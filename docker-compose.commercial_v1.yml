# GEOX Commercial v1 compose baseline.
# Includes: postgres + server + web + mqtt + worker + minio.

services:
  postgres:
    image: postgres:16
    container_name: geox-v1-postgres
    environment:
      POSTGRES_USER: landos
      POSTGRES_PASSWORD: landos_pwd
      POSTGRES_DB: landos
    ports:
      - "5433:5432"
    volumes:
      - geox_v1_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landos -d landos -h 127.0.0.1 -p 5432"]
      interval: 3s
      timeout: 2s
      retries: 20

  mqtt:
    image: eclipse-mosquitto:2
    container_name: geox-v1-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"

  minio:
    image: minio/minio:latest
    container_name: geox-v1-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9002:9001"
    volumes:
      - geox_v1_minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live > /dev/null"]
      interval: 3s
      timeout: 2s
      retries: 30

  minio-init:
    image: minio/mc:latest
    container_name: geox-v1-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      GEOX_EVIDENCE_S3_BUCKET: ${GEOX_EVIDENCE_S3_BUCKET:-evidence-exports-v1}
    restart: "no"
    entrypoint: ["/bin/sh", "-ceu"]
    command:
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "[minio-init] waiting for minio"
          sleep 1
        done
        echo "[minio-init] creating bucket $$GEOX_EVIDENCE_S3_BUCKET (idempotent)"
        mc mb --ignore-existing local/"$$GEOX_EVIDENCE_S3_BUCKET"
        echo "[minio-init] verifying bucket exists: $$GEOX_EVIDENCE_S3_BUCKET"
        mc stat local/"$$GEOX_EVIDENCE_S3_BUCKET"
        echo "[minio-init] listing buckets"
        mc ls local
        echo "[minio-init] setting bucket policy private (idempotent)"
        mc anonymous set private local/"$$GEOX_EVIDENCE_S3_BUCKET" || true
        echo "[minio-init] done"

  server:
    # Server container listens on 3000 internally.
    # Host entrypoint is http://127.0.0.1:3001 via 3001:3000 port mapping.
    # Inter-container calls must use http://server:3000.
    # Healthcheck must probe container-internal port 3000.
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      args:
        BUILD_COMMAND: pnpm --filter @geox/contracts build && pnpm --filter @geox/device-skills build && pnpm --filter @geox/server build
    image: geox/server-runtime:local
    container_name: geox-v1-server
    working_dir: /app
    init: true
    restart: unless-stopped
    command: ["node", "apps/server/dist/server.js"]
    environment:
      DB_DRIVER: postgres
      DATABASE_URL: postgres://landos:landos_pwd@postgres:5432/landos
      DB_STRICT: "1"
      NODE_ENV: development
      GEOX_SYSTEM_PROFILE: commercial_v1
      GEOX_INTERNAL_BASE_URL: http://server:3000
      ALERT_WEBHOOK_URL: ""
      ALERT_WECHAT_WEBHOOK_URL: ""
      ALERT_DINGTALK_WEBHOOK_URL: ""
      ALERT_EMAIL_WEBHOOK_URL: ""
      ALERT_EMAIL_TO: ""
      TWILIO_ACCOUNT_SID: ""
      TWILIO_AUTH_TOKEN: ""
      TWILIO_FROM_NUMBER: ""
      ALERT_SMS_TO: ""
      GEOX_EVIDENCE_STORAGE_MODE: S3_COMPAT
      GEOX_EVIDENCE_S3_ENDPOINT: http://minio:9000
      GEOX_EVIDENCE_S3_BUCKET: ${GEOX_EVIDENCE_S3_BUCKET:-evidence-exports-v1}
      GEOX_EVIDENCE_S3_REGION: us-east-1
      GEOX_EVIDENCE_S3_ACCESS_KEY_ID: minioadmin
      GEOX_EVIDENCE_S3_SECRET_ACCESS_KEY: minioadmin
      GEOX_EVIDENCE_S3_FORCE_PATH_STYLE: "true"
      GEOX_EVIDENCE_S3_PRESIGN_TTL_SEC: "900"
      GEOX_AO_ACT_TOKEN: ${GEOX_AO_ACT_TOKEN:?GEOX_AO_ACT_TOKEN is required}
      GEOX_TOKEN: ${GEOX_AO_ACT_TOKEN:?GEOX_AO_ACT_TOKEN is required}
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/v1/fields',{headers:{authorization:'Bearer x'}}).then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s

  telemetry-ingest:
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      args:
        BUILD_COMMAND: pnpm --filter @geox/contracts build && pnpm --filter @geox/telemetry-ingest build
    image: geox/telemetry-ingest-runtime:local
    container_name: geox-v1-telemetry-ingest
    working_dir: /app
    init: true
    restart: unless-stopped
    command: ["node", "apps/telemetry-ingest/dist/main.js"]
    environment:
      DB_DRIVER: postgres
      DATABASE_URL: postgres://landos:landos_pwd@postgres:5432/landos
      DB_STRICT: "1"
      NODE_ENV: development
      GEOX_SYSTEM_PROFILE: commercial_v1
      GEOX_BASE_URL: http://server:3000
      GEOX_AO_ACT_TOKEN: ${GEOX_AO_ACT_TOKEN:?GEOX_AO_ACT_TOKEN is required}
      GEOX_TENANT_ID: tenantA
      GEOX_PROJECT_ID: projectA
      GEOX_GROUP_ID: groupA
      GEOX_MQTT_URL: mqtt://mqtt:1883
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_started

  jobs:
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      args:
        BUILD_COMMAND: pnpm --filter @geox/contracts build && pnpm --filter @geox/device-skills build && pnpm --filter @geox/server build
    image: geox/jobs-runtime:local
    container_name: geox-v1-jobs
    working_dir: /app
    init: true
    restart: unless-stopped
    command: ["node", "apps/server/dist/jobs/runtime.js"]
    environment:
      DB_DRIVER: postgres
      DATABASE_URL: postgres://landos:landos_pwd@postgres:5432/landos
      DB_STRICT: "1"
      NODE_ENV: development
      GEOX_SYSTEM_PROFILE: commercial_v1
      GEOX_BASE_URL: http://server:3000
      GEOX_AO_ACT_TOKEN: ${GEOX_AO_ACT_TOKEN:?GEOX_AO_ACT_TOKEN is required}
      GEOX_TENANT_ID: tenantA
      GEOX_PROJECT_ID: projectA
      GEOX_GROUP_ID: groupA
      GEOX_MQTT_URL: mqtt://mqtt:1883
      AGRONOMY_AGENT_ENABLED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_started

  executor:
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      args:
        BUILD_COMMAND: pnpm --filter @geox/contracts build && pnpm --filter @geox/device-skills build && pnpm --filter @geox/executor build
    image: geox/executor-runtime:local
    working_dir: /app
    init: true
    restart: unless-stopped
    command: ["node", "apps/executor/dist/runtime_loop.js"]
    environment:
      DB_DRIVER: postgres
      DATABASE_URL: postgres://landos:landos_pwd@postgres:5432/landos
      DB_STRICT: "1"
      NODE_ENV: development
      GEOX_SYSTEM_PROFILE: commercial_v1
      GEOX_INTERNAL_BASE_URL: http://server:3000
      GEOX_BASE_URL: http://server:3000
      GEOX_AO_ACT_TOKEN: ${GEOX_AO_ACT_TOKEN:?GEOX_AO_ACT_TOKEN is required}
      GEOX_TENANT_ID: tenantA
      GEOX_PROJECT_ID: projectA
      GEOX_GROUP_ID: groupA
      GEOX_MQTT_URL: mqtt://mqtt:1883
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-3000}
      ALERT_WEBHOOK_URL: ""
      ALERT_WECHAT_WEBHOOK_URL: ""
      ALERT_DINGTALK_WEBHOOK_URL: ""
      ALERT_EMAIL_WEBHOOK_URL: ""
      ALERT_EMAIL_TO: ""
      TWILIO_ACCOUNT_SID: ""
      TWILIO_AUTH_TOKEN: ""
      TWILIO_FROM_NUMBER: ""
      ALERT_SMS_TO: ""
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: geox/web-runtime:local
    container_name: geox-v1-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  geox_v1_pgdata:
  geox_v1_minio_data:
