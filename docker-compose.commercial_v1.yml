# GEOX Commercial v1 compose baseline.
# Includes: postgres + server + web + mqtt + worker + minio.

services:
  postgres:
    image: postgres:16
    container_name: geox-v1-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "5433:5432"
    volumes:
      - geox_v1_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\" -h 127.0.0.1 -p 5432"]
      interval: 3s
      timeout: 2s
      retries: 20

  mqtt:
    image: eclipse-mosquitto:2
    container_name: geox-v1-mqtt
    environment:
      MQTT_USERNAME: ${MQTT_USERNAME:?MQTT_USERNAME is required}
      MQTT_PASSWORD: ${MQTT_PASSWORD:?MQTT_PASSWORD is required}
    entrypoint: ["/bin/sh", "-ceu"]
    command:
      - |
        mkdir -p /tmp/mosquitto-config /tmp/mosquitto-data /tmp/mosquitto-log
        printf 'listener 1883 0.0.0.0\nallow_anonymous false\npassword_file /tmp/mosquitto-config/passwords\npersistence false\n' > /tmp/mosquitto-config/mosquitto.conf
        mosquitto_passwd -b -c /tmp/mosquitto-config/passwords "$$MQTT_USERNAME" "$$MQTT_PASSWORD"
        exec mosquitto -c /tmp/mosquitto-config/mosquitto.conf
    ports:
      - "1883:1883"

  minio:
    image: minio/minio:latest
    container_name: geox-v1-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "9000:9000"
      - "9002:9001"
    volumes:
      - geox_v1_minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live > /dev/null"]
      interval: 3s
      timeout: 2s
      retries: 30

  minio-init:
    image: minio/mc:latest
    container_name: geox-v1-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      GEOX_EVIDENCE_S3_BUCKET: ${GEOX_EVIDENCE_S3_BUCKET:-evidence-exports-v1}
    restart: "no"
    entrypoint: ["/bin/sh", "-ceu"]
    command:
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          echo "[minio-init] waiting for minio"
          sleep 1
        done
        echo "[minio-init] creating bucket $$GEOX_EVIDENCE_S3_BUCKET (idempotent)"
        mc mb --ignore-existing local/"$$GEOX_EVIDENCE_S3_BUCKET"
        echo "[minio-init] verifying bucket exists: $$GEOX_EVIDENCE_S3_BUCKET"
        mc stat local/"$$GEOX_EVIDENCE_S3_BUCKET"
        echo "[minio-init] listing buckets"
        mc ls local
        echo "[minio-init] setting bucket policy private (idempotent)"
        mc anonymous set private local/"$$GEOX_EVIDENCE_S3_BUCKET" || true
        echo "[minio-init] done"

  server:
    # Server container listens on 3000 internally.
    # Host entrypoint is http://127.0.0.1:3001 via 3001:3000 port mapping.
    # Inter-container calls must use http://server:3000.
    # Healthcheck must probe container-internal port 3000.
    # NOTE: This is in-container liveness/readiness only, not host-side external口径.
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      args:
        BUILD_COMMAND: pnpm --filter @geox/contracts build && pnpm --filter @geox/device-skills build && pnpm --filter @geox/server build
    image: geox/server-runtime:local
    container_name: geox-v1-server
    working_dir: /app
    init: true
    restart: unless-stopped
    command: ["node", "apps/server/dist/server.js"]
    environment:
      DB_DRIVER: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_STRICT: "1"
      NODE_ENV: production
      GEOX_RUNTIME_ENV: ${GEOX_RUNTIME_ENV:-pilot}
      GEOX_TOKENS_FILE: /app/config/auth/security_acceptance_tokens.json
      GEOX_SYSTEM_PROFILE: controlled_pilot
      GEOX_INTERNAL_BASE_URL: http://server:3000
      GEOX_INTERNAL_TASK_ISSUER_TOKEN: ${GEOX_INTERNAL_TASK_ISSUER_TOKEN:-operator_token}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      GEOX_ALLOWED_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required}
      GEOX_APP_SECRET: ${APP_SECRET:?APP_SECRET is required}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      GEOX_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      MQTT_AUTH_REQUIRED: "1"
      GEOX_MQTT_AUTH_REQUIRED: "1"
      MQTT_USERNAME: ${MQTT_USERNAME:?MQTT_USERNAME is required}
      MQTT_PASSWORD: ${MQTT_PASSWORD:?MQTT_PASSWORD is required}
      GEOX_MQTT_USERNAME: ${MQTT_USERNAME:?MQTT_USERNAME is required}
      GEOX_MQTT_PASSWORD: ${MQTT_PASSWORD:?MQTT_PASSWORD is required}
      GEOX_EXECUTION_DEFAULT_DISABLED: ${GEOX_EXECUTION_DEFAULT_DISABLED:-1}
      GEOX_EXECUTION_ENABLE_EXPLICITLY: ${GEOX_EXECUTION_ENABLE_EXPLICITLY:-0}
      GEOX_EXECUTION_ENABLE_REASON: ${GEOX_EXECUTION_ENABLE_REASON:-controlled-pilot-runtime-explicit}
      GEOX_DEVTOOLS_ENABLED: ${GEOX_DEVTOOLS_ENABLED:-0}
      ALERT_WEBHOOK_URL: ""
      ALERT_WECHAT_WEBHOOK_URL: ""
      ALERT_DINGTALK_WEBHOOK_URL: ""
      ALERT_EMAIL_WEBHOOK_URL: ""
      ALERT_EMAIL_TO: ""
      TWILIO_ACCOUNT_SID: ""
      TWILIO_AUTH_TOKEN: ""
      TWILIO_FROM_NUMBER: ""
      ALERT_SMS_TO: ""
      GEOX_EVIDENCE_STORAGE_MODE: S3_COMPAT
      GEOX_EVIDENCE_S3_ENDPOINT: http://minio:9000
      GEOX_EVIDENCE_S3_PUBLIC_ENDPOINT: ${GEOX_EVIDENCE_S3_PUBLIC_ENDPOINT:-http://127.0.0.1:9000}
      GEOX_EVIDENCE_S3_BUCKET: ${GEOX_EVIDENCE_S3_BUCKET:-evidence-exports-v1}
      GEOX_EVIDENCE_S3_REGION: us-east-1
      GEOX_EVIDENCE_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      GEOX_EVIDENCE_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      GEOX_EVIDENCE_S3_FORCE_PATH_STYLE: "true"
      GEOX_EVIDENCE_S3_PRESIGN_TTL_SEC: "900"
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s

  telemetry-ingest:
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      args:
        BUILD_COMMAND: pnpm --filter @geox/contracts build && pnpm --filter @geox/telemetry-ingest build
    image: geox/telemetry-ingest-runtime:local
    container_name: geox-v1-telemetry-ingest
    working_dir: /app
    init: true
    restart: unless-stopped
    command: ["node", "apps/telemetry-ingest/dist/main.js"]
    environment:
      DB_DRIVER: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      DB_STRICT: "1"
      NODE_ENV: production
      GEOX_RUNTIME_ENV: ${GEOX_RUNTIME_ENV:-pilot}
      GEOX_SYSTEM_PROFILE: controlled_pilot
      GEOX_BASE_URL: http://server:3000
      GEOX_AO_ACT_TOKEN: ${GEOX_AO_ACT_TOKEN:?GEOX_AO_ACT_TOKEN is required}
      GEOX_TENANT_ID: tenantA
      GEOX_PROJECT_ID: projectA
      GEOX_GROUP_ID: groupA
      GEOX_MQTT_URL: mqtt://mqtt:1883
      GEOX_MQTT_USERNAME: ${MQTT_USERNAME:?MQTT_USERNAME is required}
      GEOX_MQTT_PASSWORD: ${MQTT_PASSWORD:?MQTT_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_started

  jobs:
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      args:
        BUILD_COMMAND: pnpm --filter @geox/contracts build && pnpm --filter @geox/device-skills build && pnpm --filter @geox/server build
    image: geox/jobs-runtime:local
    container_name: geox-v1-jobs
    working_dir: /app
    init: true
    restart: unless-stopped
    command: ["node", "apps/server/dist/jobs/runtime.js"]
    environment:
      DB_DRIVER: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      DB_STRICT: "1"
      NODE_ENV: production
      GEOX_RUNTIME_ENV: ${GEOX_RUNTIME_ENV:-pilot}
      GEOX_SYSTEM_PROFILE: controlled_pilot
      GEOX_WORKER_ID: geox-v1-jobs
      GEOX_WORKER_TYPE: jobs
      GEOX_BASE_URL: http://server:3000
      GEOX_AO_ACT_TOKEN: ${GEOX_AO_ACT_TOKEN:?GEOX_AO_ACT_TOKEN is required}
      GEOX_TENANT_ID: tenantA
      GEOX_PROJECT_ID: projectA
      GEOX_GROUP_ID: groupA
      GEOX_MQTT_URL: mqtt://mqtt:1883
      AGRONOMY_AGENT_ENABLED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_started

  executor:
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      args:
        BUILD_COMMAND: pnpm --filter @geox/contracts build && pnpm --filter @geox/device-skills build && pnpm --filter @geox/executor build
    image: geox/executor-runtime:local
    working_dir: /app
    init: true
    restart: unless-stopped
    command: ["node", "apps/executor/dist/runtime_loop.js"]
    environment:
      DB_DRIVER: postgres
      DATABASE_URL: postgres://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      DB_STRICT: "1"
      NODE_ENV: production
      GEOX_RUNTIME_ENV: ${GEOX_RUNTIME_ENV:-pilot}
      GEOX_SYSTEM_PROFILE: controlled_pilot
      GEOX_WORKER_ID: geox-v1-executor
      GEOX_WORKER_TYPE: executor
      GEOX_INTERNAL_BASE_URL: http://server:3000
      GEOX_BASE_URL: http://server:3000
      GEOX_AO_ACT_TOKEN: ${GEOX_EXECUTOR_TOKEN:?GEOX_EXECUTOR_TOKEN is required}
      GEOX_TENANT_ID: tenantA
      GEOX_PROJECT_ID: projectA
      GEOX_GROUP_ID: groupA
      GEOX_MQTT_URL: mqtt://mqtt:1883
      GEOX_MQTT_USERNAME: ${MQTT_USERNAME:?MQTT_USERNAME is required}
      GEOX_MQTT_PASSWORD: ${MQTT_PASSWORD:?MQTT_PASSWORD is required}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-3000}
      ALERT_WEBHOOK_URL: ""
      ALERT_WECHAT_WEBHOOK_URL: ""
      ALERT_DINGTALK_WEBHOOK_URL: ""
      ALERT_EMAIL_WEBHOOK_URL: ""
      ALERT_EMAIL_TO: ""
      TWILIO_ACCOUNT_SID: ""
      TWILIO_AUTH_TOKEN: ""
      TWILIO_FROM_NUMBER: ""
      ALERT_SMS_TO: ""
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: geox/web-runtime:local
    container_name: geox-v1-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  geox_v1_pgdata:
  geox_v1_minio_data:
