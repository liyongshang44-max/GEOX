services:
  postgres:
    image: postgres:16
    container_name: geox-postgres
    environment:
      POSTGRES_USER: landos
      POSTGRES_PASSWORD: landos_pwd
      POSTGRES_DB: landos
    ports:
      - "5433:5432"
    volumes:
      - landos_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landos -d landos -h 127.0.0.1 -p 5432"]
      interval: 3s
      timeout: 2s
      retries: 20

  server:
    # Server container listens on 3000 internally.
    # Host entrypoint is http://127.0.0.1:3001 via 3001:3000 port mapping.
    # Inter-container calls must use http://server:3000.
    # Healthcheck must probe container-internal port 3000.
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      args:
        BUILD_COMMAND: pnpm --filter @geox/contracts build && pnpm --filter @geox/server build
    image: geox/server-runtime:local
    container_name: geox-server
    working_dir: /app
    init: true
    restart: unless-stopped
    command: ["node", "apps/server/dist/server.js"]

    environment:
      DB_DRIVER: postgres
      DATABASE_URL: postgres://landos:landos_pwd@postgres:5432/landos
      DB_STRICT: "1"
      NODE_ENV: development
      CI: "1"
      PNPM_STORE_DIR: /pnpm-store
      GEOX_INTERNAL_BASE_URL: http://server:3000  # Container-internal calls use server:3000; host entrypoint is http://127.0.0.1:3001
      GEOX_EVIDENCE_STORAGE_MODE: LOCAL_MIRROR  # local/dev baseline only; commercial baseline must use S3_COMPAT.
      GEOX_EVIDENCE_OBJECT_ROOT: runtime/evidence_object_store_v1

    ports:
      - "3001:3000"

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/v1/fields',{headers:{authorization:'Bearer x'}}).then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s

  executor:
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      args:
        BUILD_COMMAND: pnpm --filter @geox/executor build
    image: geox/executor-runtime:local
    working_dir: /app
    init: true
    restart: unless-stopped
    command: ["pnpm", "--filter", "@geox/executor", "exec", "tsx", "apps/executor/src/runtime_loop.ts"]
    environment:
      NODE_ENV: development
      CI: "1"
      PNPM_STORE_DIR: /pnpm-store
      GEOX_BASE_URL: http://server:3000
      GEOX_AO_ACT_TOKEN: ${GEOX_AO_ACT_TOKEN:?GEOX_AO_ACT_TOKEN is required}
      GEOX_TENANT_ID: ${GEOX_TENANT_ID:-tenantA}
      GEOX_PROJECT_ID: ${GEOX_PROJECT_ID:-projectA}
      GEOX_GROUP_ID: ${GEOX_GROUP_ID:-groupA}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-3000}
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_started

volumes:
  landos_pgdata:
