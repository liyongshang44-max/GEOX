services:
  postgres:
    image: postgres:16
    container_name: geox-postgres
    environment:
      POSTGRES_USER: landos
      POSTGRES_PASSWORD: landos_pwd
      POSTGRES_DB: landos
    ports:
      - "5433:5432"
    volumes:
      - landos_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landos -d landos -h 127.0.0.1 -p 5432"]
      interval: 3s
      timeout: 2s
      retries: 20

  server:
    image: node:20
    container_name: geox-server
    working_dir: /app
    init: true
    restart: unless-stopped

    command:
      - sh
      - -lc
      - |
          set -e

          export CI=1
          export PNPM_STORE_DIR=/pnpm-store

          npm install -g pnpm@9.15.4

          pnpm -r install --no-frozen-lockfile --store-dir=/pnpm-store --virtual-store-dir=/pnpm-vstore
          pnpm --filter @geox/contracts build

          # 不跑 tsc，直接 tsx 运行（避免 TS 编译错误导致容器循环重启）
          pnpm --filter @geox/server exec tsx src/server.ts

    volumes:
      - ./:/app
      - geox_node_modules:/app/node_modules
      - geox_pnpm_store:/pnpm-store
      - geox_pnpm_vstore:/pnpm-vstore

    environment:
      DB_DRIVER: postgres
      DATABASE_URL: postgres://landos:landos_pwd@postgres:5432/landos
      DB_STRICT: "1"
      NODE_ENV: development
      CI: "1"
      PNPM_STORE_DIR: /pnpm-store
      GEOX_INTERNAL_BASE_URL: http://127.0.0.1:3000
      GEOX_EVIDENCE_STORAGE_MODE: LOCAL_MIRROR  # Add this line
      GEOX_EVIDENCE_OBJECT_ROOT: runtime/evidence_object_store_v1  # Add this line

    ports:
      - "3001:3000"

    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/v1/fields',{headers:{authorization:'Bearer x'}}).then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s

  executor:
    image: node:20
    working_dir: /app
    init: true
    restart: unless-stopped
    command:
      - sh
      - -lc
      - |
          set -e

          export CI=1
          export PNPM_STORE_DIR=/pnpm-store

          npm install -g pnpm@9.15.4

          pnpm -r install --no-frozen-lockfile --store-dir=/pnpm-store --virtual-store-dir=/pnpm-vstore
          pnpm --filter @geox/contracts build

          node apps/executor/src/runtime_loop.ts
    volumes:
      - ./:/app
      - geox_node_modules:/app/node_modules
      - geox_pnpm_store:/pnpm-store
      - geox_pnpm_vstore:/pnpm-vstore
    environment:
      NODE_ENV: development
      CI: "1"
      PNPM_STORE_DIR: /pnpm-store
      GEOX_BASE_URL: http://server:3000
      GEOX_AO_ACT_TOKEN: ${GEOX_AO_ACT_TOKEN:-}
      GEOX_TENANT_ID: ${GEOX_TENANT_ID:-tenantA}
      GEOX_PROJECT_ID: ${GEOX_PROJECT_ID:-projectA}
      GEOX_GROUP_ID: ${GEOX_GROUP_ID:-groupA}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-3000}
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_started

volumes:
  landos_pgdata:
  geox_pnpm_store:
  geox_pnpm_vstore:
  geox_node_modules:
