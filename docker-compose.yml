# GEOX local Compose baseline with independent MCFT-CAP-07 database bootstrap, migration, and Runtime identities.

services:
  postgres:
    image: postgres:16
    container_name: geox-postgres
    environment:
      POSTGRES_USER: landos
      POSTGRES_PASSWORD: landos_pwd
      POSTGRES_DB: landos
    ports:
      - "5433:5432"
    volumes:
      - landos_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U landos -d landos -h 127.0.0.1 -p 5432"]
      interval: 3s
      timeout: 2s
      retries: 20

  database-platform-bootstrap:
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      args:
        BUILD_COMMAND: pnpm --filter @geox/contracts build && pnpm --filter @geox/control-kernel build && pnpm --filter @geox/device-skills build && pnpm --filter @geox/skill-registry build && pnpm --filter @geox/server build
    image: geox/server-runtime:local
    working_dir: /app
    init: true
    restart: "no"
    command: ["node", "apps/server/dist/database/platform_bootstrap.js"]
    environment:
      GEOX_DB_PLATFORM_ADMIN_DATABASE_URL: postgres://landos:landos_pwd@postgres:5432/landos
      GEOX_MIGRATION_DATABASE_URL: postgres://geox_mcft_migrator_v1:${GEOX_MCFT_MIGRATOR_PASSWORD:-local-mcft-migrator-password}@postgres:5432/landos
      GEOX_RUNTIME_DATABASE_URL: postgres://geox_runtime_v1:${GEOX_RUNTIME_DATABASE_PASSWORD:-local-runtime-database-password}@postgres:5432/landos
      GEOX_MCFT_MIGRATOR_PASSWORD: ${GEOX_MCFT_MIGRATOR_PASSWORD:-local-mcft-migrator-password}
      GEOX_RUNTIME_DATABASE_PASSWORD: ${GEOX_RUNTIME_DATABASE_PASSWORD:-local-runtime-database-password}
    depends_on:
      postgres:
        condition: service_healthy

  mcft-cap07-migration:
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      args:
        BUILD_COMMAND: pnpm --filter @geox/contracts build && pnpm --filter @geox/control-kernel build && pnpm --filter @geox/device-skills build && pnpm --filter @geox/skill-registry build && pnpm --filter @geox/server build
    image: geox/server-runtime:local
    working_dir: /app
    init: true
    restart: "no"
    command: ["node", "apps/server/dist/database/mcft_cap07_migration.js"]
    environment:
      GEOX_MIGRATION_DATABASE_URL: postgres://geox_mcft_migrator_v1:${GEOX_MCFT_MIGRATOR_PASSWORD:-local-mcft-migrator-password}@postgres:5432/landos
      GEOX_DEPLOYMENT_SUBJECT_COMMIT: ${GEOX_DEPLOYMENT_SUBJECT_COMMIT:-0000000000000000000000000000000000000000}
    depends_on:
      database-platform-bootstrap:
        condition: service_completed_successfully

  server:
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      args:
        BUILD_COMMAND: pnpm --filter @geox/contracts build && pnpm --filter @geox/control-kernel build && pnpm --filter @geox/device-skills build && pnpm --filter @geox/skill-registry build && pnpm --filter @geox/server build
    image: geox/server-runtime:local
    container_name: geox-server
    working_dir: /app
    init: true
    restart: unless-stopped
    command: ["node", "apps/server/dist/server.js"]
    environment:
      DB_DRIVER: postgres
      DATABASE_URL: postgres://geox_runtime_v1:${GEOX_RUNTIME_DATABASE_PASSWORD:-local-runtime-database-password}@postgres:5432/landos
      GEOX_RUNTIME_DATABASE_URL: postgres://geox_runtime_v1:${GEOX_RUNTIME_DATABASE_PASSWORD:-local-runtime-database-password}@postgres:5432/landos
      GEOX_RUNTIME_DATABASE_ROLE: geox_runtime_v1
      GEOX_MCFT_CAP_07_STARTUP_PREFLIGHT_REQUIRED: "1"
      DB_STRICT: "1"
      NODE_ENV: development
      CI: "1"
      PNPM_STORE_DIR: /pnpm-store
      GEOX_INTERNAL_BASE_URL: http://server:3000
      GEOX_TOKENS_FILE: /app/config/auth/example_tokens.json
      GEOX_EVIDENCE_STORAGE_MODE: LOCAL_MIRROR
      GEOX_EVIDENCE_OBJECT_ROOT: runtime/evidence_object_store_v1
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mcft-cap07-migration:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/v1/fields',{headers:{authorization:'Bearer x'}}).then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s

  executor:
    build:
      context: .
      dockerfile: docker/runtime.Dockerfile
      args:
        BUILD_COMMAND: pnpm --filter @geox/executor build
    image: geox/executor-runtime:local
    working_dir: /app
    init: true
    restart: unless-stopped
    command: ["pnpm", "--filter", "@geox/executor", "exec", "tsx", "apps/executor/src/runtime_loop.ts"]
    environment:
      NODE_ENV: development
      CI: "1"
      PNPM_STORE_DIR: /pnpm-store
      GEOX_BASE_URL: http://server:3000
      GEOX_AO_ACT_TOKEN: ${GEOX_AO_ACT_TOKEN:?GEOX_AO_ACT_TOKEN is required}
      GEOX_TENANT_ID: ${GEOX_TENANT_ID:-tenantA}
      GEOX_PROJECT_ID: ${GEOX_PROJECT_ID:-projectA}
      GEOX_GROUP_ID: ${GEOX_GROUP_ID:-groupA}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-3000}
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_started

volumes:
  landos_pgdata:
