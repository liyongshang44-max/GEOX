name: mcft-cap-06-s6-paired-shadow-effectiveness-postmerge-proof

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s6-paired-shadow-effectiveness-postmerge-proof.yml'

permissions:
  contents: read

jobs:
  exact-merged-main-s6-effectiveness-proof:
    runs-on: ubuntu-latest
    env:
      MCFT_CAP_06_S6_PAIRED_SHADOW_EFFECTIVENESS_BASELINE_REF: b1111e39ed70b39098362a468eac14101bc29ee3
    steps:
      - name: Checkout proof carrier
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify exact proof topology
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "1333ef2f1613745b785d01859e5355ea6fd27274"
          test "$(git rev-list --count b1111e39ed70b39098362a468eac14101bc29ee3..7dac45afa621c1b59c8656a7b47cb6ff1f877b3e)" = "16"
          test "$(git rev-list --count b1111e39ed70b39098362a468eac14101bc29ee3..1333ef2f1613745b785d01859e5355ea6fd27274)" = "17"
          test "$(git diff --name-only b1111e39ed70b39098362a468eac14101bc29ee3...1333ef2f1613745b785d01859e5355ea6fd27274 | wc -l | tr -d ' ')" = "12"
          git diff --quiet 7dac45afa621c1b59c8656a7b47cb6ff1f877b3e 1333ef2f1613745b785d01859e5355ea6fd27274

      - name: Checkout exact S6 effectiveness merge
        uses: actions/checkout@v4
        with:
          ref: 1333ef2f1613745b785d01859e5355ea6fd27274
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1

      - name: Run exact merged-main S6 effectiveness Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S6_PAIRED_SHADOW_EFFECTIVENESS.cjs

      - name: Verify exact merged-main structured effectiveness
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S6_PAIRED_SHADOW_EFFECTIVENESS_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s6_paired_shadow_effectiveness_result_v1') throw new Error('S6_EFFECTIVENESS_POSTMERGE_SCHEMA_MISMATCH');
          if (result.status !== 'PASS') throw new Error('S6_EFFECTIVENESS_POSTMERGE_NOT_PASS');
          if (result.exact_head !== '1333ef2f1613745b785d01859e5355ea6fd27274') throw new Error('S6_EFFECTIVENESS_POSTMERGE_HEAD_MISMATCH');
          if (result.changed_file_count !== 12 || result.logical_commit_count !== 17) throw new Error('S6_EFFECTIVENESS_POSTMERGE_TOPOLOGY_MISMATCH');
          if (result.s6_status !== 'MERGED_EFFECTIVE' || result.s6_effective !== true) throw new Error('S6_EFFECTIVENESS_POSTMERGE_STATUS_MISMATCH');
          if (result.active_delivery_slice_id !== 'MCFT-CAP-06.MCFT-03-12.SHADOW-EVALUATION-COMMIT-V1') throw new Error('S6_EFFECTIVENESS_POSTMERGE_FRONTIER_MISMATCH');
          if (result.s7_authorized !== true || result.s7_implementation_started !== false) throw new Error('S6_EFFECTIVENESS_POSTMERGE_S7_AUTHORIZATION_MISMATCH');
          if (result.governance_writeback_canonical_write_count !== 0 || result.production_candidate_append_count !== 0 || result.production_evaluation_append_count !== 0 || result.projection_write_count !== 0 || result.model_activation_count !== 0) throw new Error('S6_EFFECTIVENESS_POSTMERGE_WRITE_BOUNDARY_VIOLATION');
          if (result.active_config_switch_count !== 0 || result.runtime_parameter_change_count !== 0 || result.state_mutation_count !== 0 || result.checkpoint_mutation_count !== 0 || result.migration_count !== 0) throw new Error('S6_EFFECTIVENESS_POSTMERGE_RUNTIME_BOUNDARY_VIOLATION');
          NODE

      - name: Upload proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s6-paired-shadow-effectiveness-postmerge-proof-evidence
          path: acceptance-output/
          if-no-files-found: error
