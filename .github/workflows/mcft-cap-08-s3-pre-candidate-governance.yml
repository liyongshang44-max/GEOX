name: mcft-cap-08-s3-pre-candidate-governance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact historical governance subject
        uses: actions/checkout@v4
        with:
          ref: 13e3e1260c70b9c2b6dd1fd6b8d57fd50fb3202e
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20.11.1"
      - name: Verify exact merged S3 pre-candidate governance
        env:
          BASE_SHA: e8dc01b72def45c9931d70dab06f78dbc2b5a527
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_PRE_CANDIDATE_GOVERNANCE.cjs
      - name: Upload governance result
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap08-s3-pre-candidate-governance-13e3e126
          path: tmp/mcft-cap08-s3-pre-candidate-governance/MCFT_CAP_08_S3_PRE_CANDIDATE_GOVERNANCE_RESULT.json
          if-no-files-found: error
          retention-days: 30
