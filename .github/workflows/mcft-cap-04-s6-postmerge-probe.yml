name: MCFT-CAP-04 S6 postmerge probe

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s6-postmerge-probe-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify exact merged-main identity
        run: |
          test "$(git branch --show-current)" = "main"
          test "$(git rev-parse HEAD)" = "ea9ddfeeda88a3bb0a3b8abd3b821b8a3965dac3"
          test "$(git rev-parse origin/main)" = "ea9ddfeeda88a3bb0a3b8abd3b821b8a3965dac3"

      - name: Run merged-main S6 governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S6_SINGLE_TICK.cjs --postmerge

      - name: Verify complete task integrity
        run: |
          echo 'ea63e92a64b760b84c49428b1d3a245ce5cd94bb08daa9c6b971a53861b90a63  docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-TASK.md' | sha256sum -c -
          test "$(wc -c < docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-TASK.md)" -eq 77603
