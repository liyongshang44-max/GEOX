name: mcft-candidate-declaration-integrity-v1

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-candidate-declaration-integrity.yml'
      - 'docs/digital_twin/mcft/MCFT-DELIVERY-POLICY-V1.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CANDIDATE_DECLARATION_INTEGRITY.cjs'
  pull_request_target:
    types: [opened, synchronize, edited, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: read

concurrency:
  group: mcft-candidate-declaration-integrity-${{ github.event_name }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  policy-contract-selftest:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact policy candidate head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
      - name: Run generic candidate declaration policy selftest
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CANDIDATE_DECLARATION_INTEGRITY.cjs --selftest
      - name: Verify generic policy result
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const r = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CANDIDATE_DECLARATION_INTEGRITY_RESULT.json','utf8'));
          if (r.status !== 'PASS' || r.mode !== 'SELFTEST') throw new Error(`CANDIDATE_DECLARATION_SELFTEST_FAILED:${r.error || 'UNKNOWN'}`);
          if (r.generic_rule_dispatch !== true || r.fixed_slice_constants === true) throw new Error('CANDIDATE_DECLARATION_NOT_GENERIC');
          NODE
      - name: Upload policy selftest evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-candidate-declaration-integrity-selftest-${{ github.run_id }}
          path: acceptance-output/MCFT_CANDIDATE_DECLARATION_INTEGRITY_RESULT.json
          if-no-files-found: error
          retention-days: 30

  enforce-candidate-declaration:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout merged Delivery Policy authority only
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
      - name: Enforce generic exact-head candidate declaration integrity
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CANDIDATE_DECLARATION_INTEGRITY.cjs --enforce
      - name: Upload candidate declaration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-candidate-declaration-integrity-${{ github.run_id }}
          path: acceptance-output/MCFT_CANDIDATE_DECLARATION_INTEGRITY_RESULT.json
          if-no-files-found: error
          retention-days: 90
