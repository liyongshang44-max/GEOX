name: mcft-candidate-declaration-integrity-v1-historical
# Historical MCFT Delivery Policy V1 S9-specific rule. Superseded by generic V2.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  historical-s9-rule-selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 710e3a5696f66396cacf2920c305c7956ff7e6b4
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
      - name: Reproduce historical S9-specific rule selftest
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CANDIDATE_DECLARATION_INTEGRITY.cjs --selftest
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mcft-candidate-declaration-integrity-v1-historical-evidence
          path: acceptance-output/MCFT_CANDIDATE_DECLARATION_INTEGRITY_RESULT.json
          if-no-files-found: error
