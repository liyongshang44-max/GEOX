name: MCFT-CAP-04 S5A finalize

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s5a-a1-a2-record-set-builders-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout S5A branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Materialize S5A governance
        run: node .cap04-s5a/materialize_s5a.cjs

      - name: Recursive typecheck
        run: pnpm -r typecheck

      - name: Run positive A1 A2 builder acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_A1_A2_RECORD_SET_BUILDERS.ts

      - name: Run negative A1 A2 builder acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_A1_A2_RECORD_SET_BUILDERS_NEGATIVE.ts

      - name: Remove temporary materialization and diagnostic files
        run: |
          rm -rf .cap04-s5a
          rm -f .github/workflows/mcft-cap-04-s5a-diagnostic.yml
          rm -f .github/workflows/mcft-cap-04-s5a-finalize.yml

      - name: Run final S5A governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S5A_A1_A2_BUILDERS.cjs --final

      - name: Verify patch integrity
        run: git diff --check f0fc64d487ba6ed34d0c77178fed45e707092a07

      - name: Commit exact final candidate
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(mcft-cap-04): materialize S5A A1 A2 builder candidate"
          git push origin "HEAD:${HEAD_BRANCH}"
