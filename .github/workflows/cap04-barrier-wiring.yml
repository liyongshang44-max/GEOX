name: cap04-barrier-wiring

on:
  push:
    branches:
      - agent/mcft-cap-04-s6-single-tick-integration-v1

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s6-single-tick-integration-v1
      - name: Wire barrier into PostgreSQL acceptance
        shell: python
        run: |
          from pathlib import Path
          path = Path('scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_SINGLE_TICK_INTEGRATION_DB.ts')
          text = path.read_text(encoding='utf-8')
          anchor = '''import { PrepareNextTickInputServiceV1 } from "../../apps/server/src/runtime/twin_runtime/next_tick_input_service_v1.js";\n'''
          insert = '''import { Cap04PendingScenarioBarrierSingleTickServiceV1 } from "../../apps/server/src/runtime/twin_runtime/pending_scenario_barrier_service_v1.js";\nimport { PrepareNextTickInputServiceV1 } from "../../apps/server/src/runtime/twin_runtime/next_tick_input_service_v1.js";\n'''
          if anchor not in text:
              raise SystemExit('import anchor missing')
          text = text.replace(anchor, insert, 1)
          old = '''  service: Cap04ForecastScenarioSingleTickServiceV1;\n'''
          new = '''  service: Cap04PendingScenarioBarrierSingleTickServiceV1;\n'''
          if old not in text:
              raise SystemExit('return type anchor missing')
          text = text.replace(old, new, 1)
          old = '''  const service = new Cap04ForecastScenarioSingleTickServiceV1(\n    new PrepareNextTickInputServiceV1(nextTickRepository),\n    source,\n    runtimeRepository,\n    persistenceAdapterV1(runtimeRepository, repository),\n  );\n'''
          new = '''  const handoffService = new PrepareNextTickInputServiceV1(nextTickRepository);\n  const persistence = persistenceAdapterV1(runtimeRepository, repository);\n  const innerService = new Cap04ForecastScenarioSingleTickServiceV1(\n    handoffService,\n    source,\n    runtimeRepository,\n    persistence,\n  );\n  const service = new Cap04PendingScenarioBarrierSingleTickServiceV1(\n    handoffService,\n    runtimeRepository,\n    persistence,\n    innerService,\n  );\n'''
          if old not in text:
              raise SystemExit('service construction anchor missing')
          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
      - name: Remove temporary patcher
        run: rm .github/workflows/cap04-barrier-wiring.yml
      - name: Commit barrier wiring
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_SINGLE_TICK_INTEGRATION_DB.ts .github/workflows/cap04-barrier-wiring.yml
          git commit -m "test(mcft-cap-04): wire pending barrier into PostgreSQL acceptance"
          git push origin HEAD:agent/mcft-cap-04-s6-single-tick-integration-v1
