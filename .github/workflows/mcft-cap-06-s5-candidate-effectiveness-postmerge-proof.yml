name: mcft-cap-06-s5-candidate-effectiveness-postmerge-proof

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s5-candidate-effectiveness-postmerge-proof.yml'

permissions:
  contents: read

jobs:
  exact-merged-main-effectiveness-proof:
    runs-on: ubuntu-latest
    env:
      MCFT_CAP_06_S5_CANDIDATE_EFFECTIVENESS_BASELINE_REF: 8edbc27ea0dfabd41faede9fb0f8bed11058c260
    steps:
      - name: Checkout proof carrier
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify exact proof topology
        shell: bash
        run: |
          test "$(git rev-parse HEAD^)" = "5f73ed68cad479276ca55fb70391ae4543cb3dcc"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "5f73ed68cad479276ca55fb70391ae4543cb3dcc"
          test -z "$(git diff --name-only 5047912c526a4e98e0c8fae14a82bb7094c15279 5f73ed68cad479276ca55fb70391ae4543cb3dcc)"
          test "$(git rev-list --count 8edbc27ea0dfabd41faede9fb0f8bed11058c260..5047912c526a4e98e0c8fae14a82bb7094c15279)" = "23"
          test "$(git rev-list --count 8edbc27ea0dfabd41faede9fb0f8bed11058c260..5f73ed68cad479276ca55fb70391ae4543cb3dcc)" = "24"
          test "$(git diff --name-only 8edbc27ea0dfabd41faede9fb0f8bed11058c260...5f73ed68cad479276ca55fb70391ae4543cb3dcc | wc -l | tr -d ' ')" = "16"

      - name: Checkout exact S5 effectiveness merge
        uses: actions/checkout@v4
        with:
          ref: 5f73ed68cad479276ca55fb70391ae4543cb3dcc
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1

      - name: Run exact merged-main S5 effectiveness Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S5_CANDIDATE_EFFECTIVENESS.cjs

      - name: Verify exact merged-main structured effectiveness
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S5_CANDIDATE_EFFECTIVENESS_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s5_candidate_effectiveness_result_v1') throw new Error('POSTMERGE_S5_EFFECTIVENESS_SCHEMA_MISMATCH');
          if (result.status !== 'PASS') throw new Error('POSTMERGE_S5_EFFECTIVENESS_NOT_PASS');
          if (result.exact_head !== '5f73ed68cad479276ca55fb70391ae4543cb3dcc') throw new Error('POSTMERGE_S5_EFFECTIVENESS_HEAD_MISMATCH');
          if (result.changed_file_count !== 16 || result.logical_commit_count !== 24) throw new Error('POSTMERGE_S5_EFFECTIVENESS_DELTA_MISMATCH');
          if (result.s5_status !== 'MERGED_EFFECTIVE' || result.s5_effective !== true) throw new Error('POSTMERGE_S5_EFFECTIVENESS_STATUS_MISMATCH');
          if (result.active_delivery_slice_id !== 'MCFT-CAP-06.MCFT-06-09-11-12.PAIRED-HISTORICAL-SHADOW-COMPUTE-V1') throw new Error('POSTMERGE_S5_EFFECTIVENESS_FRONTIER_MISMATCH');
          if (result.s6_authorized !== true || result.s6_implementation_started !== false) throw new Error('POSTMERGE_S5_EFFECTIVENESS_S6_MISMATCH');
          if (result.governance_writeback_canonical_write_count !== 0 || result.production_candidate_append_count !== 0 || result.production_evaluation_append_count !== 0 || result.model_activation_count !== 0) throw new Error('POSTMERGE_S5_EFFECTIVENESS_WRITE_BOUNDARY_VIOLATION');
          if (result.active_config_switch_count !== 0 || result.runtime_parameter_change_count !== 0 || result.state_mutation_count !== 0 || result.checkpoint_mutation_count !== 0 || result.migration_count !== 0) throw new Error('POSTMERGE_S5_EFFECTIVENESS_RUNTIME_BOUNDARY_VIOLATION');
          NODE

      - name: Upload proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s5-candidate-effectiveness-postmerge-proof
          path: acceptance-output/
          if-no-files-found: error
