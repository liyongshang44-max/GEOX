name: mcft-cap-06-s8-restart-readback-rebuild-effectiveness
# Historical MCFT-CAP-06 workflow: automatic triggers frozen after final repair.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  s8-restart-readback-rebuild-effectiveness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow carrier
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve frozen S8 effectiveness validation ref
        id: validation
        shell: bash
        run: |
          set -euo pipefail
          EFFECTIVE=$(node -e "const s=require('./docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S8-RESTART-READBACK-REBUILD-STATUS.json'); process.stdout.write(String(s.s8_effective === true));")
          if [ "$EFFECTIVE" = 'true' ]; then
            echo 'ref=cc95f9ebced0c7f8dc92d2a0b5d9716e06c3ec2c' >> "$GITHUB_OUTPUT"
            echo 'baseline=a573e741ea0d2b84bfc3727af3412eaa4552fdd0' >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = 'pull_request' ]; then
            echo 'ref=${{ github.event.pull_request.head.sha }}' >> "$GITHUB_OUTPUT"
            echo 'baseline=${{ github.event.pull_request.base.sha }}' >> "$GITHUB_OUTPUT"
          else
            echo 'ref=${{ github.sha }}' >> "$GITHUB_OUTPUT"
            echo 'baseline=a573e741ea0d2b84bfc3727af3412eaa4552fdd0' >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout exact S8 effectiveness authority
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.validation.outputs.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'

      - name: Run S8 restart/readback/rebuild effectiveness Gate
        env:
          MCFT_CAP_06_S8_EFFECTIVENESS_BASE_REF: ${{ steps.validation.outputs.baseline }}
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S8_RESTART_READBACK_REBUILD_EFFECTIVENESS.cjs

      - name: Verify structured S8 effectiveness result
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const p = 'acceptance-output/MCFT_CAP_06_S8_RESTART_READBACK_REBUILD_EFFECTIVENESS_RESULT.json';
          const result = JSON.parse(fs.readFileSync(p, 'utf8'));
          if (result.status !== 'PASS') throw new Error(`S8_EFFECTIVENESS_NOT_PASS:${result.error || 'UNKNOWN'}`);
          if (result.changed_file_count !== 7) throw new Error('S8_EFFECTIVENESS_FILE_COUNT_INVALID');
          if (result.taskbook_version !== 'v0.4.0') throw new Error('S8_EFFECTIVENESS_TASKBOOK_VERSION_INVALID');
          if (result.s8_status !== 'MERGED_EFFECTIVE' || result.s8_effective !== true) throw new Error('S8_EFFECTIVENESS_STATUS_INVALID');
          if (result.s9_authorized !== true || result.s9_implementation_started !== false) throw new Error('S8_EFFECTIVENESS_S9_FRONTIER_INVALID');
          if (result.active_delivery_slice_id !== 'MCFT-CAP-06.MCFT-04-06-08-09-12.POST-EVALUATION-NON-CONSUMPTION-TICK-V1') throw new Error('S8_EFFECTIVENESS_ACTIVE_SLICE_INVALID');
          if (result.next_repository_action !== 'IMPLEMENT_S9_POST_EVALUATION_NON_CONSUMPTION_TICK') throw new Error('S8_EFFECTIVENESS_NEXT_ACTION_INVALID');
          if (result.new_prerequisite_inserted !== false || result.new_slice_inserted !== false) throw new Error('S8_EFFECTIVENESS_AD_HOC_NODE_VIOLATION');
          NODE

      - name: Upload S8 effectiveness evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s8-restart-readback-rebuild-effectiveness-evidence
          path: acceptance-output/MCFT_CAP_06_S8_RESTART_READBACK_REBUILD_EFFECTIVENESS_RESULT.json
          if-no-files-found: error
