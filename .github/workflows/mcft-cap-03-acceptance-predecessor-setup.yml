name: mcft-cap-03-acceptance-predecessor-setup

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-03-acceptance-predecessor-setup.yml'
      - 'scripts/remediation/APPLY_MCFT_CAP_03_ACCEPTANCE_PREDECESSOR_SETUP.py'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_03_ASSIMILATED_PERSISTENCE_RECOVERY_DB.ts'

permissions:
  contents: write

jobs:
  prove-and-commit:
    if: github.head_ref == 'agent/mcft-cap-03-acceptance-predecessor-setup-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: landos
          POSTGRES_PASSWORD: ci-pilot-postgres-strong-2026
          POSTGRES_DB: mcft_cap03_acceptance
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U landos -d mcft_cap03_acceptance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://landos:ci-pilot-postgres-strong-2026@127.0.0.1:5433/mcft_cap03_acceptance
      MCFT_CAP_03_S3B_DESTRUCTIVE_ACCEPTANCE: "1"
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply acceptance-only correction
        run: python scripts/remediation/APPLY_MCFT_CAP_03_ACCEPTANCE_PREDECESSOR_SETUP.py

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: CAP-03 inherited recovery acceptance
        run: |
          set -o pipefail
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_03_ASSIMILATED_PERSISTENCE_RECOVERY_DB.ts 2>&1 | tee /tmp/cap03-acceptance.log

      - name: Upload CAP-03 diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cap03-acceptance-predecessor-setup-diagnostics
          path: /tmp/cap03-acceptance.log

      - name: Commit proven acceptance correction
        run: |
          set -o pipefail
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f -- scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_03_ASSIMILATED_PERSISTENCE_RECOVERY_DB.ts
          if git diff --cached --quiet; then
            echo 'No acceptance correction required'
            exit 0
          fi
          git commit -m 'MCFT-CAP-03: seed frozen predecessor handoff coherently'
          git push origin HEAD:${{ github.head_ref }}
