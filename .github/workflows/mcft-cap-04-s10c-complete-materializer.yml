losure_effective===true,'closure effective');check((x.capability_status==='COMPLETE'||x.capability_complete===true),'capability complete');exact(x.pending_completion_claims,[],'pending empty');exact(x.effective_completion_claims,claims,'24 effective claims');check(x.successor_authorized===false||x===s,'successor unauthorized')}check(c.status==='COMPLETE'&&c.implementation_status==='COMPLETE','closure status COMPLETE');check(r.status==='COMPLETE','record COMPLETE');check(f.status==='COMPLETE'&&f.implementation_status==='COMPLETE'&&f.active_delivery_slice_id===null,'finalization COMPLETE');check(m.status==='COMPLETE'&&m.effectiveness_condition_satisfied===true,'main verification effective');check(e.status==='COMPLETE'&&e.reconciliation_phase==='EFFECTIVE'&&e.effectiveness_condition_satisfied===true,'effectiveness COMPLETE');check(e.s10c_effectiveness.evidence_merge_commit===BASE&&e.s10c_effectiveness.reconciliation_workflow_run===29261294502,'S10C evidence exact');check(!e.preserved_nonclaims.includes('NO_MCFT_CAP_04_COMPLETE_CLAIM'),'temporary nonclaim removed');check(d.successor_authorized===false&&e.successor_authorized===false,'CAP05 unauthorized');const tracked=git(['diff','--name-only',BASE]).split(/\\r?\\n/).filter(Boolean),untracked=git(['ls-files','--others','--exclude-standard']).split(/\\r?\\n/).filter(Boolean),changed=[...new Set([...tracked,...untracked])].sort();exact(changed,files,'exact changed files');for(const x of changed){check(!x.startsWith('apps/server/src/'),'no Runtime '+x);check(!x.startsWith('apps/server/db/migrations/'),'no migration '+x);check(!x.startsWith('apps/web/'),'no web '+x);check(!x.startsWith('.github/workflows/'),'no workflow '+x)}if(MODE==='postmerge'){check(git(['branch','--show-current'])==='main','postmerge on main');check(git(['rev-parse','HEAD'])===git(['rev-parse','origin/main']),'postmerge main equals origin/main')}console.log('MCFT-CAP-04 final effectiveness '+MODE+': '+pass+' PASS, '+fail+' FAIL');if(fail)process.exit(1