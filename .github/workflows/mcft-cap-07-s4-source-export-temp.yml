name: mcft-cap-07-s4-source-export-temp
on:
  pull_request:
    paths: ['.github/workflows/mcft-cap-07-s4-source-export-temp.yml']
permissions:
  contents: read
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture server typecheck
        shell: bash
        run: |
          set +e
          pnpm --filter @geox/server typecheck > s4-typecheck.log 2>&1
          code=$?
          echo "$code" > s4-typecheck-exit.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-07-s4-typecheck-diagnostic
          path: |
            s4-typecheck.log
            s4-typecheck-exit.txt
          retention-days: 1
