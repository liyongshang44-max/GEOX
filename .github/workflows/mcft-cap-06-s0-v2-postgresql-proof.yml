name: mcft-cap-06-s0-v2-postgresql-proof

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/server/src/domain/twin_runtime/calibration_case_graph_qualification_v2.ts"
      - "apps/server/src/persistence/twin_runtime/postgres_cap06_repository_history_case_graph_reader_v2.ts"
      - "scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_CASE_GRAPH_QUALIFICATION_V4.ts"
      - "scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S0_V2_QUALIFY_EXISTING_DB.ts"
      - "scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S0_V2_POSTGRESQL.ts"
      - ".github/workflows/mcft-cap-06-s0-v2-postgresql-proof.yml"

jobs:
  formal-postgresql-qualification:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres

    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Assert exact source identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run server typecheck
        run: pnpm run typecheck:server

      - name: Run pure dual-Config qualification acceptance
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_CASE_GRAPH_QUALIFICATION_V4.ts

      - name: Run formal CAP-05 reconstruction and S0 v2 PostgreSQL qualification
        shell: bash
        run: |
          mkdir -p acceptance-output
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S0_V2_POSTGRESQL.ts 2>&1 | tee acceptance-output/MCFT_CAP_06_S0_V2_POSTGRESQL_PROOF.log

      - name: Upload proof log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s0-v2-postgresql-proof
          path: acceptance-output/MCFT_CAP_06_S0_V2_POSTGRESQL_PROOF.log
          if-no-files-found: warn
