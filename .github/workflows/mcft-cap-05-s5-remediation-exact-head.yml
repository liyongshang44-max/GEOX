name: MCFT-CAP-05 S5 remediation exact-head verification

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-05-s5-remediation-exact-head-probe-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mcft_cap05_s5_remediation
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mcft_cap05_s5_remediation"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/mcft_cap05_s5_remediation
      MCFT_CAP_05_S5_REMEDIATION_DESTRUCTIVE_ACCEPTANCE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-05-s5-remediation-recovery-hash-fixed-point-v1
          fetch-depth: 0

      - name: Verify exact remediation head
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin agent/mcft-cap-05-s5-remediation-recovery-hash-fixed-point-v1
          test "$(git rev-parse HEAD)" = "4d9319f468f420c43dc4de80993a0712b7b0da03"
          test "$(git rev-parse origin/agent/mcft-cap-05-s5-remediation-recovery-hash-fixed-point-v1)" = "4d9319f468f420c43dc4de80993a0712b7b0da03"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Run remediation governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S5_REMEDIATION.cjs

      - name: Run remediation PostgreSQL acceptance
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_S5_REMEDIATION_DB.ts

      - name: Create S3 regression database
        run: PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d postgres -c 'CREATE DATABASE mcft_cap05_s3_remediation_regression'

      - name: Run S3 persistence and recovery regression
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/mcft_cap05_s3_remediation_regression
          MCFT_CAP_05_S3_DESTRUCTIVE_ACCEPTANCE: "1"
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_PERSISTENCE_RECOVERY_DB.ts

      - name: Typecheck repository
        run: pnpm -r typecheck
