name: pfa2-validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-pfa2-head:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      PFA2_HEAD_SHA: e82bcb8e11d78473d50409070f0581051c7152b2
    steps:
      - name: Checkout exact PFA-2 head
        uses: actions/checkout@v4
        with:
          ref: e82bcb8e11d78473d50409070f0581051c7152b2
          fetch-depth: 0

      - name: Fetch main baseline
        run: git fetch origin main:refs/remotes/origin/main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Initialize validation evidence
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/pfa2-validation"
          mkdir -p "$OUT"
          test "$(git rev-parse HEAD)" = "$PFA2_HEAD_SHA"
          git rev-parse HEAD | tee "$OUT/validated-head.txt"
          git diff --name-only origin/main...HEAD | tee "$OUT/changed-files.txt"

      - name: Run PFA-2 static locale contract gate
        run: |
          set -euo pipefail
          node scripts/frontend_acceptance/ACCEPTANCE_PFA_2_LOCALE_CONTRACT.cjs 2>&1 | tee "$RUNNER_TEMP/pfa2-validation/pfa2-static.log"

      - name: Run typecheck and build
        run: |
          set -euo pipefail
          pnpm -r typecheck 2>&1 | tee "$RUNNER_TEMP/pfa2-validation/typecheck.log"
          pnpm -r build 2>&1 | tee "$RUNNER_TEMP/pfa2-validation/build.log"

      - name: Run bundle budget checker
        run: |
          set -euo pipefail
          node scripts/frontend_acceptance/CHECK_PFE_10_WEB_BUNDLE_BUDGET.cjs 2>&1 | tee "$RUNNER_TEMP/pfa2-validation/bundle-budget.log"
          cp docs/audit/PFE_10_BUNDLE_BUDGET_REPORT.md "$RUNNER_TEMP/pfa2-validation/" || true
          rm -f docs/audit/PFE_10_BUNDLE_BUDGET_REPORT.md

      - name: Record phase-scoped legacy gate outcomes
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/pfa2-validation"
          set +e
          node scripts/frontend_acceptance/ACCEPTANCE_PFE_11_PRODUCT_COPY_I18N_COMPLETION.cjs > "$OUT/pfe11-legacy-gate.log" 2>&1
          PFE11_RC=$?
          node scripts/frontend_acceptance/ACCEPTANCE_PFA_1_RUNTIME_API_BASE_CAPTURE.cjs > "$OUT/pfa1-legacy-gate.log" 2>&1
          PFA1_RC=$?
          node scripts/frontend_acceptance/ACCEPTANCE_PFA_0_PAGE_QUALITY_AUDIT.cjs > "$OUT/pfa0-legacy-gate.log" 2>&1
          PFA0_RC=$?
          node scripts/frontend_acceptance/ACCEPTANCE_PFE_13_FRONTEND_PRODUCT_V1_FREEZE.cjs > "$OUT/pfe13-legacy-gate.log" 2>&1
          PFE13_RC=$?
          set -e
          test "$PFE11_RC" -ne 0
          test "$PFA1_RC" -ne 0
          test "$PFA0_RC" -ne 0
          test "$PFE13_RC" -ne 0
          grep -q 'ASSERTION_FAILED:exists:apps/web/src/components/common/RuntimeTextGuard.tsx' "$OUT/pfe11-legacy-gate.log"
          grep -q 'ASSERTION_FAILED:changed_files_are_pfa1_only' "$OUT/pfa1-legacy-gate.log"
          grep -q 'ASSERTION_FAILED:changed_files_allowlist' "$OUT/pfa0-legacy-gate.log"
          grep -q 'ASSERTION_FAILED:changed_files_allowlist' "$OUT/pfe13-legacy-gate.log"
          printf 'PFE-11 legacy gate: phase-scoped N/A (expects RuntimeTextGuard baseline=8)\nPFA-1 legacy gate: phase-scoped N/A (expects PFA-1-only diff)\nPFA-0 legacy gate: phase-scoped N/A (forbids later runtime-source changes)\nPFE-13 legacy gate: phase-scoped N/A (freeze-phase diff gate)\n' | tee "$OUT/legacy-gate-classification.txt"

      - name: Run successor regression proofs
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/pfa2-validation"
          git diff --quiet origin/main...HEAD -- \
            apps/web/src/api/client.ts \
            docs/frontend-acceptance/PFA-1-RUNTIME-API-BASE-CAPTURE.md \
            scripts/frontend_acceptance/ACCEPTANCE_PFA_1_RUNTIME_API_BASE_CAPTURE.cjs \
            scripts/frontend_acceptance/CAPTURE_PFA_0_PAGE_REVIEW.cjs
          git diff --quiet origin/main...HEAD -- \
            docs/frontend-acceptance/PFA-0-PAGE-QUALITY-AUDIT.md \
            docs/frontend-acceptance/PFA-0-REVIEW-MANIFEST.json \
            docs/frontend-acceptance/PFA-0-ROUTE-REVIEW-MATRIX.json \
            docs/frontend-acceptance/PFA-0-ISSUE-REGISTER.md \
            scripts/frontend_acceptance/ACCEPTANCE_PFA_0_PAGE_QUALITY_AUDIT.cjs \
            scripts/frontend_acceptance/CAPTURE_PFA_0_PAGE_REVIEW.cjs
          git diff --quiet origin/main...HEAD -- \
            docs/frontend-productization/PFE-11-PRODUCT-COPY-I18N-COMPLETION.md \
            docs/frontend-productization/PFE-11-COPY-MATRIX.md \
            docs/frontend-productization/PFE-11-I18N-COVERAGE-MATRIX.md \
            docs/frontend-productization/PFE-11-COPY-ISSUE-REGISTER.md \
            apps/web/src/lib/productSurfaceLabels.ts
          git diff --quiet origin/main...HEAD -- \
            docs/frontend-productization/PFE-13-FREEZE-MANIFEST.json \
            docs/frontend-productization/PFE-13-ROUTE-INVENTORY.json \
            docs/frontend-productization/PFE-13-FORMAL-SURFACES.md
          CHANGED="$(git diff --name-only origin/main...HEAD)"
          if printf '%s\n' "$CHANGED" | grep -E '^(apps/server/|migrations/|packages/contracts/|fixtures/|\.github/|apps/web/src/app/routes/|apps/web/src/app/App\.tsx$|package\.json$|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|apps/web/package\.json$)'; then
            echo 'forbidden topology/backend/package/workflow change detected' >&2
            exit 1
          fi
          node - <<'NODE' | tee "$OUT/successor-regression-proof.json"
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('docs/frontend-productization/PFE-13-FREEZE-MANIFEST.json', 'utf8'));
          const inventory = JSON.parse(fs.readFileSync('docs/frontend-productization/PFE-13-ROUTE-INVENTORY.json', 'utf8'));
          const client = fs.readFileSync('apps/web/src/api/client.ts', 'utf8');
          const capture = fs.readFileSync('scripts/frontend_acceptance/CAPTURE_PFA_0_PAGE_REVIEW.cjs', 'utf8');
          const locale = fs.readFileSync('apps/web/src/lib/locale.tsx', 'utf8');
          const toggle = fs.readFileSync('apps/web/src/components/common/LocaleToggle.tsx', 'utf8');
          const guardExists = fs.existsSync('apps/web/src/components/common/RuntimeTextGuard.tsx');
          const checks = {
            pfa1ApiBaseInvariant: client.includes('import.meta.env.VITE_API_BASE_URL') && client.includes('import.meta.env.VITE_API_BASE ??') && client.includes('http://127.0.0.1:3001') && !client.includes('(import.meta as any)?.env'),
            pfa1CaptureInvariant: capture.includes('createAuthenticatedStorageState') && capture.includes('browser auth/me') && capture.includes("PFA0_CAPTURE_MODE || 'full'"),
            pfe11SuccessorInvariant: locale.includes('"zh-CN" | "en-US"') && toggle.includes('aria-pressed') && !guardExists,
            pfe13SurfaceCounts: inventory.customer.length === 9 && inventory.operator.length === 13 && inventory.admin.length === 7,
            pfe13Nonclaims: manifest.productionLaunch === false && manifest.commercialLaunch === false && manifest.liveDeviceConnected === false && manifest.productionGatewayOnline === false && manifest.fieldPilotStarted === false && manifest.aoActDispatchEnabled === false,
          };
          if (!Object.values(checks).every(Boolean)) {
            console.error(JSON.stringify({ ok: false, checks }, null, 2));
            process.exit(1);
          }
          console.log(JSON.stringify({ ok: true, checks }, null, 2));
          NODE

      - name: Prepare commercial runtime environment
        run: |
          set -euo pipefail
          ACCEPTANCE_TOKEN="$(node -e "const f=require('./config/auth/security_acceptance_tokens.json'); const t=f.tokens.find(x => x.role==='admin' && x.scopes.includes('security.admin') && !x.revoked); if(!t) process.exit(1); console.log(t.token)")"
          EXECUTOR_TOKEN="$(node -e "const f=require('./config/auth/security_acceptance_tokens.json'); const t=f.tokens.find(x => x.token==='tenant_a_admin_token' && x.scopes.includes('ao_act.task.write') && x.scopes.includes('ao_act.receipt.write') && !x.revoked); if(!t) process.exit(1); console.log(t.token)")"
          cat > .env.ci <<EOF
          GEOX_RUNTIME_ENV=pilot
          POSTGRES_USER=landos
          POSTGRES_PASSWORD=ci-pilot-postgres-strong-2026
          POSTGRES_DB=landos
          GEOX_AO_ACT_TOKEN=$ACCEPTANCE_TOKEN
          GEOX_EXECUTOR_TOKEN=$EXECUTOR_TOKEN
          GEOX_EVIDENCE_S3_BUCKET=evidence-exports-v1
          GEOX_EVIDENCE_S3_PUBLIC_ENDPOINT=http://127.0.0.1:9000
          MINIO_ROOT_USER=geoxminio
          MINIO_ROOT_PASSWORD=ci-pilot-minio-strong-2026
          MQTT_AUTH_REQUIRED=1
          GEOX_MQTT_AUTH_REQUIRED=1
          MQTT_USERNAME=geoxmqtt
          MQTT_PASSWORD=ci-pilot-mqtt-strong-2026
          CORS_ORIGINS=https://pilot-ci.geox.invalid
          GEOX_ALLOWED_ORIGINS=https://pilot-ci.geox.invalid
          APP_SECRET=ci-pilot-app-secret-strong-2026
          GEOX_APP_SECRET=ci-pilot-app-secret-strong-2026
          PUBLIC_BASE_URL=https://pilot-ci.geox.invalid
          GEOX_PUBLIC_BASE_URL=https://pilot-ci.geox.invalid
          GEOX_EXECUTION_DEFAULT_DISABLED=1
          GEOX_EXECUTION_ENABLE_EXPLICITLY=0
          GEOX_EXECUTION_ENABLE_REASON=pfa2-validation
          GEOX_DEVTOOLS_ENABLED=0
          EOF
          echo "ACCEPTANCE_TOKEN=$ACCEPTANCE_TOKEN" >> "$GITHUB_ENV"

      - name: Start runtime dependencies
        run: |
          set -euo pipefail
          timeout 180 docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml up -d minio minio-init
          timeout 300 docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml up -d postgres mqtt server jobs executor
          timeout 180 bash -lc 'until curl -fsS http://127.0.0.1:3001/api/health > /dev/null; do sleep 2; done'

      - name: Seed and verify browser runtime data
        run: |
          set -euo pipefail
          export BASE_URL=http://127.0.0.1:3001
          export API_BASE_URL=http://127.0.0.1:3001
          export DATABASE_URL="postgres://landos:ci-pilot-postgres-strong-2026@127.0.0.1:5433/landos"
          node scripts/demo_seed/SEED_CONTROLLED_PILOT_FULL_REVIEW_V1.cjs --cleanup --apply --tenant tenantA
          node scripts/demo_seed/SEED_CONTROLLED_PILOT_FULL_REVIEW_V1.cjs --apply --tenant tenantA --base-url http://127.0.0.1:3001
          node scripts/demo_seed/SEED_CONTROLLED_PILOT_FULL_REVIEW_V1.cjs --verify --tenant tenantA
          node scripts/demo_seed/SEED_CONTROLLED_PILOT_FULL_REVIEW_V1.cjs --verify-api --tenant tenantA --base-url http://127.0.0.1:3001

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Run 60-render PFA-2 runtime locale audit
        run: |
          set -euo pipefail
          export API_BASE_URL=http://127.0.0.1:3001
          export GEOX_WEB_PROXY_TARGET=http://127.0.0.1:3001
          export GEOX_ACCEPTANCE_TOKEN="$ACCEPTANCE_TOKEN"
          export FRONTEND_AUDIT_SKIP_BROWSER_INSTALL=1
          export PFA2_WEB_PORT=5184
          node scripts/frontend_acceptance/AUDIT_PFA_2_RUNTIME_LOCALE_CONTRACT.cjs 2>&1 | tee "$RUNNER_TEMP/pfa2-validation/pfa2-runtime.log"
          cp docs/audit/PFA_2_RUNTIME_LOCALE_AUDIT_REPORT.json "$RUNNER_TEMP/pfa2-validation/"
          node - <<'NODE'
          const report = require('./docs/audit/PFA_2_RUNTIME_LOCALE_AUDIT_REPORT.json');
          const expected = {
            ok: true,
            actualRoutes: 30,
            locales: 2,
            routeRenders: 60,
            routeHealthPass: 60,
            htmlLangPass: 60,
            localePairPass: 30,
            localePairDifferentiationPass: 30,
            roleBoundaryEquivalencePass: 30,
            pathnameEquivalencePass: 30,
            runtimeTextGuardDependency: 0,
          };
          const failures = Object.entries(expected).filter(([key, value]) => report[key] !== value);
          if (failures.length) {
            console.error(JSON.stringify({ ok: false, failures, actual: report }, null, 2));
            process.exit(1);
          }
          console.log(JSON.stringify({ ok: true, expected }, null, 2));
          NODE
          rm -f docs/audit/PFA_2_RUNTIME_LOCALE_AUDIT_REPORT.json

      - name: Confirm generated artifacts are absent from git status
        run: |
          set -euo pipefail
          rm -f .env.ci
          git status --short --untracked-files=all | tee "$RUNNER_TEMP/pfa2-validation/git-status.txt"
          test -z "$(git status --short --untracked-files=all)"

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pfa2-validation-e82bcb8
          path: ${{ runner.temp }}/pfa2-validation
          if-no-files-found: error
          retention-days: 90

      - name: Stop runtime dependencies
        if: always()
        run: docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml down -v --remove-orphans || true
