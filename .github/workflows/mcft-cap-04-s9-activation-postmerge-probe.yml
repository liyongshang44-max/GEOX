name: MCFT-CAP-04 S9 activation merged-main verification

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s9-activation-postmerge-probe-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Verify exact merged main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          test "$(git branch --show-current)" = "main"
          test "$(git rev-parse HEAD)" = "8a4e1b5a92b8b3fcc21ec77a6542743fd3a7b4c3"
          test "$(git rev-parse origin/main)" = "8a4e1b5a92b8b3fcc21ec77a6542743fd3a7b4c3"
      - name: Run S9 activation merged-main Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S9_CLOSURE_ACTIVATION.cjs --postmerge
