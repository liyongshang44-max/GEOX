name: MCFT-CAP-04 S3 finalize negative authority

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s3-pure-72h-forecast-math-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout S3 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Align negative acceptance with earlier contract authority
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_PURE_FORECAST_MATH_NEGATIVE.ts')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '"CAP04_FORECAST_FORCING_CONFIG_IDENTITY_MISMATCH"': '"CAP04_FORCING_POINT_CONFIG_MISMATCH"',
              '"CAP04_FORECAST_CROP_STAGE_CONTEXT_MISMATCH"': '"CAP04_FORCING_POINT_CROP_STAGE_MISMATCH"',
              '"CAP04_FORECAST_STRUCTURAL_STDDEV_ZERO_FORBIDDEN"': '"ASSIMILATED_STRUCTURAL_STDDEV_MISMATCH"',
          }
          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{old}: expected once, found {count}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8', newline='')
          PY

      - name: Remove temporary diagnostic files
        run: |
          rm -rf .cap04-s3
          rm -f .github/workflows/mcft-cap-04-s3-merge-typecheck-diagnostics.yml

      - name: Recursive typecheck
        run: pnpm -r typecheck

      - name: Run positive pure Forecast math acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_PURE_FORECAST_MATH.ts

      - name: Run negative pure Forecast math acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_PURE_FORECAST_MATH_NEGATIVE.ts

      - name: Run final S3 governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S3_PURE_FORECAST_MATH.cjs --final

      - name: Verify patch integrity
        run: git diff --check 4a8dab632246b05266f1d869f6c9a0a5bcf37e76

      - name: Commit exact repaired candidate
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(mcft-cap-04): align S3 negative contract authority"
          git push origin "HEAD:${HEAD_BRANCH}"
