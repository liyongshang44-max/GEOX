name: MCFT-CAP-04 S3 merge-ref diagnostics

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s3-pure-72h-forecast-math-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout S3 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Fetch and typecheck PR merge ref
        id: merge_typecheck
        continue-on-error: true
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch origin "pull/${PR_NUMBER}/merge:refs/remotes/pull/${PR_NUMBER}/merge"
          git checkout "refs/remotes/pull/${PR_NUMBER}/merge"
          pnpm -r typecheck 2>&1 | tee /tmp/cap04-s3-merge-typecheck.log

      - name: Persist merge-ref diagnostics
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git checkout "${HEAD_BRANCH}"
          mkdir -p .cap04-s3
          cp /tmp/cap04-s3-merge-typecheck.log .cap04-s3/merge-typecheck.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .cap04-s3/merge-typecheck.log
          git commit -m "chore(mcft-cap-04): persist S3 merge-ref typecheck diagnostics"
          git push origin "HEAD:${HEAD_BRANCH}"

      - name: Preserve diagnostic failure status
        if: steps.merge_typecheck.outcome == 'failure'
        run: exit 1
