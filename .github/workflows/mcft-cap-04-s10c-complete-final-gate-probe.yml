name: MCFT-CAP-04 COMPLETE exact-head effectiveness Gate

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s10c-complete-final-gate-probe-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s10c-complete-activation-v1
          fetch-depth: 0
      - name: Verify exact COMPLETE head
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "51586079fe625ae28d23769cce9b74932823f344"
          test "$(git rev-parse origin/agent/mcft-cap-04-s10c-complete-activation-v1)" = "51586079fe625ae28d23769cce9b74932823f344"
      - name: Run COMPLETE effectiveness Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_FINALIZATION_EFFECTIVENESS.cjs
