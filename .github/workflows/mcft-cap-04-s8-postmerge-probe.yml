name: MCFT-CAP-04 S8 merged-main verification

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s8-postmerge-probe-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Verify exact merged main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          test "$(git branch --show-current)" = "main"
          test "$(git rev-parse HEAD)" = "235c832d302a1917dbd557ba0adfe15587a44f50"
          test "$(git rev-parse origin/main)" = "235c832d302a1917dbd557ba0adfe15587a44f50"
      - name: Run S8 merged-main Governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S8_RESTART_BACKFILL_RECOVERY.cjs --postmerge
