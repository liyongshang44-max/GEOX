name: MCFT-CAP-05 S5 initial validation

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-05-s5-approval-plan-binding-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mcft_cap05_s5_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mcft_cap05_s5_acceptance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/mcft_cap05_s5_acceptance
      MCFT_CAP_05_S5_DESTRUCTIVE_ACCEPTANCE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Typecheck repository
        run: pnpm -r typecheck
      - name: Run S5 PostgreSQL acceptance
        shell: bash
        run: |
          set -o pipefail
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_APPROVAL_PLAN_BINDING_DB.ts 2>&1 | tee /tmp/mcft-cap05-s5-db.log
      - name: Upload S5 DB failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-05-s5-db-failure
          path: /tmp/mcft-cap05-s5-db.log
          if-no-files-found: ignore
