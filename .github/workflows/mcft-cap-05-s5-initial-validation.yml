name: MCFT-CAP-05 S5 final materialization

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-05-s5-approval-plan-evidence-binding-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mcft_cap05_s5_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mcft_cap05_s5_acceptance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/mcft_cap05_s5_acceptance
      MCFT_CAP_05_S5_DESTRUCTIVE_ACCEPTANCE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Materialize S5 SSOT
        shell: bash
        run: |
          set -o pipefail
          python3 .mcft_cap05_s5_materializer.py 2>&1 | tee /tmp/mcft-cap05-s5-materializer.log

      - name: Upload materializer failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-05-s5-materializer-failure
          path: /tmp/mcft-cap05-s5-materializer.log
          if-no-files-found: ignore

      - name: Commit exact S5 candidate and remove temporary files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/mcft-cap-05-s5-initial-validation.yml .mcft_cap05_s5_materializer.py
          git add -f \
            apps/server/src/evidence/twin_runtime/approval_plan_evidence_contracts_v1.ts \
            apps/server/src/persistence/twin_runtime/postgres_approval_plan_evidence_repository_v1.ts \
            apps/server/src/persistence/twin_runtime/postgres_feedback_persistence_repository_v1.ts \
            apps/server/src/projections/twin_runtime/feedback_persistence_projection_v1.ts \
            apps/server/src/runtime/twin_runtime/approval_plan_binding_service_v1.ts \
            docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md \
            docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-AUTHORIZATION-STATUS.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-DELIVERY-SLICE-STATUS.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-S5-APPROVAL-PLAN-EVIDENCE.md \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-S5-STATUS.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-TASK.md \
            scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S5_APPROVAL_PLAN_BINDING.cjs \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_APPROVAL_PLAN_BINDING_DB.ts
          git commit -m "feat(mcft-cap-05): establish S5 Approval Plan Evidence binding"

      - name: Run S5 governance Gate
        shell: bash
        run: |
          set -o pipefail
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S5_APPROVAL_PLAN_BINDING.cjs 2>&1 | tee /tmp/mcft-cap05-s5-governance.log

      - name: Upload governance failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-05-s5-governance-failure
          path: /tmp/mcft-cap05-s5-governance.log
          if-no-files-found: ignore

      - name: Run S5 PostgreSQL acceptance
        shell: bash
        run: |
          set -o pipefail
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_APPROVAL_PLAN_BINDING_DB.ts 2>&1 | tee /tmp/mcft-cap05-s5-db.log

      - name: Upload PostgreSQL failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-05-s5-postgresql-failure
          path: /tmp/mcft-cap05-s5-db.log
          if-no-files-found: ignore

      - name: Typecheck repository
        run: pnpm -r typecheck

      - name: Push final S5 candidate
        run: git push origin HEAD:${{ github.head_ref }}
