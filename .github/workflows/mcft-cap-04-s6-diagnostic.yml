name: MCFT-CAP-04 S6 diagnostic

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s6-single-tick-integration-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: landos
          POSTGRES_PASSWORD: landos
          POSTGRES_DB: mcft_cap04_s6_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U landos -d mcft_cap04_s6_acceptance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout S6 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply bounded S6 patches
        run: |
          node .cap04-s6/patch_interfaces.cjs
          node .cap04-s6/patch_idempotent_pin.cjs
          node .cap04-s6/patch_source_builder.cjs
          node .cap04-s6/patch_source_time_authority.cjs
          node .cap04-s6/patch_a_builder_source_authority.cjs
          node .cap04-s6/patch_remove_legacy_source_helper.cjs
          node .cap04-s6/patch_next_tick_cap04_read.cjs
          node .cap04-s6/patch_db_migrations.cjs
          node .cap04-s6/patch_scenario_builder_canonical_compare.cjs
          node .cap04-s6/patch_cap04_member_read_validator.cjs

      - name: Capture recursive Typecheck
        shell: bash
        run: |
          set +e
          set -o pipefail
          pnpm -r typecheck 2>&1 | tee .cap04-s6/typecheck.log
          echo "${PIPESTATUS[0]}" > .cap04-s6/typecheck.exit
          exit 0

      - name: Capture positive S6 acceptance
        shell: bash
        run: |
          set +e
          set -o pipefail
          pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_SINGLE_TICK_INTEGRATION.ts 2>&1 | tee .cap04-s6/positive.log
          echo "${PIPESTATUS[0]}" > .cap04-s6/positive.exit
          exit 0

      - name: Capture negative S6 acceptance
        shell: bash
        run: |
          set +e
          set -o pipefail
          pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_SINGLE_TICK_INTEGRATION_NEGATIVE.ts 2>&1 | tee .cap04-s6/negative.log
          echo "${PIPESTATUS[0]}" > .cap04-s6/negative.exit
          exit 0

      - name: Capture PostgreSQL S6 acceptance
        shell: bash
        env:
          DATABASE_URL: postgresql://landos:landos@127.0.0.1:5432/mcft_cap04_s6_acceptance
          MCFT_CAP_04_SINGLE_TICK_DESTRUCTIVE_ACCEPTANCE: '1'
        run: |
          set +e
          set -o pipefail
          pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_SINGLE_TICK_INTEGRATION_DB.ts 2>&1 | tee .cap04-s6/db.log
          echo "${PIPESTATUS[0]}" > .cap04-s6/db.exit
          exit 0

      - name: Persist patches and diagnostics
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no diagnostic changes"
          else
            git commit -m "chore(mcft-cap-04): capture S6 integration diagnostics"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi

      - name: Require recursive Typecheck and S6 acceptances
        run: |
          test "$(cat .cap04-s6/typecheck.exit)" -eq 0
          test "$(cat .cap04-s6/positive.exit)" -eq 0
          test "$(cat .cap04-s6/negative.exit)" -eq 0
          test "$(cat .cap04-s6/db.exit)" -eq 0
