name: MCFT-CAP-04 S6 diagnostic

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s6-single-tick-integration-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout S6 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply bounded S6 interface patch
        run: node .cap04-s6/patch_interfaces.cjs

      - name: Capture recursive Typecheck
        id: typecheck
        shell: bash
        run: |
          set +e
          set -o pipefail
          pnpm -r typecheck 2>&1 | tee .cap04-s6/typecheck.log
          code=${PIPESTATUS[0]}
          echo "$code" > .cap04-s6/typecheck.exit
          exit 0

      - name: Persist patch and diagnostics
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no diagnostic changes"
          else
            git commit -m "chore(mcft-cap-04): apply S6 interface patch and capture typecheck"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi

      - name: Require recursive Typecheck
        run: test "$(cat .cap04-s6/typecheck.exit)" -eq 0
