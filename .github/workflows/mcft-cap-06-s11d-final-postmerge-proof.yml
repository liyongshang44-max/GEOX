name: mcft-cap-06-s11d-final-postmerge-proof

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s11d-final-postmerge-proof.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exact-s11d-final-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      MCFT_CAP_06_S11D_BASE_REF: 2e1b14e31a5420dccfd70c4955726427fc29eb7e
    steps:
      - name: Checkout proof carrier
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify exact S11D merge topology
        shell: bash
        run: |
          set -euo pipefail
          BASE='2e1b14e31a5420dccfd70c4955726427fc29eb7e'
          CANDIDATE='afe2ec06ae3ca28c5a55760a14d26bb7f1adaa83'
          MERGE='f889db7d336661f85198f4b377bc07cc00da4dc0'
          test "$(git rev-parse HEAD^)" = "$MERGE"
          test "$(git rev-list --count "$BASE..$CANDIDATE")" = '14'
          test "$(git rev-list --count "$BASE..$MERGE")" = '15'
          test "$(git diff --name-only "$BASE...$CANDIDATE" | sed '/^$/d' | wc -l | tr -d ' ')" = '12'
          test "$(git diff --name-only "$CANDIDATE" "$MERGE" | sed '/^$/d' | wc -l | tr -d ' ')" = '0'
          test "$(git rev-parse "$CANDIDATE^{tree}")" = "$(git rev-parse "$MERGE^{tree}")"

      - name: Checkout exact S11D merge
        uses: actions/checkout@v4
        with:
          ref: f889db7d336661f85198f4b377bc07cc00da4dc0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run exact merged-main S11D Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_FINAL_EFFECTIVENESS_RECONCILIATION.cjs

      - name: Typecheck build and selfcheck
        run: |
          pnpm -r typecheck
          pnpm -r build
          pnpm --filter @geox/server run test:p1:selfcheck

      - name: Create isolated controlled regression database
        shell: bash
        run: |
          set -euo pipefail
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          SELECT pg_terminate_backend(pid)
            FROM pg_stat_activity
           WHERE datname='mcft_cap06_s11d_final_regression'
             AND pid<>pg_backend_pid();
          DROP DATABASE IF EXISTS mcft_cap06_s11d_final_regression;
          CREATE DATABASE mcft_cap06_s11d_final_regression;
          SQL

      - name: Run controlled bounded-chain PostgreSQL regression
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/mcft_cap06_s11d_final_regression
          MCFT_CAP_06_S10_BOUNDED_CHAIN_DESTRUCTIVE_ACCEPTANCE: '1'
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S10_BOUNDED_CHAIN_DB.ts

      - name: Run repository-history qualification regression
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S0_V2_HONEST_QUALIFICATION.cjs

      - name: Verify structured final proof
        run: |
          node - <<'NODE'
          const fs=require('node:fs');
          const s11d=JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S11D_FINAL_RECONCILIATION_RESULT.json','utf8'));
          const controlled=JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S10_BOUNDED_CHAIN_DB_RESULT.json','utf8'));
          const repository=JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S0_V2_RESULT.json','utf8'));
          if(s11d.status!=='PASS'||s11d.exact_head!=='f889db7d336661f85198f4b377bc07cc00da4dc0') throw new Error('S11D_FINAL_GATE_INVALID');
          if(s11d.changed_file_count!==12||s11d.hard_acceptance_total_check_count!==255) throw new Error('S11D_FINAL_BOUNDARY_INVALID');
          if(s11d.pending_completion_claim_count!==0||s11d.effective_completion_claim_count!==48) throw new Error('S11D_FINAL_CLAIMS_INVALID');
          if(s11d.closure_effective!==true||s11d.capability_complete!==true||s11d.active_delivery_slice_id!==null||s11d.next_repository_action!==null) throw new Error('S11D_FINAL_TERMINAL_STATE_INVALID');
          if(s11d.runtime_source_authorized!==false||s11d.successor_capability_line_authorized!==false||s11d.postmerge_ssot_writeback_allowed!==false) throw new Error('S11D_FINAL_AUTHORITY_INVALID');
          if(controlled.status!=='PASS'||controlled.actual_r!==24||controlled.actual_c!==0||controlled.actual_cap06_canonical_delta!==36) throw new Error('S11D_FINAL_CONTROLLED_INVALID');
          if(controlled.completed_replay_additional_fact_count!==0||controlled.completed_replay_projection_divergence_count!==0||controlled.completed_replay_evidence_load_count!==0) throw new Error('S11D_FINAL_REPLAY_INVALID');
          if(controlled.candidate_consumed!==false||controlled.evaluation_consumed!==false||controlled.model_activation_count!==0||controlled.active_config_snapshot_changed!==false) throw new Error('S11D_FINAL_RUNTIME_AUTHORITY_CHANGED');
          if(!repository.qualification||repository.qualification.dataset_qualification_status!=='INSUFFICIENT_MATCHED_PAIRS') throw new Error('S11D_FINAL_REPOSITORY_STATUS_INVALID');
          if(repository.qualification.canonical_residual_count!==1||repository.qualification.eligible_matched_pair_count!==1) throw new Error('S11D_FINAL_REPOSITORY_COUNTS_INVALID');
          NODE

      - name: Upload final proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s11d-final-postmerge-proof
          path: acceptance-output/
          if-no-files-found: error
