name: mcft-cap-08-s3-typecheck-diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-08-s3-typecheck-diagnostic.yml'
      - 'apps/server/src/domain/twin_runtime/cap08_s3_**'
      - 'apps/server/src/runtime/twin_runtime/cap08_s3_**'
      - 'apps/server/src/runtime/twin_runtime/receipt_consuming_forecast_scenario_tick_service_v1.ts'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - name: Install locked workspace quietly
        run: pnpm install --frozen-lockfile --reporter=silent
      - name: Capture S3 server typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set +e
          mkdir -p acceptance-output
          pnpm --filter @geox/server typecheck > acceptance-output/MCFT_CAP_08_S3_TYPECHECK.txt 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload typecheck diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap08-s3-typecheck-${{ github.event.pull_request.head.sha || github.sha }}
          path: acceptance-output/MCFT_CAP_08_S3_TYPECHECK.txt
          if-no-files-found: error
          retention-days: 7
      - name: Fail when typecheck failed
        if: steps.typecheck.outputs.exit_code != '0'
        run: |
          tac acceptance-output/MCFT_CAP_08_S3_TYPECHECK.txt | head -n 120
          exit 1
