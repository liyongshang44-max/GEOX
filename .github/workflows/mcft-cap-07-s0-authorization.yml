name: mcft-cap-07-s0-authorization

on:
  pull_request:
    paths:
      - 'docs/digital_twin/mcft/cap_07/**'
      - 'docs/digital_twin/mcft/MCFT-CANDIDATE-AUTHORITY-REGISTRY-V1.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_07_*.cjs'
      - 'scripts/governance_acceptance/mcft_attestation_retention_store_v1.cjs'
      - 'scripts/governance_acceptance/mcft_cap07_slice_workflow_mode_v1.cjs'
      - 'scripts/governance_acceptance/MCFT_REGISTRY_FOCUSED_WORKFLOW_APPLICABILITY_V1.cjs'
      - '.github/workflows/mcft-cap-07-*.yml'
  merge_group:
    types: [checks_requested]

permissions:
  contents: read
  actions: read
  pull-requests: read

concurrency:
  group: mcft-cap-07-s0-${{ github.event_name }}-${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  resolve-applicability:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      disposition: ${{ steps.resolve.outputs.disposition }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with: { node-version: 20.11.1 }
      - id: resolve
        name: Resolve Registry-owned candidate transition
        env:
          MCFT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          MCFT_CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
          MCFT_EXPECTED_FOCUSED_WORKFLOW: mcft-cap-07-s0-authorization
        run: |
          DISPOSITION="$(node scripts/governance_acceptance/MCFT_REGISTRY_FOCUSED_WORKFLOW_APPLICABILITY_V1.cjs --resolve)"
          echo "disposition=${DISPOSITION}" >> "${GITHUB_OUTPUT}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mcft-cap-07-s0-applicability-${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          path: acceptance-output/MCFT_REGISTRY_FOCUSED_WORKFLOW_APPLICABILITY_V1_RESULT.json
          if-no-files-found: error
          retention-days: 30

  not-applicable:
    needs: resolve-applicability
    if: needs.resolve-applicability.outputs.disposition == 'NOT_APPLICABLE'
    runs-on: ubuntu-latest
    steps:
      - run: echo "mcft-cap-07-s0-authorization NOT_APPLICABLE for this registered transition"

  mcft-cap-07-s0-authorization:
    needs: resolve-applicability
    if: needs.resolve-applicability.outputs.disposition == 'APPLICABLE'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact candidate head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
      - name: Validate slice workflow classifier static contract
        run: node scripts/governance_acceptance/mcft_cap07_slice_workflow_mode_v1.cjs --self-test
      - name: Classify S0 workflow execution mode
        id: slice-mode
        env:
          MCFT_EVENT_NAME: ${{ github.event_name }}
          MCFT_PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/governance_acceptance/mcft_cap07_slice_workflow_mode_v1.cjs --target MCFT-CAP-07.S0
      - name: Validate frozen S0 exact candidate authority materialization
        if: steps.slice-mode.outputs.mode == 'EXACT_CANDIDATE_MODE'
        env:
          MCFT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_07_S0_AUTHORIZATION.cjs
      - name: Validate S0 successor regression
        if: steps.slice-mode.outputs.mode == 'SUCCESSOR_REGRESSION_MODE'
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_07_S0_SUCCESSOR_REGRESSION.cjs
      - name: Validate retention authority static contract
        run: node scripts/governance_acceptance/mcft_attestation_retention_store_v1.cjs --static-contract
      - name: Validate same-PR trusted negative-to-corrected exercise
        if: steps.slice-mode.outputs.mode == 'EXACT_CANDIDATE_MODE'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MCFT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_07_S0_LIVE_TRUSTED_EXERCISE.cjs
      - name: Record successor-mode live exercise skip
        if: steps.slice-mode.outputs.mode == 'SUCCESSOR_REGRESSION_MODE'
        env:
          MCFT_EVENT_NAME: ${{ github.event_name }}
          MCFT_PR_NUMBER: ${{ github.event.pull_request.number }}
          MCFT_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
        run: |
          mkdir -p acceptance-output
          node - <<'NODE'
          const fs = require('node:fs');
          const result = {
            schema_version: 'geox_mcft_cap_07_s0_live_trusted_exercise_v1',
            status: 'SKIP_SUCCESSOR_REGRESSION_MODE',
            event_name: process.env.MCFT_EVENT_NAME || null,
            pr_number: process.env.MCFT_PR_NUMBER || null,
            head_sha: process.env.MCFT_HEAD_SHA || null,
            reason: 'LIVE_TRUSTED_EXERCISE_APPLIES_ONLY_TO_EXACT_S0_CANDIDATE_MODE',
          };
          fs.writeFileSync('acceptance-output/MCFT_CAP_07_S0_LIVE_TRUSTED_EXERCISE_RESULT.json', `${JSON.stringify(result, null, 2)}\n`);
          NODE
      - name: Upload focused acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-07-s0-authorization-${{ github.sha }}
          path: |
            acceptance-output/MCFT_CAP_07_S0_AUTHORIZATION_RESULT.json
            acceptance-output/MCFT_CAP_07_S0_LIVE_TRUSTED_EXERCISE_RESULT.json
          if-no-files-found: error
          retention-days: 90
