name: mcft-cap-06-s5-candidate-postmerge-proof

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s5-candidate-postmerge-proof.yml'

permissions:
  contents: read

jobs:
  exact-merged-main-proof:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      MCFT_CAP_06_S5_CANDIDATE_BASELINE_REF: dc7913d070c4a0c2cac0a7c35ccfa4292e633876
    steps:
      - name: Checkout proof carrier
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify exact proof topology
        shell: bash
        run: |
          test "$(git rev-parse HEAD^)" = "8edbc27ea0dfabd41faede9fb0f8bed11058c260"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "8edbc27ea0dfabd41faede9fb0f8bed11058c260"
          test -z "$(git diff --name-only d6085d0721b519f6a57971600f32b4fa89d15f97 8edbc27ea0dfabd41faede9fb0f8bed11058c260)"
          test "$(git rev-list --count dc7913d070c4a0c2cac0a7c35ccfa4292e633876..d6085d0721b519f6a57971600f32b4fa89d15f97)" = "5"
          test "$(git rev-list --count dc7913d070c4a0c2cac0a7c35ccfa4292e633876..8edbc27ea0dfabd41faede9fb0f8bed11058c260)" = "6"
          test "$(git diff --name-only dc7913d070c4a0c2cac0a7c35ccfa4292e633876...8edbc27ea0dfabd41faede9fb0f8bed11058c260 | wc -l | tr -d ' ')" = "12"

      - name: Checkout exact S5 merge commit
        uses: actions/checkout@v4
        with:
          ref: 8edbc27ea0dfabd41faede9fb0f8bed11058c260
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Run exact merged-main S5 Candidate preflight
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S5_CANDIDATE.cjs

      - name: Verify exact merged-main structured evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S5_CANDIDATE_PREFLIGHT_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s5_candidate_preflight_result_v1') throw new Error('POSTMERGE_S5_SCHEMA_MISMATCH');
          if (result.status !== 'PASS') throw new Error('POSTMERGE_S5_NOT_PASS');
          if (result.exact_head !== '8edbc27ea0dfabd41faede9fb0f8bed11058c260') throw new Error('POSTMERGE_S5_HEAD_MISMATCH');
          if (result.calibration_case_count !== 16 || result.grid_point_count !== 21 || result.selected_parameter_value !== '0.034000') throw new Error('POSTMERGE_S5_NUMERICAL_RESULT_MISMATCH');
          if (result.controlled_candidate_append_count !== 1 || result.completed_chain_rerun_candidate_append_count !== 0) throw new Error('POSTMERGE_S5_APPEND_MISMATCH');
          if (result.production_candidate_append_count !== 0 || result.evaluation_append_count !== 0 || result.model_activation_count !== 0) throw new Error('POSTMERGE_S5_PRODUCTION_WRITE_BOUNDARY_VIOLATION');
          if (result.active_config_switch_count !== 0 || result.runtime_parameter_change_count !== 0 || result.state_mutation_count !== 0 || result.checkpoint_mutation_count !== 0 || result.migration_count !== 0) throw new Error('POSTMERGE_S5_RUNTIME_BOUNDARY_VIOLATION');
          if (result.production_database_used !== false) throw new Error('POSTMERGE_S5_PRODUCTION_DATABASE_VIOLATION');
          if (result.s5_candidate_implemented !== true || result.s5_effective !== false || result.s6_authorized !== false) throw new Error('POSTMERGE_S5_FRONTIER_MISMATCH');
          NODE

      - name: Upload proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s5-candidate-postmerge-proof
          path: acceptance-output/
          if-no-files-found: error
