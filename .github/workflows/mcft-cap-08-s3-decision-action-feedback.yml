name: mcft-cap-08-s3-decision-action-feedback

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-08-s3-decision-action-feedback.yml'
      - '.github/workflows/mcft-cap-08-s3-exact-sha-attestation.yml'
      - 'apps/server/src/domain/twin_runtime/cap08_s3_**'
      - 'apps/server/src/persistence/twin_runtime/postgres_approval_plan_evidence_repository_v1.ts'
      - 'apps/server/src/persistence/twin_runtime/postgres_immutable_decision_action_commit_repository_v1.ts'
      - 'apps/server/src/runtime/twin_runtime/action_feedback_normalization_service_v1.ts'
      - 'apps/server/src/runtime/twin_runtime/human_decision_service_v1.ts'
      - 'apps/server/src/runtime/twin_runtime/cap08_s3_**'
      - 'apps/server/src/runtime/twin_runtime/receipt_consuming_forecast_scenario_tick_service_v1.ts'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_**'
      - 'scripts/runtime_acceptance/mcft_cap08_s3_**'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_**'
      - 'scripts/governance_acceptance/mcft_cap08_s3_**'
      - 'docs/digital_twin/mcft/cap_08/GEOX-MCFT-CAP-08-S3-*'
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mcft-cap08-s3-${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  s3-decision-action-feedback:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 3s
          --health-timeout 2s
          --health-retries 30
    steps:
      - name: Checkout exact candidate head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - name: Install locked workspace
        run: pnpm install --frozen-lockfile
      - name: Typecheck server and S3 scripts
        run: pnpm --filter @geox/server typecheck

      - name: Bootstrap S3 positive database
        env:
          MCFT_CAP08_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
          MCFT_CAP08_TARGET_DATABASE_NAME: geox_mcft_cap08_s3_candidate
          MCFT_CAP08_RUNNER_PASSWORD: cap08-s3-candidate-runner-password
          MCFT_CAP08_MIGRATOR_PASSWORD: cap08-s3-candidate-migrator-password
          MCFT_CAP08_LEGACY_RUNTIME_PASSWORD: cap08-s3-candidate-legacy-password
          MCFT_CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_PLATFORM_SECURITY_BOOTSTRAP_DB.ts
      - name: Execute formal Decision Action Feedback positive proof
        env:
          DATABASE_URL: postgres://geox_mcft_cap08_runner_v1:cap08-s3-candidate-runner-password@127.0.0.1:5432/geox_mcft_cap08_s3_candidate
          MCFT_CAP08_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox_mcft_cap08_s3_candidate
          MCFT_CAP08_S2_G3_DESTRUCTIVE_ACCEPTANCE: '1'
          MCFT_CAP08_S3_DESTRUCTIVE_ACCEPTANCE: '1'
        run: |
          mkdir -p acceptance-output
          set -o pipefail
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_DECISION_ACTION_DB.ts 2>&1 | tee acceptance-output/MCFT_CAP_08_S3_DECISION_ACTION_EXECUTION.log
      - name: Cleanup S3 positive database
        if: always()
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='geox_mcft_cap08_s3_candidate' AND pid<>pg_backend_pid();"
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "DROP DATABASE IF EXISTS geox_mcft_cap08_s3_candidate;"

      - name: Bootstrap S3 negative database
        env:
          MCFT_CAP08_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
          MCFT_CAP08_TARGET_DATABASE_NAME: geox_mcft_cap08_s3_negative
          MCFT_CAP08_RUNNER_PASSWORD: cap08-s3-negative-runner-password
          MCFT_CAP08_MIGRATOR_PASSWORD: cap08-s3-negative-migrator-password
          MCFT_CAP08_LEGACY_RUNTIME_PASSWORD: cap08-s3-negative-legacy-password
          MCFT_CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_PLATFORM_SECURITY_BOOTSTRAP_DB.ts
      - name: Execute S3 negative and pointer matrix
        env:
          DATABASE_URL: postgres://geox_mcft_cap08_runner_v1:cap08-s3-negative-runner-password@127.0.0.1:5432/geox_mcft_cap08_s3_negative
          MCFT_CAP08_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox_mcft_cap08_s3_negative
          MCFT_CAP08_S2_G3_DESTRUCTIVE_ACCEPTANCE: '1'
          MCFT_CAP08_S3_NEGATIVE_DESTRUCTIVE_ACCEPTANCE: '1'
        run: |
          set -o pipefail
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_NEGATIVE_DB.ts 2>&1 | tee acceptance-output/MCFT_CAP_08_S3_NEGATIVE_EXECUTION.log
      - name: Cleanup S3 negative database
        if: always()
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='geox_mcft_cap08_s3_negative' AND pid<>pg_backend_pid();"
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "DROP DATABASE IF EXISTS geox_mcft_cap08_s3_negative;"

      - name: Upload focused S3 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-08-s3-${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          path: acceptance-output/
          if-no-files-found: error
          retention-days: 90
