name: mcft-cap-06-taskbook-v0-4-effectiveness

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s8-restart-readback-rebuild.yml'
      - '.github/workflows/mcft-cap-06-taskbook-v0-4-effectiveness.yml'
      - '.github/workflows/mcft-delivery-policy-v1.yml'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-AUTHORITY-V2.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S8-RESTART-READBACK-REBUILD-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASKBOOK-MANIFEST.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASKBOOK-V0.4.0-EFFECTIVENESS.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_TASKBOOK_V0_4_EFFECTIVENESS.cjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  taskbook-v0-4-effectiveness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact effectiveness candidate head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'

      - name: Resolve effectiveness baseline
        id: baseline
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=56fd50500a14cc8b5d3743306da85f9d0055abe0" >> "$GITHUB_OUTPUT"
          fi

      - name: Run taskbook v0.4 effectiveness Gate
        env:
          MCFT_CAP_06_TASKBOOK_V0_4_EFFECTIVENESS_BASE_REF: ${{ steps.baseline.outputs.ref }}
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_TASKBOOK_V0_4_EFFECTIVENESS.cjs

      - name: Verify structured effectiveness result
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const p = 'acceptance-output/MCFT_CAP_06_TASKBOOK_V0_4_EFFECTIVENESS_RESULT.json';
          const result = JSON.parse(fs.readFileSync(p, 'utf8'));
          if (result.status !== 'PASS') throw new Error(`TASKBOOK_V0_4_EFFECTIVENESS_NOT_PASS:${result.error || 'UNKNOWN'}`);
          if (result.changed_file_count !== 8) throw new Error('TASKBOOK_V0_4_EFFECTIVENESS_FILE_COUNT_INVALID');
          if (result.taskbook_version !== 'v0.4.0') throw new Error('TASKBOOK_V0_4_VERSION_INVALID');
          if (result.taskbook_status !== 'MERGED_MAIN_EFFECTIVE_FROZEN') throw new Error('TASKBOOK_V0_4_STATUS_INVALID');
          if (result.execution_paused !== false) throw new Error('TASKBOOK_V0_4_EXECUTION_NOT_RESUMED');
          if (result.active_delivery_slice_id !== 'MCFT-CAP-06.MCFT-03-04-12.RESTART-READBACK-REBUILD-V1') throw new Error('TASKBOOK_V0_4_ACTIVE_SLICE_INVALID');
          if (result.next_repository_action !== 'S8_EFFECTIVENESS_WRITEBACK') throw new Error('TASKBOOK_V0_4_RESUME_ACTION_INVALID');
          if (result.new_prerequisite_inserted !== false) throw new Error('TASKBOOK_V0_4_AD_HOC_PREREQUISITE_VIOLATION');
          if (result.s8_implementation_merged_main_proven !== true) throw new Error('TASKBOOK_V0_4_S8_EVIDENCE_INVALID');
          if (result.s8_effective !== false || result.s8_effectiveness_writeback_authorized !== true) throw new Error('TASKBOOK_V0_4_S8_FRONTIER_INVALID');
          if (result.s9_authorized !== false) throw new Error('TASKBOOK_V0_4_S9_MUST_REMAIN_BLOCKED');
          NODE

      - name: Upload effectiveness evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-taskbook-v0-4-effectiveness-evidence
          path: acceptance-output/MCFT_CAP_06_TASKBOOK_V0_4_EFFECTIVENESS_RESULT.json
          if-no-files-found: error
