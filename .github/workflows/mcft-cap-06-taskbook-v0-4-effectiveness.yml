name: mcft-cap-06-taskbook-v0-4-effectiveness
# Historical MCFT-CAP-06 workflow: automatic triggers frozen after final repair.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  taskbook-v0-4-effectiveness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow carrier
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Resolve frozen taskbook activation validation ref
        id: validation
        shell: bash
        run: |
          REF="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="56fd50500a14cc8b5d3743306da85f9d0055abe0"
          fi
          STATUS_FILE="docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S8-RESTART-READBACK-REBUILD-STATUS.json"
          if [ -f "$STATUS_FILE" ]; then
            S8_EFFECTIVE="$(node -e "const j=require('./$STATUS_FILE'); process.stdout.write(String(j.s8_effective === true))")"
            if [ "$S8_EFFECTIVE" = "true" ]; then
              REF="a573e741ea0d2b84bfc3727af3412eaa4552fdd0"
              BASE="56fd50500a14cc8b5d3743306da85f9d0055abe0"
            fi
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      - name: Checkout exact taskbook activation authority
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.validation.outputs.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'

      - name: Run frozen taskbook v0.4 activation Gate
        env:
          MCFT_CAP_06_TASKBOOK_V0_4_EFFECTIVENESS_BASE_REF: ${{ steps.validation.outputs.base }}
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_TASKBOOK_V0_4_EFFECTIVENESS.cjs

      - name: Verify frozen activation result
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const p = 'acceptance-output/MCFT_CAP_06_TASKBOOK_V0_4_EFFECTIVENESS_RESULT.json';
          const result = JSON.parse(fs.readFileSync(p, 'utf8'));
          if (result.status !== 'PASS') throw new Error(`TASKBOOK_V0_4_ACTIVATION_NOT_PASS:${result.error || 'UNKNOWN'}`);
          if (result.changed_file_count !== 8) throw new Error('TASKBOOK_V0_4_ACTIVATION_FILE_COUNT_INVALID');
          if (result.taskbook_version !== 'v0.4.0') throw new Error('TASKBOOK_V0_4_VERSION_INVALID');
          if (result.taskbook_status !== 'MERGED_MAIN_EFFECTIVE_FROZEN') throw new Error('TASKBOOK_V0_4_STATUS_INVALID');
          if (result.execution_paused !== false) throw new Error('TASKBOOK_V0_4_EXECUTION_NOT_RESUMED');
          if (result.active_delivery_slice_id !== 'MCFT-CAP-06.MCFT-03-04-12.RESTART-READBACK-REBUILD-V1') throw new Error('TASKBOOK_V0_4_ACTIVATION_SLICE_INVALID');
          if (result.next_repository_action !== 'S8_EFFECTIVENESS_WRITEBACK') throw new Error('TASKBOOK_V0_4_ACTIVATION_ACTION_INVALID');
          if (result.new_prerequisite_inserted !== false) throw new Error('TASKBOOK_V0_4_AD_HOC_PREREQUISITE_VIOLATION');
          if (result.s8_implementation_merged_main_proven !== true) throw new Error('TASKBOOK_V0_4_S8_EVIDENCE_INVALID');
          if (result.s8_effective !== false || result.s8_effectiveness_writeback_authorized !== true) throw new Error('TASKBOOK_V0_4_ACTIVATION_FRONTIER_INVALID');
          if (result.s9_authorized !== false) throw new Error('TASKBOOK_V0_4_ACTIVATION_S9_MUST_BE_BLOCKED');
          NODE

      - name: Upload activation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-taskbook-v0-4-effectiveness-evidence
          path: acceptance-output/MCFT_CAP_06_TASKBOOK_V0_4_EFFECTIVENESS_RESULT.json
          if-no-files-found: error
