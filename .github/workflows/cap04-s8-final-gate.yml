name: MCFT-CAP-04 S8 final Governance Gate

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s8-restart-backfill-recovery-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s8-restart-backfill-recovery-v1
          fetch-depth: 0
      - name: Remove temporary Gate files from candidate worktree
        run: |
          rm -f .github/workflows/cap04-s8-final-gate.yml
          rm -f .cap04-s8-final-gate-trigger
      - name: Run final S8 Governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S8_RESTART_BACKFILL_RECOVERY.cjs --final
