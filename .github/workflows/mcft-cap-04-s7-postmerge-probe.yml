name: MCFT-CAP-04 S7 merged-main verification

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s7-postmerge-probe-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Verify exact merged main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          test "$(git branch --show-current)" = "main"
          test "$(git rev-parse HEAD)" = "413908eadf1016d879760da3afc968abdee82342"
          test "$(git rev-parse origin/main)" = "413908eadf1016d879760da3afc968abdee82342"
      - name: Run S7 merged-main Governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S7_RANGE.cjs --postmerge
