name: MCFT-CAP-04 S8 PostgreSQL restart recheck

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  restart-recheck:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s8-restart-backfill-recovery-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox_mcft_cap04_s8_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox_mcft_cap04_s8_acceptance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s8-restart-backfill-recovery-v1
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm -r typecheck
      - name: Capture S8 PostgreSQL restart proof
        shell: bash
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/geox_mcft_cap04_s8_acceptance
          MCFT_CAP_04_S8_DESTRUCTIVE_ACCEPTANCE: "1"
        run: |
          set +e
          pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_RESTART_BACKFILL_DB.ts > /tmp/cap04-s8-db.log 2>&1
          code=$?
          cat /tmp/cap04-s8-db.log
          echo "$code" > /tmp/cap04-s8-db-exit.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: cap04-s8-db-diagnostic
          path: |
            /tmp/cap04-s8-db.log
            /tmp/cap04-s8-db-exit.txt
          retention-days: 1
      - name: Enforce S8 PostgreSQL restart proof
        shell: bash
        run: test "$(cat /tmp/cap04-s8-db-exit.txt)" = "0"
