name: mcft-cap-06-final-candidate-materialize-once

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-final-candidate-materialize-once.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mcft-cap-06-final-candidate-materialize-once-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  materialize-final-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
      - name: Materialize repaired final candidate
        run: node scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_S11D_REPAIRED_FINAL_CANDIDATE.cjs
      - name: Verify final candidate projection
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const root = 'docs/digital_twin/mcft/cap_06';
          const closure = JSON.parse(fs.readFileSync(`${root}/GEOX-MCFT-CAP-06-CLOSURE-RECORD.json`, 'utf8'));
          const frontier = JSON.parse(fs.readFileSync(`${root}/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-AUTHORITY-V2.json`, 'utf8'));
          const ledger = JSON.parse(fs.readFileSync(`${root}/GEOX-MCFT-CAP-06-HARD-ACCEPTANCE-EVIDENCE-LEDGER.json`, 'utf8'));
          const resolved = JSON.parse(fs.readFileSync(`${root}/GEOX-MCFT-CAP-06-RESOLVED-TASK-MANIFEST-V2.json`, 'utf8'));
          if (closure.status !== 'COMPLETE' || closure.closure_effective !== true || closure.capability_complete !== true) throw new Error('FINAL_CANDIDATE_CLOSURE_INVALID');
          if (closure.active_delivery_slice_id !== null || closure.next_repository_action !== null) throw new Error('FINAL_CANDIDATE_FRONTIER_NOT_CLOSED');
          if (closure.closure_effectiveness_condition !== 'EXACT_MERGE_SHA_ATTESTATION_PASS') throw new Error('FINAL_CANDIDATE_CONDITION_INVALID');
          if (closure.pending_completion_claims.length !== 0 || closure.effective_completion_claims.length !== 48) throw new Error('FINAL_CANDIDATE_CLAIMS_INVALID');
          if (frontier.status !== 'MCFT_CAP_06_COMPLETE' || frontier.successor_capability_line_authorized !== false) throw new Error('FINAL_CANDIDATE_AUTHORITY_INVALID');
          if (JSON.stringify(ledger.status_counts) !== JSON.stringify({PASS:253,FAIL:0,PENDING:2,NOT_APPLICABLE:0})) throw new Error('FINAL_CANDIDATE_COMMITTED_LEDGER_INVALID');
          if (JSON.stringify(ledger.effective_status_counts_on_attestation) !== JSON.stringify({PASS:255,FAIL:0,PENDING:0,NOT_APPLICABLE:0})) throw new Error('FINAL_CANDIDATE_EFFECTIVE_LEDGER_INVALID');
          if (resolved.completion_claims.effective_count !== 48 || resolved.closure_delivery_policy.proof_only_pr_required !== false) throw new Error('FINAL_CANDIDATE_RESOLVED_MANIFEST_INVALID');
          if (closure.runtime_source_authorized !== false || closure.successor_authorized !== false) throw new Error('FINAL_CANDIDATE_RUNTIME_OR_SUCCESSOR_AUTHORITY_INVALID');
          NODE
      - name: Commit final candidate governance state
        if: github.event_name == 'pull_request'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/digital_twin/mcft/cap_06
          if git diff --cached --quiet; then
            echo 'Final candidate already materialized.'
          else
            git commit -m 'MCFT-CAP-06 S11D repair: materialize repaired final candidate'
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
