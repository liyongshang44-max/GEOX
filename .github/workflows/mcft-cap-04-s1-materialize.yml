name: MCFT-CAP-04 S1 repaired positive diagnostic

on:
  pull_request:
    types: [reopened]
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/mcft-cap-04-s1-contracts-config-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply inherited selection repair
        run: |
          python - <<'PY'
          from pathlib import Path
          target = Path('apps/server/src/domain/twin_runtime/forecast_scenario_runtime_config_v1.ts')
          text = target.read_text(encoding='utf-8')
          old = 'inherited.config_selection_mode = "EXPLICIT_REQUEST_PIN_ONLY";'
          new = 'inherited.config_selection_mode = "EXPLICIT_REPLAY_PIN";'
          if old not in text:
              raise SystemExit('expected inherited selection marker missing')
          target.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Capture repaired positive acceptance
        run: |
          set +e
          pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_CONTRACTS_CONFIG.ts > /tmp/cap04-s1-positive.log 2>&1
          echo "$?" > /tmp/cap04-s1-positive.exit
          cat /tmp/cap04-s1-positive.log
          exit 0
      - name: Publish exact result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/cap04-s1-positive.log', 'utf8');
            const exit = fs.readFileSync('/tmp/cap04-s1-positive.exit', 'utf8').trim();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `<!-- cap04-s1-positive-repaired -->\n### S1 repaired positive acceptance\n\nExit: ${exit}\n\n\`\`\`text\n${output.slice(-20000)}\n\`\`\``
            });
      - name: Enforce result
        run: test "$(cat /tmp/cap04-s1-positive.exit)" -eq 0
