name: MCFT-CAP-04 S1 repair fixture and verify

on:
  pull_request:
    types: [reopened]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  materialize:
    if: github.head_ref == 'agent/mcft-cap-04-s1-contracts-config-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: landos
          POSTGRES_PASSWORD: landos
          POSTGRES_DB: mcft_cap04_s1_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://landos:landos@127.0.0.1:5432/mcft_cap04_s1_acceptance
      MCFT_CAP_04_CONTRACTS_CONFIG_DESTRUCTIVE_ACCEPTANCE: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply bounded repairs
        run: |
          python - <<'PY'
          from pathlib import Path

          config = Path('apps/server/src/domain/twin_runtime/forecast_scenario_runtime_config_v1.ts')
          text = config.read_text(encoding='utf-8')
          old = 'inherited.config_selection_mode = "EXPLICIT_REQUEST_PIN_ONLY";'
          new = 'inherited.config_selection_mode = "EXPLICIT_REPLAY_PIN";'
          if old not in text:
              raise SystemExit('expected inherited selection marker missing')
          config.write_text(text.replace(old, new, 1), encoding='utf-8')

          fixture = Path('scripts/runtime_acceptance/mcft_cap_04_contracts_config_fixture_v1.ts')
          text = fixture.read_text(encoding='utf-8')
          old_point = 'point.determinism_hash = semanticHashV1({ ...point, determinism_hash: undefined });'
          new_point = '''const pointHashBasis = { ...point } as Partial<Cap04ForecastPointV1>;
    delete pointHashBasis.determinism_hash;
    point.determinism_hash = semanticHashV1(pointHashBasis);'''
          old_envelope = 'envelope.determinism_hash = semanticHashV1({ ...envelope, determinism_hash: undefined, created_at: undefined });'
          new_envelope = '''const envelopeHashBasis = { ...envelope } as Partial<Cap04ScenarioSetEnvelopeV1>;
  delete envelopeHashBasis.determinism_hash;
  delete envelopeHashBasis.created_at;
  envelope.determinism_hash = semanticHashV1(envelopeHashBasis);'''
          if old_point not in text or old_envelope not in text:
              raise SystemExit('expected fixture hash markers missing')
          text = text.replace(old_point, new_point, 1).replace(old_envelope, new_envelope, 1)
          fixture.write_text(text, encoding='utf-8')
          PY
      - name: Materialize S1 governance
        run: node .cap04-s1/materialize_s1.cjs
      - name: Recursive typecheck
        run: pnpm -r typecheck
      - name: Positive contracts acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_CONTRACTS_CONFIG.ts
      - name: Fail-closed negative acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_CONTRACTS_CONFIG_NEGATIVE.ts
      - name: Isolated PostgreSQL D-transaction acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_CONTRACTS_CONFIG_DB.ts
      - name: Remove temporary materializer
        run: |
          rm -rf .cap04-s1
          rm .github/workflows/mcft-cap-04-s1-materialize.yml
      - name: S1 final governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S1_CONTRACTS_CONFIG.cjs --final
      - name: Parse governance JSON and task integrity
        run: |
          node -e "JSON.parse(require('fs').readFileSync('docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-AUTHORIZATION-STATUS.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-DELIVERY-SLICE-STATUS.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-S1-CONTRACTS-CONFIG-STATUS.json','utf8'))"
          echo 'ea63e92a64b760b84c49428b1d3a245ce5cd94bb08daa9c6b971a53861b90a63  docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-TASK.md' | sha256sum -c -
      - name: Commit exact S1 candidate
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat(mcft-cap-04): materialize S1 contracts config candidate"
          git push origin HEAD:${{ github.head_ref }}
