name: mcft-cap-06-s2-effectiveness-postmerge-probe

on:
  pull_request:

permissions:
  contents: read

jobs:
  exact-merged-main-effectiveness-proof:
    if: github.head_ref == 'agent/mcft-cap-06-s2-effectiveness-postmerge-probe-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      PROVED_COMMIT: ea198cc0cad063c7e70a59727171908f2f8c7e7d
    steps:
      - name: Checkout exact S2 effectiveness merge commit
        uses: actions/checkout@v4
        with:
          ref: ea198cc0cad063c7e70a59727171908f2f8c7e7d
          fetch-depth: 0

      - name: Prove checkout and current main identity
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$PROVED_COMMIT"
          git fetch --quiet origin main
          test "$(git rev-parse origin/main)" = "$PROVED_COMMIT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck and build exact effectiveness merge
        run: |
          set -euo pipefail
          pnpm -r typecheck
          pnpm -r build

      - name: Reproduce corrected S1 canonical Residuals
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S1_RESIDUAL_WINDOWS.cjs

      - name: Reproduce corrected S1 regimes
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_REGIMES.ts

      - name: Run phase-aware corrected S1 Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_DATA_CORRECTION.cjs

      - name: Reproduce S2 contracts and math
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.ts

      - name: Run phase-aware S2 Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.cjs

      - name: Prove S2 effectiveness and bounded S3 authorization
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('node:fs');
          const S2 = 'MCFT-CAP-06.MCFT-02-06-07-09-11-12.CALIBRATION-SHADOW-CONTRACTS-MATH-V1';
          const S3 = 'MCFT-CAP-06.MCFT-03-12.D-GOVERNANCE-PERSISTENCE-RECOVERY-V1';
          const effectiveness = JSON.parse(fs.readFileSync('docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S2-EFFECTIVENESS.json', 'utf8'));
          const status = JSON.parse(fs.readFileSync('docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S2-STATUS.json', 'utf8'));
          const delivery = JSON.parse(fs.readFileSync('docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json', 'utf8'));
          const current = JSON.parse(fs.readFileSync('docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json', 'utf8'));
          const matrix = JSON.parse(fs.readFileSync('docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json', 'utf8'));
          const lines = Array.isArray(matrix.capability_lines) ? matrix.capability_lines : matrix.capabilities;
          const line = lines.find((item) => item.capability_line_id === 'MCFT-CAP-06');
          const matrixS2 = line.delivery_slices.find((item) => item.delivery_slice_id === S2);
          const matrixS3 = line.delivery_slices.find((item) => item.delivery_slice_id === S3);

          if (effectiveness.status !== 'MERGED_EFFECTIVE' || effectiveness.effective !== true) throw new Error('S2_EFFECTIVENESS_NOT_ACTIVE');
          if (effectiveness.implementation_exact_head !== 'cc1c982f3dd8e26af31a2f4270e6b43cba4ba30f') throw new Error('S2_HEAD_MISMATCH');
          if (effectiveness.implementation_exact_head_ci_run !== 29504752806) throw new Error('S2_CI_MISMATCH');
          if (effectiveness.implementation_merge_commit !== 'b6d28477d87239ee417c688d43122cb7a20b1a31') throw new Error('S2_MERGE_MISMATCH');
          if (effectiveness.postmerge_workflow_run !== 29506065728) throw new Error('S2_PROOF_MISMATCH');
          if (effectiveness.canonical_write_count !== 0 || effectiveness.projection_write_count !== 0 || effectiveness.migration_count !== 0 || effectiveness.model_activation_count !== 0) throw new Error('S2_EFFECTIVENESS_WRITE_FOUND');
          if (status.status !== 'MERGED_EFFECTIVE' || status.s2_effective !== true || status.s3_authorized !== true || status.s3_implementation_started !== false) throw new Error('S2_STATUS_MISMATCH');
          if (delivery.active_delivery_slice_id !== S3 || delivery.s2_effective !== true || delivery.s3_authorized !== true || delivery.s3_implementation_started !== false) throw new Error('DELIVERY_STATE_MISMATCH');
          if (delivery.candidate_slices.length !== 0 || delivery.authorized_not_started_slices.length !== 1 || delivery.authorized_not_started_slices[0] !== S3) throw new Error('DELIVERY_SLICE_CARDINALITY_MISMATCH');
          if (delivery.blocked_slices.includes(S3)) throw new Error('S3_STILL_BLOCKED');
          if (current.current_state.active_delivery_slice_id !== S3 || current.current_state.s2 !== 'MERGED_EFFECTIVE' || current.current_state.s3 !== 'AUTHORIZED_NOT_STARTED') throw new Error('CURRENT_STATE_MISMATCH');
          if (line.active_delivery_slice_id !== S3 || line.calibration_contract_math_implemented !== true || line.s3_authorized !== true || line.s3_implementation_started !== false) throw new Error('MATRIX_STATE_MISMATCH');
          if (line.next_delivery_slice_id !== S3 || line.next_authorized_slice_ids.length !== 1 || line.next_authorized_slice_ids[0] !== S3) throw new Error('MATRIX_SUCCESSOR_POINTER_MISMATCH');
          if (matrixS2.status !== 'MERGED_EFFECTIVE' || matrixS2.effectiveness_condition_satisfied !== true) throw new Error('MATRIX_S2_NOT_EFFECTIVE');
          if (matrixS3.status !== 'AUTHORIZED_NOT_STARTED' || matrixS3.implementation_started !== false) throw new Error('MATRIX_S3_PREMATURE_START');
          if (line.candidate_runtime_implemented !== false || line.shadow_evaluation_runtime_implemented !== false) throw new Error('DOWNSTREAM_RUNTIME_PREMATURE');
          if (line.successor_authorized !== false) throw new Error('CAP07_PREMATURE_AUTHORIZATION');
          NODE

      - name: Final exact-commit proof
        run: test "$(git rev-parse HEAD)" = "$PROVED_COMMIT"
