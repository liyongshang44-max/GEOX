name: MCFT-CAP-04 P0 materialize

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'mcft-cap-04-p0-predecessor-ssot-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout P0 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate materializer syntax
        run: node -c scripts/ops/materialize_mcft_cap_04_p0.cjs

      - name: Materialize P0 matrix and implementation map
        run: node scripts/ops/materialize_mcft_cap_04_p0.cjs

      - name: Remove operational materializer files
        run: |
          rm scripts/ops/materialize_mcft_cap_04_p0.cjs
          rm .github/workflows/mcft-cap-04-p0-materialize.yml

      - name: Validate P0 acceptance syntax
        run: node -c scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_P0_PREDECESSOR_SSOT.cjs

      - name: Run CAP-04 P0 exact-boundary acceptance
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_P0_PREDECESSOR_SSOT.cjs --enforce-diff

      - name: Re-run CAP-03 R4 final verification acceptance
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_03_R4_FINAL_VERIFICATION.cjs

      - name: Re-run CAP-03 R4-C effectiveness acceptance
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_03_R4_C_EFFECTIVENESS.cjs

      - name: Parse governance JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-P0-STATUS.json','utf8'))"

      - name: Check whitespace and patch integrity
        run: git diff --check origin/main

      - name: Commit materialized P0 candidate
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "docs(mcft-cap-04): reconcile predecessor SSOT and freeze P0"
          git push origin HEAD:${{ github.head_ref }}
