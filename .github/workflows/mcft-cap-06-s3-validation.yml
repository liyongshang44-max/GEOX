name: mcft-cap-06-s3-finalizer

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize-s3-candidate:
    if: github.head_ref == 'agent/mcft-cap-06-s3-d-persistence-recovery-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      BASE_MAIN: ea198cc0cad063c7e70a59727171908f2f8c7e7d
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-06-s3-d-persistence-recovery-v1
          fetch-depth: 0

      - name: Verify exact S3 baseline
        run: |
          set -euo pipefail
          git fetch --quiet origin main
          test "$(git rev-parse origin/main)" = "$BASE_MAIN"
          test "$(git merge-base HEAD origin/main)" = "$BASE_MAIN"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Materialize S3 candidate SSOT and phase-aware gates
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          BASE_MAIN = 'ea198cc0cad063c7e70a59727171908f2f8c7e7d'
          S2 = 'MCFT-CAP-06.MCFT-02-06-07-09-11-12.CALIBRATION-SHADOW-CONTRACTS-MATH-V1'
          S3 = 'MCFT-CAP-06.MCFT-03-12.D-GOVERNANCE-PERSISTENCE-RECOVERY-V1'
          S5 = 'MCFT-CAP-06.MCFT-06-09-11-12.CALIBRATION-CANDIDATE-COMPUTE-COMMIT-V1'
          S3_CONTRACT = 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S3-D-PERSISTENCE.json'
          S3_STATUS = 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S3-STATUS.json'
          EXPECTED_FILES = [
            'apps/server/db/migrations/2026_07_16_mcft_cap_06_calibration_governance_persistence.sql',
            'apps/server/src/persistence/twin_runtime/postgres_calibration_governance_persistence_repository_v1.ts',
            'apps/server/src/projections/twin_runtime/calibration_governance_projection_v1.ts',
            'docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md',
            'docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json',
            'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json',
            'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json',
            S3_CONTRACT,
            S3_STATUS,
            'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASK.md',
            'scripts/acceptance/run_acceptance.cjs',
            'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_DATA_CORRECTION.cjs',
            'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.cjs',
            'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S3_D_PERSISTENCE.cjs',
            'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S3_D_PERSISTENCE_DB.ts',
            'scripts/runtime_acceptance/RUN_MCFT_CAP_06_S3_D_PERSISTENCE.cjs',
            'scripts/runtime_acceptance/mcft_cap_06_s3_persistence_fixture_v1.ts',
          ]
          NONCLAIMS = [
            'NO_S5_CALIBRATION_CANDIDATE_COMPUTE_SERVICE',
            'NO_S6_OPERATIONAL_SHADOW_COMPUTE',
            'NO_S7_EVALUATION_COMMIT_SERVICE',
            'NO_ACTIVE_CONFIG_INDEX_CREATION_OR_MUTATION',
            'NO_STATE_OR_CHECKPOINT_MUTATION',
            'NO_MODEL_ACTIVATION',
            'NO_PUBLIC_ROUTE',
            'NO_WEB',
            'NO_SCHEDULER',
            'NO_MCFT_CAP_07_AUTHORIZATION',
          ]

          def read_json(path):
            return json.loads(Path(path).read_text(encoding='utf-8'))

          def write_json(path, value):
            Path(path).write_text(json.dumps(value, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')

          def replace_once(text, old, new, label):
            count = text.count(old)
            if count != 1:
              raise RuntimeError(f'{label}_ANCHOR_COUNT:{count}')
            return text.replace(old, new, 1)

          status = read_json(S3_STATUS)
          status['candidate_validation']['temporary_workflows_retained'] = False
          status['candidate_validation']['generated_acceptance_artifacts_retained'] = False
          status['candidate_validation']['exact_changed_file_count'] = len(EXPECTED_FILES)
          status['exact_changed_file_boundary'] = EXPECTED_FILES
          write_json(S3_STATUS, status)

          current_path = 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json'
          current = read_json(current_path)
          current['baseline_main_commit'] = BASE_MAIN
          current['status'] = 'S3_D_PERSISTENCE_CANDIDATE'
          current['reconciliation_effective'] = False
          state = current['current_state']
          state['active_delivery_slice_id'] = S3
          state['s3'] = 'CANDIDATE_IMPLEMENTED_NOT_EFFECTIVE'
          state['s3_authorized'] = True
          state['s3_implementation_started'] = True
          state['d_persistence_candidate_implemented'] = True
          state['d_persistence_implemented'] = False
          state['candidate_runtime_implemented'] = False
          state['shadow_evaluation_runtime_implemented'] = False
          current.setdefault('proof', {})['s3_candidate'] = {
            'status': 'CANDIDATE_IMPLEMENTED_NOT_EFFECTIVE',
            'contract_ref': S3_CONTRACT,
            'status_ref': S3_STATUS,
            'isolated_postgresql_workflow_run': 29518184366,
            'isolated_postgresql_acceptance': 'PASS',
            'migration_count': 1,
            'public_facts_sole_canonical_store': True,
            'active_config_relation_delta': 0,
            'candidate_to_evaluation_cardinality': 'ONE_TO_ZERO_OR_MANY',
            'effective': False,
          }
          current['next_repository_action'] = S3
          current['preserved_nonclaims'] = NONCLAIMS
          current['effectiveness_condition'] = 'S3_EXACT_HEAD_CI_PASS_AND_MERGE_AND_TREE_EQUIVALENCE_AND_EXACT_MERGED_MAIN_PROOF_AND_SEPARATE_EFFECTIVENESS_WRITEBACK'
          current['s3_contract_ref'] = S3_CONTRACT
          current['s3_status_ref'] = S3_STATUS
          write_json(current_path, current)

          delivery_path = 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json'
          delivery = read_json(delivery_path)
          delivery['implementation_status'] = 'S3_D_PERSISTENCE_CANDIDATE'
          delivery['active_delivery_slice_id'] = S3
          delivery['candidate_slices'] = [S3]
          delivery['authorized_not_started_slices'] = []
          delivery['next_repository_action'] = S3
          delivery['s3_authorized'] = True
          delivery['s3_implementation_started'] = True
          delivery['s3_candidate_implemented'] = True
          delivery['s3_effective'] = False
          delivery['s3_contract_ref'] = S3_CONTRACT
          delivery['s3_status_ref'] = S3_STATUS
          write_json(delivery_path, delivery)

          matrix_path = 'docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json'
          matrix = read_json(matrix_path)
          matrix['baseline']['commit'] = BASE_MAIN
          matrix['baseline']['meaning'] = 'MCFT-CAP-06 S2 merged-main effective; S3 D persistence candidate implemented but not effective; S5+ and MCFT-CAP-07 blocked'
          lines = matrix.get('capability_lines', matrix.get('capabilities'))
          line = next(item for item in lines if item['capability_line_id'] == 'MCFT-CAP-06')
          line['implementation_status'] = 'S3_D_PERSISTENCE_CANDIDATE'
          line['active_delivery_slice_id'] = S3
          line['next_repository_action'] = S3
          line['next_delivery_slice_id'] = S3
          line['next_delivery_slice_authorized'] = True
          line['next_authorized_slice_ids'] = []
          line['preserved_nonclaims'] = NONCLAIMS
          line['d_persistence_candidate_implemented'] = True
          line['d_persistence_implemented'] = False
          line['s3_authorized'] = True
          line['s3_implementation_started'] = True
          line['s3_contract_ref'] = S3_CONTRACT
          line['s3_status_ref'] = S3_STATUS
          line['candidate_runtime_implemented'] = False
          line['shadow_evaluation_runtime_implemented'] = False
          s3 = next(item for item in line['delivery_slices'] if item['delivery_slice_id'] == S3)
          s3['status'] = 'CANDIDATE_IMPLEMENTED_NOT_EFFECTIVE'
          s3['implementation_started'] = True
          s3['effectiveness_condition_satisfied'] = False
          s3['status_ref'] = S3_STATUS
          s3['contract_ref'] = S3_CONTRACT
          matrix['latest_governance_update'] = 'MCFT-CAP-06.S3.D-PERSISTENCE-CANDIDATE-V1'
          write_json(matrix_path, matrix)

          task_path = Path('docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASK.md')
          task = task_path.read_text(encoding='utf-8')
          task = replace_once(
            task,
            'implementation_status:\nS2_MERGED_EFFECTIVE_S3_AUTHORIZED_NOT_STARTED',
            'implementation_status:\nS3_D_PERSISTENCE_CANDIDATE',
            'TASK_IMPLEMENTATION_STATUS',
          )
          task = replace_once(
            task,
            'runtime_implementation_status:\nS2_CONTRACTS_MATH_MERGED_EFFECTIVE_S3_NOT_STARTED',
            'runtime_implementation_status:\nS3_D_PERSISTENCE_IMPLEMENTED_NOT_EFFECTIVE',
            'TASK_RUNTIME_STATUS',
          )
          marker = '<!-- MCFT-CAP-06-S3-D-PERSISTENCE-CANDIDATE-V1 -->'
          if marker not in task:
            task += f'''\n\n{marker}\n## S3 D persistence candidate\n\n```text\nstatus: CANDIDATE_IMPLEMENTED_NOT_EFFECTIVE\nbaseline main: {BASE_MAIN}\nisolated PostgreSQL workflow: 29518184366 PASS\nD transaction: D_MODEL_GOVERNANCE_STEP_COMMIT\nmigration count: 1\ncanonical store: public.facts only\nsupport tables: 4 rebuildable projections/indexes\nCandidate-to-Evaluation: ONE_TO_ZERO_OR_MANY\nactive-config relation delta: 0\nS5 authorization: false\nCandidate compute service: absent\nOperational Shadow compute: absent\nModel Activation: absent\nMCFT-CAP-07 authorization: false\n```\n'''
          task_path.write_text(task, encoding='utf-8')

          map_path = Path('docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md')
          implementation_map = map_path.read_text(encoding='utf-8')
          marker = '<!-- MCFT-CAP-06-S3-D-PERSISTENCE-CANDIDATE-V1 -->'
          if marker not in implementation_map:
            implementation_map += f'''\n\n{marker}\n## MCFT-CAP-06 S3 D persistence candidate\n\n```text\nactive slice: {S3}\nstatus: CANDIDATE_IMPLEMENTED_NOT_EFFECTIVE\nexactly one additive migration: PASS\npublic.facts sole canonical store: PASS\nD Candidate/Evaluation repository: implemented\nrebuildable Candidate/Evaluation/link/case support: implemented\nconcurrency, response-loss and facts recovery: PASS\nactive-config relation delta: 0\nS5+: blocked\n```\n'''
          map_path.write_text(implementation_map, encoding='utf-8')

          runner_path = Path('scripts/acceptance/run_acceptance.cjs')
          runner = runner_path.read_text(encoding='utf-8')
          anchor = '''    {
      id: 'MCFT_CAP_06_S2_CONTRACTS_MATH_GOVERNANCE',
      command: 'node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.cjs',
      logFile: 'MCFT_CAP_06_S2_CONTRACTS_MATH_GOVERNANCE.log',
      notes: 'Cross-checks S2 runtime evidence, frozen numeric policies, exact source dataset identity, zero-write boundary, and S3 blocking.'
    }
'''
          replacement = anchor.rstrip() + ''',
    {
      id: 'MCFT_CAP_06_S3_D_PERSISTENCE',
      command: 'node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S3_D_PERSISTENCE.cjs',
      logFile: 'MCFT_CAP_06_S3_D_PERSISTENCE.log',
      notes: 'Creates an isolated database and proves exactly-one-object D commits, Candidate/Evaluation projections, concurrency, response-loss recovery, facts rebuild and zero active-config mutation.'
    },
    {
      id: 'MCFT_CAP_06_S3_D_PERSISTENCE_GOVERNANCE',
      command: 'node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S3_D_PERSISTENCE.cjs',
      logFile: 'MCFT_CAP_06_S3_D_PERSISTENCE_GOVERNANCE.log',
      notes: 'Cross-checks S3 PostgreSQL evidence, P-1 one-migration adjudication, public.facts canonical authority, candidate lifecycle state and S5 blocking.'
    }
'''
          runner = replace_once(runner, anchor, replacement, 'RUN_ACCEPTANCE_S2_ANCHOR')
          runner_path.write_text(runner, encoding='utf-8')

          s1_path = Path('scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_DATA_CORRECTION.cjs')
          s1 = s1_path.read_text(encoding='utf-8')
          start = s1.index('  const s2CandidatePhase = delivery.candidate_slices.length === 1')
          end = s1.index("\n  const runner = readText('scripts/acceptance/run_acceptance.cjs');", start)
          phase_block = '''  const s2CandidatePhase = delivery.candidate_slices.length === 1 && delivery.candidate_slices[0] === S2;
  const s2EffectivePhase = delivery.s2_effective === true && delivery.active_delivery_slice_id === S3;
  const s3CandidatePhase = delivery.candidate_slices.length === 1 && delivery.candidate_slices[0] === S3;

  assert.equal(delivery.blocked_slices.includes(S2), false);
  assert.equal(delivery.s1_effective, true);
  assert.equal(delivery.s1_successor_readiness_effective, true);
  assert.equal(delivery.s2_authorized, true);
  assert.equal(current.current_state.s1, 'MERGED_EFFECTIVE_CORRECTED');
  assert.equal(current.current_state.controlled_residual_window_effective, true);
  assert.equal(current.current_state.s1_successor_readiness_effective, true);
  assert.equal(current.current_state.s2_authorized, true);

  const lines = Array.isArray(matrix.capability_lines) ? matrix.capability_lines : matrix.capabilities;
  const line = lines.find((item) => item.capability_line_id === 'MCFT-CAP-06');
  assert.ok(line);
  assert.equal(line.controlled_residual_window_effective, true);
  assert.equal(line.s1_successor_readiness_effective, true);
  assert.equal(line.candidate_runtime_implemented, false);
  assert.equal(line.shadow_evaluation_runtime_implemented, false);
  const matrixS1 = line.delivery_slices.find((item) => item.delivery_slice_id === S1);
  const matrixS2 = line.delivery_slices.find((item) => item.delivery_slice_id === S2);
  assert.equal(matrixS1.status, 'MERGED_EFFECTIVE_CORRECTED');
  assert.equal(matrixS1.effectiveness_condition_satisfied, true);

  if (s2EffectivePhase) {
    const matrixS3 = line.delivery_slices.find((item) => item.delivery_slice_id === S3);
    assert.deepEqual(delivery.candidate_slices, s3CandidatePhase ? [S3] : []);
    assert.deepEqual(delivery.authorized_not_started_slices, s3CandidatePhase ? [] : [S3]);
    assert.equal(delivery.blocked_slices.includes(S3), false);
    assert.equal(delivery.s2_implementation_started, true);
    assert.equal(delivery.s2_candidate_implemented, true);
    assert.equal(delivery.s2_effective, true);
    assert.equal(delivery.s3_authorized, true);
    assert.equal(delivery.s3_implementation_started, s3CandidatePhase);
    assert.equal(current.status, s3CandidatePhase ? 'S3_D_PERSISTENCE_CANDIDATE' : 'MERGED_EFFECTIVE');
    assert.equal(current.reconciliation_effective, !s3CandidatePhase);
    assert.equal(current.current_state.active_delivery_slice_id, S3);
    assert.equal(current.current_state.s2, 'MERGED_EFFECTIVE');
    assert.equal(current.current_state.s2_implementation_started, true);
    assert.equal(current.current_state.calibration_contract_math_candidate_implemented, true);
    assert.equal(current.current_state.calibration_contract_math_implemented, true);
    assert.equal(current.current_state.s3, s3CandidatePhase ? 'CANDIDATE_IMPLEMENTED_NOT_EFFECTIVE' : 'AUTHORIZED_NOT_STARTED');
    assert.equal(current.current_state.s3_authorized, true);
    assert.equal(current.current_state.s3_implementation_started, s3CandidatePhase);
    if (s3CandidatePhase) {
      assert.equal(current.current_state.d_persistence_candidate_implemented, true);
      assert.equal(current.current_state.d_persistence_implemented, false);
    }
    assert.equal(line.active_delivery_slice_id, S3);
    assert.deepEqual(line.next_authorized_slice_ids, s3CandidatePhase ? [] : [S3]);
    assert.equal(line.calibration_contract_math_candidate_implemented, true);
    assert.equal(line.calibration_contract_math_implemented, true);
    assert.equal(matrixS2.status, 'MERGED_EFFECTIVE');
    assert.equal(matrixS2.implementation_started, true);
    assert.equal(matrixS2.effectiveness_condition_satisfied, true);
    assert.equal(matrixS3.status, s3CandidatePhase ? 'CANDIDATE_IMPLEMENTED_NOT_EFFECTIVE' : 'AUTHORIZED_NOT_STARTED');
    assert.equal(matrixS3.implementation_started, s3CandidatePhase);
    if (s3CandidatePhase) assert.equal(matrixS3.effectiveness_condition_satisfied, false);
  } else if (s2CandidatePhase) {
    assert.equal(delivery.active_delivery_slice_id, S2);
    assert.deepEqual(delivery.authorized_not_started_slices, []);
    assert.equal(delivery.blocked_slices.includes(S3), true);
    assert.equal(delivery.s2_implementation_started, true);
    assert.equal(delivery.s2_candidate_implemented, true);
    assert.equal(delivery.s2_effective, false);
    assert.equal(delivery.s3_authorized, false);
    assert.equal(current.status, 'S2_CONTRACTS_MATH_CANDIDATE');
    assert.equal(current.reconciliation_effective, false);
    assert.equal(current.current_state.active_delivery_slice_id, S2);
    assert.equal(current.current_state.s2, 'CANDIDATE_IMPLEMENTED_NOT_EFFECTIVE');
    assert.equal(current.current_state.calibration_contract_math_candidate_implemented, true);
    assert.equal(current.current_state.calibration_contract_math_implemented, false);
    assert.equal(line.active_delivery_slice_id, S2);
    assert.deepEqual(line.next_authorized_slice_ids, []);
    assert.equal(line.calibration_contract_math_candidate_implemented, true);
    assert.equal(line.calibration_contract_math_implemented, false);
    assert.equal(matrixS2.status, 'CANDIDATE_IMPLEMENTED_NOT_EFFECTIVE');
    assert.equal(matrixS2.effectiveness_condition_satisfied, false);
  } else {
    assert.equal(delivery.active_delivery_slice_id, S2);
    assert.deepEqual(delivery.candidate_slices, []);
    assert.deepEqual(delivery.authorized_not_started_slices, [S2]);
    assert.equal(delivery.blocked_slices.includes(S3), true);
    assert.equal(delivery.s2_implementation_started, false);
    assert.equal(current.status, 'MERGED_EFFECTIVE');
    assert.equal(current.reconciliation_effective, true);
    assert.equal(current.current_state.active_delivery_slice_id, S2);
    assert.equal(current.current_state.s2, 'AUTHORIZED_NOT_STARTED');
    assert.equal(current.current_state.s2_implementation_started, false);
    assert.equal(current.current_state.calibration_contract_math_implemented, false);
    assert.equal(line.active_delivery_slice_id, S2);
    assert.deepEqual(line.next_authorized_slice_ids, [S2]);
    assert.equal(matrixS2.status, 'AUTHORIZED_NOT_STARTED');
    assert.equal(matrixS2.implementation_started, false);
  }
'''
          s1 = s1[:start] + phase_block + s1[end:]
          s1 = s1.replace(
            "  console.log('PASS corrected S1 effectiveness remains exact across bounded S2 authorization, candidate, and merged-effective phases');",
            "  console.log('PASS corrected S1 effectiveness remains exact through bounded S2 and S3 candidate lifecycle phases');",
          )
          s1 = s1.replace(
            "  console.log('PASS Candidate/Evaluation/Activation/CAP-07 remain absent; S3 is blocked or authorized-not-started');",
            "  console.log('PASS Candidate/Evaluation runtime and Activation remain absent; S3 is bounded and S5/CAP-07 remain blocked');",
          )
          s1_path.write_text(s1, encoding='utf-8')

          s2_path = Path('scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.cjs')
          s2 = s2_path.read_text(encoding='utf-8')
          start = s2.index('  assert.equal(status.delivery_slice_id, S2);')
          end = s2.index("\n  assert.match(task, s2EffectivePhase", start)
          phase_block = '''  assert.equal(status.delivery_slice_id, S2);
  assert.deepEqual(status.exact_changed_file_boundary, EXPECTED_FILES);
  assert.equal(status.candidate_tree_validation.exact_changed_file_count, 18);
  const s3CandidatePhase = delivery.candidate_slices.length === 1 && delivery.candidate_slices[0] === S3;
  if (s2EffectivePhase) {
    assert.equal(status.status, 'MERGED_EFFECTIVE');
    assert.equal(status.s3_authorized, true);
    assert.ok(effectiveness);
    assert.equal(effectiveness.implementation_exact_head, 'cc1c982f3dd8e26af31a2f4270e6b43cba4ba30f');
    assert.equal(effectiveness.implementation_exact_head_ci_run, 29504752806);
    assert.equal(effectiveness.implementation_merge_commit, 'b6d28477d87239ee417c688d43122cb7a20b1a31');
    assert.equal(effectiveness.postmerge_workflow_run, 29506065728);
    assert.equal(effectiveness.canonical_write_count, 0);
    assert.equal(current.current_state.active_delivery_slice_id, S3);
    assert.equal(current.current_state.s2, 'MERGED_EFFECTIVE');
    assert.equal(current.current_state.calibration_contract_math_implemented, true);
    assert.equal(current.current_state.s3, s3CandidatePhase ? 'CANDIDATE_IMPLEMENTED_NOT_EFFECTIVE' : 'AUTHORIZED_NOT_STARTED');
    assert.equal(delivery.active_delivery_slice_id, S3);
    assert.deepEqual(delivery.candidate_slices, s3CandidatePhase ? [S3] : []);
    assert.deepEqual(delivery.authorized_not_started_slices, s3CandidatePhase ? [] : [S3]);
    assert.equal(delivery.s2_effective, true);
    assert.equal(delivery.s3_authorized, true);
    assert.equal(delivery.s3_implementation_started, s3CandidatePhase);
  } else {
    assert.equal(status.status, 'CANDIDATE_IMPLEMENTED_NOT_EFFECTIVE');
    assert.equal(status.s2_effective, false);
    assert.equal(status.s3_authorized, false);
    assert.equal(current.current_state.active_delivery_slice_id, S2);
    assert.equal(delivery.active_delivery_slice_id, S2);
    assert.deepEqual(delivery.candidate_slices, [S2]);
  }
  const lines = Array.isArray(matrix.capability_lines) ? matrix.capability_lines : matrix.capabilities;
  const line = lines.find((item) => item.capability_line_id === 'MCFT-CAP-06');
  const matrixS2 = line.delivery_slices.find((item) => item.delivery_slice_id === S2);
  assert.equal(line.preserved_nonclaims.includes('NO_S2_IMPLEMENTATION'), false);
  assert.equal(current.preserved_nonclaims.includes('NO_S2_IMPLEMENTATION'), false);
  assert.equal(current.s2_candidate_validation.exact_permanent_changed_file_count, 18);
  if (s2EffectivePhase) {
    const matrixS3 = line.delivery_slices.find((item) => item.delivery_slice_id === S3);
    assert.equal(line.active_delivery_slice_id, S3);
    assert.equal(line.calibration_contract_math_implemented, true);
    assert.equal(matrixS2.status, 'MERGED_EFFECTIVE');
    assert.equal(matrixS3.status, s3CandidatePhase ? 'CANDIDATE_IMPLEMENTED_NOT_EFFECTIVE' : 'AUTHORIZED_NOT_STARTED');
    assert.equal(matrixS3.implementation_started, s3CandidatePhase);
    assert.deepEqual(line.next_authorized_slice_ids, s3CandidatePhase ? [] : [S3]);
    assert.equal(
      matrix.latest_governance_update,
      s3CandidatePhase ? 'MCFT-CAP-06.S3.D-PERSISTENCE-CANDIDATE-V1' : 'MCFT-CAP-06.S2.MERGED-MAIN-EFFECTIVENESS-ACTIVATION-V1',
    );
    assert.equal(current.baseline_main_commit, s3CandidatePhase ? 'ea198cc0cad063c7e70a59727171908f2f8c7e7d' : 'b6d28477d87239ee417c688d43122cb7a20b1a31');
    if (s3CandidatePhase) {
      assert.equal(current.current_state.d_persistence_candidate_implemented, true);
      assert.equal(current.current_state.d_persistence_implemented, false);
      assert.equal(line.d_persistence_candidate_implemented, true);
      assert.equal(line.d_persistence_implemented, false);
    }
  } else {
    assert.equal(line.active_delivery_slice_id, S2);
    assert.equal(line.calibration_contract_math_implemented, false);
    assert.equal(matrixS2.status, 'CANDIDATE_IMPLEMENTED_NOT_EFFECTIVE');
