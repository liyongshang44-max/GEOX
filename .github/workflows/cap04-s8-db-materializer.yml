name: MCFT-CAP-04 S8 DB acceptance materializer

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s8-restart-backfill-recovery-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s8-restart-backfill-recovery-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build S8 PostgreSQL acceptance from frozen S7 authority
        run: python3 .cap04-s8/build_db.py
      - name: Remove temporary DB materializer
        shell: bash
        run: |
          rm -f .github/workflows/cap04-s8-db-materializer.yml
          rm -f .cap04-s8/build_db.py
          rm -f .cap04-s8-db-trigger
          rmdir .cap04-s8 2>/dev/null || true
      - name: Commit S8 PostgreSQL acceptance
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'test(mcft-cap-04): add PostgreSQL restart backfill acceptance'
          git push origin HEAD:agent/mcft-cap-04-s8-restart-backfill-recovery-v1
