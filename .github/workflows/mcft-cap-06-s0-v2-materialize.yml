name: MCFT-CAP-06 S0 v2 materializer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'agent/mcft-cap-06-s0-v2-exact-qualification'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: landos
          POSTGRES_PASSWORD: landos
          POSTGRES_DB: mcft_cap06_s0_v2_materialize
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U landos -d mcft_cap06_s0_v2_materialize"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-06-s0-v2-exact-qualification
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Decode permanent S0 v2 qualification script
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          encoded = ''''''
          target = Path('scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S0_V2_EXACT_QUALIFICATION.ts')
          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_bytes(gzip.decompress(base64.b64decode(encoded)))
          PY

      - name: Run exact isolated PostgreSQL qualification
        env:
          DATABASE_URL: postgres://landos:landos@127.0.0.1:5432/mcft_cap06_s0_v2_materialize
          MCFT_CAP_06_S0_DESTRUCTIVE_ACCEPTANCE: "1"
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S0_V2_EXACT_QUALIFICATION.ts 2>&1 | tee /tmp/mcft-cap-06-s0-v2-result.log

      - name: Commit permanent qualification script only
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/mcft-cap-06-s0-v2-materialize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S0_V2_EXACT_QUALIFICATION.ts
          git diff --cached --check
          git commit -m "MCFT-CAP-06: add exact S0 v2 qualification runner"
          git push origin HEAD:agent/mcft-cap-06-s0-v2-exact-qualification

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mcft-cap-06-s0-v2-materialization
          path: /tmp/mcft-cap-06-s0-v2-result.log
          if-no-files-found: warn
          retention-days: 7
