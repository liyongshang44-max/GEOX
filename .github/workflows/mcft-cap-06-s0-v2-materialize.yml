name: mcft-cap-06-s0-v2-materialize

on:
  pull_request:
    branches:
      - main
    paths:
      - "scripts/governance_acceptance/.MATERIALIZE_MCFT_CAP_06_S0_V2_CANDIDATE.cjs"
      - ".github/workflows/mcft-cap-06-s0-v2-materialize.yml"

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assert baseline main and branch
        shell: bash
        run: |
          git fetch origin main
          test "$(git rev-parse origin/main)" = "ca819ba51bdf3017dbefa96015f76bd3b66a647c"
          test "$(git branch --show-current)" = "agent/mcft-cap-06-s0-v2-exact-graph-qualification"

      - name: Materialize permanent current-state frontiers
        run: node scripts/governance_acceptance/.MATERIALIZE_MCFT_CAP_06_S0_V2_CANDIDATE.cjs

      - name: Assert temporary infrastructure removed
        shell: bash
        run: |
          test ! -e scripts/governance_acceptance/.MATERIALIZE_MCFT_CAP_06_S0_V2_CANDIDATE.cjs
          test ! -e .github/workflows/mcft-cap-06-s0-v2-materialize.yml

      - name: Commit and push candidate frontier
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "MCFT-CAP-06 S0 v2: materialize candidate frontier"
          git push origin HEAD:agent/mcft-cap-06-s0-v2-exact-graph-qualification
