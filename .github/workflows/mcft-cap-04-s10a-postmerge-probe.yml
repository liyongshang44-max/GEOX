name: MCFT-CAP-04 S10A merged-main verification

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s10a-postmerge-probe-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Verify exact merged main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          test "$(git branch --show-current)" = "main"
          test "$(git rev-parse HEAD)" = "e39ac16f83e4f5e5c4762a25589dce275c853f1a"
          test "$(git rev-parse origin/main)" = "e39ac16f83e4f5e5c4762a25589dce275c853f1a"
      - name: Run S10A merged-main Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S10A_FINALIZATION_CANDIDATE.cjs --postmerge
