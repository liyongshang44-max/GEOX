name: MCFT-CAP-04 S1 typecheck diagnostic

on:
  pull_request:
    types: [synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/mcft-cap-04-s1-contracts-config-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture typecheck
        run: |
          set +e
          pnpm -r typecheck > /tmp/typecheck.log 2>&1
          echo "$?" > /tmp/typecheck.exit
          cat /tmp/typecheck.log
          exit 0
      - name: Publish diagnostic
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/typecheck.log','utf8');
            const exit = fs.readFileSync('/tmp/typecheck.exit','utf8').trim();
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: `<!-- cap04-s1-typecheck -->\n### S1 typecheck diagnostic\n\nExit: ${exit}\n\n\`\`\`text\n${output.slice(-20000)}\n\`\`\``});
      - run: test "$(cat /tmp/typecheck.exit)" -eq 0
