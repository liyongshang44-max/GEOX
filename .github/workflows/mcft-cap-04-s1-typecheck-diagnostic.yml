name: MCFT-CAP-04 S1 typed config repair

on:
  pull_request:
    types: [synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  repair:
    if: github.head_ref == 'agent/mcft-cap-04-s1-contracts-config-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Repair inherited literal override
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/server/src/domain/twin_runtime/forecast_scenario_runtime_config_v1.ts')
          text = path.read_text(encoding='utf-8')
          old = '"config_purpose" | "record_set_contract_id" | "model_component_refs"'
          new = '"config_purpose" | "config_selection_mode" | "record_set_contract_id" | "model_component_refs"'
          if old not in text:
              raise SystemExit('expected inheritance type marker missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Capture recursive typecheck
        run: |
          set +e
          pnpm -r typecheck > /tmp/typecheck.log 2>&1
          echo "$?" > /tmp/typecheck.exit
          cat /tmp/typecheck.log
          exit 0
      - name: Publish diagnostic
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/typecheck.log','utf8');
            const exit = fs.readFileSync('/tmp/typecheck.exit','utf8').trim();
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: `<!-- cap04-s1-typecheck -->\n### S1 typed-config repair\n\nExit: ${exit}\n\n\`\`\`text\n${output.slice(-20000)}\n\`\`\``});
      - name: Enforce and self-clean
        run: |
          test "$(cat /tmp/typecheck.exit)" -eq 0
          rm .github/workflows/mcft-cap-04-s1-typecheck-diagnostic.yml
          git diff --check
      - name: Commit repair
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(mcft-cap-04): separate inherited config selection literal"
          git push origin HEAD:${{ github.head_ref }}
