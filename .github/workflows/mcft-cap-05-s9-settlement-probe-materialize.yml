name: mcft-cap-05-s9-settlement-probe-materialize

on:
  push:
    branches:
      - ci/mcft-cap-05-s9-settlement-merged-main-probe

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout probe branch
        uses: actions/checkout@v4
        with:
          ref: ci/mcft-cap-05-s9-settlement-merged-main-probe
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Materialize one-file merged-main probe
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const wrapperPath = 'scripts/dev/assert_local_pnpm_runtime.cjs';
          let wrapper = fs.readFileSync(wrapperPath, 'utf8');

          const importAnchor = `const fs = require('node:fs');
          const path = require('node:path');
          const { spawnSync } = require('node:child_process');`;
          const importReplacement = `const assert = require('node:assert/strict');
          const fs = require('node:fs');
          const os = require('node:os');
          const path = require('node:path');
          const { spawnSync } = require('node:child_process');`;
          if (!wrapper.includes(importAnchor)) throw new Error('PROBE_IMPORT_ANCHOR_MISSING');
          wrapper = wrapper.replace(importAnchor, importReplacement);

          const diagnosticAnchor = `const diagnosticPath = path.join(process.cwd(), 'acceptance-output', 'MCFT_CAP_05_S9_ACCEPTANCE.log');`;
          const diagnosticReplacement = `${diagnosticAnchor}
          const SETTLEMENT_BRANCH = 'agent/mcft-cap-05-s9-ssot-settlement-v1';
          const SETTLEMENT_EXACT_HEAD = 'f188c2f2c9fd505daefbc31aeab0467242f2fcf8';
          const SETTLEMENT_MERGE = '679a1442cc130c174951eb0330b0c82592e4a6df';
          const PROBE_FILE = 'scripts/dev/assert_local_pnpm_runtime.cjs';`;
          if (!wrapper.includes(diagnosticAnchor)) throw new Error('PROBE_DIAGNOSTIC_ANCHOR_MISSING');
          wrapper = wrapper.replace(diagnosticAnchor, diagnosticReplacement);

          const runAnchor = `function run(command, args = [], envOverrides = {}) {
            const result = spawnSync(command, args, {
              cwd: process.cwd(),`;
          const runReplacement = `function run(command, args = [], envOverrides = {}, cwd = process.cwd()) {
            const result = spawnSync(command, args, {
              cwd,`;
          if (!wrapper.includes(runAnchor)) throw new Error('PROBE_RUN_ANCHOR_MISSING');
          wrapper = wrapper.replace(runAnchor, runReplacement);

          const normalizedAnchor = `function normalized(value) {`;
          const preflight = `function exactChangedFiles(base, head, cwd = process.cwd()) {
            const output = requireSuccess(run('git', ['diff', '--name-only', base, head], {}, cwd));
            return output.split(/\\r?\\n/).filter(Boolean).sort();
          }

          function runMergedMainSettlementProbe() {
            requireSuccess(run('git', [
              'fetch',
              '--no-tags',
              'origin',
              '+refs/heads/main:refs/remotes/origin/main',
              \`+refs/heads/\${SETTLEMENT_BRANCH}:refs/remotes/origin/\${SETTLEMENT_BRANCH}\`,
            ]));
            assert.equal(
              requireSuccess(run('git', ['rev-parse', \`origin/\${SETTLEMENT_BRANCH}\`])),
              SETTLEMENT_EXACT_HEAD,
              'settlement candidate branch moved after exact-head lock',
            );
            assert.equal(
              requireSuccess(run('git', ['rev-parse', 'origin/main'])),
              SETTLEMENT_MERGE,
              'main moved after settlement merge lock',
            );
            assert.deepEqual(
              exactChangedFiles(SETTLEMENT_EXACT_HEAD, SETTLEMENT_MERGE),
              [],
              'settlement exact head and merge commit must be file-tree equivalent',
            );
            assert.deepEqual(
              exactChangedFiles(SETTLEMENT_MERGE, 'HEAD'),
              [PROBE_FILE],
              'probe must differ from merged main by exactly one validation-only wrapper',
            );

            const worktreePath = fs.mkdtempSync(path.join(os.tmpdir(), 'geox-s9-settlement-effective-'));
            try {
              requireSuccess(run('git', ['worktree', 'add', '--detach', worktreePath, SETTLEMENT_MERGE]));
              requireSuccess(run(
                process.execPath,
                ['scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S9_SETTLEMENT.cjs', '--postmerge'],
                {},
                worktreePath,
              ));
            } finally {
              requireSuccess(run('git', ['worktree', 'remove', '--force', worktreePath]));
            }
          }

          ${normalizedAnchor}`;
          if (!wrapper.includes(normalizedAnchor)) throw new Error('PROBE_NORMALIZED_ANCHOR_MISSING');
          wrapper = wrapper.replace(normalizedAnchor, preflight);

          const doctorAnchor = `runRuntimeDoctor();`;
          const doctorReplacement = `runMergedMainSettlementProbe();

          ${doctorAnchor}`;
          if (!wrapper.includes(doctorAnchor)) throw new Error('PROBE_DOCTOR_ANCHOR_MISSING');
          wrapper = wrapper.replace(doctorAnchor, doctorReplacement);

          const finalGateAnchor = `// MCFT_CAP_05_S9_SSOT_SETTLEMENT_GATE_V1: settle S9 merged-main effectiveness and explicitly authorize, but do not implement, S10.
          runGate(s9SettlementGatePath, '--auto');`;
          const finalGateReplacement = `// MCFT_CAP_05_S9_SSOT_SETTLEMENT_GATE_V1: the probe preflight runs this Gate against the exact settlement merge commit in a detached worktree.
          // Do not re-run the exact eight-file settlement boundary against the one-file probe checkout.`;
          if (!wrapper.includes(finalGateAnchor)) throw new Error('PROBE_FINAL_GATE_ANCHOR_MISSING');
          wrapper = wrapper.replace(finalGateAnchor, finalGateReplacement);

          if (!wrapper.includes('runMergedMainSettlementProbe();')) throw new Error('PROBE_PREFLIGHT_WIRING_FAILED');
          fs.writeFileSync(wrapperPath, wrapper.endsWith('\n') ? wrapper : `${wrapper}\n`, 'utf8');
          NODE

      - name: Remove one-shot workflow
        run: rm .github/workflows/mcft-cap-05-s9-settlement-probe-materialize.yml

      - name: Commit probe wrapper
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "MCFT-CAP-05 S9 settlement: add merged-main probe wrapper"

      - name: Verify strict one-file boundary
        run: |
          node --check scripts/dev/assert_local_pnpm_runtime.cjs
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const actual = execFileSync(
            'git',
            ['diff', '--name-only', '679a1442cc130c174951eb0330b0c82592e4a6df..HEAD'],
            { encoding: 'utf8' },
          ).trim().split(/\r?\n/).filter(Boolean).sort();
          const expected = ['scripts/dev/assert_local_pnpm_runtime.cjs'];
          if (JSON.stringify(actual) !== JSON.stringify(expected)) {
            throw new Error(`UNEXPECTED_PROBE_BOUNDARY:${JSON.stringify(actual)}`);
          }
          NODE

      - name: Push probe candidate
        run: git push origin HEAD:ci/mcft-cap-05-s9-settlement-merged-main-probe
