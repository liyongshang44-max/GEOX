name: mcft-cap-07-s4-repair-typecheck-temp
on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-07-s4-repair-typecheck-temp.yml'
      - 'apps/server/src/**'
permissions:
  contents: read
jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture typecheck
        shell: bash
        run: |
          set +e
          pnpm --filter @geox/server typecheck > s4-repair-typecheck.log 2>&1
          rc=$?
          echo "$rc" > s4-repair-typecheck.exit
          cat s4-repair-typecheck.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: s4-repair-typecheck-${{ github.event.pull_request.head.sha }}
          path: |
            s4-repair-typecheck.log
            s4-repair-typecheck.exit
          retention-days: 1
