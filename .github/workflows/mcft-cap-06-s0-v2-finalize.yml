name: MCFT-CAP-06 S0 v2 finalizer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/mcft-cap-06-s0-v2-exact-qualification'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-06-s0-v2-exact-qualification
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Rebuild candidate bundle from verified S0 evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p acceptance-output
          python3 - <<'PY'
          import json
          from pathlib import Path

          qualification = json.loads(Path('docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DATASET-QUALIFICATION.json').read_text(encoding='utf-8'))
          lock = json.loads(Path('docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-PREDECESSOR-LOCK.json').read_text(encoding='utf-8'))
          if qualification.get('dataset_qualification_status') != 'INSUFFICIENT_MATCHED_PAIRS':
              raise SystemExit('S0_VERIFIED_QUALIFICATION_STATUS_REQUIRED')
          if qualification.get('case_graph_validation_status') != 'PASS':
              raise SystemExit('S0_VERIFIED_GRAPH_PASS_REQUIRED')
          identity = lock.get('canonical_identity')
          if not isinstance(identity, dict) or identity.get('checkpoint_sequence') != 80:
              raise SystemExit('S0_VERIFIED_PREDECESSOR_IDENTITY_REQUIRED')
          Path('acceptance-output/MCFT_CAP_06_S0_V2_RESULT.json').write_text(
              json.dumps({'identity': identity, 'qualification': qualification}, indent=2) + '\n',
              encoding='utf-8',
          )

          materializer = Path('scripts/remediation/MATERIALIZE_MCFT_CAP_06_S0_V2_CANDIDATE.cjs')
          source = materializer.read_text(encoding='utf-8')
          start = source.index('function buildExactQualificationSource() {')
          end = source.index('\nfunction main()', start)
          replacement = '''function buildExactQualificationSource() {
            return readText(PATHS.exactQualification);
          }
          '''
          materializer.write_text(source[:start] + replacement + source[end:], encoding='utf-8')
          PY
          node scripts/remediation/MATERIALIZE_MCFT_CAP_06_S0_V2_CANDIDATE.cjs

      - name: Materialize and validate permanent candidate
        shell: bash
        run: |
          set -euo pipefail
          {
            python3 - <<'PY'
            from pathlib import Path
            path = Path('scripts/remediation/FINALIZE_MCFT_CAP_06_S0_V2_CANDIDATE.py')
            source = path.read_text(encoding='utf-8')
            source = source.replace('    harden_exact_runner()\n', '')
            source = source.replace('    write_final_wrapper()\n', '')
            path.write_text(source, encoding='utf-8')
            PY
            python3 scripts/remediation/FINALIZE_MCFT_CAP_06_S0_V2_CANDIDATE.py
            node --check scripts/acceptance/run_acceptance.cjs
            node --check scripts/runtime_acceptance/RUN_MCFT_CAP_06_S0_V2_HONEST_QUALIFICATION.cjs
            node --check scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_AUTHORIZATION.cjs
            node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_AUTHORIZATION.cjs
            python3 -m json.tool docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json >/dev/null
            python3 -m json.tool docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-AUTHORIZATION-STATUS.json >/dev/null
            git diff --check
          } 2>&1 | tee /tmp/mcft-cap-06-s0-v2-validation.log

      - name: Commit exact permanent S0 candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          mapfile -t files < <(git diff --cached --name-only | sort)
          expected=(
            docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md
            docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json
            docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-AUTHORIZATION-STATUS.json
            docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-AUTHORIZATION.md
            docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DATASET-QUALIFICATION.json
            docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json
            docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-PREDECESSOR-LOCK.json
            docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASK.md
            scripts/acceptance/run_acceptance.cjs
            scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_AUTHORIZATION.cjs
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S0_V2_EXACT_QUALIFICATION.ts
            scripts/runtime_acceptance/RUN_MCFT_CAP_06_S0_V2_HONEST_QUALIFICATION.cjs
          )
          mapfile -t expected_sorted < <(printf '%s\n' "${expected[@]}" | sort)
          diff -u <(printf '%s\n' "${expected_sorted[@]}") <(printf '%s\n' "${files[@]}")
          git commit -m "MCFT-CAP-06 S0 v2: materialize exact qualification candidate"
          git push origin HEAD:agent/mcft-cap-06-s0-v2-exact-qualification

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mcft-cap-06-s0-v2-finalization
          path: /tmp/mcft-cap-06-s0-v2-validation.log
          if-no-files-found: warn
          retention-days: 7
