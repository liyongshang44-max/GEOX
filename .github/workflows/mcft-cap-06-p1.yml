name: mcft-cap-06-p1

on:
  pull_request:

jobs:
  p-minus-1-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout candidate
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Verify P-1 governance adjudication
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_P_MINUS_1_ADJUDICATION.cjs

      - name: Repository typecheck
        run: pnpm -r typecheck

      - name: Repository build
        run: pnpm -r build

      - name: Server selfcheck
        run: pnpm --filter @geox/server test:p1:selfcheck
