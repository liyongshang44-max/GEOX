name: mcft-cap-05-apply-source-patch

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-05-apply-source-patch.yml'
      - 'scripts/remediation/APPLY_MCFT_CAP_05_EXECUTION_VIEW_SEPARATION.py'
      - 'apps/server/src/domain/twin_runtime/runtime_config_execution_view_v1.ts'
      - 'apps/server/src/runtime/twin_runtime/cap05_inherited_cap04_execution_config_resolver_v1.ts'

permissions:
  contents: write

jobs:
  apply-source-patch:
    if: github.head_ref == 'agent/mcft-cap-05-post-closure-config-conformance-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Repair generator empty-replacement idempotency
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/remediation/APPLY_MCFT_CAP_05_EXECUTION_VIEW_SEPARATION.py')
          text = path.read_text()
          old = '    if new in text:\n        return\n'
          new = '    if new and new in text:\n        return\n'
          if old not in text:
              raise SystemExit('GENERATOR_IDEMPOTENCY_MARKER_NOT_FOUND')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Generate separated execution-view source
        run: python scripts/remediation/APPLY_MCFT_CAP_05_EXECUTION_VIEW_SEPARATION.py

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Validate generated source
        run: |
          set -o pipefail
          git diff --check 2>&1 | tee /tmp/source-diff-check.log
          pnpm -r typecheck 2>&1 | tee /tmp/source-typecheck.log

      - name: Upload source-patch diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-05-source-patch-diagnostics
          path: |
            /tmp/source-diff-check.log
            /tmp/source-typecheck.log

      - name: Commit source patch
        run: |
          set -o pipefail
          {
            git status --short
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -A -- \
              apps/server/src/domain/twin_runtime/runtime_config_execution_view_v1.ts \
              apps/server/src/runtime/twin_runtime/cap05_inherited_cap04_execution_config_resolver_v1.ts \
              apps/server/src/runtime/twin_runtime/forecast_scenario_single_tick_service_v1.ts \
              apps/server/src/runtime/twin_runtime/receipt_consuming_forecast_scenario_tick_service_v1.ts \
              apps/server/src/runtime/twin_runtime/pending_scenario_barrier_service_v1.ts \
              apps/server/scripts/mcft/MCFT_CAP_05_HUMAN_DECISION_FEEDBACK_RUNNER.ts \
              apps/server/src/adapters/twin_runtime/canonical_replay_file_source_v1.ts \
              apps/server/src/runtime/twin_runtime/cap05_feedback_config_execution_view_v1.ts \
              scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_FEEDBACK_CONFIG_EXECUTION_VIEW.ts \
              scripts/remediation/APPLY_MCFT_CAP_05_EXECUTION_VIEW_SEPARATION.py
            git status --short
            if git diff --cached --quiet; then
              echo 'No source patch required'
              exit 0
            fi
            git commit -m 'MCFT-CAP-05: separate canonical Config from execution view'
            git push origin HEAD:${{ github.head_ref }}
          } 2>&1 | tee /tmp/source-commit.log

      - name: Upload commit diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-05-source-commit-diagnostics
          path: /tmp/source-commit.log
