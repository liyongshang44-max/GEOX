name: mcft-cap-07-s5-operator-integration

on:
  pull_request:
    paths:
      - 'apps/server/src/domain/auth/roles.ts'
      - 'apps/server/src/infra/mcft_cap07_database_platform_bootstrap_v1.ts'
      - 'apps/web/src/api/mcftFieldTwinRuntime.ts'
      - 'apps/web/src/app/routes/operatorFieldRuntimeRoutes.tsx'
      - 'apps/web/src/features/operator/fieldRuntime/McftCanonicalFieldRuntimeRoutePage.tsx'
      - 'apps/web/src/features/operator/fieldRuntime/McftFieldRuntimeScopeNavigatorPage.tsx'
      - 'apps/web/src/styles/operatorFieldRuntimeNavigator.css'
      - 'config/auth/security_acceptance_tokens.json'
      - 'scripts/dev_seed/SEED_THREE_SURFACE_LOCAL_DEMO_V1.cjs'
      - 'scripts/dev_seed/seed_three_surface_local_demo_v1.ts'
      - 'scripts/dev_seed/three_surface_local_demo_action_lifecycle_v1.ts'
      - 'scripts/dev_seed/three_surface_local_demo_contract_v1.ts'
      - 'scripts/dev_seed/three_surface_local_demo_optional_persistence_v1.ts'
      - 'scripts/dev_seed/three_surface_local_demo_persistence_v1.ts'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_07_LOCAL_DEMO_AND_SCOPE_NAVIGATOR_V1.cjs'
      - 'docs/digital_twin/mcft/cap_07/GEOX-MCFT-CAP-07-S5-DELIVERY-STATUS-V1.json'
      - 'docs/digital_twin/mcft/cap_07/GEOX-MCFT-CAP-07-S6-DELIVERY-STATUS-V1.json'
      - 'docs/digital_twin/mcft/MCFT-CANDIDATE-AUTHORITY-REGISTRY-V1.json'
      - 'scripts/frontend_acceptance/ACCEPTANCE_MCFT_CAP_07_S5_OPERATOR_INTEGRATION.cjs'
      - '.github/workflows/mcft-cap-07-s5-operator-integration.yml'
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mcft-cap-07-s5-${{ github.event_name }}-${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  mcft-cap-07-s5-operator-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 3s
          --health-timeout 2s
          --health-retries 30
    steps:
      - name: Checkout exact candidate head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve exact head, comparison base, and lifecycle mode
        id: delivery
        shell: bash
        env:
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || '' }}
        run: |
          set -euo pipefail
          EXACT_SHA="${EVENT_HEAD_SHA}"
          if [[ -n "${EVENT_BASE_SHA}" ]]; then BASE_SHA="${EVENT_BASE_SHA}"; else BASE_SHA="$(git rev-parse origin/main)"; fi
          git cat-file -e "${EXACT_SHA}^{commit}"
          git cat-file -e "${BASE_SHA}^{commit}"
          export MCFT_BASE_SHA="${BASE_SHA}"
          MODE="$(node - <<'NODE'
          const fs = require('node:fs');
          const cp = require('node:child_process');
          const base = process.env.MCFT_BASE_SHA;
          const actual = cp.execFileSync('git', ['diff', '--name-only', `${base}...HEAD`], { encoding: 'utf8' })
            .trim().split(/\r?\n/).filter(Boolean).sort();
          const remediation = [
            '.github/workflows/mcft-cap-07-s5-operator-integration.yml',
            'scripts/frontend_acceptance/ACCEPTANCE_MCFT_CAP_07_S5_OPERATOR_INTEGRATION.cjs',
          ].sort();
          const postClosureLocalDemo = [
            '.github/workflows/mcft-cap-07-s5-operator-integration.yml',
            'apps/server/src/domain/auth/roles.ts',
            'apps/server/src/infra/mcft_cap07_database_platform_bootstrap_v1.ts',
            'apps/web/src/app/routes/operatorFieldRuntimeRoutes.tsx',
            'apps/web/src/features/operator/fieldRuntime/McftFieldRuntimeScopeNavigatorPage.tsx',
            'apps/web/src/styles/operatorFieldRuntimeNavigator.css',
            'config/auth/security_acceptance_tokens.json',
            'scripts/dev_seed/SEED_THREE_SURFACE_LOCAL_DEMO_V1.cjs',
            'scripts/dev_seed/seed_three_surface_local_demo_v1.ts',
            'scripts/dev_seed/three_surface_local_demo_action_lifecycle_v1.ts',
            'scripts/dev_seed/three_surface_local_demo_contract_v1.ts',
            'scripts/dev_seed/three_surface_local_demo_optional_persistence_v1.ts',
            'scripts/dev_seed/three_surface_local_demo_persistence_v1.ts',
            'scripts/frontend_acceptance/ACCEPTANCE_MCFT_CAP_07_S5_OPERATOR_INTEGRATION.cjs',
            'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_07_LOCAL_DEMO_AND_SCOPE_NAVIGATOR_V1.cjs',
          ].sort();
          const s6 = JSON.parse(fs.readFileSync('docs/digital_twin/mcft/cap_07/GEOX-MCFT-CAP-07-S6-DELIVERY-STATUS-V1.json', 'utf8'));
          if (JSON.stringify(actual) === JSON.stringify(postClosureLocalDemo)) process.stdout.write('S5_POST_CLOSURE_LOCAL_DEMO_MODE');
          else if (JSON.stringify(actual) === JSON.stringify(remediation)) process.stdout.write('S5_WORKFLOW_REMEDIATION_MODE');
          else if (s6.record_status === 'S6_COMMITTED_CLOSURE_CANDIDATE_AUTHORITY' && s6.s6_candidate_implemented === true) process.stdout.write('S6_SUCCESSOR_REGRESSION_MODE');
          else process.stdout.write('S5_EXACT_CANDIDATE_MODE');
          NODE
          )"
          echo "exact_sha=${EXACT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "base_sha=${BASE_SHA}" >> "${GITHUB_OUTPUT}"
          echo "mode=${MODE}" >> "${GITHUB_OUTPUT}"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Install locked workspace
        run: pnpm install --frozen-lockfile

      - name: Typecheck canonical Operator surface
        run: pnpm --filter @geox/web typecheck

      - name: Build canonical Operator surface
        run: pnpm --filter @geox/web build

      - name: Build server entries for local-demo PostgreSQL proof
        if: steps.delivery.outputs.mode == 'S5_POST_CLOSURE_LOCAL_DEMO_MODE'
        run: pnpm --filter @geox/contracts build && pnpm --filter @geox/control-kernel build && pnpm --filter @geox/device-skills build && pnpm --filter @geox/skill-registry build && pnpm --filter @geox/server build

      - name: Apply commercial PostgreSQL init baseline
        if: steps.delivery.outputs.mode == 'S5_POST_CLOSURE_LOCAL_DEMO_MODE'
        env:
          INIT_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: |
          set -euo pipefail
          mkdir -p acceptance-output
          node --input-type=module - <<'NODE' 2>&1 | tee acceptance-output/MCFT_CAP_07_COMMERCIAL_INIT_BASELINE.log
          import fs from 'node:fs';
          import path from 'node:path';
          import pg from 'pg';
          const { Client } = pg;
          const directory = path.resolve('docker/postgres/init');
          const files = fs.readdirSync(directory).filter((name) => name.endsWith('.sql')).sort();
          if (files.length === 0) throw new Error('COMMERCIAL_INIT_SQL_MISSING');
          const client = new Client({ connectionString: process.env.INIT_DATABASE_URL });
          await client.connect();
          try {
            for (const name of files) {
              const sql = fs.readFileSync(path.join(directory, name), 'utf8').replace(/^\uFEFF/, '');
              if (!sql.trim()) continue;
              await client.query(sql);
              console.log(JSON.stringify({ applied: name }));
            }
          } finally {
            await client.end();
          }
          console.log(JSON.stringify({ status: 'PASS', sql_file_count: files.length }));
          NODE

      - name: Initialize product schema and CAP-07 visibility contract
        if: steps.delivery.outputs.mode == 'S5_POST_CLOSURE_LOCAL_DEMO_MODE'
        env:
          GEOX_RUNTIME_ENV: development
          GEOX_DB_PLATFORM_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
          GEOX_MIGRATION_DATABASE_URL: postgres://geox_mcft_migrator_v1:local-mcft-migrator-password@127.0.0.1:5432/postgres
          GEOX_RUNTIME_DATABASE_URL: postgres://geox_runtime_v1:local-runtime-database-password@127.0.0.1:5432/postgres
          GEOX_MCFT_MIGRATOR_PASSWORD: local-mcft-migrator-password
          GEOX_RUNTIME_DATABASE_PASSWORD: local-runtime-database-password
          GEOX_DEPLOYMENT_SUBJECT_COMMIT: ${{ steps.delivery.outputs.exact_sha }}
        run: |
          set -euo pipefail
          mkdir -p acceptance-output
          node apps/server/dist/database/platform_bootstrap.js 2>&1 | tee acceptance-output/MCFT_CAP_07_PLATFORM_BOOTSTRAP_INITIAL.log
          env -u GEOX_DB_PLATFORM_ADMIN_DATABASE_URL -u GEOX_RUNTIME_DATABASE_URL \
            node apps/server/dist/database/mcft_cap07_migration.js 2>&1 | tee acceptance-output/MCFT_CAP_07_MIGRATION_INITIAL.log

      - name: Apply local demo twice and verify through dedicated Runtime credential
        if: steps.delivery.outputs.mode == 'S5_POST_CLOSURE_LOCAL_DEMO_MODE'
        env:
          GEOX_RUNTIME_ENV: development
          GEOX_RUNTIME_DATABASE_URL: postgres://geox_runtime_v1:local-runtime-database-password@127.0.0.1:5432/postgres
        run: |
          set -euo pipefail
          mkdir -p acceptance-output
          pnpm -w exec tsx scripts/dev_seed/seed_three_surface_local_demo_v1.ts \
            --apply --confirm-local-demo \
            --database-url postgres://postgres:postgres@127.0.0.1:5432/postgres \
            --runtime-database-url postgres://geox_runtime_v1:local-runtime-database-password@127.0.0.1:5432/postgres \
            | tee acceptance-output/MCFT_CAP_07_LOCAL_DEMO_FIRST_APPLY.json
          pnpm -w exec tsx scripts/dev_seed/seed_three_surface_local_demo_v1.ts \
            --apply --confirm-local-demo \
            --database-url postgres://postgres:postgres@127.0.0.1:5432/postgres \
            --runtime-database-url postgres://geox_runtime_v1:local-runtime-database-password@127.0.0.1:5432/postgres \
            | tee acceptance-output/MCFT_CAP_07_LOCAL_DEMO_IDEMPOTENT_APPLY.json

      - name: Probe operator field-read authorization
        if: steps.delivery.outputs.mode == 'S5_POST_CLOSURE_LOCAL_DEMO_MODE'
        env:
          GEOX_RUNTIME_ENV: development
          GEOX_TOKENS_FILE: ${{ github.workspace }}/config/auth/security_acceptance_tokens.json
          PROBE_DATABASE_URL: postgres://geox_runtime_v1:local-runtime-database-password@127.0.0.1:5432/postgres
        run: |
          set -euo pipefail
          node --input-type=module - <<'NODE' 2>&1 | tee acceptance-output/MCFT_CAP_07_OPERATOR_FIELD_DISCOVERY_AUTH.json
          import Fastify from 'fastify';
          import pg from 'pg';
          import { registerFieldsV1Routes } from './apps/server/dist/apps/server/src/routes/fields_v1.js';
          const { Pool } = pg;
          const pool = new Pool({ connectionString: process.env.PROBE_DATABASE_URL, max: 2 });
          const app = Fastify({ logger: false });
          registerFieldsV1Routes(app, pool);
          await app.ready();
          try {
            const list = await app.inject({
              method: 'GET',
              url: '/api/v1/fields',
              headers: { authorization: 'Bearer operator_token' },
            });
            if (list.statusCode !== 200) throw new Error(`OPERATOR_FIELD_LIST_NOT_200:${list.statusCode}:${list.body}`);
            const listBody = list.json();
            const fields = Array.isArray(listBody.fields) ? listBody.fields : [];
            if (!fields.some((item) => item.field_id === 'field_c8_demo')) throw new Error('GOVERNED_C8_FIELD_NOT_DISCOVERED');
            const seasonQuery = await pool.query(
              `SELECT season_id FROM field_season_index_v1
                WHERE tenant_id = $1 AND field_id = $2 AND season_id = $3`,
              ['tenantA', 'field_c8_demo', 'season_2026_c8_corn'],
            );
            if ((seasonQuery.rowCount ?? 0) !== 1) throw new Error('GOVERNED_C8_SEASON_NOT_RUNTIME_READABLE');
            const denied = await app.inject({
              method: 'GET',
              url: '/api/v1/fields',
              headers: { authorization: 'Bearer set-via-env-or-external-secret-file-pdi-writeonly' },
            });
            if (denied.statusCode !== 403) throw new Error(`WRITE_ONLY_FIELD_LIST_NOT_DENIED:${denied.statusCode}:${denied.body}`);
            const deniedBody = denied.json();
            if (deniedBody.error !== 'AUTH_SCOPE_DENIED') throw new Error(`WRITE_ONLY_DENIAL_CODE_INVALID:${denied.body}`);
            console.log(JSON.stringify({
              status: 'PASS',
              operator_field_list_status: list.statusCode,
              governed_field_discovered: true,
              governed_season_runtime_readable: true,
              write_only_status: denied.statusCode,
              write_only_error: deniedBody.error,
              fields_write_authorized: false,
            }));
          } catch (error) {
            console.log(JSON.stringify({
              status: 'FAIL',
              error: error instanceof Error ? error.message : String(error),
            }));
            throw error;
          } finally {
            await app.close();
            await pool.end();
          }
          NODE

      - name: Prove bootstrap and migration reentry preserve CAP-07 permissions
        if: steps.delivery.outputs.mode == 'S5_POST_CLOSURE_LOCAL_DEMO_MODE'
        env:
          GEOX_DB_PLATFORM_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
          GEOX_MIGRATION_DATABASE_URL: postgres://geox_mcft_migrator_v1:local-mcft-migrator-password@127.0.0.1:5432/postgres
          GEOX_RUNTIME_DATABASE_URL: postgres://geox_runtime_v1:local-runtime-database-password@127.0.0.1:5432/postgres
          GEOX_MCFT_MIGRATOR_PASSWORD: local-mcft-migrator-password
          GEOX_RUNTIME_DATABASE_PASSWORD: local-runtime-database-password
          GEOX_DEPLOYMENT_SUBJECT_COMMIT: ${{ steps.delivery.outputs.exact_sha }}
          GEOX_RUNTIME_ENV: development
        run: |
          set -euo pipefail
          node apps/server/dist/database/platform_bootstrap.js 2>&1 | tee acceptance-output/MCFT_CAP_07_PLATFORM_BOOTSTRAP_REENTRY.log
          env -u GEOX_DB_PLATFORM_ADMIN_DATABASE_URL -u GEOX_RUNTIME_DATABASE_URL \
            node apps/server/dist/database/mcft_cap07_migration.js | tee acceptance-output/MCFT_CAP_07_MIGRATION_REENTRY.json
          pnpm -w exec tsx scripts/dev_seed/seed_three_surface_local_demo_v1.ts \
            --verify \
            --database-url postgres://postgres:postgres@127.0.0.1:5432/postgres \
            --runtime-database-url postgres://geox_runtime_v1:local-runtime-database-password@127.0.0.1:5432/postgres \
            | tee acceptance-output/MCFT_CAP_07_LOCAL_DEMO_POST_REENTRY_READBACK.json

      - name: Verify local-demo PostgreSQL evidence
        if: steps.delivery.outputs.mode == 'S5_POST_CLOSURE_LOCAL_DEMO_MODE'
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const requiredTimelineKinds = [
            'EVIDENCE_WINDOW','STATE_TRANSITION','ASSIMILATION_UPDATE','POSTERIOR_STATE','FORECAST_RESULT',
            'RUNTIME_TICK','CHECKPOINT','RUNTIME_HEALTH','SCENARIO_SET','HUMAN_DECISION',
            'APPROVED_PLAN_EVIDENCE','ACTION_FEEDBACK','FORECAST_RESIDUAL','CALIBRATION_CANDIDATE','SHADOW_EVALUATION',
          ];
          for (const file of [
            'acceptance-output/MCFT_CAP_07_LOCAL_DEMO_FIRST_APPLY.json',
            'acceptance-output/MCFT_CAP_07_LOCAL_DEMO_IDEMPOTENT_APPLY.json',
            'acceptance-output/MCFT_CAP_07_LOCAL_DEMO_POST_REENTRY_READBACK.json',
          ]) {
            const result = JSON.parse(fs.readFileSync(file, 'utf8'));
            if (result.ok !== true) throw new Error(`LOCAL_DEMO_NOT_OK:${file}`);
            if (result.readback_identity !== 'DEDICATED_RUNTIME_CREDENTIAL') throw new Error(`RUNTIME_IDENTITY_NOT_DEDICATED:${file}`);
            if (result.readback.runtime_root_graph_status !== 'COMPLETE_EXACT_GRAPH') throw new Error(`ROOT_NOT_COMPLETE:${file}`);
            if (result.readback.state_count < 2 || result.readback.forecast_count < 1 || result.readback.scenario_count < 1 || result.readback.residual_count < 1) throw new Error(`COLLECTIONS_INCOMPLETE:${file}`);
            if (result.readback.runtime_action_feedback_has_items !== true || result.readback.action_feedback_count < 1) throw new Error(`ACTION_LIFECYCLE_INCOMPLETE:${file}`);
            if (result.readback.timeline_event_count < requiredTimelineKinds.length || requiredTimelineKinds.some((kind) => !result.readback.timeline_event_kinds.includes(kind))) throw new Error(`TIMELINE_INCOMPLETE:${file}`);
            if (result.readback.calibration_candidate_count < 1 || result.readback.shadow_evaluation_count < 1 || result.readback.trace_node_count < 9) throw new Error(`GOVERNANCE_OR_TRACE_INCOMPLETE:${file}`);
            if (result.manifest?.cleanup_policy !== 'DISPOSABLE_LOCAL_DATABASE_OR_VOLUME_ONLY') throw new Error(`CLEANUP_POLICY_INVALID:${file}`);
            if (result.boundaries.runtime_source_authorized !== false || result.boundaries.canonical_production_write_authorized !== false || result.boundaries.model_activation_created !== false || result.boundaries.mcft_cap_08_authorized !== false) throw new Error(`BOUNDARY_INVALID:${file}`);
          }
          const migration = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_07_MIGRATION_REENTRY.json', 'utf8'));
          if (migration.status !== 'PASS' || migration.migration_action !== 'ALREADY_APPLIED_EXACT' || migration.runtime_metadata_direct_dml !== 'FORBIDDEN') throw new Error('MIGRATION_REENTRY_INVALID');
          const auth = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_07_OPERATOR_FIELD_DISCOVERY_AUTH.json', 'utf8'));
          if (auth.status !== 'PASS' || auth.operator_field_list_status !== 200 || auth.governed_field_discovered !== true || auth.governed_season_runtime_readable !== true || auth.write_only_status !== 403 || auth.write_only_error !== 'AUTH_SCOPE_DENIED' || auth.fields_write_authorized !== false) throw new Error('OPERATOR_FIELD_DISCOVERY_AUTH_INVALID');
          NODE

      - name: Run lifecycle-aware S5 acceptance
        env:
          MCFT_BASE_SHA: ${{ steps.delivery.outputs.base_sha }}
          MCFT_S5_ACCEPTANCE_MODE: ${{ steps.delivery.outputs.mode }}
        run: node scripts/frontend_acceptance/ACCEPTANCE_MCFT_CAP_07_S5_OPERATOR_INTEGRATION.cjs

      - name: Run post-closure local-demo boundary acceptance
        if: steps.delivery.outputs.mode == 'S5_POST_CLOSURE_LOCAL_DEMO_MODE'
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_07_LOCAL_DEMO_AND_SCOPE_NAVIGATOR_V1.cjs

      - name: Verify structured S5 result and lifecycle authority
        env:
          EXPECTED_MODE: ${{ steps.delivery.outputs.mode }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_07_S5_OPERATOR_INTEGRATION_RESULT.json', 'utf8'));
          if (result.status !== 'PASS') throw new Error(`S5_NOT_PASS:${result.error || 'UNKNOWN'}`);
          if (result.acceptance_mode !== process.env.EXPECTED_MODE) throw new Error(`S5_MODE_MISMATCH:${result.acceptance_mode}:${process.env.EXPECTED_MODE}`);
          if (!Number.isInteger(result.check_count) || result.check_count < 10) throw new Error('S5_CHECK_INVENTORY_INVALID');
          if (!Array.isArray(result.checks) || result.checks.some((check) => check.status !== 'PASS')) throw new Error('S5_CHECK_FAILURE');
          if (result.canonical_tab_count !== 9 || result.canonical_endpoint_count !== 10 || result.exact_scope_key_count !== 6) throw new Error('S5_FROZEN_INVENTORY_INVALID');
          if (result.legacy_truth_fallback !== false || result.numeric_confidence_fabricated !== false || result.write_authority_delta !== 'ZERO') throw new Error('S5_BOUNDARY_INVALID');
          NODE

      - name: Upload focused acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-07-s5-operator-integration-${{ steps.delivery.outputs.exact_sha }}
          path: acceptance-output/
          if-no-files-found: error
          retention-days: 90
