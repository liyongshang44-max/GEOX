name: MCFT-CAP-04 S5B finalize

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s5b-persistence-uniqueness-recovery-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: landos
          POSTGRES_PASSWORD: landos
          POSTGRES_DB: mcft_cap04_s5b_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U landos -d mcft_cap04_s5b_acceptance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout S5B branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Materialize S5B governance
        run: node .cap04-s5b/materialize_s5b.cjs

      - name: Recursive typecheck
        run: pnpm -r typecheck

      - name: Run positive Scenario Set builder acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_SCENARIO_SET_BUILDER.ts

      - name: Run negative Scenario Set builder acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_SCENARIO_SET_BUILDER_NEGATIVE.ts

      - name: Run isolated PostgreSQL persistence acceptance
        env:
          DATABASE_URL: postgresql://landos:landos@127.0.0.1:5432/mcft_cap04_s5b_acceptance
          MCFT_CAP_04_PERSISTENCE_DESTRUCTIVE_ACCEPTANCE: '1'
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_PERSISTENCE_DB.ts

      - name: Remove temporary and diagnostic files
        run: |
          rm -rf .cap04-s5b
          rm -f .github/workflows/mcft-cap-04-s5b-diagnostic.yml
          rm -f .github/workflows/mcft-cap-04-s5b-finalize.yml
          rm -f docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-S5B-WIP.md
          rm -f docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-S5B-DIAGNOSTIC-BOUNDARY.json
          rm -f docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-S5B-README.md
          rm -f docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-S5B-PR-NOTE.md
          rm -f docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-S5B-ACTIVATION.json
          rm -f docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-S5B-NONCLAIMS.json

      - name: Run final S5B governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S5B_PERSISTENCE.cjs --final

      - name: Verify patch integrity
        run: git diff --check 2c6a0834488f367eb927430a15c9590c1bf348a3

      - name: Commit exact final candidate
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(mcft-cap-04): materialize S5B persistence candidate"
          git push origin "HEAD:${HEAD_BRANCH}"
