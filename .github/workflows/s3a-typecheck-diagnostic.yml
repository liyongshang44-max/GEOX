name: s3a-typecheck-diagnostic

on:
  pull_request:
    branches:
      - main

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: pnpm install --no-frozen-lockfile --reporter=silent
      - name: Capture Server Typecheck
        run: |
          set +e
          pnpm --filter @geox/server typecheck > s3a-typecheck.log 2>&1
          rc=$?
          printf '%s\n' "$rc" > s3a-typecheck.exit
          cat s3a-typecheck.log
          exit 0
      - name: Upload Typecheck Diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: s3a-typecheck-diagnostic
          path: |
            s3a-typecheck.log
            s3a-typecheck.exit
          if-no-files-found: error
          retention-days: 1
      - name: Enforce Typecheck Result
        run: test "$(cat s3a-typecheck.exit)" = "0"
