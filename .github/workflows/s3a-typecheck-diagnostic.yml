name: s3a-typecheck-diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: mcft-cap-03-assimilated-a2-record-set-builder-v1
          fetch-depth: 1
          show-progress: false
      - name: Normalize S3A type assertions
        shell: python
        run: |
          from pathlib import Path

          replacements = {
              Path("apps/server/src/domain/twin_runtime/assimilated_continuation_cross_ref_validator_v1.ts"): [
                  (
                      "const assimilation = input.assimilation_member.payload\n    as unknown as AssimilatedContinuationUpdatePayloadV1;",
                      "const assimilation = input.assimilation_member.payload as unknown as AssimilatedContinuationUpdatePayloadV1;",
                  ),
                  (
                      "const assimilation = assimilationMember.payload\n    as unknown as AssimilatedContinuationUpdatePayloadV1;",
                      "const assimilation = assimilationMember.payload as unknown as AssimilatedContinuationUpdatePayloadV1;",
                  ),
              ],
              Path("apps/server/src/runtime/twin_runtime/assimilated_continuation_record_set_builder_v1.ts"): [
                  (
                      "const config = input.runtime_config.payload\n    as unknown as AssimilatedContinuationRuntimeConfigPayloadV1;",
                      "const config = input.runtime_config.payload as unknown as AssimilatedContinuationRuntimeConfigPayloadV1;",
                  ),
              ],
          }

          changed = 0
          for path, pairs in replacements.items():
              text = path.read_text(encoding="utf-8")
              for old, new in pairs:
                  if old in text:
                      text = text.replace(old, new, 1)
                      changed += 1
              path.write_text(text, encoding="utf-8", newline="\n")

          if changed != 3:
              raise SystemExit(f"expected 3 replacements, applied {changed}")
      - name: Capture commit and push
        run: |
          set +e
          {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add apps/server/src/domain/twin_runtime/assimilated_continuation_cross_ref_validator_v1.ts
            git add apps/server/src/runtime/twin_runtime/assimilated_continuation_record_set_builder_v1.ts
            git diff --cached --stat
            git commit -m "fix(mcft-cap-03): normalize S3A type assertions"
            git push origin HEAD:mcft-cap-03-assimilated-a2-record-set-builder-v1
          } > s3a-patch.log 2>&1
          rc=$?
          printf '%s\n' "$rc" > s3a-patch.exit
          cat s3a-patch.log
          exit 0
      - name: Upload patch diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: s3a-patch-diagnostic
          path: |
            s3a-patch.log
            s3a-patch.exit
          if-no-files-found: error
          retention-days: 1
      - name: Enforce patch result
        run: test "$(cat s3a-patch.exit)" = "0"
