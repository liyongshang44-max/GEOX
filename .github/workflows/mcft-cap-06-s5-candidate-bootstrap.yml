name: mcft-cap-06-s5-candidate-bootstrap

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s5-candidate-bootstrap.yml'
      - '.github/s5-bootstrap/**'

permissions:
  contents: write

jobs:
  materialize-exact-candidate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      MCFT_CAP_06_S5_CANDIDATE_BASELINE_REF: dc7913d070c4a0c2cac0a7c35ccfa4292e633876
    steps:
      - name: Checkout exact S5 authorized main
        uses: actions/checkout@v4
        with:
          ref: dc7913d070c4a0c2cac0a7c35ccfa4292e633876
          fetch-depth: 0

      - name: Verify exact main baseline
        shell: bash
        run: |
          git fetch origin main
          test "$(git rev-parse HEAD)" = "dc7913d070c4a0c2cac0a7c35ccfa4292e633876"
          test "$(git rev-parse origin/main)" = "dc7913d070c4a0c2cac0a7c35ccfa4292e633876"

      - name: Checkout bootstrap payload
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: bootstrap
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply exact five-commit S5 patch series
        shell: bash
        run: |
          cat bootstrap/.github/s5-bootstrap/part-* | base64 -d > /tmp/mcft-cap06-s5.patch.gz
          echo "1dd74075e764fdc03e855e071381167a24876490dec7aeef22545f8ad801e34c  /tmp/mcft-cap06-s5.patch.gz" | sha256sum -c -
          gzip -dc /tmp/mcft-cap06-s5.patch.gz > /tmp/mcft-cap06-s5.patch
          echo "8499951499a6715c751c0a9f0f990698078eaff1e183722df26b841b95101d24  /tmp/mcft-cap06-s5.patch" | sha256sum -c -
          rm -rf bootstrap
          git config user.name "GEOX S5 candidate automation"
          git config user.email "actions@users.noreply.github.com"
          git am /tmp/mcft-cap06-s5.patch
          test "$(git rev-list --count dc7913d070c4a0c2cac0a7c35ccfa4292e633876..HEAD)" = "5"
          test "$(git diff --name-only dc7913d070c4a0c2cac0a7c35ccfa4292e633876..HEAD | wc -l | tr -d ' ')" = "12"
          test -z "$(git status --porcelain)"

      - name: Run mandatory single-command S5 preflight
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S5_CANDIDATE.cjs

      - name: Verify structured candidate evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S5_CANDIDATE_PREFLIGHT_RESULT.json', 'utf8'));
          const governance = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S5_CANDIDATE_GOVERNANCE_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s5_candidate_preflight_result_v1') throw new Error('S5_CANDIDATE_SCHEMA_MISMATCH');
          if (result.status !== 'PASS' || governance.status !== 'PASS') throw new Error('S5_CANDIDATE_NOT_PASS');
          if (governance.changed_file_count !== 12 || governance.logical_commit_count !== 5) throw new Error('S5_CANDIDATE_HISTORY_MISMATCH');
          if (result.calibration_case_count !== 16 || result.grid_point_count !== 21) throw new Error('S5_CANDIDATE_CARDINALITY_MISMATCH');
          if (result.selected_parameter_value !== '0.034000') throw new Error('S5_CANDIDATE_PARAMETER_MISMATCH');
          if (result.controlled_candidate_append_count !== 1 || result.completed_chain_rerun_candidate_append_count !== 0) throw new Error('S5_CANDIDATE_APPEND_MISMATCH');
          if (result.production_candidate_append_count !== 0 || result.evaluation_append_count !== 0 || result.model_activation_count !== 0) throw new Error('S5_CANDIDATE_WRITE_BOUNDARY_VIOLATION');
          if (result.active_config_switch_count !== 0 || result.runtime_parameter_change_count !== 0 || result.state_mutation_count !== 0 || result.checkpoint_mutation_count !== 0) throw new Error('S5_CANDIDATE_RUNTIME_BOUNDARY_VIOLATION');
          if (result.s5_candidate_implemented !== true || result.s5_effective !== false || result.s6_authorized !== false) throw new Error('S5_CANDIDATE_FRONTIER_MISMATCH');
          NODE

      - name: Push exact validated candidate branch
        shell: bash
        run: git push --force origin HEAD:refs/heads/agent/mcft-cap-06-s5-candidate-compute-commit-v1

      - name: Upload structured evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s5-candidate-bootstrap-evidence
          path: acceptance-output/
          if-no-files-found: error
