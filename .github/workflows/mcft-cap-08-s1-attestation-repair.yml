name: mcft-cap-08-s1-attestation-repair

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      subject_sha:
        description: Historical MCFT-CAP-08 S1 merge SHA
        required: true
        type: string
      pr_number:
        description: Merged S1 pull request number
        required: true
        type: string

permissions:
  contents: read
  actions: read
  pull-requests: read
  statuses: write

concurrency:
  group: mcft-cap-08-s1-attestation-repair-${{ github.event.issue.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  exact-sha-repair:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.pull_request &&
       github.event.comment.user.login == github.repository_owner &&
       startsWith(github.event.comment.body, '/mcft-cap08-s1-attest '))
    runs-on: ubuntu-latest
    timeout-minutes: 65
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: postgres }
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 3s
          --health-timeout 2s
          --health-retries 30
    steps:
      - name: Checkout trusted current-main repair tooling
        uses: actions/checkout@v4
        with:
          ref: main
          path: tools
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1

      - name: Resolve and authorize historical exact subject
        id: request
        env:
          GITHUB_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_PR_NUMBER: ${{ github.event.issue.number }}
          INPUT_SUBJECT_SHA: ${{ inputs.subject_sha }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const cp = require('child_process');
          const eventName = process.env.EVENT_NAME;
          let subject;
          let prNumber;
          if (eventName === 'issue_comment') {
            const match = String(process.env.COMMENT_BODY || '').trim().match(/^\/mcft-cap08-s1-attest ([0-9a-f]{40})$/);
            if (!match) throw new Error('REPAIR_COMMENT_COMMAND_INVALID');
            subject = match[1];
            prNumber = Number(process.env.COMMENT_PR_NUMBER);
          } else {
            subject = String(process.env.INPUT_SUBJECT_SHA || '').trim();
            prNumber = Number(process.env.INPUT_PR_NUMBER);
          }
          if (!/^[0-9a-f]{40}$/.test(subject)) throw new Error('REPAIR_SUBJECT_SHA_INVALID');
          if (!Number.isInteger(prNumber) || prNumber <= 0) throw new Error('REPAIR_PR_NUMBER_INVALID');

          const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
          async function api(apiPath) {
            const response = await fetch(`https://api.github.com${apiPath}`, {
              headers: {
                Accept: 'application/vnd.github+json',
                Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
                'X-GitHub-Api-Version': '2022-11-28',
                'User-Agent': 'geox-mcft-cap08-s1-attestation-repair-v1',
              },
            });
            if (!response.ok) throw new Error(`GITHUB_API_FAILED:${response.status}:${apiPath}:${(await response.text()).slice(0, 300)}`);
            return response.json();
          }

          (async () => {
            const pr = await api(`/repos/${owner}/${repo}/pulls/${prNumber}`);
            if (!pr.merged_at || pr.merge_commit_sha !== subject) throw new Error('REPAIR_PR_SUBJECT_MISMATCH');
            const marker = String(pr.body || '').match(/<!--\s*MCFT_CANDIDATE_DECLARATION_V2\s*\n([\s\S]*?)-->/);
            if (!marker) throw new Error('REPAIR_SUBJECT_DECLARATION_MISSING');
            const declaration = Object.fromEntries(marker[1].split(/\r?\n/).filter(Boolean).map((line) => {
              const at = line.indexOf('=');
              if (at < 1) throw new Error(`REPAIR_DECLARATION_LINE_INVALID:${line}`);
              return [line.slice(0, at).trim(), line.slice(at + 1).trim()];
            }));
            if (declaration.capability_line !== 'MCFT-CAP-08' || declaration.slice_id !== 'MCFT-CAP-08.S1') {
              throw new Error('REPAIR_SUBJECT_NOT_CAP08_S1');
            }
            if (declaration.candidate_head !== pr.head.sha || declaration.base_head !== pr.base.sha) {
              throw new Error('REPAIR_DECLARATION_PARENT_MISMATCH');
            }

            cp.execFileSync('git', ['-C', 'tools', 'fetch', '--no-tags', 'origin', 'main', subject, pr.head.sha, pr.base.sha], { stdio: 'inherit' });
            cp.execFileSync('git', ['-C', 'tools', 'merge-base', '--is-ancestor', subject, 'origin/main'], { stdio: 'inherit' });
            const parents = cp.execFileSync('git', ['-C', 'tools', 'rev-list', '--parents', '-n', '1', subject], { encoding: 'utf8' }).trim().split(/\s+/);
            if (parents.length !== 3 || parents[1] !== pr.base.sha || parents[2] !== pr.head.sha) {
              throw new Error('REPAIR_SUBJECT_PARENT_ORDER_MISMATCH');
            }
            const subjectTree = cp.execFileSync('git', ['-C', 'tools', 'rev-parse', `${subject}^{tree}`], { encoding: 'utf8' }).trim();
            const candidateTree = cp.execFileSync('git', ['-C', 'tools', 'rev-parse', `${pr.head.sha}^{tree}`], { encoding: 'utf8' }).trim();
            if (subjectTree !== candidateTree) throw new Error('REPAIR_SUBJECT_TREE_MISMATCH');

            const output = process.env.GITHUB_OUTPUT;
            fs.appendFileSync(output, `subject=${subject}\n`);
            fs.appendFileSync(output, `pr=${prNumber}\n`);
            fs.appendFileSync(output, `base=${pr.base.sha}\n`);
            fs.appendFileSync(output, `candidate=${pr.head.sha}\n`);
            fs.appendFileSync(output, `tree=${subjectTree}\n`);
          })().catch((error) => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE

      - name: Checkout exact historical subject
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.request.outputs.subject }}
          path: subject
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
          cache-dependency-path: subject/pnpm-lock.yaml

      - name: Install locked historical workspace
        working-directory: subject
        run: pnpm install --frozen-lockfile

      - name: Prove exact candidate-to-merge tree and required checks
        working-directory: subject
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MCFT_SUBJECT_SHA: ${{ steps.request.outputs.subject }}
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_08_SLICE_EXACT_SHA_ATTESTATION.cjs

      - name: Replay candidate boundary in detached candidate worktree
        env:
          MCFT_SUBJECT_ROOT: ${{ github.workspace }}/subject
          MCFT_BOUNDARY_RESULT_DESTINATION: ${{ github.workspace }}/subject/acceptance-output/MCFT_CAP_08_S1_BOUNDARY_RESULT.json
          MCFT_SUBJECT_SHA: ${{ steps.request.outputs.subject }}
          MCFT_BASE_SHA: ${{ steps.request.outputs.base }}
          MCFT_CANDIDATE_SHA: ${{ steps.request.outputs.candidate }}
        run: node tools/scripts/governance_acceptance/MCFT_CAP08_S1_POSTMERGE_BOUNDARY_REPLAY.cjs

      - name: Bootstrap fresh historical exact-SHA database
        working-directory: subject
        env:
          MCFT_CAP08_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
          MCFT_CAP08_TARGET_DATABASE_NAME: geox_mcft_cap08_s1_repair
          MCFT_CAP08_RUNNER_PASSWORD: cap08-s1-repair-runner-password
          MCFT_CAP08_MIGRATOR_PASSWORD: cap08-s1-repair-migrator-password
          MCFT_CAP08_LEGACY_RUNTIME_PASSWORD: cap08-s1-repair-legacy-runtime-password
          MCFT_CANDIDATE_SHA: ${{ steps.request.outputs.subject }}
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_PLATFORM_SECURITY_BOOTSTRAP_DB.ts

      - name: Reexecute fresh PostgreSQL B00 plus 24-Tick S1 proof
        working-directory: subject
        env:
          DATABASE_URL: postgres://geox_mcft_cap08_runner_v1:cap08-s1-repair-runner-password@127.0.0.1:5432/geox_mcft_cap08_s1_repair
          MCFT_CAP08_S1_DESTRUCTIVE_ACCEPTANCE: '1'
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_S1_BASE_RUNTIME_DB.ts

      - name: Finalize repaired exact merge-SHA artifact
        working-directory: subject
        env:
          MCFT_SUBJECT_SHA: ${{ steps.request.outputs.subject }}
          MCFT_ARTIFACT_STAGE: EXACT_MERGE_SHA
        run: node scripts/governance_acceptance/mcft_cap08_s1_artifact_finalize.cjs

      - name: Build deterministic archive
        working-directory: subject
        run: |
          mkdir -p acceptance-output/archive-input
          cp acceptance-output/MCFT_CAP_08_S1_AUTHORITY_ARTIFACT.json acceptance-output/archive-input/canonical-artifact.json
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -cf acceptance-output/mcft-cap-08-s1-attestation.tar -C acceptance-output/archive-input canonical-artifact.json
          gzip -n -f acceptance-output/mcft-cap-08-s1-attestation.tar

      - name: Upload and read back immutable R1 authority
        working-directory: subject
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.GEOX_MCFT_ATTESTATION_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.GEOX_MCFT_ATTESTATION_S3_SECRET_ACCESS_KEY }}
          GEOX_MCFT_ATTESTATION_S3_ENDPOINT: ${{ vars.GEOX_MCFT_ATTESTATION_S3_ENDPOINT }}
          GEOX_MCFT_ATTESTATION_S3_BUCKET: ${{ vars.GEOX_MCFT_ATTESTATION_S3_BUCKET }}
          GEOX_MCFT_ATTESTATION_S3_REGION: ${{ vars.GEOX_MCFT_ATTESTATION_S3_REGION }}
          GEOX_MCFT_ATTESTATION_S3_FORCE_PATH_STYLE: ${{ vars.GEOX_MCFT_ATTESTATION_S3_FORCE_PATH_STYLE }}
          MCFT_CANONICAL_ARTIFACT_PATH: acceptance-output/MCFT_CAP_08_S1_AUTHORITY_ARTIFACT.json
          MCFT_ARTIFACT_ARCHIVE_PATH: acceptance-output/mcft-cap-08-s1-attestation.tar.gz
          MCFT_REPOSITORY_OWNER: ${{ github.repository_owner }}
          MCFT_REPOSITORY_NAME: GEOX
          MCFT_ARTIFACT_NAME: mcft-cap-08-s1-exact-sha-${{ steps.request.outputs.subject }}
          MCFT_RETENTION_LEVEL: R1
          MCFT_RETENTION_DAYS: 180
        run: node scripts/governance_acceptance/mcft_attestation_retention_store_v1.cjs --upload-readback

      - name: Cleanup fresh database
        if: always()
        env: { PGPASSWORD: postgres }
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='geox_mcft_cap08_s1_repair' AND pid<>pg_backend_pid();"
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "DROP DATABASE IF EXISTS geox_mcft_cap08_s1_repair;"

      - id: artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-08-s1-exact-sha-repair-${{ steps.request.outputs.subject }}
          path: subject/acceptance-output/
          if-no-files-found: error
          retention-days: 90

      - name: Publish repaired exact-SHA status
        if: always()
        uses: actions/github-script@v7
        env:
          SUBJECT_SHA: ${{ steps.request.outputs.subject }}
          JOB_STATUS: ${{ job.status }}
          ARTIFACT_ID: ${{ steps.artifact.outputs.artifact-id }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs=require('fs');let a=null;try{a=JSON.parse(fs.readFileSync('subject/acceptance-output/MCFT_CAP_08_S1_AUTHORITY_ARTIFACT.json','utf8'))}catch{}
            const ok=process.env.JOB_STATUS==='success'&&a?.status==='PASS'&&a?.effective_delivery_frontier_projection?.effective_status==='S1_BASE_RUNTIME_IMPLEMENTED_EFFECTIVE'&&String(process.env.ARTIFACT_ID||'').length>0;
            const [owner,repo]=process.env.GITHUB_REPOSITORY.split('/');
            await github.rest.repos.createCommitStatus({owner,repo,sha:process.env.SUBJECT_SHA,state:ok?'success':'failure',context:'mcft-cap-08/slice-exact-sha-attestation',description:(ok?`PASS S1 repaired next=S2 artifact=${process.env.ARTIFACT_ID}`:'FAIL S1 repaired exact-SHA').slice(0,140),target_url:`${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`});
