name: MCFT-CAP-04 S0 authorization materialize

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s0-authorization-predecessor-lock-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: landos
          POSTGRES_PASSWORD: mcft-cap04-s0-acceptance
          POSTGRES_DB: mcft_cap_04_s0_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U landos -d mcft_cap_04_s0_acceptance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout S0 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Validate authorization Gate syntax
        run: node -c scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_AUTHORIZATION.cjs

      - name: Capture PostgreSQL predecessor preflight
        env:
          DATABASE_URL: postgres://landos:mcft-cap04-s0-acceptance@127.0.0.1:5432/mcft_cap_04_s0_acceptance
          MCFT_CAP_04_PREFLIGHT_DESTRUCTIVE_ACCEPTANCE: "1"
        run: |
          set +e
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_PREDECESSOR_PREFLIGHT.ts > /tmp/mcft-cap-04-s0-preflight.log 2>&1
          echo "$?" > /tmp/mcft-cap-04-s0-preflight.exit
          cat /tmp/mcft-cap-04-s0-preflight.log
          exit 0

      - name: Publish preflight diagnostic
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = [
              '<!-- mcft-cap-04-s0-preflight-diagnostic -->',
              '### MCFT-CAP-04 S0 PostgreSQL preflight',
              '',
              `Exit: ${fs.readFileSync('/tmp/mcft-cap-04-s0-preflight.exit', 'utf8').trim()}`,
              '',
              '```text',
              fs.readFileSync('/tmp/mcft-cap-04-s0-preflight.log', 'utf8').slice(-16000),
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Enforce preflight success
        run: test "$(cat /tmp/mcft-cap-04-s0-preflight.exit)" -eq 0

      - name: Remove temporary workflow
        run: rm .github/workflows/mcft-cap-04-s0-materialize.yml

      - name: Run exact-head S0 final Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_AUTHORIZATION.cjs --final

      - name: Re-run P0 postmerge semantic Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_P0_PREDECESSOR_SSOT.cjs --postmerge

      - name: Verify complete task integrity
        run: |
          echo 'ea63e92a64b760b84c49428b1d3a245ce5cd94bb08daa9c6b971a53861b90a63  docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-TASK.md' | sha256sum -c -
          test "$(wc -c < docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-TASK.md)" -eq 77603

      - name: Parse governance JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-AUTHORIZATION-STATUS.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-PREDECESSOR-LOCK.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-DELIVERY-SLICE-STATUS.json','utf8'))"

      - name: Enforce exact final boundary
        run: |
          git diff --check 30fdd839aa675656dd3dc9d1def57b06f63f86ec
          test "$(git diff --name-only 30fdd839aa675656dd3dc9d1def57b06f63f86ec | wc -l)" -eq 9
          git diff --name-only 30fdd839aa675656dd3dc9d1def57b06f63f86ec
          test -z "$(git diff --name-only 30fdd839aa675656dd3dc9d1def57b06f63f86ec | grep -E '^(apps/server/src|apps/server/db/migrations|apps/web|\.github/workflows)' || true)"

      - name: Typecheck repository
        run: pnpm -r typecheck

      - name: Commit S0 candidate
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "docs(mcft-cap-04): materialize S0 predecessor lock"
          git push origin HEAD:${{ github.head_ref }}
