name: MCFT-CAP-05 S7 Settlement Retry

on:
  push:
    branches:
      - agent/mcft-cap-05-s7-ssot-settlement-v1

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-05-s7-ssot-settlement-v1
          fetch-depth: 0
          persist-credentials: true

      - name: Recover and execute materializer
        env:
          PR_NUMBER: "2469"
          MATERIALIZATION_WORKFLOW: "29340747976"
        run: |
          set -o pipefail
          git show b6f8898af71fdd862c5a585ea666ed77d9dc7cf1:.github/workflows/mcft-cap-05-s7-settlement-materialize.yml > /tmp/materialize.yml
          python - <<'PY'
          from pathlib import Path

          source = Path('/tmp/materialize.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(source) if "python - <<'PY'" in line) + 1
          end = next(i for i in range(start, len(source)) if source[i].strip() == 'PY')
          lines = source[start:end]
          code = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/mcft_cap05_s7_materializer.py').write_text(code, encoding='utf-8')
          PY

          set +e
          python /tmp/mcft_cap05_s7_materializer.py > /tmp/mcft_cap05_s7_materializer.log 2>&1
          rc=$?
          set -e

          if [ "$rc" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/mcft_cap05_s7_materializer.log docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-S7-MATERIALIZER-ERROR.log
            rm .github/workflows/mcft-cap-05-s7-settlement-retry.yml
            git config user.name "GEOX Governance Bot"
            git config user.email "actions@users.noreply.github.com"
            git add -A
            git commit -m "chore(mcft-cap-05): update S7 settlement materializer failure"
            git push origin HEAD:agent/mcft-cap-05-s7-ssot-settlement-v1
            exit 0
          fi

          rm -f docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-S7-MATERIALIZER-ERROR.log
          rm .github/workflows/mcft-cap-05-s7-settlement-retry.yml
          git config user.name "GEOX Governance Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "docs(mcft-cap-05): settle S7 effective and authorize S8"
          git push origin HEAD:agent/mcft-cap-05-s7-ssot-settlement-v1
