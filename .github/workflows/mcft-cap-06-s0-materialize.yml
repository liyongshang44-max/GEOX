name: mcft-cap-06-s0-materialize

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  materialize-s0:
    if: github.head_ref == 'agent/mcft-cap-06-s0-authorization-predecessor-qualification-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mcft_cap06_s0_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mcft_cap06_s0_acceptance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/mcft_cap06_s0_acceptance
      EFFECTIVE_MAIN_SHA: 1e66ea7efc842b8e547bccc40521d520b4370e69
    steps:
      - name: Checkout S0 branch
        uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-06-s0-authorization-predecessor-qualification-v1
          fetch-depth: 0

      - name: Merge exact effective main baseline
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags --quiet origin main:refs/remotes/origin/main
          test "$(git rev-parse refs/remotes/origin/main)" = "$EFFECTIVE_MAIN_SHA"
          git merge --no-edit refs/remotes/origin/main

      - name: Apply resumed S0 predecessor qualification contract
        run: |
          set -o pipefail
          {
            python scripts/remediation/APPLY_MCFT_CAP_06_S0_RESUMPTION.py
            python scripts/remediation/APPLY_MCFT_CAP_06_S0_STATE_COUNT_RECONCILIATION.py
          } 2>&1 | tee /tmp/s0-transform.log
          rm scripts/remediation/APPLY_MCFT_CAP_06_S0_RESUMPTION.py
          rm scripts/remediation/APPLY_MCFT_CAP_06_S0_STATE_COUNT_RECONCILIATION.py

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Materialize S0 from isolated PostgreSQL
        env:
          MCFT_CAP_06_S0_DESTRUCTIVE_ACCEPTANCE: "1"
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_PREDECESSOR_PREFLIGHT.ts 2>&1 | tee /tmp/s0-preflight.log
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then
            tail -n 160 /tmp/s0-preflight.log > /tmp/s0-preflight-tail.log
            gh pr comment 2500 --body-file /tmp/s0-preflight-tail.log
            exit "$rc"
          fi

      - name: Upload resumed diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s0-resumed-diagnostics
          path: |
            /tmp/s0-transform.log
            /tmp/s0-preflight.log
          if-no-files-found: ignore

      - name: Restore exact permanent candidate boundary
        run: |
          rm -f .github/workflows/mcft-cap-06-s0-materialize.yml
          rm -f scripts/remediation/APPLY_MCFT_CAP_06_S0_RESUMPTION.py
          rm -f scripts/remediation/APPLY_MCFT_CAP_06_S0_STATE_COUNT_RECONCILIATION.py
          git add -A
          git commit -m "MCFT-CAP-06 S0: materialize authorization and predecessor qualification"

      - name: Verify S0 authorization Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_AUTHORIZATION.cjs

      - name: Repository typecheck
        run: pnpm -r typecheck

      - name: Repository build
        run: pnpm -r build

      - name: Server selfcheck
        run: pnpm --filter @geox/server test:p1:selfcheck

      - name: Push materialized candidate
        run: git push origin HEAD:agent/mcft-cap-06-s0-authorization-predecessor-qualification-v1
