name: mcft-cap-06-s0-materialize

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  materialize-s0:
    if: github.head_ref == 'agent/mcft-cap-06-s0-authorization-predecessor-qualification-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mcft_cap06_s0_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mcft_cap06_s0_acceptance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/mcft_cap06_s0_acceptance
      EFFECTIVE_MAIN_SHA: 1e66ea7efc842b8e547bccc40521d520b4370e69
      HISTORICAL_P0_MERGE_SHA: a7bb8d9499560b0ef0244a1a6daeaee1eeb408bf
    steps:
      - name: Checkout S0 branch
        uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-06-s0-authorization-predecessor-qualification-v1
          fetch-depth: 0

      - name: Merge exact effective main baseline
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags --quiet origin main:refs/remotes/origin/main
          test "$(git rev-parse refs/remotes/origin/main)" = "$EFFECTIVE_MAIN_SHA"
          git merge --no-edit refs/remotes/origin/main

      - name: Separate current S0 baseline from historical P0 merge identity
        run: |
          python - <<'PY'
          from pathlib import Path

          effective = "1e66ea7efc842b8e547bccc40521d520b4370e69"
          historical = "a7bb8d9499560b0ef0244a1a6daeaee1eeb408bf"

          preflight_path = Path("scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_PREDECESSOR_PREFLIGHT.ts")
          preflight = preflight_path.read_text()
          preflight = preflight.replace(
              f'const BASELINE_MAIN = "{historical}";',
              f'const BASELINE_MAIN = "{effective}";',
          )
          preflight = preflight.replace(
              'const P0_MERGE_COMMIT = BASELINE_MAIN;',
              f'const P0_MERGE_COMMIT = "{historical}";',
          )
          if f'const BASELINE_MAIN = "{effective}";' not in preflight:
              raise SystemExit("S0_EFFECTIVE_BASELINE_PATCH_FAILED")
          if f'const P0_MERGE_COMMIT = "{historical}";' not in preflight:
              raise SystemExit("S0_HISTORICAL_P0_PATCH_FAILED")
          preflight_path.write_text(preflight)

          gate_path = Path("scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_AUTHORIZATION.cjs")
          gate = gate_path.read_text()
          gate = gate.replace(
              f'const baseline = "{historical}";',
              f'const baseline = "{effective}";\nconst p0MergeCommit = "{historical}";',
          )
          gate = gate.replace(
              'p0.effectiveness.merge_commit === baseline',
              'p0.effectiveness.merge_commit === p0MergeCommit',
          )
          if f'const baseline = "{effective}";' not in gate:
              raise SystemExit("S0_GATE_EFFECTIVE_BASELINE_PATCH_FAILED")
          if f'const p0MergeCommit = "{historical}";' not in gate:
              raise SystemExit("S0_GATE_P0_HISTORY_PATCH_FAILED")
          gate_path.write_text(gate)
          PY

      - name: Align S0 preflight with H-authoritative formal Replay contract
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_PREDECESSOR_PREFLIGHT.ts")
          text = path.read_text()
          text = text.replace(
              'import fs from "node:fs";\nimport path from "node:path";',
              'import fs from "node:fs";\nimport os from "node:os";\nimport path from "node:path";',
          )
          text = text.replace(
              'import { Cap05ApprovalPlanBindingServiceV1 } from "../../apps/server/src/runtime/twin_runtime/approval_plan_binding_service_v1.js";',
              'import { semanticHashV1 } from "../../apps/server/src/domain/twin_runtime/canonical_identity_v1.js";\nimport { Cap05ApprovalPlanBindingServiceV1 } from "../../apps/server/src/runtime/twin_runtime/approval_plan_binding_service_v1.js";',
          )

          helper = r'''
          function walkReplayFilesV1(directory: string): string[] {
            const files: string[] = [];
            for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
              const absolutePath = path.join(directory, entry.name);
              if (entry.isDirectory()) files.push(...walkReplayFilesV1(absolutePath));
              else files.push(absolutePath);
            }
            return files;
          }

          function buildS0HAuthoritativeReplayViewV1(): string {
            const source = absolute("fixtures/mcft/water_state/replay_v1");
            const target = path.join(os.tmpdir(), "mcft_cap06_s0_h_authoritative_replay_v1");
            fs.rmSync(target, { recursive: true, force: true });
            fs.cpSync(source, target, { recursive: true });

            let removedLegacyIrrigation = 0;
            let normalizedObservation = 0;
            for (const file of walkReplayFilesV1(target).filter((candidate) => candidate.endsWith(".jsonl"))) {
              const records = fs.readFileSync(file, "utf8")
                .split("\n")
                .filter(Boolean)
                .map((line) => JSON.parse(line) as Record<string, any>);
              const output: string[] = [];
              for (const record of records) {
                if (record.record_type === "irrigation_execution_evidence_v1") {
                  removedLegacyIrrigation += 1;
                  continue;
                }
                if (record.record_type === "soil_moisture_observation_v1") {
                  record.canonical_payload = { ...record.canonical_payload };
                  record.source_payload = { ...record.source_payload };
                  if (record.canonical_payload.quantity_kind === undefined) {
                    assert.equal(typeof record.quantity_kind, "string", "S0_TEMP_REPLAY_QUANTITY_KIND_REQUIRED");
                    record.canonical_payload.quantity_kind = record.quantity_kind;
                    normalizedObservation += 1;
                  }
                  if (record.source_payload.source_version === undefined) {
                    assert.equal(typeof record.source_version, "string", "S0_TEMP_REPLAY_SOURCE_VERSION_REQUIRED");
                    record.source_payload.source_version = record.source_version;
                  }
                  const semantic = structuredClone(record);
                  delete semantic.source_record_hash;
                  delete semantic.materialized_file_location;
                  record.source_record_hash = semanticHashV1(semantic);
                }
                output.push(JSON.stringify(record));
              }
              fs.writeFileSync(file, `${output.join("\n")}\n`, "utf8");
            }
            assert.ok(removedLegacyIrrigation >= 1, "S0_LEGACY_IRRIGATION_EXCLUSION_NOT_PROVEN");
            assert.ok(normalizedObservation >= 1, "S0_LEGACY_OBSERVATION_NORMALIZATION_NOT_PROVEN");

            const outcomePath = absolute("fixtures/mcft/water_state/feedback_v1/soil_observations.jsonl");
            const outcomeRecords = fs.readFileSync(outcomePath, "utf8")
              .split(String.fromCharCode(10))
              .filter(Boolean)
              .map((line) => JSON.parse(line) as Record<string, any>);
            assert.equal(outcomeRecords.length, 1, "S0_OUTCOME_OBSERVATION_CARDINALITY");
            const outcome = structuredClone(outcomeRecords[0]);
            assert.equal(outcome.record_type, "soil_moisture_observation_v1");
            assert.equal(outcome.role_time.observed_at, "2026-06-04T03:00:00.000Z");
            outcome.canonical_payload = {
              ...outcome.canonical_payload,
              quantity_kind: "VOLUMETRIC_WATER_CONTENT",
            };
            outcome.source_payload = {
              ...outcome.source_payload,
              source_version: String(outcome.source_version ?? "1"),
            };
            const semantic = structuredClone(outcome);
            delete semantic.source_record_hash;
            delete semantic.materialized_file_location;
            outcome.source_record_hash = semanticHashV1(semantic);
            fs.appendFileSync(
              path.join(target, "soil_moisture", "2026-06-04.jsonl"),
              `${JSON.stringify(outcome)}\n`,
              "utf8",
            );
            return target;
          }

          '''.replace("          ", "")

          marker = "async function executeCap05TerminalChain(databaseUrl: string): Promise<void> {"
          if "function buildS0HAuthoritativeReplayViewV1" not in text:
              if marker not in text:
                  raise SystemExit("S0_REPLAY_HELPER_INSERTION_MARKER_MISSING")
              text = text.replace(marker, helper + marker, 1)

          text = text.replace(
              '  fs.mkdirSync(absolute("acceptance-output"), { recursive: true });',
              '  const replayRoot = buildS0HAuthoritativeReplayViewV1();\n  fs.mkdirSync(absolute("acceptance-output"), { recursive: true });',
          )
          text = text.replace(
              '    replay_root: "fixtures/mcft/water_state/replay_v1",',
              '    replay_root: replayRoot,',
          )
          text = text.replace(
              '    authorized_future_forcing_binding_ids: ["binding_weather", "binding_et0"],',
              '    authorized_future_forcing_binding_ids: ["weather_assumption_c8_replay_v1", "et0_future_assumption_c8_v1"],',
          )
          text = text.replace(
              '  fs.rmSync(absolute(TEMP_RUNNER_INPUT_PATH), { force: true });\n  ok("completed MCFT-CAP-05 bounded eight-tick terminal chain is reproduced in isolated PostgreSQL");',
              '  fs.rmSync(absolute(TEMP_RUNNER_INPUT_PATH), { force: true });\n  fs.rmSync(replayRoot, { recursive: true, force: true });\n  ok("completed MCFT-CAP-05 bounded eight-tick terminal chain is reproduced in isolated PostgreSQL");',
          )

          required = [
              'import os from "node:os";',
              'import { semanticHashV1 }',
              'function buildS0HAuthoritativeReplayViewV1',
              'replay_root: replayRoot',
              '"weather_assumption_c8_replay_v1", "et0_future_assumption_c8_v1"',
          ]
          for expected in required:
              if expected not in text:
                  raise SystemExit(f"S0_H_AUTHORITATIVE_REPLAY_PATCH_FAILED:{expected}")
          path.write_text(text)
          PY

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Materialize S0 from isolated PostgreSQL
        env:
          MCFT_CAP_06_S0_DESTRUCTIVE_ACCEPTANCE: "1"
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_PREDECESSOR_PREFLIGHT.ts 2>&1 | tee /tmp/s0-preflight.log
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then
            tail -n 120 /tmp/s0-preflight.log > /tmp/s0-preflight-tail.log
            gh pr comment 2500 --body-file /tmp/s0-preflight-tail.log
            exit "$rc"
          fi

      - name: Restore exact permanent candidate boundary
        run: |
          rm .github/workflows/mcft-cap-06-s0-materialize.yml
          git add -A
          git commit -m "MCFT-CAP-06 S0: materialize authorization and predecessor qualification"

      - name: Verify S0 authorization Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_AUTHORIZATION.cjs

      - name: Repository typecheck
        run: pnpm -r typecheck

      - name: Repository build
        run: pnpm -r build

      - name: Server selfcheck
        run: pnpm --filter @geox/server test:p1:selfcheck

      - name: Push materialized candidate
        run: git push origin HEAD:agent/mcft-cap-06-s0-authorization-predecessor-qualification-v1
