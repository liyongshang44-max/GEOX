name: mcft-cap-06-s5-predecessor-graph-postmerge-proof

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s5-predecessor-graph-postmerge-proof.yml'

permissions:
  contents: read

jobs:
  exact-merged-main-predecessor-graph-proof:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TARGET_COMMIT: 17a01ec25be2bbd7ee92b9e9e6115afed9665435
      CANDIDATE_HEAD: 001effed492514a5ea866d5b976af8f4a9e3357c
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      MCFT_CAP_06_S5_GRAPH_BASELINE_REF: 437a6ccae5903494638d17c997a7017c6da057cf
    steps:
      - name: Checkout proof carrier
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify proof carrier ancestry and current main
        run: |
          set -euo pipefail
          git fetch origin main
          test "$(git rev-parse HEAD^)" = "$TARGET_COMMIT"
          test "$(git rev-parse origin/main)" = "$TARGET_COMMIT"
          test -z "$(git diff --name-only "$CANDIDATE_HEAD".."$TARGET_COMMIT")"

      - name: Checkout exact merged-main predecessor graph commit
        uses: actions/checkout@v4
        with:
          ref: 17a01ec25be2bbd7ee92b9e9e6115afed9665435
          fetch-depth: 0

      - name: Assert exact checkout and main identity
        run: |
          set -euo pipefail
          git fetch origin main
          test "$(git rev-parse HEAD)" = "$TARGET_COMMIT"
          test "$(git rev-parse origin/main)" = "$TARGET_COMMIT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Run exact merged-main graph conformance preflight
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S5_PREDECESSOR_GRAPH_CONFORMANCE.cjs

      - name: Verify structured merged-main evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S5_PREDECESSOR_GRAPH_PREFLIGHT_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s5_predecessor_graph_preflight_result_v1') throw new Error('S5_GRAPH_POSTMERGE_SCHEMA_MISMATCH');
          if (result.status !== 'PASS') throw new Error('S5_GRAPH_POSTMERGE_NOT_PASS');
          if (result.exact_head !== process.env.TARGET_COMMIT) throw new Error('S5_GRAPH_POSTMERGE_HEAD_MISMATCH');
          if (result.canonical_write_count !== 0 || result.candidate_append_count !== 0 || result.evaluation_append_count !== 0) throw new Error('S5_GRAPH_POSTMERGE_WRITE_BOUNDARY_VIOLATION');
          if (result.s5_authorized !== false || result.s5_implementation_started !== false) throw new Error('S5_GRAPH_POSTMERGE_PREMATURE_S5_START');
          NODE

      - name: Upload exact merged-main evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s5-predecessor-graph-postmerge-evidence
          path: acceptance-output/
          if-no-files-found: error
