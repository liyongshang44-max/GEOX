name: cap04-predecessor-dispatch-fix

on:
  push:
    branches:
      - agent/mcft-cap-04-s6-single-tick-integration-v1

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s6-single-tick-integration-v1
      - name: Fix predecessor dispatch and client lifecycle
        shell: python
        run: |
          from pathlib import Path
          path = Path('apps/server/src/persistence/twin_runtime/postgres_forecast_scenario_recovery_repository_v1.ts')
          text = path.read_text(encoding='utf-8')
          import_anchor = 'import type { CanonicalObjectEnvelopeV1 } from "../../domain/twin_runtime/canonical_object_contracts_v1.js";\n'
          import_block = '''import type { CanonicalObjectEnvelopeV1 } from "../../domain/twin_runtime/canonical_object_contracts_v1.js";
import {
  CAP04_CANONICAL_FORECAST_AUTHORITY_CONTRACT_ID_V1,
  validateCap04CanonicalForecastRunPayloadV1,
  type Cap04CanonicalForecastRunPayloadV1,
} from "../../domain/twin_runtime/forecast_canonical_authority_v1.js";
'''
          if 'CAP04_CANONICAL_FORECAST_AUTHORITY_CONTRACT_ID_V1' not in text:
              if import_anchor not in text:
                  raise SystemExit('canonical object import anchor missing')
              text = text.replace(import_anchor, import_block, 1)
          old_client = '''    const forecastRef = stringFieldV1(checkpoint.payload.forecast_result_ref, "PENDING_SCENARIO_CHECKPOINT_FORECAST_REF_REQUIRED");
    const forecast = await this.readCanonicalObjectForRecoveryWithClientV1(await this.recoveryPool.connect(), forecastRef).catch((error) => { throw error; });
    if (!forecast || forecast.object_type !== "twin_forecast_run_v1") throw new Error("PENDING_SCENARIO_FORECAST_NOT_FOUND");
'''
          new_client = '''    const forecastRef = stringFieldV1(checkpoint.payload.forecast_result_ref, "PENDING_SCENARIO_CHECKPOINT_FORECAST_REF_REQUIRED");
    const client = await this.recoveryPool.connect();
    let forecast: CanonicalObjectEnvelopeV1 | null;
    try {
      forecast = await this.readCanonicalObjectForRecoveryWithClientV1(client, forecastRef);
    } finally {
      client.release();
    }
    if (!forecast || forecast.object_type !== "twin_forecast_run_v1") throw new Error("PENDING_SCENARIO_FORECAST_NOT_FOUND");
'''
          if old_client in text:
              text = text.replace(old_client, new_client, 1)
          elif 'const client = await this.recoveryPool.connect();' not in text[text.find('override async detectPendingScenario'):]:
              raise SystemExit('pending Forecast client lifecycle anchor missing')
          old_payload = '''    const payload = forecast.payload as unknown as Cap04ForecastRunPayloadV1;
    validateCap04ForecastRunPayloadV1(payload);
    if (payload.status === "BLOCKED" || payload.scenario_eligible !== true) return null;
'''
          new_payload = '''    if (forecast.payload.canonical_authority_contract_id !== CAP04_CANONICAL_FORECAST_AUTHORITY_CONTRACT_ID_V1) return null;
    const payload = forecast.payload as unknown as Cap04CanonicalForecastRunPayloadV1;
    validateCap04CanonicalForecastRunPayloadV1(payload);
    if (payload.status === "BLOCKED" || payload.scenario_eligible !== true) return null;
'''
          if old_payload not in text:
              raise SystemExit('pending Forecast payload dispatch anchor missing')
          text = text.replace(old_payload, new_payload, 1)
          path.write_text(text, encoding='utf-8')
      - name: Remove temporary patchers
        run: |
          rm -f .github/workflows/cap04-predecessor-dispatch-fix.yml
          rm -f .github/workflows/cap04-recovery-client-fix.yml
      - name: Commit exact predecessor dispatch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/server/src/persistence/twin_runtime/postgres_forecast_scenario_recovery_repository_v1.ts .github/workflows/cap04-predecessor-dispatch-fix.yml .github/workflows/cap04-recovery-client-fix.yml
          git commit -m "fix(mcft-cap-04): dispatch pending recovery by exact Forecast authority"
          git push origin HEAD:agent/mcft-cap-04-s6-single-tick-integration-v1
