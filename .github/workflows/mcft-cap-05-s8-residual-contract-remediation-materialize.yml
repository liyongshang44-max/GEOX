name: MCFT-CAP-05 S8 Residual Contract Remediation Materializer

on:
  pull_request:
    types: [synchronize]
    branches: [main]
    paths:
      - .github/workflows/mcft-cap-05-s8-residual-contract-remediation-materialize.yml

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'agent/mcft-cap-05-s8-residual-contract-conformance-remediation-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Materialize remediated call sites and standard gate
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          S2 = Path("scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_CONTRACTS_PROJECTION_CONFIG.ts")
          S3 = Path("scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_PERSISTENCE_RECOVERY_DB.ts")
          WRAPPER = Path("scripts/dev/assert_local_pnpm_runtime.cjs")

          def replace_once(text, old, new, code):
              if text.count(old) != 1:
                  raise RuntimeError(f"{code}:{text.count(old)}")
              return text.replace(old, new, 1)

          s2 = S2.read_text(encoding="utf-8")
          s2 = replace_once(
              s2,
              '''import {
            CAP05_FORECAST_OBSERVATION_PROJECTION_METHOD_ID_V1,
            buildCap05ForecastResidualV1,
            projectCap05ForecastPointToObservationV1,
          } from "../../apps/server/src/domain/twin_runtime/forecast_observation_residual_v1.js";''',
              '''import {
            CAP05_FORECAST_OBSERVATION_PROJECTION_METHOD_ID_V1,
            buildCap05ForecastPointMemberRefV1,
            buildCap05ForecastResidualV1,
            projectCap05ForecastPointToObservationV1,
          } from "../../apps/server/src/domain/twin_runtime/forecast_observation_residual_v1.js";''',
              "S2_IMPORT_PATTERN",
          )
          s2 = replace_once(s2, '    horizon_hour: 2,', '    horizon_hour: 1,', "S2_HORIZON_PATTERN")
          s2 = replace_once(s2, '    determinism_hash: "sha256:forecast-point-h2-controlled",', '    determinism_hash: "sha256:forecast-point-h1-controlled",', "S2_POINT_HASH_PATTERN")
          s2 = replace_once(
              s2,
              '  const observation = readOne("soil_observations.jsonl");',
              '''  const observation = readOne("soil_observations.jsonl");
            const sourceForecastRef = "twin_forecast_run_cap05_s2_post_receipt";
            const sourceForecastHash = "sha256:forecast-cap05-s2-post-receipt";
            const sourceForecastIssuedAt = "2026-06-04T02:00:00.000Z";''',
              "S2_SOURCE_FORECAST_CONSTANTS_PATTERN",
          )
          projection_pattern = re.compile(
              r'  const forecastPoint = forecastPointFixture\(\);\n  const projection = projectCap05ForecastPointToObservationV1\(\{.*?  ok\("H=1 root-zone-mean Forecast projection and normalized residual math are exact"\);',
              re.S,
          )
          projection_replacement = '''  const forecastPoint = forecastPointFixture();
            const projection = projectCap05ForecastPointToObservationV1({
              forecast_run_ref: sourceForecastRef,
              forecast_run_hash: sourceForecastHash,
              forecast_issued_at: sourceForecastIssuedAt,
              forecast_point_ref: buildCap05ForecastPointMemberRefV1(sourceForecastRef, 1),
              forecast_point: forecastPoint,
              root_zone_geometry_ref: "root_zone_geometry_cap05_s2_fixture",
              root_zone_geometry_hash: "sha256:root-zone-geometry-cap05-s2-fixture",
              root_zone_depth_mm: "300.000000",
              actual_observation_ref: observation.source_record_id,
              actual_observation_hash: observation.source_record_hash,
              actual_observation_observed_at: observation.role_time.observed_at,
              actual_observation_quality: observation.quality.status,
              actual_observation_value: "0.224000",
              actual_observation_variance: "0.000008000000",
              representativeness_variance: "0.000004000000",
            });
            assert.equal(projection.projection_method_id, CAP05_FORECAST_OBSERVATION_PROJECTION_METHOD_ID_V1);
            assert.equal(projection.forecast_point_ref, `${sourceForecastRef}#/points/1`);
            assert.equal(projection.predicted_observation_value, "0.220000");
            assert.equal(projection.predicted_observation_variance, "0.000001000000");
            assert.equal(projection.residual_value, "0.004000");
            assert.equal(projection.total_residual_variance, "0.000009000000");
            assert.equal(projection.normalized_residual, "1.333333");
            assert.match(projection.projection_input_hash, /^sha256:/);
            assert.match(projection.projection_trace_hash, /^sha256:/);
            ok("H=1 root-zone-mean Forecast projection and normalized residual math are exact");'''
          s2, count = projection_pattern.subn(projection_replacement, s2, count=1)
          if count != 1:
              raise RuntimeError(f"S2_PROJECTION_BLOCK_PATTERN:{count}")

          residual_pattern = re.compile(
              r'  const residual = buildCap05ForecastResidualV1\(\{.*?  ok\("Forecast Residual remains distinct from Assimilation Innovation and owns no posterior authority"\);',
              re.S,
          )
          residual_replacement = '''  const residual = buildCap05ForecastResidualV1({
              scope,
              forecast_run_ref: sourceForecastRef,
              forecast_run_hash: sourceForecastHash,
              forecast_issued_at: sourceForecastIssuedAt,
              forecast_point_ref: buildCap05ForecastPointMemberRefV1(sourceForecastRef, 1),
              forecast_point: forecastPoint,
              root_zone_geometry_ref: "root_zone_geometry_cap05_s2_fixture",
              root_zone_geometry_hash: "sha256:root-zone-geometry-cap05-s2-fixture",
              root_zone_depth_mm: "300.000000",
              actual_observation_ref: observation.source_record_id,
              actual_observation_hash: observation.source_record_hash,
              actual_observation_observed_at: observation.role_time.observed_at,
              actual_observation_quality: observation.quality.status,
              actual_observation_value: "0.224000",
              actual_observation_variance: "0.000008000000",
              representativeness_variance: "0.000004000000",
              runtime_config_ref: chainA[1].object_id,
              runtime_config_hash: chainA[1].determinism_hash,
              context_lineage_ref: LOCK.canonical_identity.active_lineage_ref,
              context_revision_ref: LOCK.canonical_identity.revision_id,
              observation_available_to_runtime_at: observation.available_to_runtime_at,
              assimilation_update_ref: "twin_assimilation_update_cap05_s2_fixture",
              assimilation_update_hash: "sha256:assimilation-update-cap05-s2-fixture",
              created_at: observation.available_to_runtime_at,
            });
            assert.equal(residual.payload.equivalence_claimed, false);
            assert.equal("assimilation_gain" in residual.payload, false);
            assert.equal("posterior_state_ref" in residual.payload, false);
            assert.equal(residual.payload.actual_observation_variance, "0.000008000000");
            ok("Forecast Residual remains distinct from Assimilation Innovation and owns no posterior authority");'''
          s2, count = residual_pattern.subn(residual_replacement, s2, count=1)
          if count != 1:
              raise RuntimeError(f"S2_RESIDUAL_BLOCK_PATTERN:{count}")
          S2.write_text(s2, encoding="utf-8")

          s3 = S3.read_text(encoding="utf-8")
          s3 = replace_once(
              s3,
              '''import {
            buildCap05ForecastResidualV1,
          } from "../../apps/server/src/domain/twin_runtime/forecast_observation_residual_v1.js";''',
              '''import {
            buildCap05ForecastPointMemberRefV1,
            buildCap05ForecastResidualV1,
          } from "../../apps/server/src/domain/twin_runtime/forecast_observation_residual_v1.js";''',
              "S3_IMPORT_PATTERN",
          )
          s3_pattern = re.compile(
              r'  const forecastRunRef = "twin_forecast_run_cap05_s3_source";.*?  ok\("C Forecast Residual commits independently from Assimilation authority"\);',
              re.S,
          )
          s3_replacement = '''  const forecastRunRef = "twin_forecast_run_cap05_s3_source";
            const forecastRunHash = "sha256:cap05-s3-source-forecast";
            const forecastIssuedAt = "2026-06-04T02:00:00.000Z";
            const residual = buildCap05ForecastResidualV1({
              scope,
              forecast_run_ref: forecastRunRef,
              forecast_run_hash: forecastRunHash,
              forecast_issued_at: forecastIssuedAt,
              forecast_point_ref: buildCap05ForecastPointMemberRefV1(forecastRunRef, 1),
              forecast_point: forecastPointFixture(),
              root_zone_geometry_ref: "root_zone_geometry_cap05_s3_fixture",
              root_zone_geometry_hash: "sha256:root-zone-geometry-cap05-s3-fixture",
              root_zone_depth_mm: "300.000000",
              actual_observation_ref: observation.source_record_id,
              actual_observation_hash: observation.source_record_hash,
              actual_observation_observed_at: observation.role_time.observed_at,
              actual_observation_quality: observation.quality.status,
              actual_observation_value: "0.224000",
              actual_observation_variance: "0.000008000000",
              representativeness_variance: "0.000004000000",
              runtime_config_ref: LOCK.canonical_identity.predecessor_state_runtime_config_ref,
              runtime_config_hash: LOCK.canonical_identity.predecessor_state_runtime_config_hash,
              context_lineage_ref: LOCK.canonical_identity.active_lineage_ref,
              context_revision_ref: LOCK.canonical_identity.revision_id,
              observation_available_to_runtime_at: observation.available_to_runtime_at,
              assimilation_update_ref: "twin_assimilation_update_cap05_s3",
              assimilation_update_hash: "sha256:cap05-s3-assimilation",
              created_at: observation.available_to_runtime_at,
            });
            assert.equal((await repository.commitCanonicalObject({ object: residual })).status, "INSERTED");
            assert.equal((await repository.commitCanonicalObject({ object: residual })).status, "EXISTING_IDEMPOTENT_SUCCESS");
            assert.equal(await count("twin_forecast_residual_projection_v1"), 1);
            assert.equal(residual.payload.total_residual_variance, "0.000009000000");
            assert.match(residual.payload.projection_trace_hash, /^sha256:/);
            ok("C Forecast Residual commits independently from Assimilation authority");'''
          s3, count = s3_pattern.subn(s3_replacement, s3, count=1)
          if count != 1:
              raise RuntimeError(f"S3_RESIDUAL_BLOCK_PATTERN:{count}")
          S3.write_text(s3, encoding="utf-8")

          wrapper = WRAPPER.read_text(encoding="utf-8")
          marker = "MCFT_CAP_05_S8_RESIDUAL_CONTRACT_REMEDIATION_GATE_V1"
          if marker not in wrapper:
              wrapper += '''

          // MCFT_CAP_05_S8_RESIDUAL_CONTRACT_REMEDIATION_GATE_V1: preserve the corrected Forecast-point, variance and projection-trace contract before S8 orchestration.
          function runCap05S8ResidualContractRemediationAcceptance() {
            const gatePath = path.join(process.cwd(), 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S8_RESIDUAL_CONTRACT_REMEDIATION.cjs');
            if (!fs.existsSync(gatePath)) return;
            requireSuccess(run(process.execPath, [gatePath, '--auto']));
            const pnpmCmd = isWindows ? 'pnpm.cmd' : 'pnpm';
            requireSuccess(run(pnpmCmd, ['-w', 'exec', 'tsx', 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_CONTRACTS_PROJECTION_CONFIG.ts']));
            requireSuccess(run(pnpmCmd, ['-w', 'exec', 'tsx', 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_S8_RESIDUAL_CONTRACT_CONFORMANCE.ts']));

            const shouldRunDatabase = env.CI === 'true' || env.MCFT_CAP_05_S8_RESIDUAL_CONTRACT_REMEDIATION_RUN_DB_ACCEPTANCE === '1';
            const base = postgresBaseUrl();
            if (!shouldRunDatabase || !base) return;
            const admin = databaseUrl(base, 'postgres');
            const databaseName = 'mcft_cap05_s8_residual_contract_remediation_acceptance';
            requireSuccess(run('psql', [admin, '-v', 'ON_ERROR_STOP=1', '-c', `DROP DATABASE IF EXISTS ${databaseName} WITH (FORCE)`]));
            requireSuccess(run('psql', [admin, '-v', 'ON_ERROR_STOP=1', '-c', `CREATE DATABASE ${databaseName}`]));
            requireSuccess(run(pnpmCmd, ['-w', 'exec', 'tsx', 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_PERSISTENCE_RECOVERY_DB.ts'], {
              DATABASE_URL: databaseUrl(base, databaseName),
              MCFT_CAP_05_S3_DESTRUCTIVE_ACCEPTANCE: '1',
            }));
          }

          runCap05S8ResidualContractRemediationAcceptance();
          '''
          WRAPPER.write_text(wrapper, encoding="utf-8")
          PY

      - name: Commit materialized remediation
        run: |
          rm .github/workflows/mcft-cap-05-s8-residual-contract-remediation-materialize.yml
          git config user.name "GEOX Governance Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "test(mcft-cap-05): materialize residual contract remediation"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
