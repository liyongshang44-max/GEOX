name: mcft-cap-06-hard-ledger-generator

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-hard-ledger-generator.yml'
      - 'scripts/governance_acceptance/GENERATE_MCFT_CAP_06_HARD_ACCEPTANCE_ITEM_LEDGER.cjs'
      - 'scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_HARD_ACCEPTANCE_ITEM_RECORDS.cjs'
      - 'scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_REQUIRED_DELIVERABLES.cjs'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-item-ledger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
      - name: Generate repair-candidate item records
        env:
          MCFT_CAP_06_LEDGER_MODE: REPAIR_CANDIDATE
        run: node scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_HARD_ACCEPTANCE_ITEM_RECORDS.cjs
      - name: Materialize frozen-path compatibility wrappers
        run: node scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_REQUIRED_DELIVERABLES.cjs
      - name: Verify generated records and deliverables
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const dir = 'acceptance-output/mcft-cap-06-ledger-repair';
          const p = path.join(dir, 'GEOX-MCFT-CAP-06-HARD-ACCEPTANCE-EVIDENCE-LEDGER.manifest.generated.json');
          const j = JSON.parse(fs.readFileSync(p, 'utf8'));
          if (j.total_check_count !== 255) throw new Error('LEDGER_ITEM_COUNT_INVALID');
          if (j.item_shape_inheritance !== 'FORBIDDEN' || j.each_item_self_contained !== true) throw new Error('LEDGER_ITEM_SHAPE_INVALID');
          if (j.status_counts.PASS !== 253 || j.status_counts.FAIL !== 2 || j.status_counts.NOT_APPLICABLE !== 0) throw new Error('LEDGER_REPAIR_COUNTS_INVALID');
          if (!Array.isArray(j.category_records) || j.category_records.length !== 10) throw new Error('LEDGER_CATEGORY_RECORDS_INVALID');
          let count = 0;
          const ids = new Set();
          for (const letter of 'ABCDEFGHIJ') {
            const record = JSON.parse(fs.readFileSync(path.join(dir, `MCFT-CAP-06-HARD-${letter}.generated.json`), 'utf8'));
            if (record.item_shape_inheritance !== 'FORBIDDEN' || record.each_item_self_contained !== true) throw new Error(`CATEGORY_ITEM_SHAPE_INVALID:${letter}`);
            count += record.item_count;
            for (const item of record.items) {
              if (ids.has(item.acceptance_id)) throw new Error(`LEDGER_ITEM_ID_DUPLICATE:${item.acceptance_id}`);
              ids.add(item.acceptance_id);
              for (const key of ['acceptance_id','category','assertion','status','evidence_refs','workflow_refs','canonical_refs','notes']) {
                if (!(key in item)) throw new Error(`LEDGER_ITEM_FIELD_MISSING:${item.acceptance_id}:${key}`);
              }
            }
          }
          if (count !== 255 || ids.size !== 255) throw new Error('LEDGER_ITEM_ACCUMULATION_INVALID');
          const m = JSON.parse(fs.readFileSync('docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-REQUIRED-DELIVERABLES-MANIFEST.json', 'utf8'));
          if (m.required_deliverable_count !== 13 || m.runtime_acceptance_count !== 12 || m.governance_acceptance_count !== 1) throw new Error('REQUIRED_DELIVERABLE_COUNT_INVALID');
          for (const d of m.deliverables) {
            if (!fs.existsSync(d.required_path)) throw new Error(`REQUIRED_DELIVERABLE_MISSING:${d.required_path}`);
            if (!fs.existsSync(d.implementation_authority)) throw new Error(`DELIVERABLE_AUTHORITY_MISSING:${d.implementation_authority}`);
          }
          NODE
      - name: Materialize generated records and wrappers on the repair work branch
        if: github.event_name == 'pull_request'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          DIR='acceptance-output/mcft-cap-06-ledger-repair'
          cp "$DIR/GEOX-MCFT-CAP-06-HARD-ACCEPTANCE-EVIDENCE-LEDGER.manifest.generated.json" \
            docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-HARD-ACCEPTANCE-EVIDENCE-LEDGER.json
          for LETTER in A B C D E F G H I J; do
            cp "$DIR/MCFT-CAP-06-HARD-${LETTER}.generated.json" \
              "docs/digital_twin/mcft/cap_06/hard_acceptance/MCFT-CAP-06-HARD-${LETTER}.json"
          done
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-HARD-ACCEPTANCE-EVIDENCE-LEDGER.json \
            docs/digital_twin/mcft/cap_06/hard_acceptance/MCFT-CAP-06-HARD-*.json \
            docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-REQUIRED-DELIVERABLES-MANIFEST.json \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_PREDECESSOR_PREFLIGHT.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_DATASET_QUALIFICATION.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_RESIDUAL_WINDOWS_DB.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_CONTRACTS_MATH.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_EXACT_REF_PORT.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_PERSISTENCE_DB.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_CANDIDATE_DB.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_SHADOW_COMPUTE.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_EVALUATION_DB.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_RESTART_RECOVERY.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_NON_CONSUMPTION_TICK.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_BOUNDED_CHAIN.ts \
            scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_FINALIZATION_EFFECTIVENESS.cjs
          if git diff --cached --quiet; then
            echo 'Generated repair records and wrappers already materialized.'
          else
            git commit -m 'MCFT-CAP-06 S11D repair: materialize required deliverables'
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-hard-ledger-generated
          path: acceptance-output/mcft-cap-06-ledger-repair/*.json
          if-no-files-found: error
