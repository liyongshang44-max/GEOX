name: mcft-cap-06-hard-ledger-generator

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-hard-ledger-generator.yml'
      - 'scripts/governance_acceptance/GENERATE_MCFT_CAP_06_HARD_ACCEPTANCE_ITEM_LEDGER.cjs'
      - 'scripts/governance_acceptance/NORMALIZE_MCFT_CAP_06_HARD_ACCEPTANCE_ITEM_LEDGER.cjs'
      - 'scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_HARD_ACCEPTANCE_ITEM_RECORDS.cjs'
      - 'scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_REQUIRED_DELIVERABLES.cjs'
      - 'scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_S11D_CLOSURE_REPAIR_STATE.cjs'
      - 'scripts/governance_acceptance/PATCH_MCFT_CAP_06_S11D_REPAIR_RUNTIME_DELTA.cjs'
      - 'scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_RESOLVED_TASKBOOK_V2.cjs'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mcft-cap-06-resolved-taskbook-materialization-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  generate-item-ledger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
      - name: Generate repair-candidate item records
        env:
          MCFT_CAP_06_LEDGER_MODE: REPAIR_CANDIDATE
        run: node scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_HARD_ACCEPTANCE_ITEM_RECORDS.cjs
      - name: Materialize frozen-path compatibility wrappers
        run: node scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_REQUIRED_DELIVERABLES.cjs
      - name: Stage generated item records
        run: |
          DIR='acceptance-output/mcft-cap-06-ledger-repair'
          cp "$DIR/GEOX-MCFT-CAP-06-HARD-ACCEPTANCE-EVIDENCE-LEDGER.manifest.generated.json" \
            docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-HARD-ACCEPTANCE-EVIDENCE-LEDGER.json
          for LETTER in A B C D E F G H I J; do
            cp "$DIR/MCFT-CAP-06-HARD-${LETTER}.generated.json" \
              "docs/digital_twin/mcft/cap_06/hard_acceptance/MCFT-CAP-06-HARD-${LETTER}.json"
          done
      - name: Materialize suspended S11D closure state
        run: node scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_S11D_CLOSURE_REPAIR_STATE.cjs
      - name: Normalize zero Runtime delta projection
        run: node scripts/governance_acceptance/PATCH_MCFT_CAP_06_S11D_REPAIR_RUNTIME_DELTA.cjs
      - name: Materialize resolved taskbook and item ledger V2
        run: node scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_RESOLVED_TASKBOOK_V2.cjs
      - name: Verify resolved taskbook ledger and SSOT state
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const crypto = require('node:crypto');
          const root = 'docs/digital_twin/mcft/cap_06';
          const ledger = JSON.parse(fs.readFileSync(`${root}/GEOX-MCFT-CAP-06-HARD-ACCEPTANCE-EVIDENCE-LEDGER.json`, 'utf8'));
          if (ledger.total_check_count !== 255) throw new Error('LEDGER_ITEM_COUNT_INVALID');
          if (JSON.stringify(ledger.status_counts) !== JSON.stringify({PASS:253,FAIL:0,PENDING:2,NOT_APPLICABLE:0})) throw new Error('LEDGER_REPAIR_COUNTS_INVALID');
          if (ledger.item_shape_inheritance !== 'FORBIDDEN' || ledger.each_item_self_contained !== true) throw new Error('LEDGER_ITEM_SHAPE_INVALID');
          let count = 0;
          const ids = new Set();
          const pending = [];
          for (const letter of 'ABCDEFGHIJ') {
            const file = `${root}/hard_acceptance/MCFT-CAP-06-HARD-${letter}.json`;
            const raw = fs.readFileSync(file, 'utf8');
            const record = JSON.parse(raw);
            const digest = `sha256:${crypto.createHash('sha256').update(raw).digest('hex')}`;
            if (ledger.category_record_digests[file] !== digest) throw new Error(`CATEGORY_DIGEST_MISMATCH:${letter}`);
            if (record.item_shape_inheritance !== 'FORBIDDEN' || record.each_item_self_contained !== true) throw new Error(`CATEGORY_ITEM_SHAPE_INVALID:${letter}`);
            count += record.item_count;
            for (const item of record.items) {
              if (ids.has(item.acceptance_id)) throw new Error(`LEDGER_ITEM_ID_DUPLICATE:${item.acceptance_id}`);
              ids.add(item.acceptance_id);
              for (const key of ['acceptance_id','category','assertion','lifecycle_phase','status','predicate','evidence_refs','workflow_refs','subject_commit','canonical_refs','notes']) {
                if (!(key in item)) throw new Error(`LEDGER_ITEM_FIELD_MISSING:${item.acceptance_id}:${key}`);
              }
              if (item.status === 'PENDING') pending.push(item.acceptance_id);
            }
          }
          if (count !== 255 || ids.size !== 255) throw new Error('LEDGER_ITEM_ACCUMULATION_INVALID');
          if (JSON.stringify(pending) !== JSON.stringify(['MCFT_CAP_06_HARD_J_016','MCFT_CAP_06_HARD_J_017'])) throw new Error('LEDGER_PENDING_ITEM_SET_INVALID');

          const deliverables = JSON.parse(fs.readFileSync(`${root}/GEOX-MCFT-CAP-06-REQUIRED-DELIVERABLES-MANIFEST.json`, 'utf8'));
          if (deliverables.required_deliverable_count !== 13 || deliverables.runtime_acceptance_count !== 12 || deliverables.governance_acceptance_count !== 1) throw new Error('REQUIRED_DELIVERABLE_COUNT_INVALID');
          for (const item of deliverables.deliverables) {
            if (!fs.existsSync(item.required_path)) throw new Error(`REQUIRED_DELIVERABLE_MISSING:${item.required_path}`);
            if (!fs.existsSync(item.implementation_authority)) throw new Error(`DELIVERABLE_AUTHORITY_MISSING:${item.implementation_authority}`);
          }

          const entry = fs.readFileSync(`${root}/GEOX-MCFT-CAP-06-TASK.md`, 'utf8');
          if (!entry.includes('resolved_manifest_ref:') || entry.includes('# 43. Hard Acceptance evidence ledger')) throw new Error('TASK_ENTRYPOINT_NOT_RESOLVED');
          if (!fs.existsSync(`${root}/GEOX-MCFT-CAP-06-TASK-v0.3.1.md`)) throw new Error('HISTORICAL_TASK_MISSING');
          const resolved = JSON.parse(fs.readFileSync(`${root}/GEOX-MCFT-CAP-06-RESOLVED-TASK-MANIFEST-V2.json`, 'utf8'));
          if (resolved.schema_version !== 'geox_mcft_cap_06_resolved_task_manifest_v2' || resolved.resolved_slice_graph.length !== 17) throw new Error('RESOLVED_MANIFEST_INVALID');
          if (resolved.resolution_policy.direct_historical_task_parsing_forbidden !== true || resolved.resolution_policy.closure_gates_must_consume_resolved_manifest !== true) throw new Error('RESOLVED_MANIFEST_CONSUMPTION_POLICY_INVALID');
          if (resolved.s10_composition_boundary.storage_mode !== 'TWO_NAMESPACED_ISOLATED_POSTGRESQL_STAGES') throw new Error('S10_COMPOSITION_BOUNDARY_INVALID');

          for (const name of ['GEOX-MCFT-CAP-06-CURRENT-DELIVERY-STATE.json','GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json','GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json']) {
            const historical = JSON.parse(fs.readFileSync(`${root}/${name}`, 'utf8'));
            if (historical.record_status !== 'HISTORICAL_SUPERSEDED_FOR_CURRENT_FRONTIER' || historical.current_frontier_authority !== false) throw new Error(`LEGACY_FRONTIER_NOT_SELF_MARKED:${name}`);
          }

          const closure = JSON.parse(fs.readFileSync(`${root}/GEOX-MCFT-CAP-06-CLOSURE-RECORD.json`, 'utf8'));
          if (closure.closure_effective !== false || closure.capability_complete !== false) throw new Error('CLOSURE_REPAIR_STATE_INVALID');
          if (closure.pending_completion_claims.length !== 48 || closure.runtime_source_authorized !== false || closure.successor_authorized !== false) throw new Error('CLOSURE_REPAIR_AUTHORITY_INVALID');
          if (closure.proof_only_pr_required !== false || closure.repair_merge_sha_attestation_required !== true) throw new Error('CLOSURE_ATTESTATION_POLICY_INVALID');
          NODE
      - name: Commit generated repair state on the work branch
        if: github.event_name == 'pull_request'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/digital_twin/mcft/cap_06 \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_PREDECESSOR_PREFLIGHT.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_DATASET_QUALIFICATION.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_RESIDUAL_WINDOWS_DB.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_CONTRACTS_MATH.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_EXACT_REF_PORT.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_PERSISTENCE_DB.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_CANDIDATE_DB.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_SHADOW_COMPUTE.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_EVALUATION_DB.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_RESTART_RECOVERY.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_NON_CONSUMPTION_TICK.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_BOUNDED_CHAIN.ts \
            scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_FINALIZATION_EFFECTIVENESS.cjs
          if git diff --cached --quiet; then
            echo 'Resolved taskbook V2 state already materialized.'
          else
            git commit -m 'MCFT-CAP-06 S11D repair: materialize resolved taskbook v2'
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-resolved-taskbook-materialization
          path: acceptance-output/mcft-cap-06-ledger-repair/*.json
          if-no-files-found: error
