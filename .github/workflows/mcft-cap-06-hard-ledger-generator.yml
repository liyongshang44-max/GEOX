name: mcft-cap-06-final-candidate-materializer

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-hard-ledger-generator.yml'
      - 'scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_S11D_REPAIRED_FINAL_CANDIDATE.cjs'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mcft-cap-06-final-candidate-materializer-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  materialize-final-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
      - name: Materialize repaired final candidate in isolated workspace
        run: node scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_S11D_REPAIRED_FINAL_CANDIDATE.cjs
      - name: Verify final candidate projection
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const root = 'docs/digital_twin/mcft/cap_06';
          const closure = JSON.parse(fs.readFileSync(`${root}/GEOX-MCFT-CAP-06-CLOSURE-RECORD.json`, 'utf8'));
          const frontier = JSON.parse(fs.readFileSync(`${root}/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-AUTHORITY-V2.json`, 'utf8'));
          const ledger = JSON.parse(fs.readFileSync(`${root}/GEOX-MCFT-CAP-06-HARD-ACCEPTANCE-EVIDENCE-LEDGER.json`, 'utf8'));
          const resolved = JSON.parse(fs.readFileSync(`${root}/GEOX-MCFT-CAP-06-RESOLVED-TASK-MANIFEST-V2.json`, 'utf8'));
          if (closure.status !== 'COMPLETE' || closure.closure_effective !== true || closure.capability_complete !== true) throw new Error('FINAL_CANDIDATE_CLOSURE_INVALID');
          if (closure.active_delivery_slice_id !== null || closure.next_repository_action !== null) throw new Error('FINAL_CANDIDATE_FRONTIER_NOT_CLOSED');
          if (closure.closure_effectiveness_condition !== 'EXACT_MERGE_SHA_ATTESTATION_PASS') throw new Error('FINAL_CANDIDATE_CONDITION_INVALID');
          if (closure.pending_completion_claims.length !== 0 || closure.effective_completion_claims.length !== 48) throw new Error('FINAL_CANDIDATE_CLAIMS_INVALID');
          if (frontier.status !== 'MCFT_CAP_06_COMPLETE' || frontier.successor_capability_line_authorized !== false) throw new Error('FINAL_CANDIDATE_AUTHORITY_INVALID');
          if (JSON.stringify(ledger.status_counts) !== JSON.stringify({PASS:253,FAIL:0,PENDING:2,NOT_APPLICABLE:0})) throw new Error('FINAL_CANDIDATE_COMMITTED_LEDGER_INVALID');
          if (JSON.stringify(ledger.effective_status_counts_on_attestation) !== JSON.stringify({PASS:255,FAIL:0,PENDING:0,NOT_APPLICABLE:0})) throw new Error('FINAL_CANDIDATE_EFFECTIVE_LEDGER_INVALID');
          if (resolved.completion_claims.effective_count !== 48 || resolved.closure_delivery_policy.proof_only_pr_required !== false) throw new Error('FINAL_CANDIDATE_RESOLVED_MANIFEST_INVALID');
          if (closure.runtime_source_authorized !== false || closure.successor_authorized !== false) throw new Error('FINAL_CANDIDATE_RUNTIME_OR_SUCCESSOR_AUTHORITY_INVALID');
          NODE
      - name: Package atomic final candidate tree input
        run: |
          set -euo pipefail
          OUT='acceptance-output/mcft-cap-06-final-candidate'
          mkdir -p "$OUT/root"
          git diff --name-only -- docs/digital_twin/mcft/cap_06 > "$OUT/changed-files.txt"
          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            mkdir -p "$OUT/root/$(dirname "$FILE")"
            cp "$FILE" "$OUT/root/$FILE"
          done < "$OUT/changed-files.txt"
          node - <<'NODE'
          const cp = require('node:child_process');
          const fs = require('node:fs');
          const out = 'acceptance-output/mcft-cap-06-final-candidate';
          const changed = fs.readFileSync(`${out}/changed-files.txt`, 'utf8').split(/\r?\n/).filter(Boolean);
          if (changed.length < 10) throw new Error(`FINAL_CANDIDATE_CHANGED_FILE_COUNT_TOO_LOW:${changed.length}`);
          if (changed.some((file) => !file.startsWith('docs/digital_twin/mcft/cap_06/'))) throw new Error('FINAL_CANDIDATE_NON_GOVERNANCE_FILE_CHANGED');
          const manifest = {
            schema_version: 'geox_mcft_cap_06_final_candidate_tree_input_v1',
            base_commit: cp.execFileSync('git', ['rev-parse','HEAD'], { encoding: 'utf8' }).trim(),
            base_tree: cp.execFileSync('git', ['rev-parse','HEAD^{tree}'], { encoding: 'utf8' }).trim(),
            changed_file_count: changed.length,
            changed_files: changed,
          };
          fs.writeFileSync(`${out}/manifest.json`, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE
          tar -czf "$OUT/files.tar.gz" -C "$OUT/root" .
      - uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-final-candidate-tree-input
          path: |
            acceptance-output/mcft-cap-06-final-candidate/manifest.json
            acceptance-output/mcft-cap-06-final-candidate/files.tar.gz
          if-no-files-found: error
