name: mcft-cap-06-repair-staging-materializer

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-hard-ledger-generator.yml'
      - 'scripts/governance_acceptance/GENERATE_MCFT_CAP_06_HARD_ACCEPTANCE_ITEM_LEDGER.cjs'
      - 'scripts/governance_acceptance/NORMALIZE_MCFT_CAP_06_HARD_ACCEPTANCE_ITEM_LEDGER.cjs'
      - 'scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_HARD_ACCEPTANCE_ITEM_RECORDS.cjs'
      - 'scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_REQUIRED_DELIVERABLES.cjs'
      - 'scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_S11D_CLOSURE_REPAIR_STATE.cjs'
      - 'scripts/governance_acceptance/PATCH_MCFT_CAP_06_S11D_REPAIR_RUNTIME_DELTA.cjs'
      - 'scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_RESOLVED_TASKBOOK_V2.cjs'
      - 'scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_HISTORICAL_WORKFLOW_FREEZE.cjs'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mcft-cap-06-repair-staging-materializer-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  materialize-repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
      - name: Generate item-level repair records
        env:
          MCFT_CAP_06_LEDGER_MODE: REPAIR_CANDIDATE
        run: node scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_HARD_ACCEPTANCE_ITEM_RECORDS.cjs
      - name: Materialize frozen deliverable paths
        run: node scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_REQUIRED_DELIVERABLES.cjs
      - name: Stage generated ledger records
        run: |
          DIR='acceptance-output/mcft-cap-06-ledger-repair'
          cp "$DIR/GEOX-MCFT-CAP-06-HARD-ACCEPTANCE-EVIDENCE-LEDGER.manifest.generated.json" \
            docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-HARD-ACCEPTANCE-EVIDENCE-LEDGER.json
          for LETTER in A B C D E F G H I J; do
            cp "$DIR/MCFT-CAP-06-HARD-${LETTER}.generated.json" \
              "docs/digital_twin/mcft/cap_06/hard_acceptance/MCFT-CAP-06-HARD-${LETTER}.json"
          done
      - name: Materialize suspended closure repair state
        run: node scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_S11D_CLOSURE_REPAIR_STATE.cjs
      - name: Normalize Runtime delta projection
        run: node scripts/governance_acceptance/PATCH_MCFT_CAP_06_S11D_REPAIR_RUNTIME_DELTA.cjs
      - name: Materialize Resolved Task Manifest V2 and ledger V3
        run: node scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_RESOLVED_TASKBOOK_V2.cjs
      - name: Freeze historical Slice workflows to manual replay
        run: node scripts/governance_acceptance/MATERIALIZE_MCFT_CAP_06_HISTORICAL_WORKFLOW_FREEZE.cjs
      - name: Verify staging state
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const root = 'docs/digital_twin/mcft/cap_06';
          const ledger = JSON.parse(fs.readFileSync(`${root}/GEOX-MCFT-CAP-06-HARD-ACCEPTANCE-EVIDENCE-LEDGER.json`, 'utf8'));
          if (JSON.stringify(ledger.status_counts) !== JSON.stringify({PASS:253,FAIL:0,PENDING:2,NOT_APPLICABLE:0})) throw new Error('LEDGER_REPAIR_COUNTS_INVALID');
          const resolved = JSON.parse(fs.readFileSync(`${root}/GEOX-MCFT-CAP-06-RESOLVED-TASK-MANIFEST-V2.json`, 'utf8'));
          if (resolved.resolved_slice_graph.length !== 17 || resolved.resolution_policy.closure_gates_must_consume_resolved_manifest !== true) throw new Error('RESOLVED_TASKBOOK_INVALID');
          const closure = JSON.parse(fs.readFileSync(`${root}/GEOX-MCFT-CAP-06-CLOSURE-RECORD.json`, 'utf8'));
          if (closure.closure_effective !== false || closure.pending_completion_claims.length !== 48) throw new Error('CLOSURE_REPAIR_STATE_INVALID');
          const frozen = fs.readFileSync('.github/workflows/mcft-cap-06-s11d-final-effectiveness-reconciliation.yml','utf8');
          if (!frozen.includes('Historical MCFT-CAP-06 workflow') || !/^on:\n  workflow_dispatch:/m.test(frozen)) throw new Error('HISTORICAL_WORKFLOW_NOT_FROZEN');
          NODE
      - name: Commit one-time staging migration output
        if: github.event_name == 'pull_request'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/digital_twin/mcft/cap_06 \
            .github/workflows/mcft-cap-06-s3-focused-validation.yml \
            .github/workflows/mcft-cap-06-s3-effectiveness-s4-insertion.yml \
            .github/workflows/mcft-cap-06-s4-focused-validation.yml \
            .github/workflows/mcft-cap-06-s4-effectiveness-s5-authorization.yml \
            .github/workflows/mcft-cap-06-s5-entry-controls.yml \
            .github/workflows/mcft-cap-06-s5-predecessor-graph-conformance.yml \
            .github/workflows/mcft-cap-06-s5-candidate.yml \
            .github/workflows/mcft-cap-06-s5-candidate-effectiveness.yml \
            .github/workflows/mcft-cap-06-s6-paired-shadow.yml \
            .github/workflows/mcft-cap-06-s6-paired-shadow-effectiveness.yml \
            .github/workflows/mcft-cap-06-s7-shadow-evaluation.yml \
            .github/workflows/mcft-cap-06-s7-shadow-evaluation-effectiveness.yml \
            .github/workflows/mcft-cap-06-s8-restart-readback-rebuild.yml \
            .github/workflows/mcft-cap-06-s8-restart-readback-rebuild-effectiveness.yml \
            .github/workflows/mcft-cap-06-s9-non-consumption.yml \
            .github/workflows/mcft-cap-06-s9-non-consumption-effectiveness.yml \
            .github/workflows/mcft-cap-06-s10-bounded-chain.yml \
            .github/workflows/mcft-cap-06-s10-bounded-chain-effectiveness.yml \
            .github/workflows/mcft-cap-06-taskbook-v0-4-effectiveness.yml \
            .github/workflows/mcft-cap-06-s11a-closure-candidate.yml \
            .github/workflows/mcft-cap-06-s11c-capability-completion-effectiveness-activation.yml \
            .github/workflows/mcft-cap-06-s11d-final-effectiveness-reconciliation.yml \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_PREDECESSOR_PREFLIGHT.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_DATASET_QUALIFICATION.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_RESIDUAL_WINDOWS_DB.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_CONTRACTS_MATH.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_EXACT_REF_PORT.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_PERSISTENCE_DB.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_CANDIDATE_DB.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_SHADOW_COMPUTE.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_EVALUATION_DB.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_RESTART_RECOVERY.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_NON_CONSUMPTION_TICK.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_BOUNDED_CHAIN.ts \
            scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_FINALIZATION_EFFECTIVENESS.cjs
          if git diff --cached --quiet; then
            echo 'Staging migration output already materialized.'
          else
            git commit -m 'MCFT-CAP-06 S11D repair: freeze historical workflow triggers'
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-repair-staging-materialization
          path: acceptance-output/mcft-cap-06-ledger-repair/*.json
          if-no-files-found: error
