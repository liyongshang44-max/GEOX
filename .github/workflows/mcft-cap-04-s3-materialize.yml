name: MCFT-CAP-04 S3 materialize

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s3-pure-72h-forecast-math-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout S3 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Materialize S3 governance
        run: node .cap04-s3/materialize_s3.cjs

      - name: Recursive typecheck
        id: recursive_typecheck
        continue-on-error: true
        run: pnpm -r typecheck 2>&1 | tee /tmp/cap04-s3-typecheck.log

      - name: Persist typecheck diagnostics
        if: steps.recursive_typecheck.outcome == 'failure'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          cp /tmp/cap04-s3-typecheck.log .cap04-s3/typecheck.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .cap04-s3/typecheck.log
          if ! git diff --cached --quiet; then
            git commit -m "chore(mcft-cap-04): persist S3 typecheck diagnostics"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi

      - name: Stop after typecheck failure
        if: steps.recursive_typecheck.outcome == 'failure'
        run: exit 1

      - name: Run positive pure Forecast math acceptance
        id: positive_acceptance
        continue-on-error: true
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_PURE_FORECAST_MATH.ts 2>&1 | tee /tmp/cap04-s3-positive.log

      - name: Persist positive acceptance diagnostics
        if: steps.positive_acceptance.outcome == 'failure'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          cp /tmp/cap04-s3-positive.log .cap04-s3/positive.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .cap04-s3/positive.log
          if ! git diff --cached --quiet; then
            git commit -m "chore(mcft-cap-04): persist S3 positive acceptance diagnostics"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi

      - name: Stop after positive acceptance failure
        if: steps.positive_acceptance.outcome == 'failure'
        run: exit 1

      - name: Run negative pure Forecast math acceptance
        id: negative_acceptance
        continue-on-error: true
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_PURE_FORECAST_MATH_NEGATIVE.ts 2>&1 | tee /tmp/cap04-s3-negative.log

      - name: Persist negative acceptance diagnostics
        if: steps.negative_acceptance.outcome == 'failure'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          cp /tmp/cap04-s3-negative.log .cap04-s3/negative.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .cap04-s3/negative.log
          if ! git diff --cached --quiet; then
            git commit -m "chore(mcft-cap-04): persist S3 negative acceptance diagnostics"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi

      - name: Stop after negative acceptance failure
        if: steps.negative_acceptance.outcome == 'failure'
        run: exit 1

      - name: Remove temporary materialization files
        run: |
          rm -rf .cap04-s3
          rm -f .github/workflows/mcft-cap-04-s3-materialize.yml

      - name: Run final S3 governance Gate
        id: governance_gate
        continue-on-error: true
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S3_PURE_FORECAST_MATH.cjs --final 2>&1 | tee /tmp/cap04-s3-governance.log

      - name: Persist governance diagnostics
        if: steps.governance_gate.outcome == 'failure'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          mkdir -p .cap04-s3
          cp /tmp/cap04-s3-governance.log .cap04-s3/governance.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .cap04-s3/governance.log
          if ! git diff --cached --quiet; then
            git commit -m "chore(mcft-cap-04): persist S3 governance diagnostics"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi

      - name: Stop after governance failure
        if: steps.governance_gate.outcome == 'failure'
        run: exit 1

      - name: Verify patch integrity
        run: git diff --check 4a8dab632246b05266f1d869f6c9a0a5bcf37e76

      - name: Commit exact final candidate
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(mcft-cap-04): materialize S3 pure forecast math candidate"
          git push origin "HEAD:${HEAD_BRANCH}"
