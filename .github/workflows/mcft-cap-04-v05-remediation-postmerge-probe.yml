name: MCFT-CAP-04 v0.5 remediation merged-main verification

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-v05-remediation-postmerge-probe-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Verify exact merged main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          test "$(git branch --show-current)" = "main"
          test "$(git rev-parse HEAD)" = "dbedff0eaa44cd638d461abbfd420f8f7b9fdc8d"
          test "$(git rev-parse origin/main)" = "dbedff0eaa44cd638d461abbfd420f8f7b9fdc8d"
      - name: Run v0.5 remediation merged-main Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_FINALIZATION_EFFECTIVENESS.cjs --postmerge
