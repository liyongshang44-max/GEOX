name: mcft-cap-06-tree-identity-diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-tree-identity-diagnostic.yml'

permissions:
  contents: read

jobs:
  tree-identity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Record exact candidate tree identity
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p acceptance-output/tree-identity
          printf '%s\n' "commit=$(git rev-parse HEAD)" "tree=$(git rev-parse 'HEAD^{tree}')" > acceptance-output/tree-identity/identity.txt
      - name: Upload tree identity
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-tree-identity-${{ github.event.pull_request.head.sha }}
          path: acceptance-output/tree-identity/identity.txt
          if-no-files-found: error
          retention-days: 1
