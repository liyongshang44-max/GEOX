name: mcft-cap-05-s10-typecheck-diagnostic

on:
  pull_request:
  push:
    branches:
      - agent/mcft-cap-05-s10-bounded-eight-tick-feedback-chain-v1

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Capture typecheck diagnostics
        run: |
          set +e
          pnpm -r typecheck > typecheck.log 2>&1
          echo "$?" > typecheck.exit
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-05-s10-typecheck-diagnostic
          path: |
            typecheck.log
            typecheck.exit
