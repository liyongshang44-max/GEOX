name: MCFT-CAP-04 S10B exact-head Finalization Gate

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s10b-final-gate-probe-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s10b-main-verification-v1
          fetch-depth: 0
      - name: Verify exact candidate head
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "f975a2688db56e17d93bb5b21d3e64768e72c5d1"
          test "$(git rev-parse origin/agent/mcft-cap-04-s10b-main-verification-v1)" = "f975a2688db56e17d93bb5b21d3e64768e72c5d1"
      - name: Run S10B Finalization Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_FINALIZATION.cjs
