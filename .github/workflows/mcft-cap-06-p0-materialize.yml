name: mcft-cap-06-p0-materialize

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  materialize-p0:
    if: github.head_ref == 'agent/mcft-cap-06-p0-provisional-ssot-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout P0 branch
        uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-06-p0-provisional-ssot-v1
          fetch-depth: 1
          show-progress: false

      - name: Fetch frozen P0 baseline
        run: git fetch --no-tags --quiet origin 79cd7814eff06ad86f86cdcb379c6f71a77f1ab8

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Materialize P0 provisional SSOT atomically
        run: |
          set -euo pipefail
          python scripts/dev/materialize_mcft_cap06_p0.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "MCFT-CAP-06 P0: materialize provisional SSOT"

      - name: Verify P0 candidate Gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_P0_RECONCILIATION.cjs 2>&1 | tee /tmp/p0-gate.log
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then
            summary="$(grep -E '^(FAIL|TOTAL)' /tmp/p0-gate.log || true)"
            gh pr comment 2498 --body "P0 materialization Gate failed on local candidate commit.\n\n\`\`\`text\n${summary}\n\`\`\`"
            exit "$rc"
          fi

      - name: Repository typecheck
        run: pnpm -r typecheck

      - name: Repository build
        run: pnpm -r build

      - name: Server selfcheck
        run: pnpm --filter @geox/server test:p1:selfcheck

      - name: Push materialized candidate
        run: git push origin HEAD:agent/mcft-cap-06-p0-provisional-ssot-v1
