name: mcft-cap-06-s5-predecessor-effectiveness-bootstrap

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s5-predecessor-effectiveness-bootstrap.yml'

permissions:
  contents: write

jobs:
  build-effective-candidate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      MCFT_CAP_06_S5_GRAPH_BASELINE_REF: 437a6ccae5903494638d17c997a7017c6da057cf
      MCFT_CAP_06_S5_PREDECESSOR_EFFECTIVENESS_BASELINE_REF: 17a01ec25be2bbd7ee92b9e9e6115afed9665435
    steps:
      - name: Checkout exact predecessor merge
        uses: actions/checkout@v4
        with:
          ref: 17a01ec25be2bbd7ee92b9e9e6115afed9665435
          fetch-depth: 0

      - name: Verify exact main baseline
        shell: bash
        run: |
          git fetch origin main
          test "$(git rev-parse HEAD)" = "17a01ec25be2bbd7ee92b9e9e6115afed9665435"
          test "$(git rev-parse origin/main)" = "17a01ec25be2bbd7ee92b9e9e6115afed9665435"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Run exact predecessor preflight before candidate creation
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S5_PREDECESSOR_GRAPH_CONFORMANCE.cjs

      - name: Verify structured predecessor evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S5_PREDECESSOR_GRAPH_PREFLIGHT_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s5_predecessor_graph_preflight_result_v1') throw new Error('BOOTSTRAP_GRAPH_SCHEMA_MISMATCH');
          if (result.status !== 'PASS') throw new Error('BOOTSTRAP_GRAPH_NOT_PASS');
          if (result.canonical_write_count !== 0 || result.candidate_append_count !== 0 || result.evaluation_append_count !== 0) throw new Error('BOOTSTRAP_GRAPH_WRITE_BOUNDARY_VIOLATION');
          if (result.s5_authorized !== false || result.s5_implementation_started !== false) throw new Error('BOOTSTRAP_GRAPH_FRONTIER_MISMATCH');
          NODE

      - name: Materialize one-commit effectiveness candidate
        shell: bash
        env:
          PAYLOAD_B64: ""
        run: |
          printf '%s' "$PAYLOAD_B64" | base64 -d > /tmp/mcft-effectiveness.tgz
          tar -xzf /tmp/mcft-effectiveness.tgz -C .
          git config user.name "GEOX governance automation"
          git config user.email "actions@users.noreply.github.com"
          git add             .github/workflows/mcft-cap-06-s5-predecessor-graph-conformance.yml             docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-STATE.json             docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json             docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json             docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S5-PREDECESSOR-EFFECTIVENESS.json             scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S5_PREDECESSOR_EFFECTIVENESS.cjs
          test "$(git diff --cached --name-only | wc -l | tr -d ' ')" = "6"
          git commit -m "MCFT-CAP-06: activate S5 predecessor effectiveness"
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S5_PREDECESSOR_EFFECTIVENESS.cjs
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S5_PREDECESSOR_EFFECTIVENESS_RESULT.json', 'utf8'));
          if (result.status !== 'PASS') throw new Error('BOOTSTRAP_EFFECTIVENESS_NOT_PASS');
          if (result.changed_file_count !== 6 || result.logical_commit_count !== 1) throw new Error('BOOTSTRAP_EFFECTIVENESS_HISTORY_INVALID');
          if (result.s5_authorized !== true || result.s5_implementation_started !== false) throw new Error('BOOTSTRAP_EFFECTIVENESS_FRONTIER_INVALID');
          if (result.canonical_write_count !== 0 || result.candidate_append_count !== 0 || result.evaluation_append_count !== 0) throw new Error('BOOTSTRAP_EFFECTIVENESS_WRITE_BOUNDARY_VIOLATION');
          NODE
          git push --force origin HEAD:refs/heads/agent/mcft-cap-06-s5-predecessor-effectiveness-v1

      - name: Upload bootstrap evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s5-predecessor-effectiveness-bootstrap-evidence
          path: acceptance-output/
          if-no-files-found: error
