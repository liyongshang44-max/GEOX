name: mcft-cap-05-preflight-diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-05-preflight-diagnostic.yml'
      - 'scripts/remediation/APPLY_MCFT_CAP_05_S8_EFFECTIVE_CONFIG_FIXTURE.py'
      - 'scripts/runtime_acceptance/mcft_cap_05_s8_forecast_residual_fixture_v1.ts'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_RECEIPT_CONSUMING_TICK.ts'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_NOT_YET_VALIDATED_RECEIPT_CONSUMING_TICK.ts'
      - 'scripts/runtime_acceptance/mcft_cap_05_effective_runtime_config_fixture_v1.ts'

permissions:
  contents: write

jobs:
  cap05-preflight:
    if: github.head_ref == 'agent/mcft-cap-05-post-closure-config-conformance-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply S8 fixture correction
        run: python scripts/remediation/APPLY_MCFT_CAP_05_S8_EFFECTIVE_CONFIG_FIXTURE.py
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Focused CAP-05 S7-S10 Runtime preflight
        run: |
          set -o pipefail
          {
            pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_RECEIPT_CONSUMING_TICK.ts
            pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_NOT_YET_VALIDATED_RECEIPT_CONSUMING_TICK.ts
            pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_FORECAST_RESIDUAL_OUTCOME_TICK.ts
            pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_BOUNDED_EIGHT_TICK_FEEDBACK_CHAIN.ts
          } 2>&1 | tee /tmp/mcft-cap05-preflight.log
      - name: Upload focused preflight diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap05-preflight-diagnostics
          path: /tmp/mcft-cap05-preflight.log
      - name: Commit proven S8 fixture correction
        run: |
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f -- scripts/runtime_acceptance/mcft_cap_05_s8_forecast_residual_fixture_v1.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'MCFT-CAP-05: use effective Config in S8 residual fixture'
          git push origin HEAD:${{ github.head_ref }}
