name: mcft-cap-06-s0-v2-head5bb-proof

on:
  push:
    branches:
      - agent/mcft-cap-06-s0-v2-head5bb-proof

jobs:
  exact-head-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact candidate head
        uses: actions/checkout@v4
        with:
          ref: 5bb25c2d2c1e4a34386d9aef1909d306826127ef
          fetch-depth: 0

      - name: Assert exact candidate identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "5bb25c2d2c1e4a34386d9aef1909d306826127ef"

      - name: Run permanent S0 v2 Authorization Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S0_V2_AUTHORIZATION.cjs
