name: mcft-cap-06-s0-v2-head5bb-proof

on:
  pull_request:
    branches:
      - main

jobs:
  exact-head-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact candidate head
        uses: actions/checkout@v4
        with:
          ref: c9848fcb6a11be949c8b556c379eafd26936ed4f
          fetch-depth: 0

      - name: Assert exact candidate identity
        shell: bash
        run: test "$(git rev-parse HEAD)" = "c9848fcb6a11be949c8b556c379eafd26936ed4f"

      - name: Run permanent S0 v2 Authorization Gate
        shell: bash
        run: |
          set -o pipefail
          mkdir -p acceptance-output
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S0_V2_AUTHORIZATION.cjs 2>&1 | tee acceptance-output/MCFT_CAP_06_S0_V2_EXACT_HEAD_GATE.log

      - name: Upload Gate output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s0-v2-exact-head-gate
          path: acceptance-output/MCFT_CAP_06_S0_V2_EXACT_HEAD_GATE.log
          if-no-files-found: error
