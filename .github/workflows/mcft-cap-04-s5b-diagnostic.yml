name: MCFT-CAP-04 S5B diagnostic

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s5b-persistence-uniqueness-recovery-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: landos
          POSTGRES_PASSWORD: landos
          POSTGRES_DB: mcft_cap04_s5b_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U landos -d mcft_cap04_s5b_acceptance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout S5B branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply canonical Scenario equality fix
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if [ -f .cap04-s5b/fix_canonical_scenario_equality.cjs ]; then
            node .cap04-s5b/fix_canonical_scenario_equality.cjs
            rm -f .cap04-s5b/db.log
            rmdir .cap04-s5b 2>/dev/null || true
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "fix(mcft-cap-04): canonicalize NO_ACTION trajectory equality"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Recursive typecheck
        run: pnpm -r typecheck

      - name: Capture S5B PostgreSQL acceptance
        id: database
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://landos:landos@127.0.0.1:5432/mcft_cap04_s5b_acceptance
          MCFT_CAP_04_PERSISTENCE_DESTRUCTIVE_ACCEPTANCE: '1'
        run: |
          mkdir -p .cap04-s5b
          set +e
          pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_PERSISTENCE_DB.ts > .cap04-s5b/db.log 2>&1
          code=$?
          cat .cap04-s5b/db.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Persist database diagnostics
        if: steps.database.outputs.exit_code != '0'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .cap04-s5b/db.log
          git commit -m "chore(mcft-cap-04): capture S5B database diagnostics"
          git push origin "HEAD:${HEAD_BRANCH}"

      - name: Require S5B PostgreSQL acceptance
        if: steps.database.outputs.exit_code != '0'
        run: exit 1
