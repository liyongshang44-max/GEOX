name: mcft-cap-06-s1-regime-correction-patch

on:
  push:
    branches:
      - agent/mcft-cap-06-s1-controlled-regime-correction-v1

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-06-s1-controlled-regime-correction-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch exact S1 range-fixture call
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('scripts/runtime_acceptance/mcft_cap_06_s1_residual_windows_fixture_v1.ts')
          text = path.read_text(encoding='utf-8')
          old = '  const source = await buildCap04S7RangeFixtureV1();'
          new = '  const source = await buildCap04S7RangeFixtureV1({ rainfall_profile_id: "CAP06_MULTI_REGIME_V1" });'
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected exactly one S1 range-fixture call, found {count}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Remove one-shot workflow and push exact patch
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/mcft-cap-06-s1-regime-correction-patch.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/runtime_acceptance/mcft_cap_06_s1_residual_windows_fixture_v1.ts .github/workflows/mcft-cap-06-s1-regime-correction-patch.yml
          git diff --cached --check
          git commit -m "fix(mcft-cap-06): apply corrected S1 multi-regime forcing"
          git push origin HEAD:agent/mcft-cap-06-s1-controlled-regime-correction-v1
