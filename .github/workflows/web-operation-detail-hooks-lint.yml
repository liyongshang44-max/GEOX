name: web-operation-detail-hooks-lint

on:
  pull_request:
    paths:
      - "apps/web/src/features/operations/pages/OperationDetailPage.tsx"
      - "apps/web/eslint.config.js"
      - "apps/web/package.json"
      - "pnpm-lock.yaml"
  push:
    branches:
      - main
    paths:
      - "apps/web/src/features/operations/pages/OperationDetailPage.tsx"
      - "apps/web/eslint.config.js"
      - "apps/web/package.json"
      - "pnpm-lock.yaml"

jobs:
  lint-operation-detail-hooks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Incremental lint (OperationDetailPage hooks)
        run: pnpm run ci:web:operation-detail-hooks
