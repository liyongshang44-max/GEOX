name: MCFT-CAP-06 S1 materialization

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  s1-postgresql:
    if: github.head_ref == 'agent/mcft-cap-06-s1-residual-windows-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: landos
          POSTGRES_PASSWORD: landos
          POSTGRES_DB: mcft_cap06_s1_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U landos -d mcft_cap06_s1_acceptance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-06-s1-residual-windows-v1
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Apply permanent CAP-04 config mapping repair
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/runtime_acceptance/mcft_cap_06_s1_residual_windows_fixture_v1.ts')
          source = path.read_text(encoding='utf-8')
          before_import = '''import {
            buildHourlyWaterBalanceConfigFromContinuationRuntimeConfigV1,
            executeHourlyWaterBalanceV1,
          } from "../../apps/server/src/domain/soil_water/hourly_water_balance_v1.js";'''
          after_import = '''import { executeHourlyWaterBalanceV1 } from "../../apps/server/src/domain/soil_water/hourly_water_balance_v1.js";'''
          if source.count(before_import) != 1:
              raise SystemExit(f'S1_DYNAMICS_IMPORT_MATCH:{source.count(before_import)}')
          source = source.replace(before_import, after_import, 1)
          before_config = '''    const baseConfig = buildHourlyWaterBalanceConfigFromContinuationRuntimeConfigV1(sourceRuntimeConfig.payload);
              assert.equal(baseConfig.drainage_coefficient_per_hour, CAP06_S1_BASE_DRAINAGE_COEFFICIENT_V1);'''
          after_config = '''    const configPayload = sourceRuntimeConfig.payload as Record<string, any>;
              const fixed6 = (value: unknown, code: string): string => {
                const number = Number(value);
                if (!Number.isFinite(number)) throw new Error(code);
                return number.toFixed(6);
              };
              const baseConfig = {
                root_zone_depth_mm: fixed6(configPayload.soil_hydraulic_snapshot?.root_zone_depth_mm, "CAP06_S1_ROOT_DEPTH_REQUIRED"),
                wilting_point_storage_mm: fixed6(configPayload.soil_hydraulic_snapshot?.wilting_point_storage_mm, "CAP06_S1_WILTING_STORAGE_REQUIRED"),
                field_capacity_storage_mm: fixed6(configPayload.soil_hydraulic_snapshot?.field_capacity_storage_mm, "CAP06_S1_FIELD_CAPACITY_REQUIRED"),
                saturation_storage_mm: fixed6(configPayload.soil_hydraulic_snapshot?.saturation_storage_mm, "CAP06_S1_SATURATION_STORAGE_REQUIRED"),
                saturation_fraction: fixed6(configPayload.soil_hydraulic_snapshot?.saturation_fraction, "CAP06_S1_SATURATION_FRACTION_REQUIRED"),
                runoff_fraction: fixed6(configPayload.dynamics_parameters?.runoff_fraction, "CAP06_S1_RUNOFF_REQUIRED"),
                drainage_coefficient_per_hour: fixed6(configPayload.dynamics_parameters?.drainage_coefficient_per_hour, "CAP06_S1_DRAINAGE_REQUIRED"),
                structural_process_stddev_mm_per_hour: fixed6(configPayload.process_uncertainty?.structural_process_stddev_mm_per_hour, "CAP06_S1_STRUCTURAL_STDDEV_REQUIRED"),
                rainfall_relative_stddev: fixed6(configPayload.process_uncertainty?.rainfall_relative_stddev, "CAP06_S1_RAINFALL_STDDEV_REQUIRED"),
                crop_et_relative_stddev: fixed6(configPayload.process_uncertainty?.crop_et_relative_stddev, "CAP06_S1_ET_STDDEV_REQUIRED"),
                executed_irrigation_relative_stddev: fixed6(configPayload.process_uncertainty?.executed_irrigation_relative_stddev, "CAP06_S1_IRRIGATION_STDDEV_REQUIRED"),
              };
              assert.equal(baseConfig.drainage_coefficient_per_hour, CAP06_S1_BASE_DRAINAGE_COEFFICIENT_V1);'''
          if source.count(before_config) != 1:
              raise SystemExit(f'S1_BASE_CONFIG_MATCH:{source.count(before_config)}')
          path.write_text(source.replace(before_config, after_config, 1), encoding='utf-8')
          PY

      - name: Run exact S1 PostgreSQL acceptance
        env:
          DATABASE_URL: postgres://landos:landos@127.0.0.1:5432/mcft_cap06_s1_acceptance
          MCFT_CAP_06_S1_DESTRUCTIVE_ACCEPTANCE: "1"
        run: |
          set -euo pipefail
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_RESIDUAL_WINDOWS_DB.ts 2>&1 | tee /tmp/mcft-cap-06-s1.log

      - name: Repository typecheck and build
        run: |
          pnpm -r typecheck
          pnpm -r build

      - name: Commit permanent repair after successful execution
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/runtime_acceptance/mcft_cap_06_s1_residual_windows_fixture_v1.ts
          git diff --cached --quiet || git commit -m "MCFT-CAP-06 S1: map CAP-04 config into existing Dynamics input"
          git push origin HEAD:agent/mcft-cap-06-s1-residual-windows-v1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mcft-cap-06-s1-execution
          path: /tmp/mcft-cap-06-s1.log
          if-no-files-found: warn
          retention-days: 7
