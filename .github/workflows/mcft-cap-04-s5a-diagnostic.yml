name: MCFT-CAP-04 S5A diagnostic

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s5a-a1-a2-record-set-builders-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout S5A branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Recursive typecheck
        run: pnpm -r typecheck
      - name: Positive A1 A2 builder acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_A1_A2_RECORD_SET_BUILDERS.ts
      - name: Capture negative acceptance
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          mkdir -p .cap04-s5a
          set +e
          set -o pipefail
          pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_A1_A2_RECORD_SET_BUILDERS_NEGATIVE.ts 2>&1 | tee .cap04-s5a/negative.log
          status=${PIPESTATUS[0]}
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .cap04-s5a/negative.log
          git commit -m "chore(mcft-cap-04): capture S5A negative diagnostic" || true
          git push origin "HEAD:${HEAD_BRANCH}"
          exit $status
