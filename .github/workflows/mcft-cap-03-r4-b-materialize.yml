name: MCFT-CAP-03 R4-B materialize

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'mcft-cap-03-r4-b-runtime-config-pin-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout remediation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Materialize R4-B implementation
        run: node scripts/ops/materialize_mcft_cap_03_r4_b.cjs

      - name: Remove operational materializer files
        run: |
          rm scripts/ops/materialize_mcft_cap_03_r4_b.cjs
          rm .github/workflows/mcft-cap-03-r4-b-materialize.yml

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck server
        run: pnpm --filter @geox/server typecheck

      - name: Build server
        run: pnpm --filter @geox/server build

      - name: Run historical R2 positive acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_03_R2_V2_REVALIDATION.ts

      - name: Run historical R2 negative acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_03_R2_V2_REVALIDATION_NEGATIVE.ts

      - name: Run historical R4-A acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_03_R4_A_EVIDENCE_CLASSIFICATION.ts

      - name: Run R4-B Runtime Config pin acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_03_R4_B_RUNTIME_CONFIG_PIN.ts

      - name: Commit materialized remediation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(mcft-cap-03): require explicit Runtime Config ref and hash pins"
          git push origin HEAD:${{ github.head_ref }}
