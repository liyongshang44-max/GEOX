name: MCFT-CAP-04 P0 complete-task materialize

on:
  pull_request:
    types: [reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-p0-ssot-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout P0 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate materializer syntax
        run: node -c .cap04-p0-materialize/materialize_full_cap04_p0.cjs

      - name: Materialize complete v0.5 task and P0 artifacts
        run: node .cap04-p0-materialize/materialize_full_cap04_p0.cjs

      - name: Remove temporary materializer inputs
        run: |
          rm -rf .cap04-p0-materialize
          rm .github/workflows/mcft-cap-04-p0-full-task-materialize.yml

      - name: Validate P0 Gate syntax
        run: node -c scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_P0_PREDECESSOR_SSOT.cjs

      - name: Run exact-head P0 final Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_P0_PREDECESSOR_SSOT.cjs --final

      - name: Re-run CAP-03 R4 final verification Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_03_R4_FINAL_VERIFICATION.cjs

      - name: Parse governance JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-P0-STATUS.json','utf8'))"

      - name: Verify complete task hash
        run: echo 'ea63e92a64b760b84c49428b1d3a245ce5cd94bb08daa9c6b971a53861b90a63  docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-TASK.md' | sha256sum -c -

      - name: Check patch integrity
        run: git diff --check eca0d053045db59982ad20a6e0421f72ae16f804

      - name: Commit authoritative P0 candidate
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "docs(mcft-cap-04): install complete v0.5 P0 authority"
          git push origin HEAD:${{ github.head_ref }}
