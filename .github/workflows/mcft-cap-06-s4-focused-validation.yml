name: mcft-cap-06-s4-focused-validation
# Historical MCFT-CAP-06 workflow: automatic triggers frozen after final repair.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  s4-focused-validation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
    steps:
      - name: Checkout trigger head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Detect downstream S6 effectiveness
        id: mode
        shell: bash
        run: |
          if [[ -f docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S6-PAIRED-SHADOW-EFFECTIVENESS.json ]]; then
            echo "s6_effectiveness=true" >> "$GITHUB_OUTPUT"
          else
            echo "s6_effectiveness=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout exact historical S5 effectiveness frontier
        if: steps.mode.outputs.s6_effectiveness == 'true'
        uses: actions/checkout@v4
        with:
          ref: 5f73ed68cad479276ca55fb70391ae4543cb3dcc
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck and build
        run: |
          set -o pipefail
          mkdir -p acceptance-output
          pnpm -r typecheck 2>&1 | tee acceptance-output/MCFT_CAP_06_S4_TYPECHECK.log
          pnpm -r build 2>&1 | tee acceptance-output/MCFT_CAP_06_S4_BUILD.log

      - name: Run four-layer S4 stabilization acceptance
        run: |
          set -o pipefail
          mkdir -p acceptance-output
          node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S4_STABILIZATION.cjs 2>&1 | tee acceptance-output/MCFT_CAP_06_S4_STABILIZATION.log

      - name: Reproduce S3 persistence boundary
        run: |
          set -o pipefail
          node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S3_PERSISTENCE.cjs 2>&1 | tee acceptance-output/MCFT_CAP_06_S3_REGRESSION.log

      - name: Run S4 governance Gate
        run: |
          set -o pipefail
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_STABILIZATION.cjs 2>&1 | tee acceptance-output/MCFT_CAP_06_S4_GOVERNANCE.log

      - name: Upload focused S4 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s4-focused-evidence
          path: acceptance-output/
          if-no-files-found: warn
