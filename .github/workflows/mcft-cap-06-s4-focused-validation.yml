name: mcft-cap-06-s4-focused-validation

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s4-focused-validation.yml'
      - 'apps/server/src/domain/twin_runtime/resolved_forecast_observation_case_v1.ts'
      - 'apps/server/src/persistence/calibration/postgres_exact_calibration_residual_repository_v1.ts'
      - 'apps/server/src/persistence/calibration/postgres_resolved_forecast_observation_case_assembler_v1.ts'
      - 'apps/server/src/runtime/twin_runtime/cap05_inherited_cap04_execution_config_resolver_v1.ts'
      - 'docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-EFFECTIVE-RUNTIME-BASELINE.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CAP05-STRUCTURAL-DEBT-REGISTER.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-STATE.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S4-STATUS.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_STABILIZATION.cjs'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_POST_CLOSURE_POSTGRESQL_RUNNER.ts'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_DOMAIN.ts'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_FORMAL_COMPOSITION_DB.ts'
      - 'scripts/runtime_acceptance/RUN_MCFT_CAP_06_S4_STABILIZATION.cjs'
  push:
    branches: [main]
    paths:
      - '.github/workflows/mcft-cap-06-s4-focused-validation.yml'
      - 'apps/server/src/domain/twin_runtime/resolved_forecast_observation_case_v1.ts'
      - 'apps/server/src/persistence/calibration/postgres_exact_calibration_residual_repository_v1.ts'
      - 'apps/server/src/persistence/calibration/postgres_resolved_forecast_observation_case_assembler_v1.ts'
      - 'apps/server/src/runtime/twin_runtime/cap05_inherited_cap04_execution_config_resolver_v1.ts'
      - 'docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-EFFECTIVE-RUNTIME-BASELINE.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CAP05-STRUCTURAL-DEBT-REGISTER.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-STATE.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S4-STATUS.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_STABILIZATION.cjs'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_POST_CLOSURE_POSTGRESQL_RUNNER.ts'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_DOMAIN.ts'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_FORMAL_COMPOSITION_DB.ts'
      - 'scripts/runtime_acceptance/RUN_MCFT_CAP_06_S4_STABILIZATION.cjs'

permissions:
  contents: read

jobs:
  s4-focused-validation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
    steps:
      - name: Checkout S4 candidate
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck and build
        run: |
          set -o pipefail
          mkdir -p acceptance-output
          pnpm -r typecheck 2>&1 | tee acceptance-output/MCFT_CAP_06_S4_TYPECHECK.log
          pnpm -r build 2>&1 | tee acceptance-output/MCFT_CAP_06_S4_BUILD.log

      - name: Run four-layer S4 stabilization acceptance
        run: |
          set -o pipefail
          mkdir -p acceptance-output
          node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S4_STABILIZATION.cjs 2>&1 | tee acceptance-output/MCFT_CAP_06_S4_STABILIZATION.log

      - name: Reproduce S3 persistence boundary
        run: |
          set -o pipefail
          node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S3_PERSISTENCE.cjs 2>&1 | tee acceptance-output/MCFT_CAP_06_S3_REGRESSION.log

      - name: Run S4 governance Gate
        run: |
          set -o pipefail
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_STABILIZATION.cjs 2>&1 | tee acceptance-output/MCFT_CAP_06_S4_GOVERNANCE.log

      - name: Upload focused S4 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s4-focused-evidence
          path: acceptance-output/
          if-no-files-found: warn
