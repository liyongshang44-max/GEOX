name: mcft-cap-08-s3-development-preflight

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-08-s3-development-preflight.yml'
      - 'apps/server/src/domain/twin_runtime/cap08_s3_**'
      - 'apps/server/src/persistence/twin_runtime/postgres_cap08_s3_**'
      - 'apps/server/src/persistence/twin_runtime/postgres_approval_plan_evidence_repository_v1.ts'
      - 'apps/server/src/persistence/twin_runtime/postgres_immutable_decision_action_commit_repository_v1.ts'
      - 'apps/server/src/runtime/twin_runtime/cap08_s3_**'
      - 'apps/server/src/runtime/twin_runtime/action_feedback_**'
      - 'apps/server/src/runtime/twin_runtime/human_decision_service_v1.ts'
      - 'apps/server/src/runtime/twin_runtime/receipt_consuming_forecast_scenario_tick_service_v1.ts'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_**'
      - 'scripts/runtime_acceptance/MCFT_CAP_08_S3_PREFLIGHT.ps1'
      - 'scripts/runtime_acceptance/mcft_cap08_s3_**'
      - 'scripts/runtime_acceptance/mcft_cap08_s2_g3_acceptance_support_v1.ts'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_DEVELOPMENT_BOUNDARY.cjs'
      - 'scripts/governance_acceptance/mcft_cap08_s3_preflight_finalize.cjs'
      - 'docs/digital_twin/mcft/cap_08/GEOX-MCFT-CAP-08-S3-*'

permissions:
  contents: read

concurrency:
  group: mcft-cap08-s3-development-preflight-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  s3-development-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 3s
          --health-timeout 2s
          --health-retries 30
    steps:
      - name: Checkout exact development head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - name: Install locked workspace
        run: pnpm install --frozen-lockfile
      - name: Validate development boundary
        env:
          MCFT_BASE_SHA: cabd5fb171ffa24439a40dd27a3471de04049faf
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_DEVELOPMENT_BOUNDARY.cjs
      - name: Typecheck server
        run: pnpm --filter @geox/server typecheck

      - name: Bootstrap fresh positive database
        env:
          MCFT_CAP08_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
          MCFT_CAP08_TARGET_DATABASE_NAME: geox_mcft_cap08_s3_dev_positive
          MCFT_CAP08_RUNNER_PASSWORD: cap08-s3-dev-positive-runner-password
          MCFT_CAP08_MIGRATOR_PASSWORD: cap08-s3-dev-positive-migrator-password
          MCFT_CAP08_LEGACY_RUNTIME_PASSWORD: cap08-s3-dev-positive-legacy-password
          MCFT_CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_PLATFORM_SECURITY_BOOTSTRAP_DB.ts
      - name: Run positive and exact completed-rerun proof
        env:
          DATABASE_URL: postgres://geox_mcft_cap08_runner_v1:cap08-s3-dev-positive-runner-password@127.0.0.1:5432/geox_mcft_cap08_s3_dev_positive
          MCFT_CAP08_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox_mcft_cap08_s3_dev_positive
          MCFT_CAP08_S2_G3_DESTRUCTIVE_ACCEPTANCE: '1'
          MCFT_CAP08_S3_DESTRUCTIVE_ACCEPTANCE: '1'
        run: |
          mkdir -p acceptance-output
          set -o pipefail
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_DECISION_ACTION_DB.ts 2>&1 | tee acceptance-output/MCFT_CAP_08_S3_DECISION_ACTION_EXECUTION.log
      - name: Run completed-rerun corruption S3-CR01 through S3-CR08
        env:
          DATABASE_URL: postgres://geox_mcft_cap08_runner_v1:cap08-s3-dev-positive-runner-password@127.0.0.1:5432/geox_mcft_cap08_s3_dev_positive
          MCFT_CAP08_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox_mcft_cap08_s3_dev_positive
          MCFT_CAP08_S2_G3_DESTRUCTIVE_ACCEPTANCE: '1'
          MCFT_CAP08_S3_COMPLETED_RERUN_NEGATIVE_DESTRUCTIVE_ACCEPTANCE: '1'
        run: |
          set -o pipefail
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_COMPLETED_RERUN_NEGATIVE_DB.ts 2>&1 | tee acceptance-output/MCFT_CAP_08_S3_COMPLETED_RERUN_NEGATIVE_EXECUTION.log
      - name: Cleanup positive database
        if: always()
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='geox_mcft_cap08_s3_dev_positive' AND pid<>pg_backend_pid();"
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "DROP DATABASE IF EXISTS geox_mcft_cap08_s3_dev_positive;"

      - name: Bootstrap fresh negative database
        env:
          MCFT_CAP08_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
          MCFT_CAP08_TARGET_DATABASE_NAME: geox_mcft_cap08_s3_dev_negative
          MCFT_CAP08_RUNNER_PASSWORD: cap08-s3-dev-negative-runner-password
          MCFT_CAP08_MIGRATOR_PASSWORD: cap08-s3-dev-negative-migrator-password
          MCFT_CAP08_LEGACY_RUNTIME_PASSWORD: cap08-s3-dev-negative-legacy-password
          MCFT_CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_PLATFORM_SECURITY_BOOTSTRAP_DB.ts
      - name: Run S3-N01 through S3-N22 and S3-P01 through S3-P06
        env:
          DATABASE_URL: postgres://geox_mcft_cap08_runner_v1:cap08-s3-dev-negative-runner-password@127.0.0.1:5432/geox_mcft_cap08_s3_dev_negative
          MCFT_CAP08_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox_mcft_cap08_s3_dev_negative
          MCFT_CAP08_S2_G3_DESTRUCTIVE_ACCEPTANCE: '1'
          MCFT_CAP08_S3_NEGATIVE_DESTRUCTIVE_ACCEPTANCE: '1'
        run: |
          set -o pipefail
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_NEGATIVE_DB.ts 2>&1 | tee acceptance-output/MCFT_CAP_08_S3_NEGATIVE_EXECUTION.log
      - name: Run deferred-receipt and pointer edge semantics
        env:
          DATABASE_URL: postgres://geox_mcft_cap08_runner_v1:cap08-s3-dev-negative-runner-password@127.0.0.1:5432/geox_mcft_cap08_s3_dev_negative
          MCFT_CAP08_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox_mcft_cap08_s3_dev_negative
          MCFT_CAP08_S2_G3_DESTRUCTIVE_ACCEPTANCE: '1'
          MCFT_CAP08_S3_EDGE_DESTRUCTIVE_ACCEPTANCE: '1'
        run: |
          set -o pipefail
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_EDGE_SEMANTICS_DB.ts 2>&1 | tee acceptance-output/MCFT_CAP_08_S3_EDGE_SEMANTICS_EXECUTION.log
      - name: Cleanup negative database
        if: always()
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='geox_mcft_cap08_s3_dev_negative' AND pid<>pg_backend_pid();"
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "DROP DATABASE IF EXISTS geox_mcft_cap08_s3_dev_negative;"

      - name: Finalize development preflight artifact
        run: node scripts/governance_acceptance/mcft_cap08_s3_preflight_finalize.cjs
      - name: Upload development preflight evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap08-s3-development-preflight-${{ github.event.pull_request.head.sha || github.sha }}
          path: acceptance-output/
          if-no-files-found: error
          retention-days: 90
