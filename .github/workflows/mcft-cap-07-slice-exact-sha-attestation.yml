name: mcft-cap-07-slice-exact-sha-attestation

on:
  push:
    branches: [main]
    paths:
      - 'docs/digital_twin/mcft/cap_07/**'
      - 'docs/digital_twin/mcft/MCFT-CANDIDATE-AUTHORITY-REGISTRY-V1.json'
      - '.github/workflows/mcft-cap-07-slice-exact-sha-attestation.yml'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION.cjs'
      - 'scripts/governance_acceptance/mcft_cap07_s6_closure_artifact_finalize.cjs'
  workflow_dispatch:
    inputs:
      subject_sha:
        description: Exact historical or current main merge SHA to attest
        required: true
        type: string

permissions:
  contents: read
  actions: read
  pull-requests: read
  statuses: write

concurrency:
  group: mcft-cap-07-exact-sha-${{ inputs.subject_sha || github.sha }}
  cancel-in-progress: false

jobs:
  exact-sha-attestation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MCFT_SUBJECT_SHA: ${{ inputs.subject_sha || github.sha }}
    steps:
      - name: Checkout trusted current main attestation implementation
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
      - name: Derive read-only exact-SHA delivery frontier artifact
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION.cjs
      - name: Finalize S6 closure artifact when applicable
        env:
          MCFT_CANONICAL_ARTIFACT_PATH: acceptance-output/MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION.json
        run: node scripts/governance_acceptance/mcft_cap07_s6_closure_artifact_finalize.cjs
      - name: Resolve immutable retention policy
        id: retention
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const artifact = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION.json', 'utf8'));
          const closure = artifact.slice_id === 'MCFT-CAP-07.S6';
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `level=${closure ? 'R2' : 'R1'}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `days=${closure ? '730' : '180'}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `completion=${artifact.effective_delivery_frontier_projection?.effective_status || 'UNKNOWN'}\n`);
          if (closure) {
            if (artifact.capability_complete !== true) throw new Error('S6_CAPABILITY_COMPLETE_PROJECTION_MISSING');
            if (artifact.hard_acceptance_resolution?.effective_resolved_item_count !== 282) throw new Error('S6_HARD_ACCEPTANCE_NOT_FULLY_RESOLVED');
            if (artifact.zero_write_acceptance_result?.product_observation_write_delta !== 0) throw new Error('S6_ZERO_WRITE_RESULT_INVALID');
          }
          NODE
      - name: Build deterministic transport archive
        run: |
          mkdir -p acceptance-output/archive-input
          cp acceptance-output/MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION.json acceptance-output/archive-input/canonical-artifact.json
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -cf acceptance-output/mcft-cap-07-attestation.tar -C acceptance-output/archive-input canonical-artifact.json
          gzip -n -f acceptance-output/mcft-cap-07-attestation.tar
      - name: Upload and read back long-term immutable authority
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.GEOX_MCFT_ATTESTATION_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.GEOX_MCFT_ATTESTATION_S3_SECRET_ACCESS_KEY }}
          GEOX_MCFT_ATTESTATION_S3_ENDPOINT: ${{ vars.GEOX_MCFT_ATTESTATION_S3_ENDPOINT }}
          GEOX_MCFT_ATTESTATION_S3_BUCKET: ${{ vars.GEOX_MCFT_ATTESTATION_S3_BUCKET }}
          GEOX_MCFT_ATTESTATION_S3_REGION: ${{ vars.GEOX_MCFT_ATTESTATION_S3_REGION }}
          GEOX_MCFT_ATTESTATION_S3_FORCE_PATH_STYLE: ${{ vars.GEOX_MCFT_ATTESTATION_S3_FORCE_PATH_STYLE }}
          MCFT_CANONICAL_ARTIFACT_PATH: acceptance-output/MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION.json
          MCFT_ARTIFACT_ARCHIVE_PATH: acceptance-output/mcft-cap-07-attestation.tar.gz
          MCFT_REPOSITORY_OWNER: ${{ github.repository_owner }}
          MCFT_REPOSITORY_NAME: GEOX
          MCFT_ARTIFACT_NAME: mcft-cap-07-exact-sha-${{ inputs.subject_sha || github.sha }}
          MCFT_RETENTION_LEVEL: ${{ steps.retention.outputs.level }}
          MCFT_RETENTION_DAYS: ${{ steps.retention.outputs.days }}
        run: node scripts/governance_acceptance/mcft_attestation_retention_store_v1.cjs --upload-readback
      - name: Upload transient GitHub convenience copy
        id: transient-artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-07-exact-sha-${{ inputs.subject_sha || github.sha }}
          path: |
            acceptance-output/MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION.json
            acceptance-output/MCFT_CAP_07_ATTESTATION_RETENTION_LOCATOR.json
            acceptance-output/mcft-cap-07-attestation.tar.gz
          if-no-files-found: error
          retention-days: 90
      - name: Publish exact-SHA attestation commit status
        if: always()
        uses: actions/github-script@v7
        env:
          MCFT_JOB_STATUS: ${{ job.status }}
          MCFT_ARTIFACT_ID: ${{ steps.transient-artifact.outputs.artifact-id }}
          MCFT_COMPLETION: ${{ steps.retention.outputs.completion }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('node:fs');
            const artifactPath = 'acceptance-output/MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION.json';
            let artifact = null;
            if (fs.existsSync(artifactPath)) {
              try { artifact = JSON.parse(fs.readFileSync(artifactPath, 'utf8')); } catch (_error) { artifact = null; }
            }
            const artifactId = String(process.env.MCFT_ARTIFACT_ID || '').trim();
            const succeeded = process.env.MCFT_JOB_STATUS === 'success' && artifact?.status === 'PASS' && artifactId.length > 0;
            const nextSlice = artifact?.effective_delivery_frontier_projection?.effective_next_slice || 'NONE';
            const sliceId = artifact?.slice_id || 'UNKNOWN';
            const completion = artifact?.effective_delivery_frontier_projection?.effective_status || process.env.MCFT_COMPLETION || 'UNKNOWN';
            const state = succeeded ? 'success' : 'failure';
            const description = succeeded
              ? `PASS ${sliceId} state=${completion} next=${nextSlice} artifact=${artifactId}`.slice(0, 140)
              : `FAIL ${sliceId} run=${process.env.GITHUB_RUN_ID}`.slice(0, 140);
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: process.env.MCFT_SUBJECT_SHA,
              state,
              context: 'mcft-cap-07/exact-sha-attestation',
              description,
              target_url: `${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            });
