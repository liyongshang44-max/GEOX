name: mcft-cap-06-s5-predecessor-graph-import

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s5-predecessor-graph-import.yml'
      - 'tmp/mcft-cap-06-s5-predecessor-graph-import/chunks/**'

permissions:
  contents: write

jobs:
  import-validated-logical-commits:
    runs-on: ubuntu-latest
    env:
      BASE_COMMIT: 437a6ccae5903494638d17c997a7017c6da057cf
      EXPECTED_TREE: a8ee969b8ffe311d32837e13b4f6c38ea8ff0c96
      EXPECTED_B64_SHA256: c69bd80c00eaac1d9b57eae937c48d181d978fd0ecfff0c9b2fb140d36e196ae
      EXPECTED_TARBALL_SHA256: 5d7eac6484b3dda945dc87113b8d445235ba6ec70c96e2a6f826ad6c6052ecc3
      TARGET_BRANCH: agent/mcft-cap-06-s5-predecessor-graph-conformance-v1
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify carrier base and current main
        run: |
          set -euo pipefail
          git fetch origin main "$TARGET_BRANCH"
          test "$(git rev-parse origin/main)" = "$BASE_COMMIT"
          test "$(git merge-base HEAD origin/main)" = "$BASE_COMMIT"
          test "$(git rev-parse origin/$TARGET_BRANCH)" = "$BASE_COMMIT"

      - name: Reconstruct authoritative patch bundle
        run: |
          set -euo pipefail
          CHUNKS='tmp/mcft-cap-06-s5-predecessor-graph-import/chunks'
          mkdir -p /tmp/mcft-cap-06-s5-import acceptance-output
          cat > /tmp/chunk-manifest <<'EOF'
          part-00 4096 f74364b62e60a1991b9d2a3a5391f34e230788963a7ad36d73720340d4d7c3e9
          part-01 4096 4478ede18a326a1e7645dcc9528c596aa40500a43597bb269909c219d15a64f7
          part-02 4096 8407cbd7ea1ea97daef69d756025a17d06d2788f1d8aed21054dc81625d2a8bd
          part-03 4096 3a98bb0e5b417e3bf868776957e401615fbda1f2a7a437e6a136d0dd25254d69
          part-04 4096 46560a778f8b6bcf1d3794348fb465113624015eef48c240b5445785edf88ecb
          part-05 4096 bde933d7ffa2cbb0a2d85203ad1ec858df40609d82f3f606c55bccdfd4901c6c
          part-06 4096 50440fef1e43cfbc48c4333708d84bf0b19174d31619b836d55cf3a430d231e1
          part-07 4096 9cb00aae5a6fefc0bc6c64d2edddfd11d60de6f45a17bc2c24c5cb4799cbadad
          part-08 4096 c3b47d289e04fd4a5227a953ac2175b06344b38f25aa998d0eb160d719bea5a3
          part-09 1388 c5f0091713a8c83f2dc06e643ac87998a5e6f017b11dbd7a78ca53f3ea2b1761
          EOF
          : > /tmp/mcft-cap-06-s5-import/patches.tar.gz.b64
          while read -r name bytes sha; do
            file="$CHUNKS/$name"
            test "$(wc -c < "$file" | tr -d ' ')" = "$bytes"
            test "$(sha256sum "$file" | cut -d' ' -f1)" = "$sha"
            cat "$file" >> /tmp/mcft-cap-06-s5-import/patches.tar.gz.b64
          done < /tmp/chunk-manifest
          test "$(sha256sum /tmp/mcft-cap-06-s5-import/patches.tar.gz.b64 | cut -d' ' -f1)" = "$EXPECTED_B64_SHA256"
          base64 -d /tmp/mcft-cap-06-s5-import/patches.tar.gz.b64 > /tmp/mcft-cap-06-s5-import/patches.tar.gz
          test "$(sha256sum /tmp/mcft-cap-06-s5-import/patches.tar.gz | cut -d' ' -f1)" = "$EXPECTED_TARBALL_SHA256"
          tar -xzf /tmp/mcft-cap-06-s5-import/patches.tar.gz -C /tmp/mcft-cap-06-s5-import
          printf '%s\n' "base64_sha256=$EXPECTED_B64_SHA256" "tarball_sha256=$EXPECTED_TARBALL_SHA256" "chunk_count=10" > acceptance-output/PATCH_BUNDLE_INTEGRITY.txt

      - name: Recreate three logical commits
        run: |
          set -euo pipefail
          git checkout --detach "$BASE_COMMIT"
          git switch -c mcft-cap-06-s5-import-work
          git config user.name 'OpenAI Agent'
          git config user.email 'agent@openai.local'
          git am --committer-date-is-author-date /tmp/mcft-cap-06-s5-import/01-authority.patch
          git am --committer-date-is-author-date /tmp/mcft-cap-06-s5-import/02-preflight.patch
          git am --committer-date-is-author-date /tmp/mcft-cap-06-s5-import/03-frontier.patch

      - name: Verify exact imported tree and history
        run: |
          set -euo pipefail
          ACTUAL_TREE="$(git rev-parse HEAD^{tree})"
          ACTUAL_COUNT="$(git rev-list --count "$BASE_COMMIT"..HEAD)"
          mapfile -t SUBJECTS < <(git log --reverse --format=%s "$BASE_COMMIT"..HEAD)
          CHANGED_COUNT="$(git diff --name-only "$BASE_COMMIT"..HEAD | wc -l | tr -d ' ')"
          PROTECTED_DELTA="$(git diff --name-only "$BASE_COMMIT"..HEAD | grep -E 'canonical_object_contracts_v1\.ts|canonical_identity_v1\.ts|forecast_canonical_authority_v1\.ts|a0_record_set_builder_v1\.ts' || true)"
          TRACKED_STATUS="$(git status --porcelain --untracked-files=no)"
          node - "$ACTUAL_TREE" "$ACTUAL_COUNT" "$CHANGED_COUNT" "${SUBJECTS[0]:-}" "${SUBJECTS[1]:-}" "${SUBJECTS[2]:-}" <<'NODE'
          const fs = require('node:fs');
          const [tree,count,files,...subjects] = process.argv.slice(2);
          fs.writeFileSync('acceptance-output/IMPORTED_TREE_DIAGNOSTICS.json', JSON.stringify({tree,count:Number(count),files:Number(files),subjects}, null, 2) + '\n');
          NODE
          test "$ACTUAL_TREE" = "$EXPECTED_TREE"
          test "$ACTUAL_COUNT" = '3'
          test "${SUBJECTS[0]}" = 'MCFT-CAP-06: correct predecessor graph authority'
          test "${SUBJECTS[1]}" = 'MCFT-CAP-06: add graph conformance preflight'
          test "${SUBJECTS[2]}" = 'MCFT-CAP-06: block S5 on graph conformance'
          test "$CHANGED_COUNT" = '19'
          test -z "$PROTECTED_DELTA"
          test -z "$TRACKED_STATUS"

      - name: Push validated prerequisite branch
        run: |
          set -euo pipefail
          test "$(git ls-remote origin "refs/heads/$TARGET_BRANCH" | cut -f1)" = "$BASE_COMMIT"
          git push origin "HEAD:refs/heads/$TARGET_BRANCH"
          node - <<'NODE'
          const cp = require('node:child_process');
          const fs = require('node:fs');
          const result = {
            schema_version: 'geox_mcft_cap_06_s5_predecessor_graph_import_result_v1',
            status: 'PASS',
            base_commit: process.env.BASE_COMMIT,
            target_branch: process.env.TARGET_BRANCH,
            imported_head: cp.execFileSync('git', ['rev-parse', 'HEAD'], {encoding:'utf8'}).trim(),
            imported_tree: cp.execFileSync('git', ['rev-parse', 'HEAD^{tree}'], {encoding:'utf8'}).trim(),
            logical_commit_count: 3,
            changed_file_count: 19,
            protected_predecessor_path_delta_count: 0,
            local_preflight_head: '6140743cd80455345c08d67dd14400e5827f7b89',
            local_preflight_status: 'PASS',
            canonical_write_count: 0,
            s5_implementation_started: false
          };
          fs.writeFileSync('acceptance-output/MCFT_CAP_06_S5_PREDECESSOR_GRAPH_IMPORT_RESULT.json', JSON.stringify(result, null, 2) + '\n');
          NODE

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s5-predecessor-graph-import-evidence
          path: acceptance-output/
          if-no-files-found: error
