name: MCFT-CAP-04 S7 finalization kick

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s7-twenty-four-tick-range-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s7-twenty-four-tick-range-v1
          fetch-depth: 0

      - name: Execute frozen finalization materializer
        shell: python
        run: |
          from pathlib import Path
          source = Path('.github/workflows/cap04-s7-finalize-materializer.yml').read_text(encoding='utf-8').splitlines()
          start = source.index('        run: |') + 1
          end = next(i for i in range(start, len(source)) if source[i].startswith('      - name: Remove all temporary S7 workflows'))
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in source[start:end]) + '\n'
          exec(compile(script, '/tmp/cap04_s7_finalize.py', 'exec'), {'__name__': '__main__'})

      - name: Remove all temporary S7 workflows
        run: |
          rm -f .github/workflows/cap04-s7-dual-pointer-fix.yml
          rm -f .github/workflows/cap04-s7-range-diagnostic.yml
          rm -f .github/workflows/cap04-s7-range-recheck.yml
          rm -f .github/workflows/cap04-s7-range-db-diagnostic.yml
          rm -f .github/workflows/cap04-s7-finalize-materializer.yml
          rm -f .github/workflows/cap04-s7-finalize-kick.yml

      - name: Run final S7 Governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S7_RANGE.cjs --final

      - name: Commit final S7 candidate
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "docs(mcft-cap-04): finalize S7 24-tick range candidate"
          git push origin HEAD:agent/mcft-cap-04-s7-twenty-four-tick-range-v1
