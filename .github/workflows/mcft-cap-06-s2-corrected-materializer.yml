name: mcft-cap-06-s2-corrected-materializer

on:
  pull_request:

permissions:
  contents: write

jobs:
  expose-recovered-source:
    if: github.head_ref == 'agent/mcft-cap-06-s2-contracts-math-corrected-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch quietly
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --quiet origin agent/mcft-cap-06-s2-contracts-math-corrected-v1:refs/remotes/origin/agent/mcft-cap-06-s2-contracts-math-corrected-v1
          git checkout -q -B agent/mcft-cap-06-s2-contracts-math-corrected-v1 origin/agent/mcft-cap-06-s2-contracts-math-corrected-v1

      - name: Recover and publish inspectable materializer source
        run: |
          set -euo pipefail
          python -c "import base64,hashlib,json,pathlib,struct,zlib; p=pathlib.Path('.github/mcft_cap06_s2_materializer.py.gz.b64'); r=base64.b64decode(''.join(p.read_text(encoding='utf-8').split()),validate=True); assert r[:4]==b'\x1f\x8b\x08\x08'; o=r.index(b'\x00',10)+1; d=zlib.decompress(r[o:-8],-zlib.MAX_WBITS); t=d.decode('utf-8'); compile(t,'.github/mcft_cap06_s2_materializer_recovered.py','exec'); pathlib.Path('.github/mcft_cap06_s2_materializer_recovered.py').write_text(t,encoding='utf-8',newline='\n'); expected_crc,expected_size=struct.unpack('<II',r[-8:]); meta={'recovered_sha256':hashlib.sha256(d).hexdigest(),'recovered_bytes':len(d),'expected_crc32':expected_crc,'actual_crc32':zlib.crc32(d),'expected_isize':expected_size,'actual_isize':len(d)%(1<<32),'suspect_token_count':t.count('case_id0ut_set_hash')}; pathlib.Path('.github/mcft_cap06_s2_materializer_transport.json').write_text(json.dumps(meta,indent=2)+'\n',encoding='utf-8'); print(json.dumps(meta,sort_keys=True))"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/mcft_cap06_s2_materializer_recovered.py .github/mcft_cap06_s2_materializer_transport.json
          git commit -m "chore(mcft-cap-06): expose recovered S2 materializer source"
          git push origin HEAD:agent/mcft-cap-06-s2-contracts-math-corrected-v1
