name: MCFT-CAP-05 S2 validation

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-05-s2-contracts-projection-math-config-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize S2 source
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          p = Path('apps/server/src/domain/twin_runtime/feedback_runtime_config_v1.ts')
          text = p.read_text(encoding='utf-8')
          duplicate = '  CAP04_CONFIG_SELECTION_MODE_V1,\n  CAP04_CONFIG_SELECTION_MODE_V1,\n'
          if duplicate in text:
              p.write_text(text.replace(duplicate, '  CAP04_CONFIG_SELECTION_MODE_V1,\n', 1), encoding='utf-8')
          elif text.count('  CAP04_CONFIG_SELECTION_MODE_V1,\n') != 1:
              raise SystemExit('CAP04 config selection import cardinality invalid')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add apps/server/src/domain/twin_runtime/feedback_runtime_config_v1.ts
            git commit -m "fix(mcft-cap-05): deduplicate inherited config import"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run S2 pure acceptance
        shell: bash
        run: |
          set -o pipefail
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_CONTRACTS_PROJECTION_CONFIG.ts 2>&1 | tee /tmp/mcft-cap-05-s2-acceptance.log

      - name: Upload S2 acceptance failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-05-s2-acceptance-failure
          path: /tmp/mcft-cap-05-s2-acceptance.log
          if-no-files-found: error

      - name: Typecheck repository
        shell: bash
        run: |
          set -o pipefail
          pnpm -r typecheck 2>&1 | tee /tmp/mcft-cap-05-s2-typecheck.log

      - name: Upload S2 typecheck failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-05-s2-typecheck-failure
          path: /tmp/mcft-cap-05-s2-typecheck.log
          if-no-files-found: error
