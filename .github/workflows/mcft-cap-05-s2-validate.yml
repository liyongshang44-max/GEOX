name: MCFT-CAP-05 S2 final materialization

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-05-s2-contracts-projection-math-config-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate S2 pure contracts before materialization
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_CONTRACTS_PROJECTION_CONFIG.ts

      - name: Materialize S2 governance and SSOT
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          p = Path('.mcft_cap05_s2_materializer.py')
          text = p.read_text(encoding='utf-8')
          old_marker = 'marker = "# 26. S2 — Contracts, Projection Math and Runtime Config"'
          new_marker = 'marker = "# 26. S2 — Contracts and Projection Math"'
          old_guard = 'if "S2 implementation candidate identity：" not in task:'
          new_guard = 'if "S2 pure validation workflow:" not in task:'
          if old_marker not in text or old_guard not in text:
              raise SystemExit('S2 task materialization patch target missing')
          text = text.replace(old_marker, new_marker, 1).replace(old_guard, new_guard, 1)
          p.write_text(text, encoding='utf-8')
          PY
          python3 .mcft_cap05_s2_materializer.py
          python3 - <<'PY'
          from pathlib import Path
          p = Path('scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S2_CONTRACTS_CONFIG.cjs')
          text = p.read_text(encoding='utf-8')
          replacements = [
              ('check(task.includes(`active_delivery_slice_id:\\n${s2}`) && task.includes("S2 status:\\nIMPLEMENTATION_CANDIDATE"), "task records S2 candidate");', 'check(task.includes(s2) && /S2 status:\\s*IMPLEMENTATION_CANDIDATE/s.test(task), "task records S2 candidate");'),
              ('check(task.includes("S3 authorized:\\nfalse"), "task preserves S3 block");', 'check(/S3 authorized:\\s*false/s.test(task), "task preserves S3 block");'),
              ('check(contract.includes("Forecast Residual remains distinct from `Assimilation Innovation`"), "contract separates residual and innovation");', 'check(contract.includes("Forecast Residual") && contract.includes("remains distinct from") && contract.includes("Assimilation Innovation"), "contract separates residual and innovation");'),
              ('check(!residual.includes("assimilation_gain") && !residual.includes("posterior_mean"), "Residual owns no gain or posterior mean");', 'check(residual.includes("\\\"assimilation_gain\\\" in object.payload") && residual.includes("\\\"posterior_state_ref\\\" in object.payload") && residual.includes("\\\"posterior_mean\\\" in object.payload") && residual.includes("CAP05_RESIDUAL_ASSIMILATION_AUTHORITY_FORBIDDEN"), "Residual explicitly rejects gain and posterior authority fields");'),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'expected governance assertion missing: {old}')
              text = text.replace(old, new, 1)
          p.write_text(text, encoding='utf-8')
          PY

      - name: Commit exact S2 candidate and remove temporary files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/mcft-cap-05-s2-validate.yml .mcft_cap05_s2_materializer.py
          git add \
            apps/server/src/domain/twin_runtime/action_feedback_to_executed_irrigation_v1.ts \
            apps/server/src/domain/twin_runtime/decision_second_write_policy_v1.ts \
            apps/server/src/domain/twin_runtime/feedback_canonical_contracts_v1.ts \
            apps/server/src/domain/twin_runtime/feedback_cycle_projection_v1.ts \
            apps/server/src/domain/twin_runtime/feedback_runtime_config_v1.ts \
            apps/server/src/domain/twin_runtime/forecast_observation_residual_v1.ts \
            docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md \
            docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-AUTHORIZATION-STATUS.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-DELIVERY-SLICE-STATUS.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-S2-CONTRACTS-PROJECTION-CONFIG.md \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-S2-STATUS.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-TASK.md \
            scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S2_CONTRACTS_CONFIG.cjs \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_CONTRACTS_PROJECTION_CONFIG.ts
          git commit -m "feat(mcft-cap-05): establish S2 contracts projection math and config"

      - name: Run S2 governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S2_CONTRACTS_CONFIG.cjs

      - name: Run S2 pure acceptance
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_CONTRACTS_PROJECTION_CONFIG.ts

      - name: Typecheck repository
        run: pnpm -r typecheck

      - name: Push final S2 candidate
        run: git push origin HEAD:${{ github.head_ref }}
