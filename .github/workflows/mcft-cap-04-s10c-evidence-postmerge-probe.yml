name: MCFT-CAP-04 S10C evidence merged-main reconciliation

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s10c-evidence-postmerge-probe-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Verify exact merged main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          test "$(git branch --show-current)" = "main"
          test "$(git rev-parse HEAD)" = "89f2d1ccd14cd5ad8f853c1d6da5dd8759bb8fa4"
          test "$(git rev-parse origin/main)" = "89f2d1ccd14cd5ad8f853c1d6da5dd8759bb8fa4"
      - name: Run S10C merged-main reconciliation Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_FINALIZATION_EFFECTIVENESS.cjs --postmerge
