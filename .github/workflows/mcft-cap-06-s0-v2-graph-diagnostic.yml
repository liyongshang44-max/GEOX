name: MCFT-CAP-06 S0 v2 graph diagnostic

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/mcft-cap-06-s0-v2-exact-qualification'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: landos
          POSTGRES_PASSWORD: landos
          POSTGRES_DB: mcft_cap06_s0_v2_diag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U landos -d mcft_cap06_s0_v2_diag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-06-s0-v2-exact-qualification
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Reproduce predecessor and export canonical graph
        env:
          DATABASE_URL: postgres://landos:landos@127.0.0.1:5432/mcft_cap06_s0_v2_diag
          MCFT_CAP_06_S0_DESTRUCTIVE_ACCEPTANCE: "1"
        shell: bash
        run: |
          set -euo pipefail
          export NODE_PATH="$PWD/apps/server/node_modules:$PWD/node_modules"
          git fetch origin agent/mcft-cap-06-s0-authorization-predecessor-qualification-v1
          DIAG_SCRIPT="scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_PREDECESSOR_PREFLIGHT.ts"
          git show origin/agent/mcft-cap-06-s0-authorization-predecessor-qualification-v1:"$DIAG_SCRIPT" > "$DIAG_SCRIPT"
          python3 - <<'PY'
          from pathlib import Path
          p = Path('scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_PREDECESSOR_PREFLIGHT.ts')
          s = p.read_text(encoding='utf-8')
          s = s.replace('const BASELINE_MAIN = "1e66ea7efc842b8e547bccc40521d520b4370e69";', 'const BASELINE_MAIN = "ca819ba51bdf3017dbefa96015f76bd3b66a647c";')
          s = s.replace('const BRANCH = "agent/mcft-cap-06-s0-authorization-predecessor-qualification-v1";', 'const BRANCH = "agent/mcft-cap-06-s0-v2-exact-qualification";')
          s = s.replace('const TEMP_WORKFLOW_PATH = ".github/workflows/mcft-cap-06-s0-materialize.yml";', 'const TEMP_WORKFLOW_PATH = ".github/workflows/mcft-cap-06-s0-v2-graph-diagnostic.yml";')
          s = s.replace('assert.equal(p0Status.status, "PROVISIONAL_SSOT_CANDIDATE", "P0_CANDIDATE_STATUS_REQUIRED_BEFORE_S0_MATERIALIZATION");', 'assert.equal(p0Status.status, "MERGED_EFFECTIVE", "P0_MERGED_EFFECTIVE_REQUIRED_BEFORE_S0_V2_DIAGNOSTIC");')
          p.write_text(s, encoding='utf-8')
          Path('/tmp/s0-v2-predecessor-source.ts').write_text(s, encoding='utf-8')
          PY
          pnpm -w exec tsx "$DIAG_SCRIPT" 2>&1 | tee /tmp/s0-v2-preflight.log
          node <<'NODE'
          const fs = require('node:fs');
          const { Client } = require('pg');

          function payload(row) {
            return row?.record_json?.payload ?? null;
          }

          (async () => {
            const client = new Client({ connectionString: process.env.DATABASE_URL });
            await client.connect();
            const types = [
              'twin_forecast_residual_v1',
              'twin_forecast_run_v1',
              'twin_state_estimate_v1',
              'twin_runtime_config_v1',
              'twin_evidence_window_v1',
              'twin_assimilation_update_v1',
              'twin_state_transition_v1',
              'twin_runtime_lineage_v1'
            ];
            const out = {};
            for (const type of types) {
              const result = await client.query("SELECT fact_id, occurred_at, source, record_json FROM facts WHERE record_json->>'type'=$1 ORDER BY occurred_at, fact_id", [type]);
              out[type] = result.rows;
            }

            const residual = payload(out.twin_forecast_residual_v1?.[0]);
            if (residual) {
              const rp = residual.payload || {};
              const forecast = out.twin_forecast_run_v1.map(payload).find((item) => item?.object_id === rp.forecast_run_ref);
              const posterior = out.twin_state_estimate_v1.map(payload).find((item) => item?.object_id === forecast?.payload?.source_posterior_ref);
              const evidenceWindow = out.twin_evidence_window_v1.map(payload).find((item) => item?.object_id === posterior?.payload?.evidence_window_ref);
              const assimilation = out.twin_assimilation_update_v1.map(payload).find((item) => item?.object_id === rp.assimilation_update_ref);
              const forecastConfig = out.twin_runtime_config_v1.map(payload).find((item) => item?.object_id === forecast?.payload?.runtime_config_ref);
              const residualConfig = out.twin_runtime_config_v1.map(payload).find((item) => item?.object_id === rp.runtime_config_ref);
              const exactPoint = forecast?.payload?.points?.filter((point) => point.horizon_hour === 1 && point.target_time === rp.forecast_target_time) ?? [];

              const referenceValues = [
                rp.actual_observation_ref,
                rp.root_zone_geometry_ref,
                rp.forecast_run_ref,
                rp.assimilation_update_ref,
                forecast?.payload?.source_posterior_ref,
                forecast?.payload?.runtime_config_ref,
                rp.runtime_config_ref,
                posterior?.payload?.evidence_window_ref,
                forecast?.payload?.weather_snapshot_ref,
                forecast?.payload?.et0_snapshot_ref,
                forecast?.payload?.crop_stage_context_ref
              ].filter(Boolean);
              const related = {};
              for (const ref of referenceValues) {
                const result = await client.query(
                  "SELECT fact_id, occurred_at, source, record_json FROM facts WHERE record_json::text LIKE $1 ORDER BY occurred_at, fact_id",
                  [`%${ref}%`],
                );
                related[ref] = result.rows;
              }

              out.case_graph = {
                residual,
                forecast,
                exact_h1_point_matches: exactPoint,
                source_posterior: posterior,
                source_evidence_window: evidenceWindow,
                assimilation_update: assimilation,
                forecast_runtime_config: forecastConfig,
                residual_runtime_config: residualConfig,
                related_fact_rows_by_ref: related
              };
              out.residual_payload_keys = Object.keys(rp).sort();
              out.residual_envelope_keys = Object.keys(residual).sort();
            }

            const allTypes = await client.query("SELECT record_json->>'type' AS type, count(*)::int AS count FROM facts GROUP BY 1 ORDER BY 1");
            out.type_counts = allTypes.rows;
            await client.end();
            fs.writeFileSync('/tmp/s0-v2-graph-diagnostic.json', JSON.stringify(out, null, 2));
          })().catch((error) => { console.error(error); process.exit(1); });
          NODE

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mcft-cap-06-s0-v2-graph-diagnostic
          path: |
            /tmp/s0-v2-preflight.log
            /tmp/s0-v2-graph-diagnostic.json
            /tmp/s0-v2-predecessor-source.ts
          if-no-files-found: warn
          retention-days: 7
