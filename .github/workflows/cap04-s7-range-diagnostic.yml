name: MCFT-CAP-04 S7 range diagnostics

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  range-diagnostic:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s7-twenty-four-tick-range-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s7-twenty-four-tick-range-v1
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Capture S7 range acceptance
        shell: bash
        run: |
          set +e
          pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_TWENTY_FOUR_TICK_RANGE.ts > /tmp/cap04-s7-positive.log 2>&1
          positive=$?
          pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_TWENTY_FOUR_TICK_RANGE_NEGATIVE.ts > /tmp/cap04-s7-negative.log 2>&1
          negative=$?
          echo "$positive" > /tmp/cap04-s7-positive-exit.txt
          echo "$negative" > /tmp/cap04-s7-negative-exit.txt
          cat /tmp/cap04-s7-positive.log
          cat /tmp/cap04-s7-negative.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: cap04-s7-range-diagnostics
          path: |
            /tmp/cap04-s7-positive.log
            /tmp/cap04-s7-positive-exit.txt
            /tmp/cap04-s7-negative.log
            /tmp/cap04-s7-negative-exit.txt
          retention-days: 1
