name: MCFT-CAP-04 S7 dual Forecast pointer correction

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  correct:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s7-twenty-four-tick-range-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s7-twenty-four-tick-range-v1
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile

      - name: Correct dual Forecast pointer validation and frozen boundaries
        shell: python
        run: |
          import json
          from pathlib import Path

          next_tick = Path('apps/server/src/runtime/twin_runtime/next_tick_input_service_v1.ts')
          text = next_tick.read_text(encoding='utf-8')
          old = '''    if (latestSuccessfulForecastRef !== null
      && latestSuccessfulForecastRef !== previousForecastResultRef) {
      throw new Error("SUCCESSFUL_FORECAST_POINTER_RESULT_MISMATCH");
    }
'''
          if old not in text:
            raise SystemExit('dual Forecast pointer validation anchor missing')
          text = text.replace(old, '', 1)
          text = text.replace(
            '// Boundary: application validation and DTO preparation only; no propagation, Forecast success, scheduler, route, web, filesystem, wall-clock, or canonical writes.',
            '// Boundary: application validation and DTO preparation only; the latest Forecast result and latest successful Forecast are independent persisted checkpoint pointers; no propagation, scheduler, route, web, filesystem, wall-clock, or canonical writes.',
            1,
          )
          next_tick.write_text(text, encoding='utf-8')

          corrective = 'apps/server/src/runtime/twin_runtime/next_tick_input_service_v1.ts'
          status_path = Path('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-S7-RANGE-STATUS.json')
          status = json.loads(status_path.read_text(encoding='utf-8'))
          if corrective not in status['exact_changed_file_boundary']:
            status['exact_changed_file_boundary'].append(corrective)
            status['exact_changed_file_boundary'].sort()
          status['corrective_boundary'] = {
            'finding': 'A2 preserves prior successful Forecast while latest Forecast result advances to blocked Forecast',
            'correction': 'PrepareNextTickInputServiceV1 treats checkpoint.forecast_result_ref and checkpoint.successful_forecast_ref as independent authorities',
            'authorized_under': 'S7_A2_EXPLICIT_RANGE_STOP_ACCEPTANCE',
          }
          status_path.write_text(json.dumps(status, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          auth_path = Path('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-AUTHORIZATION-STATUS.json')
          auth = json.loads(auth_path.read_text(encoding='utf-8'))
          if corrective not in auth['exact_changed_file_boundary']:
            auth['exact_changed_file_boundary'].append(corrective)
            auth['exact_changed_file_boundary'].sort()
          auth_path.write_text(json.dumps(auth, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          delivery_path = Path('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-DELIVERY-SLICE-STATUS.json')
          delivery = json.loads(delivery_path.read_text(encoding='utf-8'))
          s7 = next(item for item in delivery['slices'] if item['delivery_slice_id'] == 'MCFT-CAP-04.MCFT-04-07-09-10.TWENTY-FOUR-TICK-FORECAST-SCENARIO-RANGE-V1')
          if corrective not in s7['exact_changed_file_boundary']:
            s7['exact_changed_file_boundary'].append(corrective)
            s7['exact_changed_file_boundary'].sort()
          delivery_path.write_text(json.dumps(delivery, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

      - name: Verify correction
        shell: bash
        run: |
          pnpm -r typecheck
          pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_TWENTY_FOUR_TICK_RANGE.ts
          pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_TWENTY_FOUR_TICK_RANGE_NEGATIVE.ts

      - name: Remove temporary correction workflow
        run: rm .github/workflows/cap04-s7-range-diagnostic.yml

      - name: Commit corrective boundary
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(mcft-cap-04): support A2 dual Forecast checkpoint pointers"
          git push origin HEAD:agent/mcft-cap-04-s7-twenty-four-tick-range-v1
