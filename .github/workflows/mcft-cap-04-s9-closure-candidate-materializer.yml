name: MCFT-CAP-04 S9 closure candidate materializer

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s9-closure-candidate-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s9-closure-candidate-v1
          fetch-depth: 0
      - name: Materialize S9 closure candidate
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const BASE = '8a4e1b5a92b8b3fcc21ec77a6542743fd3a7b4c3';
          const BRANCH = 'agent/mcft-cap-04-s9-closure-candidate-v1';
          const S9 = 'MCFT-CAP-04.CLOSURE-CANDIDATE-V1';
          const S10 = 'MCFT-CAP-04.FINALIZATION-MAIN-VERIFICATION-V1';
          const files = [
            'docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md',
            'docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json',
            'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-AUTHORIZATION-STATUS.json',
            'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-DELIVERY-SLICE-STATUS.json',
            'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE-STATUS.json',
            'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE.md',
            'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE-RECORD.json',
            'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_CLOSURE.cjs'
          ];
          const requiredEvidenceSlices = [
            'MCFT-CAP-04.MCFT-02-07-09-10.FORECAST-SCENARIO-CONTRACTS-CONFIG-V1',
            'MCFT-CAP-04.MCFT-05-09.FUTURE-FORCING-WINDOW-V1',
            'MCFT-CAP-04.MCFT-06-09.PURE-72H-FORECAST-MATH-V1',
            'MCFT-CAP-04.MCFT-06-10.PURE-THREE-SCENARIO-MATH-V1',
            'MCFT-CAP-04.MCFT-02-07-08-09.A1-A2-RECORD-SET-BUILDERS-V1',
            'MCFT-CAP-04.MCFT-03-09-10.A1-A2-B-PERSISTENCE-UNIQUENESS-RECOVERY-V1',
            'MCFT-CAP-04.MCFT-04-05-06-07-08-09-10.SINGLE-TICK-FORECAST-SCENARIO-INTEGRATION-V1',
            'MCFT-CAP-04.MCFT-04-07-09-10.TWENTY-FOUR-TICK-FORECAST-SCENARIO-RANGE-V1',
            'MCFT-CAP-04.MCFT-03-04-07-09-10.RESTART-BACKFILL-FAILURE-RECOVERY-V1'
          ];
          const activationEvidence = {
            activation_pr_number: 2405,
            activation_exact_head_commit: '905195609da2d71a683821aa903abff50c802bcb',
            activation_exact_head_ci_run: 29256446215,
            activation_merge_commit: BASE,
            activation_postmerge_probe_pr_number: 2406,
            activation_postmerge_workflow_run: 29257014497,
            activation_postmerge_gate: 'PASS',
            activation_effectiveness_condition_satisfied: true
          };
          const readJson = p => JSON.parse(fs.readFileSync(p, 'utf8'));
          const writeJson = (p, v) => { fs.mkdirSync(path.dirname(p), {recursive:true}); fs.writeFileSync(p, JSON.stringify(v, null, 2) + '\n'); };
          const authPath = 'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-AUTHORIZATION-STATUS.json';
          const deliveryPath = 'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-DELIVERY-SLICE-STATUS.json';
          const closurePath = 'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE-STATUS.json';
          const matrixPath = 'docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json';
          const mapPath = 'docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md';
          const auth = readJson(authPath);
          const delivery = readJson(deliveryPath);
          const closure = readJson(closurePath);
          const claims = closure.pending_completion_claims;
          const nonclaims = closure.preserved_nonclaims;
          if (!Array.isArray(claims) || claims.length !== 24) throw new Error('EXACT_24_PENDING_CLAIMS_REQUIRED');
          if (!Array.isArray(nonclaims) || !nonclaims.includes('NO_MCFT_CAP_04_COMPLETE_CLAIM')) throw new Error('TEMPORARY_COMPLETE_NONCLAIM_REQUIRED');
          const normalizedEvidence = requiredEvidenceSlices.map(id => {
            const slice = delivery.slices.find(s => s.delivery_slice_id === id);
            if (!slice) throw new Error(`MISSING_EVIDENCE_SLICE:${id}`);
            return {
              delivery_slice_id: id,
              status: slice.status,
              implementation_status: slice.implementation_status ?? null,
              exact_head_commit: slice.exact_head_commit ?? slice.implementation_head_commit ?? slice.head_commit ?? null,
              exact_head_ci_run: slice.exact_head_ci_run ?? slice.implementation_ci_run ?? slice.ci_run ?? null,
              merge_commit: slice.merge_commit ?? slice.implementation_merge_commit ?? null,
              postmerge_workflow_run: slice.postmerge_workflow_run ?? slice.implementation_postmerge_workflow_run ?? null,
              postmerge_gate: slice.postmerge_gate ?? slice.implementation_postmerge_gate ?? null,
              effectiveness_condition_satisfied: slice.effectiveness_condition_satisfied === true
            };
          });
          auth.implementation_status = 'S9_CLOSURE_CANDIDATE';
          auth.baseline_main_commit = BASE;
          auth.branch = BRANCH;
          auth.active_delivery_slice_id = S9;
          auth.runtime_source_authorized = false;
          auth.repository_write_scope = 'S9_CLOSURE_GOVERNANCE_ONLY';
          auth.exact_changed_file_boundary = files;
          auth.current_blockers = ['MCFT_CAP_04_S9_CLOSURE_NOT_YET_MERGED','MCFT_CAP_04_S9_MERGED_MAIN_CLOSURE_GATE_NOT_YET_PASS'];
          auth.s9_activation_effectiveness = activationEvidence;
          auth.successor_authorized = false;
          writeJson(authPath, auth);
          delivery.status = 'S9_CLOSURE_CANDIDATE';
          delivery.baseline_main_commit = BASE;
          delivery.branch = BRANCH;
          delivery.active_delivery_slice_id = S9;
          delivery.runtime_source_authorized = false;
          delivery.s9_activation_effectiveness = activationEvidence;
          const s9 = delivery.slices.find(s => s.delivery_slice_id === S9);
          Object.assign(s9, {
            baseline_main_commit: BASE,
            branch: BRANCH,
            status: 'CLOSURE_CANDIDATE',
            implementation_status: 'VALIDATED_PENDING_MERGE',
            activation_effective: true,
            implementation_authorized: true,
            runtime_source_authorized: false,
            closure_effective: false,
            capability_complete: false,
            pending_completion_claims: claims,
            effective_completion_claims: [],
            preserved_nonclaims: nonclaims,
            exact_changed_file_boundary: files,
            activation_effectiveness: activationEvidence,
            closure_record_ref: 'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE-RECORD.json',
            effectiveness_condition_satisfied: false
          });
          const s10 = delivery.slices.find(s => s.delivery_slice_id === S10);
          Object.assign(s10, {status:'BLOCKED', baseline_main_commit:null, branch:null, runtime_source_authorized:false, effectiveness_condition_satisfied:false});
          delivery.next_authorized_slice_ids = [];
          delivery.successor_authorized = false;
          writeJson(deliveryPath, delivery);
          Object.assign(closure, {
            baseline_main_commit: BASE,
            implementation_branch: BRANCH,
            status: 'CLOSURE_CANDIDATE',
            activation_effective: true,
            implementation_status: 'VALIDATED_PENDING_MERGE',
            implementation_authorized: true,
            closure_effective: false,
            capability_status: 'NOT_COMPLETE',
            activation_effectiveness_condition_satisfied: true,
            activation_effectiveness: activationEvidence,
            implementation_effectiveness_condition_satisfied: false,
            pending_completion_claims: claims,
            effective_completion_claims: [],
            preserved_nonclaims: nonclaims,
            frozen_implementation_changed_file_boundary: files,
            candidate_validation: {
              evidence_slice_count: normalizedEvidence.length,
              required_evidence_slices_present: true,
              pending_completion_claim_count: claims.length,
              effective_completion_claim_count: 0,
              governance_gate: 'PASS_REQUIRED_ON_FINAL_HEAD',
              repository_exact_head_ci: 'PASS_REQUIRED_BEFORE_MERGE'
            },
            finalization_authorized: false,
            successor_authorized: false
          });
          writeJson(closurePath, closure);
          const record = {
            schema_version: 'geox_mcft_cap_04_closure_record_v1',
            closure_identity: 'GEOX-MCFT-CAP-04-CLOSURE-CANDIDATE-V1',
            capability_line_id: 'MCFT-CAP-04',
            display_alias: 'MCFT-4',
            name: '72-Hour Forecast and Three Scenarios',
            runtime_mode: 'REPLAY',
            target_completion_level: 'Level A — Deterministic Replay Twin',
            delivery_slice_id: S9,
            status: 'CLOSURE_CANDIDATE',
            closure_effective: false,
            capability_complete: false,
            baseline_main_commit: BASE,
            branch: BRANCH,
            authority: {
              task_ref: 'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-TASK.md',
              closure_document_ref: 'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE.md',
              closure_status_ref: closurePath,
              delivery_status_ref: deliveryPath,
              authorization_status_ref: authPath,
              activation_evidence: activationEvidence
            },
            accumulated_merged_main_evidence: normalizedEvidence,
            bounded_runtime_proof: {
              runtime_config_fact_count: 24,
              a1_operation_fact_count: 192,
              scenario_set_fact_count: 24,
              operation_fact_count: 216,
              config_plus_operation_fact_count: 240,
              forecast_point_count: 1728,
              scenario_point_count: 5184,
              checkpoint_sequence_start: 49,
              checkpoint_sequence_end: 72,
              global_state_count: 73,
              next_logical_tick: '2026-06-04T02:00:00.000Z',
              uninterrupted_and_restart_hash_equivalence: true,
              bounded_backfill_hash_equivalence: true,
              response_loss_recovery: true,
              stale_fencing_and_cas_fail_closed: true,
              projection_divergence_fail_closed_and_explicit_rebuild: true
            },
            pending_claim_support: claims.map(claim => ({
              claim,
              evidence_status: claim === 'MCFT_CAP_04_COMPLETE'
                ? 'CONDITIONED_ON_S10C_FINALIZATION_EFFECTIVENESS'
                : 'SUPPORTED_BY_MERGED_MAIN_EVIDENCE_PENDING_S10C',
              effective: false
            })),
            pending_completion_claims: claims,
            effective_completion_claims: [],
            preserved_nonclaims: nonclaims,
            closure_does_not_change: {
              runtime_source: true,
              persistence_source: true,
              database_schema: true,
              routes: true,
              scheduler: true,
              web: true,
              workflows: true,
              canonical_facts: true,
              active_model_parameters: true,
              recommendation_policy_decision_action: true
            },
            exact_changed_file_boundary: files,
            gate_evidence: {
              governance_gate: 'PASS_REQUIRED_ON_FINAL_HEAD',
              exact_head_ci: 'PASS_REQUIRED_BEFORE_MERGE',
              git_diff_check: 'PASS_REQUIRED_ON_FINAL_HEAD'
            },
            finalization_delivery_slice_id: S10,
            finalization_authorized: false,
            successor_capability_line_id: 'MCFT-CAP-05',
            successor_authorized: false
          };
          writeJson('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE-RECORD.json', record);
          const contractPath = 'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE.md';
          const contract = `<!-- docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE.md -->\n# GEOX MCFT-CAP-04 S9 Closure Candidate Contract\n\n## Identity\n\n\`\`\`text\ndelivery_slice_id: ${S9}\nbaseline_main_commit: ${BASE}\nimplementation_branch: ${BRANCH}\nruntime_mode: REPLAY\nclosure_kind: GOVERNANCE_ONLY_EVIDENCE_AGGREGATION\nactivation_merge_commit: ${BASE}\nactivation_postmerge_gate_run: 29257014497\n\`\`\`\n\n## Candidate semantics\n\nS9 aggregates the merged-main evidence for S1 through S8, including both S5A and S5B. Exactly twenty-four completion claims are frozen as pending. Zero completion claims are effective.\n\nEvidence support is not completion effectiveness. \`status\` and \`implementation_status\` are not \`COMPLETE\`; \`closure_effective\` and \`capability_complete\` remain false.\n\n## Boundary\n\nThe candidate is governance-only. It changes no Runtime source, persistence source, schema, route, scheduler, web behavior, workflow, canonical fact, active model parameter, recommendation, policy evaluation, decision or AO-ACT behavior.\n\n## Downstream lock\n\nS10 remains blocked until this S9 candidate is merged and the Closure Gate passes on the actual merge commit. MCFT-CAP-05 remains unauthorized.\n`;
          fs.writeFileSync(contractPath, contract);
          const matrix = readJson(matrixPath);
          matrix.baseline = {branch:'main', commit:BASE, meaning:'MCFT-CAP-04 S9 closure candidate; completion claims remain pending'};
          const cap = matrix.capability_lines.find(c => c.capability_line_id === 'MCFT-CAP-04');
          cap.status = 'CLOSURE_CANDIDATE';
          cap.active_delivery_slice_id = S9;
          cap.runtime_source_authorized = false;
          cap.pending_completion_claims = claims;
          cap.effective_completion_claims = [];
          cap.closure_effective = false;
          cap.capability_complete = false;
          cap.s9_activation_effectiveness = activationEvidence;
          cap.successor_authorized = false;
          const ms9 = cap.delivery_slices.find(s => s.delivery_slice_id === S9);
          if (ms9) Object.assign(ms9, {status:'CLOSURE_CANDIDATE', baseline_main_commit:BASE, branch:BRANCH, closure_effective:false});
          const ms10 = cap.delivery_slices.find(s => s.delivery_slice_id === S10);
          if (ms10) Object.assign(ms10, {status:'BLOCKED', baseline_main_commit:null, branch:null});
          cap.next_authorized_slice_ids = [];
          writeJson(matrixPath, matrix);
          let map = fs.readFileSync(mapPath, 'utf8');
          const marker = '## MCFT-CAP-04 S9 Closure candidate';
          if (!map.includes(marker)) map += `\n\n${marker}\n\n\`\`\`text\nbaseline main: ${BASE}\nactivation postmerge Gate: 29257014497 SUCCESS\nactive delivery slice: ${S9}\nstatus: CLOSURE_CANDIDATE\npending completion claims: 24\neffective completion claims: 0\nclosure effective: false\ncapability complete: false\nS10 status: BLOCKED\nMCFT-CAP-05 authorized: false\n\`\`\`\n\nS9 aggregates merged-main evidence only. It does not activate CAP-04 completion claims.\n`;
          fs.writeFileSync(mapPath, map);
          const gate = `// scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_CLOSURE.cjs\n// Purpose: validate the governance-only S9 closure candidate, exact evidence aggregation, pending claims, preserved nonclaims, boundaries, and downstream locks.\n// Boundary: no Runtime source, persistence source, migration, route, scheduler, web, workflow, completion effectiveness, S10 activation, or MCFT-CAP-05 authorization.\n'use strict';\nconst cp=require('node:child_process'); const fs=require('node:fs'); const path=require('node:path');\nconst ROOT=path.resolve(__dirname,'../..'); const BASE='${BASE}'; const S9='${S9}'; const S10='${S10}'; const MODE=process.argv.includes('--postmerge')?'postmerge':'final';\nconst files=${JSON.stringify(files)}; const claims=${JSON.stringify(claims)}; const nonclaims=${JSON.stringify(nonclaims)}; const evidenceIds=${JSON.stringify(requiredEvidenceSlices)}; let pass=0,fail=0;\nconst check=(v,m)=>{if(v){pass++;console.log('PASS '+m)}else{fail++;console.error('FAIL '+m)}}; const git=a=>cp.execFileSync('git',a,{cwd:ROOT,encoding:'utf8'}).trim(); const j=p=>JSON.parse(fs.readFileSync(path.join(ROOT,p),'utf8')); const exact=(a,b,m)=>check(JSON.stringify([...(a||[])].sort())===JSON.stringify([...b].sort()),m);\nfor(const f of files) check(fs.existsSync(path.join(ROOT,f)),'file exists '+f);\nconst auth=j('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-AUTHORIZATION-STATUS.json'); const d=j('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-DELIVERY-SLICE-STATUS.json'); const c=j('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE-STATUS.json'); const r=j('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE-RECORD.json'); const s9=d.slices.find(x=>x.delivery_slice_id===S9); const s10=d.slices.find(x=>x.delivery_slice_id===S10);\ncheck(auth.active_delivery_slice_id===S9,'auth active S9'); check(auth.runtime_source_authorized===false,'Runtime source unauthorized'); exact(auth.exact_changed_file_boundary,files,'auth boundary exact');\ncheck(c.status==='CLOSURE_CANDIDATE','closure status candidate'); check(c.activation_effective===true,'activation effective'); check(c.implementation_status==='VALIDATED_PENDING_MERGE','implementation pending merge'); check(c.closure_effective===false,'closure ineffective'); check(c.capability_status==='NOT_COMPLETE','capability not complete'); exact(c.pending_completion_claims,claims,'status pending claims exact'); exact(c.effective_completion_claims,[],'status zero effective claims'); exact(c.preserved_nonclaims,nonclaims,'status nonclaims exact'); exact(c.frozen_implementation_changed_file_boundary,files,'status boundary exact'); check(c.activation_effectiveness?.activation_merge_commit===BASE,'activation merge exact'); check(c.activation_effectiveness?.activation_postmerge_workflow_run===29257014497,'activation Gate run exact');\ncheck(r.status==='CLOSURE_CANDIDATE','record candidate'); check(r.closure_effective===false,'record closure ineffective'); check(r.capability_complete===false,'record capability incomplete'); check(r.baseline_main_commit===BASE,'record baseline exact'); exact(r.pending_completion_claims,claims,'record pending claims exact'); exact(r.effective_completion_claims,[],'record zero effective claims'); exact(r.preserved_nonclaims,nonclaims,'record nonclaims exact'); exact(r.exact_changed_file_boundary,files,'record boundary exact'); check(r.pending_claim_support?.length===24,'24 claim support records'); check(r.pending_claim_support?.every(x=>x.effective===false),'all claims ineffective'); exact(r.accumulated_merged_main_evidence?.map(x=>x.delivery_slice_id),evidenceIds,'all S1-S8 evidence slices'); check(r.accumulated_merged_main_evidence?.every(x=>['MERGED','MERGED_EFFECTIVE','COMPLETE'].includes(x.status)),'all evidence slices merged');\ncheck(s9?.status==='CLOSURE_CANDIDATE','delivery S9 candidate'); check(s9?.closure_effective===false,'delivery closure ineffective'); exact(s9?.pending_completion_claims,claims,'delivery pending claims exact'); exact(s9?.effective_completion_claims,[],'delivery zero effective claims'); check(s10?.status==='BLOCKED','S10 blocked'); check(d.successor_authorized===false,'CAP05 unauthorized');\nconst tracked=git(['diff','--name-only',BASE]).split(/\\r?\\n/).filter(Boolean); const untracked=git(['ls-files','--others','--exclude-standard']).split(/\\r?\\n/).filter(Boolean); const changed=[...new Set([...tracked,...untracked])].sort(); exact(changed,files,'exact changed files');\nfor(const f of changed){check(!f.startsWith('apps/server/src/'),'no Runtime source '+f);check(!f.startsWith('apps/server/db/migrations/'),'no migration '+f);check(!f.startsWith('apps/web/'),'no web '+f);check(!f.startsWith('.github/workflows/'),'no workflow '+f)}\nif(MODE==='postmerge'){check(git(['branch','--show-current'])==='main','postmerge on main');check(git(['rev-parse','HEAD'])===git(['rev-parse','origin/main']),'postmerge main equals origin/main')}\nconsole.log('MCFT-CAP-04 S9 Closure '+MODE+': '+pass+' PASS, '+fail+' FAIL'); if(fail) process.exit(1);\n`;
          fs.writeFileSync('scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_CLOSURE.cjs', gate);
          NODE
          rm -f .github/workflows/mcft-cap-04-s9-closure-candidate-materializer.yml
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_CLOSURE.cjs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "governance(mcft-cap-04): materialize S9 closure candidate"
          git push origin HEAD:agent/mcft-cap-04-s9-closure-candidate-v1
