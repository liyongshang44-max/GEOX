name: mcft-cap-06-s6-paired-shadow-postmerge-proof

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s6-paired-shadow-postmerge-proof.yml'

permissions:
  contents: read

jobs:
  exact-merged-main-s6-proof:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      MCFT_CAP_06_S6_PAIRED_SHADOW_BASELINE_REF: 5f73ed68cad479276ca55fb70391ae4543cb3dcc
    steps:
      - name: Checkout proof carrier
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify exact proof topology
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "b1111e39ed70b39098362a468eac14101bc29ee3"
          test "$(git rev-list --count 5f73ed68cad479276ca55fb70391ae4543cb3dcc..a7303ca4c5261d1ae61ecb295d4aa305134db6b4)" = "11"
          test "$(git rev-list --count 5f73ed68cad479276ca55fb70391ae4543cb3dcc..b1111e39ed70b39098362a468eac14101bc29ee3)" = "12"
          test "$(git diff --name-only 5f73ed68cad479276ca55fb70391ae4543cb3dcc...b1111e39ed70b39098362a468eac14101bc29ee3 | wc -l | tr -d ' ')" = "10"
          git diff --quiet a7303ca4c5261d1ae61ecb295d4aa305134db6b4 b1111e39ed70b39098362a468eac14101bc29ee3

      - name: Checkout exact S6 implementation merge
        uses: actions/checkout@v4
        with:
          ref: b1111e39ed70b39098362a468eac14101bc29ee3
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Run exact merged-main S6 preflight
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S6_PAIRED_SHADOW.cjs

      - name: Verify exact merged-main structured S6 evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S6_PAIRED_SHADOW_PREFLIGHT_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s6_paired_shadow_preflight_result_v1') throw new Error('S6_POSTMERGE_SCHEMA_MISMATCH');
          if (result.status !== 'PASS') throw new Error('S6_POSTMERGE_NOT_PASS');
          if (result.exact_head !== 'b1111e39ed70b39098362a468eac14101bc29ee3') throw new Error('S6_POSTMERGE_HEAD_MISMATCH');
          if (result.candidate_ref !== 'twin_calibration_candidate_5649b9ab80b5545cf6007387') throw new Error('S6_POSTMERGE_CANDIDATE_REF_MISMATCH');
          if (result.candidate_hash !== 'sha256:a2018a61bf6699b3cc3b8992058eb2c37b4d38d7f70771f9186495144c229a65') throw new Error('S6_POSTMERGE_CANDIDATE_HASH_MISMATCH');
          if (result.candidate_parameter_value !== '0.034000' || result.holdout_case_count !== 8) throw new Error('S6_POSTMERGE_INPUT_RESULT_MISMATCH');
          if (result.evaluation_disposition !== 'ELIGIBLE_FOR_HUMAN_ACTIVATION_REVIEW') throw new Error('S6_POSTMERGE_DISPOSITION_MISMATCH');
          if (JSON.stringify(result.reason_codes) !== JSON.stringify(['ALL_THRESHOLDS_PASS'])) throw new Error('S6_POSTMERGE_REASON_MISMATCH');
          if (result.deterministic_rerun_verified !== true || result.future_leakage_count !== 0) throw new Error('S6_POSTMERGE_DETERMINISM_OR_LEAKAGE_MISMATCH');
          if (result.canonical_fact_write_count !== 0 || result.projection_write_count !== 0 || result.candidate_append_count !== 0 || result.evaluation_append_count !== 0) throw new Error('S6_POSTMERGE_WRITE_BOUNDARY_VIOLATION');
          if (result.model_activation_count !== 0 || result.active_config_switch_count !== 0 || result.runtime_parameter_change_count !== 0 || result.state_mutation_count !== 0 || result.checkpoint_mutation_count !== 0 || result.migration_count !== 0) throw new Error('S6_POSTMERGE_RUNTIME_BOUNDARY_VIOLATION');
          if (result.s6_candidate_implemented !== true || result.s6_effective !== false || result.s7_authorized !== false) throw new Error('S6_POSTMERGE_FRONTIER_MISMATCH');
          NODE

      - name: Upload merged-main proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s6-paired-shadow-postmerge-proof-evidence
          path: acceptance-output/
          if-no-files-found: error
