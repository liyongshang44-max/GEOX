name: MCFT-CAP-04 S7 activation Gate

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s7-activation-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s7-activation-v1
          fetch-depth: 0

      - name: Materialize final seven-file boundary
        run: rm .github/workflows/mcft-cap-04-s7-activation-gate.yml

      - name: Run S7 activation governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S7_ACTIVATION.cjs
