name: MCFT-CAP-04 S7 activation Gate

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s7-activation-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s7-activation-v1
          fetch-depth: 0

      - name: Fix exact activation Gate and patch hygiene
        shell: python
        run: |
          from pathlib import Path

          gate = Path('scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S7_ACTIVATION.cjs')
          text = gate.read_text(encoding='utf-8')
          old = """const changed = [...new Set([\n  ...git(['diff', '--name-only', BASELINE]),\n  ...git(['ls-files', '--others', '--exclude-standard']),\n].filter(Boolean).flatMap((x) => x.split(/\\r?\\n/).filter(Boolean)))].sort();\n"""
          new = """const changed = [...new Set([\n  git(['diff', '--name-only', BASELINE]),\n  git(['ls-files', '--others', '--exclude-standard']),\n].filter(Boolean).flatMap((x) => x.split(/\\r?\\n/).filter(Boolean)))].sort();\n"""
          if old not in text:
            raise SystemExit('activation changed-file parser anchor missing')
          gate.write_text(text.replace(old, new, 1), encoding='utf-8')

          implementation_map = Path('docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md')
          implementation_map.write_text(implementation_map.read_text(encoding='utf-8').rstrip() + '\n', encoding='utf-8')

      - name: Materialize final seven-file boundary
        run: rm .github/workflows/mcft-cap-04-s7-activation-gate.yml

      - name: Run corrected S7 activation governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S7_ACTIVATION.cjs

      - name: Commit final governance-only activation candidate
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(mcft-cap-04): close S7 activation governance Gate"
          git push origin HEAD:agent/mcft-cap-04-s7-activation-v1
