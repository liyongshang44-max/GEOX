name: MCFT-CAP-04 S7 activation Gate

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s7-activation-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s7-activation-v1
          fetch-depth: 0

      - name: Materialize final seven-file boundary
        run: rm .github/workflows/mcft-cap-04-s7-activation-gate.yml

      - name: Capture boundary diagnostics
        shell: bash
        run: |
          git status --short > /tmp/s7-activation-status.txt
          git diff --name-only ea9ddfeeda88a3bb0a3b8abd3b821b8a3965dac3 > /tmp/s7-activation-files.txt
          git diff --check ea9ddfeeda88a3bb0a3b8abd3b821b8a3965dac3 > /tmp/s7-activation-diff-check.txt 2>&1 || true

      - name: Run S7 activation governance Gate
        shell: bash
        run: |
          set +e
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S7_ACTIVATION.cjs > /tmp/s7-activation-gate.log 2>&1
          status=$?
          cat /tmp/s7-activation-gate.log
          echo "$status" > /tmp/s7-activation-gate-exit.txt
          exit 0

      - uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-04-s7-activation-gate
          path: |
            /tmp/s7-activation-gate.log
            /tmp/s7-activation-gate-exit.txt
            /tmp/s7-activation-status.txt
            /tmp/s7-activation-files.txt
            /tmp/s7-activation-diff-check.txt
          retention-days: 1
