name: cap04-remediation-lease-test-fix

on:
  push:
    branches:
      - agent/mcft-cap-04-s6-single-tick-integration-v1

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s6-single-tick-integration-v1
      - name: Align terminal conflict test with fenced lease ownership
        shell: python
        run: |
          from pathlib import Path
          path = Path('scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_SINGLE_TICK_INTEGRATION_DB.ts')
          text = path.read_text(encoding='utf-8')
          old = '      lease_owner: "mcft-cap04-s6-terminal-conflict",\n'
          new = '      lease_owner: "mcft-cap04-s6-db-acceptance",\n'
          if old not in text:
              raise SystemExit('terminal conflict lease owner anchor missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          workflow = Path('.github/workflows/cap04-remediation-diagnostic.yml')
          workflow.write_text('''name: cap04-remediation-diagnostic

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/mcft-cap-04-s6-single-tick-integration-v1

permissions:
  contents: read

jobs:
  typecheck-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Capture recursive typecheck after recovery type alignment
        shell: bash
        run: |
          set +e
          pnpm -r typecheck > cap04-remediation-typecheck.txt 2>&1
          status=$?
          echo "$status" > cap04-remediation-typecheck-exit.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: cap04-remediation-typecheck
          path: |
            cap04-remediation-typecheck.txt
            cap04-remediation-typecheck-exit.txt
          retention-days: 1
''', encoding='utf-8')
      - name: Commit lease test correction
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_SINGLE_TICK_INTEGRATION_DB.ts .github/workflows/cap04-remediation-diagnostic.yml
          git commit -m "test(mcft-cap-04): preserve lease owner in terminal conflict proof"
          git push origin HEAD:agent/mcft-cap-04-s6-single-tick-integration-v1
