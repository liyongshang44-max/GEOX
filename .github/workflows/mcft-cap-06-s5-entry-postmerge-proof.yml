name: mcft-cap-06-s5-entry-postmerge-proof

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s5-entry-postmerge-proof.yml'

permissions:
  contents: read

jobs:
  exact-merged-main-proof:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      MCFT_CAP_06_S5_BASELINE_REF: 6d1a22d68fde93b440b52ce632785e5986ad47a8
      EXPECTED_MERGE_COMMIT: 52965b61e2dbd2974448d529619c5f745acf9301
      EXPECTED_CANDIDATE_HEAD: ebadebdfd8f0189a0f7776316287a7d7dad0b15e
    steps:
      - name: Checkout proof carrier
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify proof carrier ancestry and current main
        run: |
          set -euo pipefail
          git fetch origin main
          test "$(git rev-parse HEAD^)" = "$EXPECTED_MERGE_COMMIT"
          test "$(git rev-parse origin/main)" = "$EXPECTED_MERGE_COMMIT"
          test -z "$(git diff --name-only "$EXPECTED_MERGE_COMMIT"...HEAD | grep -v '^.github/workflows/mcft-cap-06-s5-entry-postmerge-proof.yml$' || true)"
          test -z "$(git diff --name-only "$EXPECTED_CANDIDATE_HEAD" "$EXPECTED_MERGE_COMMIT")"

      - name: Checkout exact merged-main commit
        uses: actions/checkout@v4
        with:
          ref: 52965b61e2dbd2974448d529619c5f745acf9301
          fetch-depth: 0

      - name: Assert exact checkout and main identity
        run: |
          set -euo pipefail
          git fetch origin main
          test "$(git rev-parse HEAD)" = "$EXPECTED_MERGE_COMMIT"
          test "$(git rev-parse origin/main)" = "$EXPECTED_MERGE_COMMIT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run exact merged-main S5 entry preflight
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S5_ENTRY_PREFLIGHT.cjs

      - name: Verify structured merged-main evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S5_ENTRY_PREFLIGHT_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s5_entry_preflight_result_v1') throw new Error('S5_ENTRY_POSTMERGE_SCHEMA_MISMATCH');
          if (result.status !== 'PASS') throw new Error('S5_ENTRY_POSTMERGE_NOT_PASS');
          if (result.exact_head !== process.env.EXPECTED_MERGE_COMMIT) throw new Error('S5_ENTRY_POSTMERGE_HEAD_MISMATCH');
          if (result.canonical_write_count !== 0) throw new Error('S5_ENTRY_POSTMERGE_CANONICAL_WRITE_FORBIDDEN');
          if (result.s5_authorized !== false) throw new Error('S5_ENTRY_POSTMERGE_PREMATURE_S5_AUTHORIZATION');
          NODE

      - name: Upload exact merged-main evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s5-entry-postmerge-proof
          path: acceptance-output/
          if-no-files-found: error
