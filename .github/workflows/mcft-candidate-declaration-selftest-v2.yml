name: mcft-candidate-declaration-selftest-v2

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - '.github/workflows/mcft-candidate-declaration-integrity-v2.yml'
      - '.github/workflows/mcft-candidate-declaration-selftest-v2.yml'
      - 'docs/digital_twin/mcft/MCFT-DELIVERY-POLICY-V2.json'
      - 'docs/digital_twin/mcft/MCFT-CANDIDATE-AUTHORITY-REGISTRY-V1.json'
      - 'docs/digital_twin/mcft/MCFT-DELIVERY-CANDIDATE-SIGNAL-CONTRACT-V1.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CANDIDATE_DECLARATION_INTEGRITY_V2.cjs'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mcft-candidate-integrity-selftest-v2-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  mcft-candidate-integrity-pr-selftest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
      - name: Run registry-driven explicit-signal candidate declaration selftest
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CANDIDATE_DECLARATION_INTEGRITY_V2.cjs --selftest
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mcft-candidate-integrity-v2-selftest-${{ github.sha }}
          path: acceptance-output/MCFT_CANDIDATE_DECLARATION_INTEGRITY_V2_RESULT.json
          if-no-files-found: error
