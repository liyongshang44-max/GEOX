name: MCFT-CAP-04 S6 finalize

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s6-single-tick-integration-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: landos
          POSTGRES_PASSWORD: landos
          POSTGRES_DB: mcft_cap04_s6_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U landos -d mcft_cap04_s6_acceptance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout S6 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Materialize S6 governance
        run: node .cap04-s6/materialize_s6.cjs

      - name: Recursive typecheck
        run: pnpm -r typecheck

      - name: Run positive single-tick acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_SINGLE_TICK_INTEGRATION.ts

      - name: Run negative single-tick acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_SINGLE_TICK_INTEGRATION_NEGATIVE.ts

      - name: Run isolated PostgreSQL single-tick acceptance
        env:
          DATABASE_URL: postgresql://landos:landos@127.0.0.1:5432/mcft_cap04_s6_acceptance
          MCFT_CAP_04_SINGLE_TICK_DESTRUCTIVE_ACCEPTANCE: '1'
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_SINGLE_TICK_INTEGRATION_DB.ts

      - name: Remove temporary and diagnostic files
        run: |
          rm -rf .cap04-s6
          rm -f .github/workflows/mcft-cap-04-s6-diagnostic.yml
          rm -f .github/workflows/mcft-cap-04-s6-finalize.yml

      - name: Run final S6 governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S6_SINGLE_TICK.cjs --final

      - name: Verify patch integrity
        run: git diff --check 63c8ba7b8dd314c1224ca8de2914b663b3551092

      - name: Commit exact final candidate
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(mcft-cap-04): materialize S6 single-tick integration candidate"
          git push origin "HEAD:${HEAD_BRANCH}"
