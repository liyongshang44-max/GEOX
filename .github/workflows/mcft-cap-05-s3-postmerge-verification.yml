name: MCFT-CAP-05 S3 merged-main verification

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-05-s3-postmerge-probe-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 7e2de9c00a4ecc305c27b6572a63914f38157dbd
          fetch-depth: 0
      - name: Verify exact merged main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          test "$(git rev-parse HEAD)" = "7e2de9c00a4ecc305c27b6572a63914f38157dbd"
          test "$(git rev-parse origin/main)" = "7e2de9c00a4ecc305c27b6572a63914f38157dbd"
      - name: Run MCFT-CAP-05 S3 merged-main Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S3_PERSISTENCE_RECOVERY.cjs --postmerge
