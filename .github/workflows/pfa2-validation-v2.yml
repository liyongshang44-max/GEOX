name: pfa2-validation-v2

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-latest-pfa2:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      PFA2_HEAD_SHA: 83f5efa595d217ad12a34e09f5e282d6390a214d
    steps:
      - name: Checkout exact PFA-2 head
        uses: actions/checkout@v4
        with:
          ref: 83f5efa595d217ad12a34e09f5e282d6390a214d
          fetch-depth: 0

      - name: Fetch main baseline
        run: git fetch origin main:refs/remotes/origin/main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Initialize evidence
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/pfa2-validation-v2"
          mkdir -p "$OUT"
          test "$(git rev-parse HEAD)" = "$PFA2_HEAD_SHA"
          git rev-parse HEAD | tee "$OUT/validated-head.txt"
          git diff --name-only origin/main...HEAD | tee "$OUT/changed-files.txt"

      - name: Static gate
        run: node scripts/frontend_acceptance/ACCEPTANCE_PFA_2_LOCALE_CONTRACT.cjs 2>&1 | tee "$RUNNER_TEMP/pfa2-validation-v2/pfa2-static.log"

      - name: Typecheck and build
        run: |
          set -euo pipefail
          pnpm -r typecheck 2>&1 | tee "$RUNNER_TEMP/pfa2-validation-v2/typecheck.log"
          pnpm -r build 2>&1 | tee "$RUNNER_TEMP/pfa2-validation-v2/build.log"

      - name: Bundle budget
        run: |
          set -euo pipefail
          node scripts/frontend_acceptance/CHECK_PFE_10_WEB_BUNDLE_BUDGET.cjs 2>&1 | tee "$RUNNER_TEMP/pfa2-validation-v2/bundle-budget.log"
          cp docs/audit/PFE_10_BUNDLE_BUDGET_REPORT.md "$RUNNER_TEMP/pfa2-validation-v2/"
          rm -f docs/audit/PFE_10_BUNDLE_BUDGET_REPORT.md

      - name: Successor regression proofs
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/pfa2-validation-v2"
          git diff --quiet origin/main...HEAD -- apps/web/src/api/client.ts docs/frontend-acceptance/PFA-1-RUNTIME-API-BASE-CAPTURE.md scripts/frontend_acceptance/ACCEPTANCE_PFA_1_RUNTIME_API_BASE_CAPTURE.cjs scripts/frontend_acceptance/CAPTURE_PFA_0_PAGE_REVIEW.cjs
          git diff --quiet origin/main...HEAD -- docs/frontend-acceptance/PFA-0-PAGE-QUALITY-AUDIT.md docs/frontend-acceptance/PFA-0-REVIEW-MANIFEST.json docs/frontend-acceptance/PFA-0-ROUTE-REVIEW-MATRIX.json docs/frontend-acceptance/PFA-0-ISSUE-REGISTER.md scripts/frontend_acceptance/ACCEPTANCE_PFA_0_PAGE_QUALITY_AUDIT.cjs scripts/frontend_acceptance/CAPTURE_PFA_0_PAGE_REVIEW.cjs
          git diff --quiet origin/main...HEAD -- docs/frontend-productization/PFE-11-PRODUCT-COPY-I18N-COMPLETION.md docs/frontend-productization/PFE-11-COPY-MATRIX.md docs/frontend-productization/PFE-11-I18N-COVERAGE-MATRIX.md docs/frontend-productization/PFE-11-COPY-ISSUE-REGISTER.md apps/web/src/lib/productSurfaceLabels.ts
          git diff --quiet origin/main...HEAD -- docs/frontend-productization/PFE-13-FREEZE-MANIFEST.json docs/frontend-productization/PFE-13-ROUTE-INVENTORY.json docs/frontend-productization/PFE-13-FORMAL-SURFACES.md
          CHANGED="$(git diff --name-only origin/main...HEAD)"
          if printf '%s\n' "$CHANGED" | grep -E '^(apps/server/|migrations/|packages/contracts/|fixtures/|\.github/|apps/web/src/app/routes/|apps/web/src/app/App\.tsx$|package\.json$|pnpm-lock\.yaml$|pnpm-workspace\.yaml$|apps/web/package\.json$)'; then exit 1; fi
          node - <<'NODE' | tee "$OUT/successor-regression-proof.json"
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('docs/frontend-productization/PFE-13-FREEZE-MANIFEST.json', 'utf8'));
          const inventory = JSON.parse(fs.readFileSync('docs/frontend-productization/PFE-13-ROUTE-INVENTORY.json', 'utf8'));
          const client = fs.readFileSync('apps/web/src/api/client.ts', 'utf8');
          const capture = fs.readFileSync('scripts/frontend_acceptance/CAPTURE_PFA_0_PAGE_REVIEW.cjs', 'utf8');
          const locale = fs.readFileSync('apps/web/src/lib/locale.tsx', 'utf8');
          const toggle = fs.readFileSync('apps/web/src/components/common/LocaleToggle.tsx', 'utf8');
          const checks = {
            pfa1ApiBaseInvariant: client.includes('import.meta.env.VITE_API_BASE_URL') && client.includes('import.meta.env.VITE_API_BASE ??') && client.includes('http://127.0.0.1:3001') && !client.includes('(import.meta as any)?.env'),
            pfa1CaptureInvariant: capture.includes('createAuthenticatedStorageState') && capture.includes('browser auth/me') && capture.includes("PFA0_CAPTURE_MODE || 'full'"),
            pfe11SuccessorInvariant: locale.includes('"zh-CN" | "en-US"') && toggle.includes('aria-pressed') && !fs.existsSync('apps/web/src/components/common/RuntimeTextGuard.tsx'),
            pfe13SurfaceCounts: inventory.customer.length === 9 && inventory.operator.length === 13 && inventory.admin.length === 7,
            pfe13Nonclaims: manifest.productionLaunch === false && manifest.commercialLaunch === false && manifest.liveDeviceConnected === false && manifest.productionGatewayOnline === false && manifest.fieldPilotStarted === false && manifest.aoActDispatchEnabled === false,
          };
          if (!Object.values(checks).every(Boolean)) process.exit(1);
          console.log(JSON.stringify({ ok: true, checks }, null, 2));
          NODE

      - name: Prepare runtime env
        run: |
          set -euo pipefail
          ACCEPTANCE_TOKEN="$(node -e "const f=require('./config/auth/security_acceptance_tokens.json'); const t=f.tokens.find(x => x.role==='admin' && x.scopes.includes('security.admin') && !x.revoked); if(!t) process.exit(1); console.log(t.token)")"
          EXECUTOR_TOKEN="$(node -e "const f=require('./config/auth/security_acceptance_tokens.json'); const t=f.tokens.find(x => x.token==='tenant_a_admin_token' && x.scopes.includes('ao_act.task.write') && x.scopes.includes('ao_act.receipt.write') && !x.revoked); if(!t) process.exit(1); console.log(t.token)")"
          cat > .env.ci <<EOF
          GEOX_RUNTIME_ENV=pilot
          POSTGRES_USER=landos
          POSTGRES_PASSWORD=ci-pilot-postgres-strong-2026
          POSTGRES_DB=landos
          GEOX_AO_ACT_TOKEN=$ACCEPTANCE_TOKEN
          GEOX_EXECUTOR_TOKEN=$EXECUTOR_TOKEN
          GEOX_EVIDENCE_S3_BUCKET=evidence-exports-v1
          GEOX_EVIDENCE_S3_PUBLIC_ENDPOINT=http://127.0.0.1:9000
          MINIO_ROOT_USER=geoxminio
          MINIO_ROOT_PASSWORD=ci-pilot-minio-strong-2026
          MQTT_AUTH_REQUIRED=1
          GEOX_MQTT_AUTH_REQUIRED=1
          MQTT_USERNAME=geoxmqtt
          MQTT_PASSWORD=ci-pilot-mqtt-strong-2026
          CORS_ORIGINS=https://pilot-ci.geox.invalid
          GEOX_ALLOWED_ORIGINS=https://pilot-ci.geox.invalid
          APP_SECRET=ci-pilot-app-secret-strong-2026
          GEOX_APP_SECRET=ci-pilot-app-secret-strong-2026
          PUBLIC_BASE_URL=https://pilot-ci.geox.invalid
          GEOX_PUBLIC_BASE_URL=https://pilot-ci.geox.invalid
          GEOX_EXECUTION_DEFAULT_DISABLED=1
          GEOX_EXECUTION_ENABLE_EXPLICITLY=0
          GEOX_EXECUTION_ENABLE_REASON=pfa2-validation-v2
          GEOX_DEVTOOLS_ENABLED=0
          EOF
          echo "ACCEPTANCE_TOKEN=$ACCEPTANCE_TOKEN" >> "$GITHUB_ENV"

      - name: Start runtime
        run: |
          set -euo pipefail
          timeout 180 docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml up -d minio minio-init
          timeout 300 docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml up -d postgres mqtt server jobs executor
          timeout 180 bash -lc 'until curl -fsS http://127.0.0.1:3001/api/health > /dev/null; do sleep 2; done'

      - name: Seed runtime
        run: |
          set -euo pipefail
          export BASE_URL=http://127.0.0.1:3001
          export API_BASE_URL=http://127.0.0.1:3001
          export DATABASE_URL="postgres://landos:ci-pilot-postgres-strong-2026@127.0.0.1:5433/landos"
          node scripts/demo_seed/SEED_CONTROLLED_PILOT_FULL_REVIEW_V1.cjs --cleanup --apply --tenant tenantA
          node scripts/demo_seed/SEED_CONTROLLED_PILOT_FULL_REVIEW_V1.cjs --apply --tenant tenantA --base-url http://127.0.0.1:3001
          node scripts/demo_seed/SEED_CONTROLLED_PILOT_FULL_REVIEW_V1.cjs --verify --tenant tenantA
          node scripts/demo_seed/SEED_CONTROLLED_PILOT_FULL_REVIEW_V1.cjs --verify-api --tenant tenantA --base-url http://127.0.0.1:3001

      - name: Install Chromium
        run: pnpm exec playwright install chromium

      - name: Run 60-render audit
        run: |
          set -euo pipefail
          export API_BASE_URL=http://127.0.0.1:3001
          export GEOX_WEB_PROXY_TARGET=http://127.0.0.1:3001
          export GEOX_ACCEPTANCE_TOKEN="$ACCEPTANCE_TOKEN"
          export FRONTEND_AUDIT_SKIP_BROWSER_INSTALL=1
          export PFA2_WEB_PORT=5184
          set +e
          node scripts/frontend_acceptance/AUDIT_PFA_2_RUNTIME_LOCALE_CONTRACT.cjs 2>&1 | tee "$RUNNER_TEMP/pfa2-validation-v2/pfa2-runtime.log"
          RC=${PIPESTATUS[0]}
          set -e
          if [ -f docs/audit/PFA_2_RUNTIME_LOCALE_AUDIT_REPORT.json ]; then cp docs/audit/PFA_2_RUNTIME_LOCALE_AUDIT_REPORT.json "$RUNNER_TEMP/pfa2-validation-v2/"; fi
          if [ "$RC" -ne 0 ]; then exit "$RC"; fi
          node - <<'NODE'
          const r = require('./docs/audit/PFA_2_RUNTIME_LOCALE_AUDIT_REPORT.json');
          const expected = { ok:true, actualRoutes:30, locales:2, routeRenders:60, routeHealthPass:60, htmlLangPass:60, localePairPass:30, localePairDifferentiationPass:30, roleBoundaryEquivalencePass:30, pathnameEquivalencePass:30, runtimeTextGuardDependency:0 };
          const failures = Object.entries(expected).filter(([key,value]) => r[key] !== value);
          if (failures.length) { console.error(failures); process.exit(1); }
          NODE
          rm -f docs/audit/PFA_2_RUNTIME_LOCALE_AUDIT_REPORT.json

      - name: Clean status
        run: |
          set -euo pipefail
          rm -f .env.ci
          git status --short --untracked-files=all | tee "$RUNNER_TEMP/pfa2-validation-v2/git-status.txt"
          test -z "$(git status --short --untracked-files=all)"

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pfa2-validation-v2-83f5efa
          path: ${{ runner.temp }}/pfa2-validation-v2
          if-no-files-found: error
          retention-days: 90

      - name: Stop runtime
        if: always()
        run: docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml down -v --remove-orphans || true
