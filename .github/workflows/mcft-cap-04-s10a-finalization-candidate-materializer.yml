name: MCFT-CAP-04 S10A finalization candidate materializer

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s10a-finalization-candidate-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s10a-finalization-candidate-v1
          fetch-depth: 0
      - name: Materialize S10A finalization candidate
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const BASE = 'a6a07840efe080198233b39ec9a31d26c2e3f4f9';
          const BRANCH = 'agent/mcft-cap-04-s10a-finalization-candidate-v1';
          const S9 = 'MCFT-CAP-04.CLOSURE-CANDIDATE-V1';
          const S10 = 'MCFT-CAP-04.FINALIZATION-MAIN-VERIFICATION-V1';
          const files = [
            'docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md',
            'docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json',
            'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-AUTHORIZATION-STATUS.json',
            'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-DELIVERY-SLICE-STATUS.json',
            'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE-STATUS.json',
            'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE-RECORD.json',
            'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-FINALIZATION-STATUS.json',
            'docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-FINALIZATION.md',
            'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S10A_FINALIZATION_CANDIDATE.cjs'
          ];
          const readJson = p => JSON.parse(fs.readFileSync(p, 'utf8'));
          const writeJson = (p,v) => { fs.mkdirSync(path.dirname(p), {recursive:true}); fs.writeFileSync(p, JSON.stringify(v,null,2)+'\n'); };
          const authPath='docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-AUTHORIZATION-STATUS.json';
          const deliveryPath='docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-DELIVERY-SLICE-STATUS.json';
          const closurePath='docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE-STATUS.json';
          const recordPath='docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE-RECORD.json';
          const matrixPath='docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json';
          const mapPath='docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md';
          const auth=readJson(authPath); const delivery=readJson(deliveryPath); const closure=readJson(closurePath); const record=readJson(recordPath);
          const claims=closure.pending_completion_claims; const nonclaims=closure.preserved_nonclaims;
          if(!Array.isArray(claims)||claims.length!==24) throw new Error('EXACT_24_PENDING_CLAIMS_REQUIRED');
          if(!Array.isArray(closure.effective_completion_claims)||closure.effective_completion_claims.length!==0) throw new Error('ZERO_EFFECTIVE_CLAIMS_REQUIRED');
          const s9Evidence={
            closure_pr_number:2407,
            closure_exact_head_commit:'9bffb51b975208b19228e3d305288924a84b698f',
            closure_exact_head_ci_run:29257493490,
            closure_merge_commit:BASE,
            closure_postmerge_probe_pr_number:2409,
            closure_postmerge_workflow_run:29258021682,
            closure_postmerge_gate:'PASS',
            closure_effectiveness_condition_satisfied:true
          };
          Object.assign(auth,{
            implementation_status:'S10A_FINALIZATION_CANDIDATE',baseline_main_commit:BASE,branch:BRANCH,
            active_delivery_slice_id:S10,runtime_source_authorized:false,repository_write_scope:'S10A_GOVERNANCE_ONLY',
            exact_changed_file_boundary:files,current_blockers:['S10A_NOT_YET_MERGED','S10A_MERGED_MAIN_GATE_NOT_YET_PASS'],
            s9_closure_effectiveness:s9Evidence,successor_authorized:false
          });
          writeJson(authPath,auth);
          delivery.status='S10A_FINALIZATION_CANDIDATE'; delivery.baseline_main_commit=BASE; delivery.branch=BRANCH;
          delivery.active_delivery_slice_id=S10; delivery.runtime_source_authorized=false; delivery.s9_closure_effectiveness=s9Evidence;
          const s9=delivery.slices.find(x=>x.delivery_slice_id===S9);
          Object.assign(s9,{status:'MERGED_EFFECTIVE',implementation_status:'MERGED_EFFECTIVE',effectiveness_condition_satisfied:true,
            pr_number:2407,exact_head_commit:'9bffb51b975208b19228e3d305288924a84b698f',exact_head_ci_run:29257493490,
            merge_commit:BASE,postmerge_probe_pr_number:2409,postmerge_workflow_run:29258021682,postmerge_gate:'PASS'});
          const s10=delivery.slices.find(x=>x.delivery_slice_id===S10);
          Object.assign(s10,{
            baseline_main_commit:BASE,branch:BRANCH,status:'S10A_CANDIDATE',activation_fields_status:'FROZEN',
            runtime_source_authorized:false,allowed_claims:[],pending_completion_claims:claims,effective_completion_claims:[],
            preserved_nonclaims:nonclaims,exact_changed_file_boundary:files,
            current_lifecycle_stage:'S10A_CANDIDATE',mandatory_lifecycle_stages:['S10A_CANDIDATE','S10B_MAIN_VERIFICATION','S10C_POSTMERGE_EFFECTIVENESS_RECONCILIATION'],
            s9_closure_effectiveness:s9Evidence,closure_effective:false,capability_complete:false,
            effectiveness_condition:'S10A_PR_MERGED_TO_MAIN_AND_MERGED_MAIN_S10A_GATE_PASS',effectiveness_condition_satisfied:false,
            explicit_activation_authority:'OWNER_EXPLICIT_AUTHORIZATION_2026_07_13'
          });
          delivery.next_authorized_slice_ids=[]; delivery.successor_authorized=false; writeJson(deliveryPath,delivery);
          Object.assign(closure,{
            baseline_main_commit:BASE,status:'FINALIZATION_CANDIDATE',implementation_status:'S10A_VALIDATED_PENDING_MERGE',
            activation_effective:true,closure_effective:false,capability_status:'NOT_COMPLETE',
            pending_completion_claims:claims,effective_completion_claims:[],s9_closure_effectiveness:s9Evidence,
            finalization_delivery_slice_id:S10,finalization_authorized:true,finalization_stage:'S10A_CANDIDATE',successor_authorized:false
          });
          writeJson(closurePath,closure);
          record.status='FINALIZATION_CANDIDATE'; record.closure_effective=false; record.capability_complete=false;
          record.baseline_main_commit=BASE; record.pending_completion_claims=claims; record.effective_completion_claims=[];
          record.s9_closure_effectiveness=s9Evidence;
          record.finalization_candidate={
            lifecycle_stage:'S10A_CANDIDATE',baseline_main_commit:BASE,branch:BRANCH,status:'VALIDATED_PENDING_MERGE',
            completion_claims_status:'PENDING',pending_completion_claims:claims,effective_completion_claims:[],
            exact_changed_file_boundary:files,effectiveness_condition:'S10A_PR_MERGED_TO_MAIN_AND_MERGED_MAIN_S10A_GATE_PASS',
            effectiveness_condition_satisfied:false
          };
          record.finalization_authorized=true; record.successor_authorized=false; writeJson(recordPath,record);
          const finalization={
            schema_version:'geox_mcft_cap_04_finalization_status_v1',capability_line_id:'MCFT-CAP-04',display_alias:'MCFT-4',
            name:'72-Hour Forecast and Three Scenarios',delivery_slice_id:S10,runtime_mode:'REPLAY',
            target_completion_level:'Level A — Deterministic Replay Twin',baseline_main_commit:BASE,branch:BRANCH,
            lifecycle_stage:'S10A_CANDIDATE',status:'VALIDATED_PENDING_MERGE',implementation_status:'S10A_VALIDATED_PENDING_MERGE',
            closure_effective:false,capability_status:'NOT_COMPLETE',active_delivery_slice_id:S10,
            predecessor_closure_evidence:s9Evidence,pending_completion_claims:claims,effective_completion_claims:[],
            preserved_nonclaims:nonclaims,exact_changed_file_boundary:files,
            s10a_effectiveness_condition:'S10A_PR_MERGED_TO_MAIN_AND_MERGED_MAIN_S10A_GATE_PASS',
            s10a_effectiveness_condition_satisfied:false,s10b_authorized:false,s10c_authorized:false,
            successor_capability_line_id:'MCFT-CAP-05',successor_authorized:false
          };
          writeJson('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-FINALIZATION-STATUS.json',finalization);
          fs.writeFileSync('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-FINALIZATION.md',`<!-- docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-FINALIZATION.md -->\n# GEOX MCFT-CAP-04 S10A Finalization Candidate\n\n## Identity\n\n\`\`\`text\nlifecycle_stage: S10A_CANDIDATE\nbaseline_main_commit: ${BASE}\nbranch: ${BRANCH}\nruntime_mode: REPLAY\n\`\`\`\n\n## Semantics\n\nS10A records the S9 merged-main closure evidence and prepares the finalization candidate. Exactly 24 completion claims remain pending and zero are effective.\n\nS10A does not set status or implementation_status to COMPLETE. closure_effective and capability_complete remain false.\n\n## Downstream lock\n\nS10B is not authorized until S10A is merged and its merged-main Gate passes. S10C and MCFT-CAP-05 remain unauthorized.\n`);
          const matrix=readJson(matrixPath); matrix.baseline={branch:'main',commit:BASE,meaning:'MCFT-CAP-04 S10A finalization candidate'};
          const cap=matrix.capability_lines.find(x=>x.capability_line_id==='MCFT-CAP-04');
          Object.assign(cap,{status:'S10A_FINALIZATION_CANDIDATE',active_delivery_slice_id:S10,runtime_source_authorized:false,
            pending_completion_claims:claims,effective_completion_claims:[],closure_effective:false,capability_complete:false,
            s9_closure_effectiveness:s9Evidence,successor_authorized:false,next_authorized_slice_ids:[]});
          const ms9=cap.delivery_slices.find(x=>x.delivery_slice_id===S9); if(ms9) Object.assign(ms9,{status:'MERGED_EFFECTIVE',merge_commit:BASE,postmerge_workflow_run:29258021682});
          const ms10=cap.delivery_slices.find(x=>x.delivery_slice_id===S10); if(ms10) Object.assign(ms10,{status:'S10A_CANDIDATE',baseline_main_commit:BASE,branch:BRANCH,runtime_source_authorized:false});
          writeJson(matrixPath,matrix);
          let map=fs.readFileSync(mapPath,'utf8'); const marker='## MCFT-CAP-04 S10A Finalization candidate';
          if(!map.includes(marker)) map+=`\n\n${marker}\n\n\`\`\`text\nbaseline main: ${BASE}\nS9 status: MERGED_EFFECTIVE\nS9 merged-main Closure Gate: 29258021682 SUCCESS\nactive delivery slice: ${S10}\nlifecycle stage: S10A_CANDIDATE\npending completion claims: 24\neffective completion claims: 0\nclosure effective: false\ncapability complete: false\nS10B authorized: false\nS10C authorized: false\nMCFT-CAP-05 authorized: false\n\`\`\`\n`;
          fs.writeFileSync(mapPath,map);
          const gate=`// scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S10A_FINALIZATION_CANDIDATE.cjs\n// Purpose: validate the governance-only S10A candidate, S9 merged-effective evidence, pending claims, exact boundary, and downstream locks.\n'use strict';\nconst cp=require('node:child_process'),fs=require('node:fs'),path=require('node:path'); const ROOT=path.resolve(__dirname,'../..'); const BASE='${BASE}',S9='${S9}',S10='${S10}'; const MODE=process.argv.includes('--postmerge')?'postmerge':'final'; const files=${JSON.stringify(files)}; let pass=0,fail=0;\nconst check=(v,m)=>{if(v){pass++;console.log('PASS '+m)}else{fail++;console.error('FAIL '+m)}}; const git=a=>cp.execFileSync('git',a,{cwd:ROOT,encoding:'utf8'}).trim(); const j=p=>JSON.parse(fs.readFileSync(path.join(ROOT,p),'utf8')); const exact=(a,b,m)=>check(JSON.stringify([...(a||[])].sort())===JSON.stringify([...(b||[])].sort()),m);\nfor(const f of files) check(fs.existsSync(path.join(ROOT,f)),'file exists '+f); const a=j('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-AUTHORIZATION-STATUS.json'); const d=j('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-DELIVERY-SLICE-STATUS.json'); const c=j('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE-STATUS.json'); const r=j('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE-RECORD.json'); const f=j('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-FINALIZATION-STATUS.json'); const s9=d.slices.find(x=>x.delivery_slice_id===S9),s10=d.slices.find(x=>x.delivery_slice_id===S10);\ncheck(a.active_delivery_slice_id===S10,'auth active S10'); check(a.runtime_source_authorized===false,'Runtime source unauthorized'); exact(a.exact_changed_file_boundary,files,'auth boundary exact'); check(s9.status==='MERGED_EFFECTIVE','S9 merged effective'); check(s9.effectiveness_condition_satisfied===true,'S9 effectiveness true'); check(s9.merge_commit===BASE,'S9 merge exact'); check(s9.postmerge_workflow_run===29258021682,'S9 postmerge Gate exact');\ncheck(s10.status==='S10A_CANDIDATE','S10A candidate'); check(s10.current_lifecycle_stage==='S10A_CANDIDATE','lifecycle S10A'); check(s10.closure_effective===false,'S10A closure ineffective'); check(s10.capability_complete===false,'S10A capability incomplete'); check(s10.pending_completion_claims.length===24,'24 pending claims'); exact(s10.effective_completion_claims,[],'zero effective claims');\ncheck(c.status!=='COMPLETE'&&c.implementation_status!=='COMPLETE','closure status not complete'); check(c.closure_effective===false&&c.capability_status==='NOT_COMPLETE','closure remains ineffective'); check(r.status!=='COMPLETE'&&r.capability_complete===false,'record remains incomplete'); check(f.lifecycle_stage==='S10A_CANDIDATE','finalization stage S10A'); check(f.status!=='COMPLETE'&&f.implementation_status!=='COMPLETE','finalization not complete'); check(f.s10a_effectiveness_condition_satisfied===false,'S10A effectiveness false premerge'); check(f.s10b_authorized===false&&f.s10c_authorized===false,'S10B/S10C blocked'); check(f.successor_authorized===false&&d.successor_authorized===false,'CAP05 unauthorized');\nconst tracked=git(['diff','--name-only',BASE]).split(/\\r?\\n/).filter(Boolean),untracked=git(['ls-files','--others','--exclude-standard']).split(/\\r?\\n/).filter(Boolean),changed=[...new Set([...tracked,...untracked])].sort(); exact(changed,files,'exact changed files'); for(const x of changed){check(!x.startsWith('apps/server/src/'),'no Runtime source '+x);check(!x.startsWith('apps/server/db/migrations/'),'no migration '+x);check(!x.startsWith('apps/web/'),'no web '+x);check(!x.startsWith('.github/workflows/'),'no workflow '+x)}\nif(MODE==='postmerge'){check(git(['branch','--show-current'])==='main','postmerge on main');check(git(['rev-parse','HEAD'])===git(['rev-parse','origin/main']),'postmerge main equals origin/main')} console.log('MCFT-CAP-04 S10A '+MODE+': '+pass+' PASS, '+fail+' FAIL'); if(fail)process.exit(1);\n`;
          fs.writeFileSync('scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S10A_FINALIZATION_CANDIDATE.cjs',gate);
          NODE
          rm -f .github/workflows/mcft-cap-04-s10a-finalization-candidate-materializer.yml
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S10A_FINALIZATION_CANDIDATE.cjs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "governance(mcft-cap-04): materialize S10A finalization candidate"
          git push origin HEAD:agent/mcft-cap-04-s10a-finalization-candidate-v1
