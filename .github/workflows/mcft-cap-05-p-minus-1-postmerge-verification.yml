name: MCFT-CAP-05 P-1 merged-main verification

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-05-p-minus-1-postmerge-probe-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Verify exact merged main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          test "$(git branch --show-current)" = "main"
          test "$(git rev-parse HEAD)" = "5391a3a8f811fc166fa187d7da70342ee36ab5fa"
          test "$(git rev-parse origin/main)" = "5391a3a8f811fc166fa187d7da70342ee36ab5fa"
      - name: Run MCFT-CAP-05 P-1 merged-main Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_P_MINUS_1_ADJUDICATION.cjs --postmerge
