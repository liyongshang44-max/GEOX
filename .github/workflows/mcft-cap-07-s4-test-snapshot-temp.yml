name: mcft-cap-07-s4-test-snapshot-temp
on:
  pull_request:
    paths: ['.github/workflows/mcft-cap-07-s4-test-snapshot-temp.yml']
permissions:
  contents: read
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - run: git rev-parse HEAD^{tree} > current-tree-sha.txt
      - uses: actions/upload-artifact@v4
        with:
          name: s4-postgres-test-source-${{ github.event.pull_request.head.sha }}
          path: |
            current-tree-sha.txt
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_07_S4_POSTGRES_API.ts
          retention-days: 1
