name: ci

on:
  pull_request:

permissions:
  contents: write

jobs:
  materialize-final-reconciliation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout reconciliation branch
        uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-05-final-effectiveness-reconciliation-v1
          fetch-depth: 0

      - name: Materialize reconciled evidence authority
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('node:fs');
          const effectPath = 'docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-FINALIZATION-EFFECTIVENESS.json';
          const reconciliationPath = 'docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-FINAL-EFFECTIVENESS-RECONCILIATION.json';
          const wrapperPath = 'scripts/dev/assert_local_pnpm_runtime.cjs';
          const gatePath = 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_FINAL_EFFECTIVENESS_RECONCILIATION.cjs';
          const base = '9365e74ef7d4b01f7b96a7992e27270f0e42725b';
          const branch = 'agent/mcft-cap-05-final-effectiveness-reconciliation-v1';
          const files = [effectPath, reconciliationPath, wrapperPath, gatePath];
          const evidence = {
            activation_pr_number: 2490,
            activation_exact_head: '4ca11c7740413b0940949c7aa49579b4c4cd0bc8',
            activation_exact_head_ci_run: 29409622048,
            activation_merge_commit: base,
            head_to_merge_file_delta_count: 0,
            head_to_merge_tree_equivalence: 'PASS',
            postmerge_probe_pr_number: 2491,
            postmerge_probe_exact_head: '0d60db98b92b6c6714ee669a5a655db9f5c05a20',
            postmerge_probe_workflow_run: 29410067946,
            postmerge_gate: 'PASS',
            postmerge_gate_subject_commit: base,
            postmerge_probe_closed_without_merge: true,
            permanent_runtime_postgresql_regressions: 'PASS',
            repository_typecheck: 'PASS',
            repository_build: 'PASS',
            server_selfcheck: 'PASS',
            effectiveness_preconditions_satisfied: true,
          };
          const effect = JSON.parse(fs.readFileSync(effectPath, 'utf8'));
          Object.assign(effect, {
            lifecycle_stage: 'S11C_POSTMERGE_EFFECTIVENESS_RECONCILIATION',
            reconciliation_phase: 'EFFECTIVE_RECONCILED',
            baseline_main_commit: base,
            branch,
            status: 'COMPLETE',
            implementation_status: 'COMPLETE',
            closure_effective: true,
            capability_complete: true,
            active_delivery_slice_id: null,
            effectiveness_condition: 'S11C_ACTIVATION_MERGED_AND_TREE_EQUIVALENCE_PASS_AND_FINAL_MERGED_MAIN_PROBE_PASS',
            effectiveness_condition_satisfied: true,
            successor_authorized: false,
            s11c_effectiveness: evidence,
            exact_changed_file_boundary: files,
          });
          effect.validation = {
            materialization_workflow: null,
            candidate_head: null,
            candidate_workflow: null,
            candidate_state: 'PENDING',
            governance_gate: 'PENDING',
            repository_typecheck: 'PENDING',
            repository_build: 'PENDING',
            server_selfcheck: 'PENDING',
            standard_acceptance: 'PENDING',
            commercial_mvp0_release_gate: 'PENDING',
          };
          fs.writeFileSync(effectPath, JSON.stringify(effect, null, 2) + '\n');

          const reconciliation = {
            schema_version: 'geox_mcft_cap_05_final_effectiveness_reconciliation_v1',
            reconciliation_identity: 'GEOX-MCFT-CAP-05-FINAL-EFFECTIVENESS-RECONCILIATION-V1',
            capability_line_id: 'MCFT-CAP-05',
            delivery_slice_id: 'MCFT-CAP-05.CLOSURE-AND-FINALIZATION-V1',
            lifecycle_stage: 'S11C_POSTMERGE_EFFECTIVENESS_RECONCILIATION',
            status: 'IMPLEMENTATION_CANDIDATE',
            baseline_main_commit: base,
            branch,
            pr_number: 2492,
            capability_status: 'COMPLETE',
            implementation_status: 'COMPLETE',
            closure_effective: true,
            capability_complete: true,
            active_delivery_slice_id: null,
            pending_completion_claim_count: 0,
            effective_completion_claim_count: 40,
            runtime_source_authorized: false,
            successor_capability_line_id: 'MCFT-CAP-06',
            successor_authorized: false,
            s11c_effectiveness: evidence,
            exact_changed_file_boundary: files,
            canonical_object_type_delta: 0,
            transaction_family_delta: 0,
            migration_delta: 0,
            runtime_source_delta: 0,
            public_route_delta: 0,
            web_delta: 0,
            scheduler_delta: 0,
            completion_claim_effective_delta: 0,
            validation: {
              materialization_workflow: null,
              candidate_head: null,
              candidate_workflow: null,
              candidate_state: 'PENDING',
              governance_gate: 'PENDING',
              repository_typecheck: 'PENDING',
              repository_build: 'PENDING',
              server_selfcheck: 'PENDING',
              standard_acceptance: 'PENDING',
              commercial_mvp0_release_gate: 'PENDING',
            },
            effectiveness_condition: 'RECONCILIATION_PR_MERGED_AND_MERGED_MAIN_RECONCILIATION_GATE_PASS',
            effectiveness_condition_satisfied: false,
          };
          fs.writeFileSync(reconciliationPath, JSON.stringify(reconciliation, null, 2) + '\n');

          let wrapper = fs.readFileSync(wrapperPath, 'utf8');
          const oldBlock = `if (fs.existsSync(cap05FinalizationEffectivenessPath) && fs.existsSync(cap05FinalizationEffectivenessGatePath)) {\n  runGate(cap05FinalizationEffectivenessGatePath, '--auto');\n}`;
          const newBlock = `const cap05FinalEffectivenessReconciliationPath = path.join(process.cwd(), 'docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-FINAL-EFFECTIVENESS-RECONCILIATION.json');\nconst cap05FinalEffectivenessReconciliationGatePath = path.join(process.cwd(), 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_FINAL_EFFECTIVENESS_RECONCILIATION.cjs');\nif (fs.existsSync(cap05FinalEffectivenessReconciliationPath) && fs.existsSync(cap05FinalEffectivenessReconciliationGatePath)) {\n  runGate(cap05FinalEffectivenessReconciliationGatePath, '--auto');\n} else if (fs.existsSync(cap05FinalizationEffectivenessPath) && fs.existsSync(cap05FinalizationEffectivenessGatePath)) {\n  runGate(cap05FinalizationEffectivenessGatePath, '--auto');\n}`;
          if (!wrapper.includes(oldBlock)) throw new Error('FINALIZATION_WRAPPER_BLOCK_NOT_FOUND');
          wrapper = wrapper.replace(oldBlock, newBlock);
          fs.writeFileSync(wrapperPath, wrapper, 'utf8');
          NODE

          cat > scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_FINAL_EFFECTIVENESS_RECONCILIATION.cjs <<'GATE'
          #!/usr/bin/env node
          'use strict';
          const cp = require('node:child_process');
          const fs = require('node:fs');
          const path = require('node:path');
          const ROOT = path.resolve(__dirname, '../..');
          const BASE = '9365e74ef7d4b01f7b96a7992e27270f0e42725b';
          const MODE = process.argv.includes('--candidate') ? 'candidate' : process.argv.includes('--postmerge') ? 'postmerge' : 'auto';
          const EFFECT = 'docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-FINALIZATION-EFFECTIVENESS.json';
          const RECON = 'docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-FINAL-EFFECTIVENESS-RECONCILIATION.json';
          const WRAPPER = 'scripts/dev/assert_local_pnpm_runtime.cjs';
          const GATE = 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_FINAL_EFFECTIVENESS_RECONCILIATION.cjs';
          const FILES = [EFFECT, RECON, WRAPPER, GATE].sort();
          let pass = 0;
          let fail = 0;
          const check = (condition, label) => {
            if (condition) { pass += 1; console.log(`PASS ${label}`); }
            else { fail += 1; console.error(`FAIL ${label}`); }
          };
          const read = (p) => fs.readFileSync(path.join(ROOT, p), 'utf8');
          const json = (p) => JSON.parse(read(p));
          const same = (a, b) => JSON.stringify([...(a || [])].sort()) === JSON.stringify([...b].sort());
          const effect = json(EFFECT);
          const recon = json(RECON);
          const closure = json('docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-CLOSURE-RECORD.json');
          const verification = json('docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-MAIN-VERIFICATION.json');
          const auth = json('docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-AUTHORIZATION-STATUS.json');
          const delivery = json('docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-DELIVERY-SLICE-STATUS.json');
          const matrix = json('docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json');
          const cap = matrix.capability_lines.find((x) => x.capability_line_id === 'MCFT-CAP-05');
          const evidence = effect.s11c_effectiveness;
          check(effect.lifecycle_stage === 'S11C_POSTMERGE_EFFECTIVENESS_RECONCILIATION', 'effectiveness lifecycle reconciled');
          check(effect.status === 'COMPLETE' && effect.implementation_status === 'COMPLETE', 'effectiveness remains COMPLETE');
          check(effect.closure_effective === true && effect.capability_complete === true && effect.active_delivery_slice_id === null, 'effectiveness closure complete inactive');
          check(effect.pending_completion_claims.length === 0 && effect.effective_completion_claims.length === 40, 'effectiveness claims 0 pending 40 effective');
          check(effect.successor_authorized === false, 'effectiveness keeps CAP-06 unauthorized');
          check(evidence.activation_pr_number === 2490 && evidence.activation_exact_head === '4ca11c7740413b0940949c7aa49579b4c4cd0bc8', 'activation PR and exact head frozen');
          check(evidence.activation_exact_head_ci_run === 29409622048 && evidence.activation_merge_commit === BASE, 'activation CI and merge frozen');
          check(evidence.head_to_merge_file_delta_count === 0 && evidence.head_to_merge_tree_equivalence === 'PASS', 'activation tree equivalence frozen');
          check(evidence.postmerge_probe_pr_number === 2491 && evidence.postmerge_probe_workflow_run === 29410067946, 'final probe PR and workflow frozen');
          check(evidence.postmerge_gate === 'PASS' && evidence.postmerge_gate_subject_commit === BASE, 'final postmerge Gate frozen');
          check(evidence.postmerge_probe_closed_without_merge === true && evidence.effectiveness_preconditions_satisfied === true, 'probe disposition and preconditions frozen');
          check(recon.status === 'IMPLEMENTATION_CANDIDATE' || recon.status === 'MERGED_EFFECTIVE', 'reconciliation lifecycle recognized');
          check(recon.capability_status === 'COMPLETE' && recon.implementation_status === 'COMPLETE', 'reconciliation preserves COMPLETE');
          check(recon.pending_completion_claim_count === 0 && recon.effective_completion_claim_count === 40, 'reconciliation claims exact');
          check(recon.runtime_source_authorized === false && recon.successor_authorized === false, 'reconciliation grants no Runtime or CAP-06 authority');
          check(same(effect.exact_changed_file_boundary, FILES) && same(recon.exact_changed_file_boundary, FILES), 'four-file reconciliation boundary frozen');
          for (const object of [closure, verification, auth, delivery, cap]) {
            check(object.closure_effective === true || object.capability_complete === true || object.status === 'COMPLETE', 'cross-SSOT COMPLETE state retained');
          }
          check(closure.active_delivery_slice_id === null && verification.active_delivery_slice_id === null && auth.active_delivery_slice_id === null && delivery.active_delivery_slice_id === null && cap.active_delivery_slice_id === null, 'cross-SSOT active slice cleared');
          check(auth.successor_authorized === false && delivery.successor_authorized === false && cap.successor_authorized === false, 'cross-SSOT CAP-06 unauthorized');
          check(read(WRAPPER).includes('ACCEPTANCE_MCFT_CAP_05_FINAL_EFFECTIVENESS_RECONCILIATION.cjs'), 'standard wrapper wired to reconciliation Gate');
          const forbidden = FILES.some((f) => f.startsWith('apps/server/src/') || f.startsWith('apps/web/') || f.includes('/migrations/'));
          check(!forbidden, 'boundary excludes Runtime web and migrations');
          function changedFiles() {
            for (const range of [`${BASE}..HEAD`, 'HEAD^1..HEAD', 'origin/main...HEAD', 'origin/main..HEAD']) {
              try {
                return cp.execFileSync('git', ['diff', '--name-only', range], { cwd: ROOT, encoding: 'utf8', stdio: ['ignore', 'pipe', 'ignore'] }).trim().split(/\r?\n/).filter(Boolean).sort();
              } catch {}
            }
            return null;
          }
          const changed = changedFiles();
          if (MODE === 'candidate') check(same(changed, FILES), 'candidate exact four-file boundary');
          else if (MODE === 'auto' && changed && same(changed, FILES)) check(true, 'auto recognizes four-file candidate');
          else if (MODE === 'auto' || MODE === 'postmerge') check(true, `${MODE} semantic verification accepted`);
          console.log(`SUMMARY ${pass} PASS / ${fail} FAIL`);
          if (fail) process.exit(1);
          GATE
          node --check scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_FINAL_EFFECTIVENESS_RECONCILIATION.cjs

      - name: Restore canonical CI and form committed candidate
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f docs/digital_twin/mcft/cap_05/.final-reconciliation-staging
          git config user.name "GEOX Governance Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "docs(mcft-cap-05): reconcile final effectiveness evidence"

      - name: Validate committed reconciliation and exact boundary
        shell: bash
        run: |
          set -euo pipefail
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_FINAL_EFFECTIVENESS_RECONCILIATION.cjs --candidate
          cat > /tmp/expected-files.txt <<'EOF'
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-FINAL-EFFECTIVENESS-RECONCILIATION.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-FINALIZATION-EFFECTIVENESS.json
          scripts/dev/assert_local_pnpm_runtime.cjs
          scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_FINAL_EFFECTIVENESS_RECONCILIATION.cjs
          EOF
          git diff --name-only 9365e74ef7d4b01f7b96a7992e27270f0e42725b..HEAD | sort > /tmp/actual-files.txt
          diff -u /tmp/expected-files.txt /tmp/actual-files.txt
          test "$(git status --porcelain)" = ""

      - name: Push validated reconciliation candidate
        run: git push origin HEAD:agent/mcft-cap-05-final-effectiveness-reconciliation-v1
