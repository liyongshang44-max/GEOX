name: ci

on:
  pull_request:

permissions:
  contents: write

jobs:
  materialize-wrapper:
    if: github.head_ref == 'agent/mcft-cap-05-s10-ssot-settlement-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout settlement branch
        uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-05-s10-ssot-settlement-v1
          fetch-depth: 0
      - name: Retire historical S10 static Gate after settlement
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/dev/assert_local_pnpm_runtime.cjs')
          text = path.read_text(encoding='utf-8')
          old_function = '''// MCFT_CAP_05_S10_BOUNDED_EIGHT_TICK_FEEDBACK_CHAIN_GATE_V1: execute S10 static governance and bounded orchestration acceptance.
          function runCap05S10BoundedFeedbackChainAcceptance() {
            runGate(
              path.join(process.cwd(), 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S10_BOUNDED_EIGHT_TICK_FEEDBACK_CHAIN.cjs'),
              '--auto',
            );
            requireSuccess(run(isWindows ? 'pnpm.cmd' : 'pnpm', [
              '-w', 'exec', 'tsx', 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_BOUNDED_EIGHT_TICK_FEEDBACK_CHAIN.ts',
            ]));
          }
          '''.replace('          ', '')
          new_function = '''// MCFT_CAP_05_S10_BOUNDED_EIGHT_TICK_FEEDBACK_CHAIN_GATE_V1: preserve bounded-chain Runtime behavior permanently; retire the historical static implementation Gate after S10 settlement materializes.
          function runCap05S10BoundedFeedbackChainAcceptance({ runHistoricalGovernance }) {
            if (runHistoricalGovernance) {
              runGate(
                path.join(process.cwd(), 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S10_BOUNDED_EIGHT_TICK_FEEDBACK_CHAIN.cjs'),
                '--auto',
              );
            }
            requireSuccess(run(isWindows ? 'pnpm.cmd' : 'pnpm', [
              '-w', 'exec', 'tsx', 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_BOUNDED_EIGHT_TICK_FEEDBACK_CHAIN.ts',
            ]));
          }
          '''.replace('          ', '')
          old_call = 'runCap05S10BoundedFeedbackChainAcceptance();'
          new_call = 'runCap05S10BoundedFeedbackChainAcceptance({ runHistoricalGovernance: !s10SettlementActive });'
          if text.count(old_function) != 1:
            raise SystemExit(f'S10_FUNCTION_MATCH_COUNT:{text.count(old_function)}')
          if text.count(old_call) != 1:
            raise SystemExit(f'S10_CALL_MATCH_COUNT:{text.count(old_call)}')
          text = text.replace(old_function, new_function).replace(old_call, new_call)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Restore canonical CI and form local candidate commit
        shell: bash
        run: |
          git fetch --no-tags origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          node --check scripts/dev/assert_local_pnpm_runtime.cjs
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S10_SETTLEMENT.cjs --candidate
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "MCFT-CAP-05 S10 settlement: retire historical static Gate"
      - name: Verify exact final boundary and push
        shell: bash
        env:
          BASELINE_MAIN: "0c015bad3eb1729000d7f68eb08e00de6ef4afcf"
          BRANCH_NAME: "agent/mcft-cap-05-s10-ssot-settlement-v1"
        run: |
          expected=$(cat <<'EOF'
          docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md
          docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-AUTHORIZATION-STATUS.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-DELIVERY-SLICE-STATUS.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-S10-SETTLEMENT-STATUS.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-TASK.md
          scripts/dev/assert_local_pnpm_runtime.cjs
          scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S10_SETTLEMENT.cjs
          EOF
          )
          actual=$(git diff --name-only "$BASELINE_MAIN"..HEAD | sort)
          test "$actual" = "$expected"
          git push origin HEAD:"$BRANCH_NAME"
