name: ci

on:
  pull_request:

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'agent/mcft-cap-05-s10-ssot-settlement-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout settlement branch
        uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-05-s10-ssot-settlement-v1
          fetch-depth: 0
      - name: Extract and execute atomic settlement materializer
        shell: bash
        env:
          PR_NUMBER: "2486"
          BASELINE_MAIN: "0c015bad3eb1729000d7f68eb08e00de6ef4afcf"
          BRANCH_NAME: "agent/mcft-cap-05-s10-ssot-settlement-v1"
        run: |
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/mcft-cap-05-s10-settlement-materialize.yml').read_text(encoding='utf-8')
          marker = "          python3 - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          block = workflow[start:end]
          lines = []
          for line in block.splitlines():
            lines.append(line[10:] if line.startswith('          ') else line)
          Path('/tmp/materialize_s10_settlement.py').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          python3 /tmp/materialize_s10_settlement.py
      - name: Restore canonical CI and validate exact boundary
        shell: bash
        env:
          BASELINE_MAIN: "0c015bad3eb1729000d7f68eb08e00de6ef4afcf"
        run: |
          git fetch --no-tags origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          python3 -m json.tool docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json >/dev/null
          python3 -m json.tool docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-AUTHORIZATION-STATUS.json >/dev/null
          python3 -m json.tool docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-DELIVERY-SLICE-STATUS.json >/dev/null
          python3 -m json.tool docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-S10-SETTLEMENT-STATUS.json >/dev/null
          node --check scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S10_SETTLEMENT.cjs
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S10_SETTLEMENT.cjs --candidate
          expected=$(cat <<'EOF'
          docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md
          docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-AUTHORIZATION-STATUS.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-DELIVERY-SLICE-STATUS.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-S10-SETTLEMENT-STATUS.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-TASK.md
          scripts/dev/assert_local_pnpm_runtime.cjs
          scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S10_SETTLEMENT.cjs
          EOF
          )
          actual=$(git diff --name-only "$BASELINE_MAIN"..HEAD -- . ':!.github/workflows/ci.yml' ':!.github/workflows/mcft-cap-05-s10-settlement-materialize.yml' ':!.mcft-cap-05-s10-settlement-staging' | sort)
          test "$actual" = "$expected"
      - name: Commit final settlement boundary
        shell: bash
        env:
          BRANCH_NAME: "agent/mcft-cap-05-s10-ssot-settlement-v1"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "MCFT-CAP-05 S10 settlement: materialize final governance boundary"
          git push origin HEAD:"$BRANCH_NAME"
