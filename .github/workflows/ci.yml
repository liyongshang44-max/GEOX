name: ci

on:
  pull_request:

jobs:
  mcft-cap-06-s1-effectiveness-postmerge-probe:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: landos
          POSTGRES_PASSWORD: landos
          POSTGRES_DB: mcft_cap06_s1_effectiveness_probe_base
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U landos -d mcft_cap06_s1_effectiveness_probe_base"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    steps:
      - name: Checkout exact S1 effectiveness merged main
        uses: actions/checkout@v4
        with:
          ref: 3a1494acb47db776d97ba75e339d85dc18c9d629
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Verify exact merged-main identity and effective S2-only authorization
        env:
          DATABASE_URL: postgres://landos:landos@127.0.0.1:5432/mcft_cap06_s1_effectiveness_probe_base
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "3a1494acb47db776d97ba75e339d85dc18c9d629"
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_AUTHORIZATION.cjs --postmerge
          node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S0_V2_HONEST_QUALIFICATION.cjs
          node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S1_RESIDUAL_WINDOWS.cjs
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_RESIDUAL_WINDOWS.cjs

      - name: Repository typecheck
        run: pnpm -r typecheck

      - name: Repository build
        run: pnpm -r build

      - name: Server selfcheck
        run: pnpm --filter @geox/server test:p1:selfcheck
