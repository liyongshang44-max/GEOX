name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Route dependency guard
        run: pnpm run ci:route-dependency-guard

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm -r build

      - name: Server selfcheck
        run: pnpm --filter @geox/server test:p1:selfcheck

  acceptance:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prepare commercial compose env
        run: |
          TOKEN="${{ secrets.GEOX_ACCEPTANCE_TOKEN }}"
          if [ -z "$TOKEN" ]; then TOKEN="${{ secrets.GEOX_AO_ACT_TOKEN }}"; fi
          if [ -z "$TOKEN" ]; then
            echo "missing GitHub Actions secret for acceptance token: configure GEOX_ACCEPTANCE_TOKEN (recommended) or GEOX_AO_ACT_TOKEN"
            exit 1
          fi
          cat > .env.ci <<EOF
          GEOX_AO_ACT_TOKEN=$TOKEN
          GEOX_TOKEN=$TOKEN
          GEOX_EVIDENCE_S3_BUCKET=evidence-exports-v1
          GEOX_EVIDENCE_S3_PUBLIC_ENDPOINT=http://127.0.0.1:9000
          MINIO_ROOT_USER=minioadmin
          MINIO_ROOT_PASSWORD=minioadmin
          EOF

      - name: Validate commercial compose rendering
        run: docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml config > /tmp/commercial-compose.rendered.yml

      - name: Start acceptance runtime dependencies
        run: |
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml up -d minio minio-init
          docker logs geox-v1-minio-init || true
          docker ps -a
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml up -d postgres mqtt server jobs executor

      - name: Wait for acceptance services ready
        run: |
          set -euo pipefail
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs minio-init || true
          if ! timeout 180 bash -lc 'until curl -fsS http://127.0.0.1:3001/api/health > /dev/null; do echo "[wait] server not ready"; sleep 2; done'; then
            echo "[diag] acceptance server did not become ready within timeout"
            docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml ps || true
            echo "[diag] --- server logs (tail 300) ---"
            docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --tail=300 server || true
            echo "[diag] --- jobs logs (tail 200) ---"
            docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --tail=200 jobs || true
            echo "[diag] --- executor logs (tail 200) ---"
            docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --tail=200 executor || true
            echo "[diag] --- postgres logs (tail 200) ---"
            docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --tail=200 postgres || true
            echo "[diag] --- mqtt logs (tail 120) ---"
            docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --tail=120 mqtt || true
            exit 1
          fi
          docker run --rm --network host --entrypoint /bin/sh minio/mc:latest -c 'set -eu; mc alias set local http://127.0.0.1:9000 minioadmin minioadmin; mc ls local; mc stat local/evidence-exports-v1'
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml ps

      - name: Run acceptance suite
        run: |
          set -a
          source .env.ci
          set +a
          pnpm run test:acceptance

      - name: Collect runtime evidence logs
        if: always()
        run: |
          set -euo pipefail
          mkdir -p acceptance-output
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs server > acceptance-output/SERVER_RUNTIME.log || true
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs minio-init > acceptance-output/MINIO_INIT.log || true
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs postgres > acceptance-output/POSTGRES_RUNTIME.log || true
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs jobs > acceptance-output/JOBS_RUNTIME.log || true
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs executor > acceptance-output/EXECUTOR_RUNTIME.log || true
          set +e
          docker run --rm --network host --entrypoint /bin/sh minio/mc:latest -c 'set -eu; mc alias set local http://127.0.0.1:9000 minioadmin minioadmin; mc ls local; mc stat local/evidence-exports-v1' > acceptance-output/MINIO_BUCKET_VERIFY.log 2>&1
          MINIO_BUCKET_VERIFY_RC=$?
          set -e
          grep -E "\\[evidence-export\\]\\[s3\\] upload target bucket=evidence-exports-v1 endpoint=.* job_id=" acceptance-output/SERVER_RUNTIME.log || true
          grep -E "verifying bucket exists: evidence-exports-v1|listing buckets" acceptance-output/MINIO_INIT.log || true
          grep -E "evidence-exports-v1" acceptance-output/MINIO_BUCKET_VERIFY.log || true
          if [ "$MINIO_BUCKET_VERIFY_RC" -ne 0 ]; then
            echo "[acceptance] bucket verify command failed with rc=$MINIO_BUCKET_VERIFY_RC (see acceptance-output/MINIO_BUCKET_VERIFY.log)"
            exit "$MINIO_BUCKET_VERIFY_RC"
          fi

      - name: Upload acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-output
          path: |
            acceptance-output/report.json
            acceptance-output/report.html
            acceptance-output/*.log
          if-no-files-found: warn

      - name: Stop acceptance runtime dependencies
        if: always()
        run: |
          if [ ! -f .env.ci ]; then
            echo "skip cleanup: .env.ci missing"
            exit 0
          fi
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml down --remove-orphans

  release-gate:
    runs-on: ubuntu-latest
    needs:
      - build-test
      - acceptance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download acceptance artifacts
        uses: actions/download-artifact@v4
        with:
          name: acceptance-output
          path: acceptance-output

      - name: Download acceptance artifacts
        uses: actions/download-artifact@v4
        with:
          name: acceptance-output
          path: acceptance-output

      - name: Generate release gate report
        run: node scripts/qa/generate_release_gate_report.cjs

      - name: Check release gates
        run: pnpm acceptance:commercial:mvp0:release-gate
