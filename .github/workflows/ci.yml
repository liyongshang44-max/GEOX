name: ci

on:
  pull_request:

permissions:
  contents: write

jobs:
  materialize-s11c:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout S11C branch
        uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-05-s11c-complete-activation-v1
          fetch-depth: 0

      - name: Reassemble and execute S11C materializer
        run: |
          set -euo pipefail
          cat docs/digital_twin/mcft/cap_05/.s11c-materializer-*.b64 > /tmp/materialize_s11c.b64
          test "$(sha256sum /tmp/materialize_s11c.b64 | cut -d' ' -f1)" = "6980cde4f6e984115df6066eeb467e266a1ab55b286b7ba3e82098edbee01643"
          base64 -d /tmp/materialize_s11c.b64 > /tmp/materialize_s11c.cjs
          test "$(sha256sum /tmp/materialize_s11c.cjs | cut -d' ' -f1)" = "e8d65daa423f87ef87610a8a481ea1fd8bf2aa2365a6f8799d3ea1228fa0ba66"
          node --check /tmp/materialize_s11c.cjs
          node /tmp/materialize_s11c.cjs

      - name: Restore canonical CI and form committed candidate
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f docs/digital_twin/mcft/cap_05/.s11c-materialization-staging
          rm -f docs/digital_twin/mcft/cap_05/.s11c-materializer-*.b64
          git config user.name "GEOX Governance Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "docs(mcft-cap-05): activate S11C completion effectiveness"

      - name: Validate finalization Gate and exact ten-file boundary
        run: |
          set -euo pipefail
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_FINALIZATION_EFFECTIVENESS.cjs --candidate
          cat > /tmp/expected-files.txt <<'EOF'
          docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md
          docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-AUTHORIZATION-STATUS.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-CLOSURE-RECORD.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-DELIVERY-SLICE-STATUS.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-FINALIZATION-EFFECTIVENESS.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-MAIN-VERIFICATION.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-TASK.md
          scripts/dev/assert_local_pnpm_runtime.cjs
          scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_FINALIZATION_EFFECTIVENESS.cjs
          EOF
          sed -i 's/^          //' /tmp/expected-files.txt
          git diff --name-only fd6c54e84ee4ede7bbb581b4fc55660251c2265f..HEAD | sort > /tmp/actual-files.txt
          diff -u /tmp/expected-files.txt /tmp/actual-files.txt
          test "$(git status --porcelain)" = ""

      - name: Push validated S11C candidate
        run: git push origin HEAD:agent/mcft-cap-05-s11c-complete-activation-v1
