name: ci

on:
  pull_request:

permissions:
  contents: read

jobs:
  inspect-s2-effectiveness-boundary:
    if: github.head_ref == 'agent/mcft-cap-06-s2-effectiveness-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout effectiveness branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Materialize and print exact boundary
        run: |
          set -euo pipefail
          python .github/mcft_cap06_s2_effectiveness.py
          python .github/mcft_cap06_s2_effectiveness_gate_fix.py
          rm -rf acceptance-output .github/__pycache__
          rm -f .github/mcft_cap06_s2_effectiveness.py .github/mcft_cap06_s2_effectiveness_gate_fix.py
          git checkout origin/main -- .github/workflows/ci.yml
          echo 'ACTUAL_BOUNDARY_BEGIN'
          git diff --name-only origin/main | sort
          echo 'ACTUAL_BOUNDARY_END'
          echo "ACTUAL_COUNT=$(git diff --name-only origin/main | wc -l)"
          git diff --check
