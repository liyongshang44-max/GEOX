name: ci

on:
  pull_request:

jobs:
  mcft-cap-06-p-minus-1-postmerge-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout effective merged main
        uses: actions/checkout@v4
        with:
          ref: 79cd7814eff06ad86f86cdcb379c6f71a77f1ab8
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Verify merged-main identity and P-1 Gate
        run: |
          test "$(git rev-parse HEAD)" = "79cd7814eff06ad86f86cdcb379c6f71a77f1ab8"
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_P_MINUS_1_ADJUDICATION.cjs

      - name: Repository typecheck
        run: pnpm -r typecheck

      - name: Repository build
        run: pnpm -r build

      - name: Server selfcheck
        run: pnpm --filter @geox/server test:p1:selfcheck
