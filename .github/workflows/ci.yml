name: ci

on:
  pull_request:

permissions:
  contents: write

jobs:
  materialize-s8-finalization:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout operational branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate and validate exact Finalization candidate
        run: node scripts/dev/assert_local_pnpm_runtime.cjs

      - name: Commit and push exact target boundary
        shell: bash
        run: |
          set -euo pipefail
          cd /tmp/geox-s8-finalization-target
          expected=(
            docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md
            docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json
            docs/digital_twin/mcft/cap_03/GEOX-MCFT-CAP-03-CLOSURE-RECORD.json
            docs/digital_twin/mcft/cap_03/GEOX-MCFT-CAP-03-CLOSURE-STATUS.json
            docs/digital_twin/mcft/cap_03/GEOX-MCFT-CAP-03-CLOSURE.md
            docs/digital_twin/mcft/cap_03/GEOX-MCFT-CAP-03-DELIVERY-SLICE-STATUS.json
            docs/digital_twin/mcft/cap_03/GEOX-MCFT-CAP-03-FINALIZATION-STATUS.json
            docs/digital_twin/mcft/cap_03/GEOX-MCFT-CAP-03-FINALIZATION.md
            docs/digital_twin/mcft/cap_03/GEOX-MCFT-CAP-03-MAIN-VERIFICATION.json
            scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_03_FINALIZATION.cjs
          )
          mapfile -t changed < <(git status --short | sed -E 's/^.. //' | sort)
          [[ "${changed[*]}" = "${expected[*]}" ]]
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -- "${expected[@]}"
          git diff --cached --check
          git commit -m 'prepare MCFT-CAP-03 S8 Finalization candidate'
          git push origin HEAD:refs/heads/mcft-cap-03-s8-finalization-v1
