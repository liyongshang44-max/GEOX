name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  mcft-cap-06-s1-s0-compat-patch:
    if: github.head_ref == 'agent/mcft-cap-06-s1-controlled-regime-correction-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch S0 qualification to validate S0 authority independently
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('.')
          source_path = root / 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S0_V2_EXACT_QUALIFICATION.ts'
          text = source_path.read_text(encoding='utf-8')

          old_const = 'const P0_STATUS_PATH = "docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-P0-STATUS.json";\n'
          new_const = old_const + 'const S0_EFFECTIVENESS_PATH = "docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S0-EFFECTIVENESS.json";\n'
          if text.count(old_const) != 1:
              raise SystemExit(f'P0 status constant count={text.count(old_const)}')
          text = text.replace(old_const, new_const)

          old_reads = '''  const p0Status = readJson(P0_STATUS_PATH);
          const currentState = readJson("docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json");'''
          new_reads = '''  const p0Status = readJson(P0_STATUS_PATH);
          const s0Effectiveness = readJson(S0_EFFECTIVENESS_PATH);
          const currentState = readJson("docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json");'''
          if text.count(old_reads) != 1:
              raise SystemExit(f'main read anchor count={text.count(old_reads)}')
          text = text.replace(old_reads, new_reads)

          old_assertions = '''  assert.equal(p0Status.status, "MERGED_EFFECTIVE", "P0_MERGED_EFFECTIVE_REQUIRED");
          assert.equal(p0Status.effectiveness?.effective, true, "P0_EFFECTIVENESS_REQUIRED");
          assert.equal(currentState.status, "MERGED_EFFECTIVE", "CURRENT_STATE_RECONCILIATION_EFFECTIVE_REQUIRED");
          assert.equal(currentState.reconciliation_effective, true, "CURRENT_STATE_RECONCILIATION_EFFECTIVE_REQUIRED");
          assert.equal(currentState.current_state?.s0, "MERGED_EFFECTIVE", "S0_MERGED_EFFECTIVE_REQUIRED");'''
          new_assertions = '''  assert.equal(p0Status.status, "MERGED_EFFECTIVE", "P0_MERGED_EFFECTIVE_REQUIRED");
          assert.equal(p0Status.effectiveness?.effective, true, "P0_EFFECTIVENESS_REQUIRED");
          assert.equal(s0Effectiveness.status, "MERGED_EFFECTIVE", "S0_EFFECTIVENESS_STATUS_REQUIRED");
          assert.equal(s0Effectiveness.effective, true, "S0_EFFECTIVENESS_REQUIRED");
          assert.equal(s0Effectiveness.implementation_merge_commit, "4c93ec59a6ac0b53b43584cbef1a7e0295d6b58a", "S0_IMPLEMENTATION_MERGE_REQUIRED");
          assert.equal(s0Effectiveness.head_to_merge_tree_equivalence, "PASS", "S0_TREE_EQUIVALENCE_REQUIRED");
          assert.equal(s0Effectiveness.postmerge_gate, "PASS", "S0_POSTMERGE_GATE_REQUIRED");
          assert.equal(s0Effectiveness.authorization_effective, true, "S0_AUTHORIZATION_EFFECTIVE_REQUIRED");
          assert.equal(s0Effectiveness.runtime_source_authorized, true, "S0_RUNTIME_SOURCE_AUTHORIZATION_REQUIRED");
          assert.equal(currentState.current_state?.s0, "MERGED_EFFECTIVE", "S0_MERGED_EFFECTIVE_REQUIRED");
          if (currentState.reconciliation_effective === true) {
            assert.equal(currentState.status, "MERGED_EFFECTIVE", "EFFECTIVE_RECONCILIATION_STATUS_REQUIRED");
          } else {
            assert.notEqual(currentState.status, "MERGED_EFFECTIVE", "NON_EFFECTIVE_RECONCILIATION_STATUS_REQUIRED");
            assert.equal(typeof currentState.effectiveness_condition, "string", "ACTIVE_CANDIDATE_EFFECTIVENESS_CONDITION_REQUIRED");
            assert.ok(currentState.effectiveness_condition.length > 0, "ACTIVE_CANDIDATE_EFFECTIVENESS_CONDITION_REQUIRED");
          }'''
          if text.count(old_assertions) != 1:
              raise SystemExit(f'global reconciliation assertion block count={text.count(old_assertions)}')
          text = text.replace(old_assertions, new_assertions)

          old_message = '  ok("merged-effective current-state and CAP-05 predecessor authority are exact");'
          new_message = '  ok("merged-effective S0 authority, active-slice SSOT and CAP-05 predecessor authority are exact");'
          if text.count(old_message) != 1:
              raise SystemExit(f'S0 success message count={text.count(old_message)}')
          source_path.write_text(text.replace(old_message, new_message), encoding='utf-8')

          status_path = root / 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-RESIDUAL-WINDOWS-STATUS.json'
          status = json.loads(status_path.read_text(encoding='utf-8'))
          s0_file = 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S0_V2_EXACT_QUALIFICATION.ts'
          boundary = status['exact_changed_file_boundary']
          if s0_file not in boundary:
              boundary.append(s0_file)
              boundary.sort()
          status['candidate_tree_validation']['exact_changed_file_count'] = 15
          status['candidate_tree_validation']['s0_downstream_state_compatibility'] = 'VALIDATE_S0_EFFECTIVENESS_NOT_GLOBAL_RECONCILIATION_STATUS'
          status_path.write_text(json.dumps(status, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')

          gate_path = root / 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_DATA_CORRECTION.cjs'
          gate = gate_path.read_text(encoding='utf-8')
          anchor = "  assert.equal(status.candidate_tree_validation.runtime_result_ssot_crosscheck, 'PASS');\n"
          addition = anchor + "  assert.equal(status.candidate_tree_validation.exact_changed_file_count, 15);\n  assert.equal(status.exact_changed_file_boundary.includes('scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S0_V2_EXACT_QUALIFICATION.ts'), true);\n"
          if gate.count(anchor) != 1:
              raise SystemExit(f'correction gate status anchor count={gate.count(anchor)}')
          gate_path.write_text(gate.replace(anchor, addition), encoding='utf-8')
          PY

      - name: Remove temporary orchestration and restore CI
        run: |
          set -euo pipefail
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/mcft-cap-06-s1-correction-finalizer.yml
          rm -f .github/workflows/mcft-cap-06-s1-s0-compat-patch.yml
          rm -f .github/mcft-cap-06-s1-s0-compat-patch.trigger

      - name: Validate and push permanent patch
        run: |
          set -euo pipefail
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          mapfile -t actual < <(git diff --cached --name-only origin/main | sort)
          test "${#actual[@]}" -eq 15
          git diff --cached --check
          git commit -m "fix(mcft-cap-06): decouple S0 proof from downstream candidate status"
          git push origin HEAD:${{ github.head_ref }}

  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Route dependency guard
        run: pnpm run ci:route-dependency-guard

      - name: Route response ownership guard
        run: pnpm run ci:route-response-ownership

      - name: PR-18I guarded report hotfix guard
        run: pnpm run ci:pr18i-guarded-report-hotfix

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Build
        run: pnpm -r build

      - name: Server selfcheck
        run: pnpm --filter @geox/server test:p1:selfcheck

  acceptance:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Prepare commercial compose env
        run: |
          ACCEPTANCE_TOKEN="$(node -e "const f=require('./config/auth/security_acceptance_tokens.json'); const t=f.tokens.find(x => x.role==='admin' && x.scopes.includes('security.admin') && !x.revoked); if(!t) { console.error('missing active admin security.admin token'); process.exit(1); } console.log(t.token)")"
          EXECUTOR_TOKEN="$(node -e "const f=require('./config/auth/security_acceptance_tokens.json'); const t=f.tokens.find(x => x.token==='tenant_a_admin_token' && x.scopes.includes('ao_act.task.write') && x.scopes.includes('ao_act.receipt.write') && !x.revoked); if(!t) { console.error('missing active executor-compatible acceptance token'); process.exit(1); } console.log(t.token)")"
          cat > .env.ci <<EOF
          GEOX_RUNTIME_ENV=pilot
          POSTGRES_USER=landos
          POSTGRES_PASSWORD=ci-pilot-postgres-strong-2026
          POSTGRES_DB=landos
          GEOX_AO_ACT_TOKEN=$ACCEPTANCE_TOKEN
          GEOX_EXECUTOR_TOKEN=$EXECUTOR_TOKEN
          GEOX_EVIDENCE_S3_BUCKET=evidence-exports-v1
          GEOX_EVIDENCE_S3_PUBLIC_ENDPOINT=http://127.0.0.1:9000
          MINIO_ROOT_USER=geoxminio
          MINIO_ROOT_PASSWORD=ci-pilot-minio-strong-2026
          MQTT_AUTH_REQUIRED=1
          GEOX_MQTT_AUTH_REQUIRED=1
          MQTT_USERNAME=geoxmqtt
          MQTT_PASSWORD=ci-pilot-mqtt-strong-2026
          CORS_ORIGINS=https://pilot-ci.geox.invalid
          GEOX_ALLOWED_ORIGINS=https://pilot-ci.geox.invalid
          APP_SECRET=ci-pilot-app-secret-strong-2026
          GEOX_APP_SECRET=ci-pilot-app-secret-strong-2026
          PUBLIC_BASE_URL=https://pilot-ci.geox.invalid
          GEOX_PUBLIC_BASE_URL=https://pilot-ci.geox.invalid
          GEOX_EXECUTION_DEFAULT_DISABLED=1
          GEOX_EXECUTION_ENABLE_EXPLICITLY=0
          GEOX_EXECUTION_ENABLE_REASON=ci-controlled-pilot-runtime-security-baseline
          GEOX_DEVTOOLS_ENABLED=0
          EOF

      - name: Validate commercial compose rendering
        run: docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml config > /tmp/commercial-compose.rendered.yml

      - name: Start acceptance runtime dependencies
        timeout-minutes: 8
        run: |
          set -euo pipefail
          trap 'rc=$?; echo "[diag] runtime dependency startup failed rc=$rc"; docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml ps || true; echo "[diag] --- minio-init logs ---"; docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --tail=200 minio-init || true; echo "[diag] --- server logs ---"; docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --tail=200 server || true; echo "[diag] --- postgres logs ---"; docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --tail=200 postgres || true; echo "[diag] --- mqtt logs ---"; docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --tail=120 mqtt || true; exit $rc' ERR
          timeout 180 docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml up -d minio minio-init
          docker logs geox-v1-minio-init || true
          docker ps -a
          timeout 300 docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml up -d postgres mqtt server jobs executor
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml ps

      - name: Wait for acceptance services ready
        run: |
          set -euo pipefail
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs minio-init || true
          if ! timeout 180 bash -lc 'until curl -fsS http://127.0.0.1:3001/api/health > /dev/null; do echo "[wait] server not ready"; sleep 2; done'; then
            echo "[diag] acceptance server did not become ready within timeout"
            docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml ps || true
            echo "[diag] --- server logs (tail 300) ---"
            docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --tail=300 server || true
            echo "[diag] --- jobs logs (tail 200) ---"
            docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --tail=200 jobs || true
            echo "[diag] --- executor logs (tail 200) ---"
            docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --tail=200 executor || true
            echo "[diag] --- postgres logs (tail 200) ---"
            docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --tail=200 postgres || true
            echo "[diag] --- mqtt logs (tail 120) ---"
            docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --tail=120 mqtt || true
            exit 1
          fi
          docker run --rm --network host --entrypoint /bin/sh minio/mc:latest -c 'set -eu; mc alias set local http://127.0.0.1:9000 geoxminio ci-pilot-minio-strong-2026; mc ls local; mc stat local/evidence-exports-v1'
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml ps

      - name: Run PR18I formal-chain preflight gate
        timeout-minutes: 30
        run: |
          set -a
          source .env.ci
          set +a
          export BASE_URL=http://127.0.0.1:3001
          export API_BASE_URL=http://127.0.0.1:3001
          export DATABASE_URL="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5433/${POSTGRES_DB}"
          export CONTROLLED_PILOT_PR18I_PHASE=formal-chain-preflight
          pnpm run ci:controlled-pilot
      - name: Apply controlled pilot full review seed
        timeout-minutes: 15
        run: |
          set -euo pipefail
          mkdir -p acceptance-output
          set -a
          source .env.ci
          set +a
          export BASE_URL=http://127.0.0.1:3001
          export API_BASE_URL=http://127.0.0.1:3001
          export DATABASE_URL="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5433/${POSTGRES_DB}"
          node scripts/demo_seed/SEED_CONTROLLED_PILOT_FULL_REVIEW_V1.cjs --cleanup --apply --tenant tenantA
          node scripts/demo_seed/SEED_CONTROLLED_PILOT_FULL_REVIEW_V1.cjs --apply --tenant tenantA --base-url http://127.0.0.1:3001
          node scripts/demo_seed/SEED_CONTROLLED_PILOT_FULL_REVIEW_V1.cjs --verify --tenant tenantA
          node scripts/demo_seed/SEED_CONTROLLED_PILOT_FULL_REVIEW_V1.cjs --verify-api --tenant tenantA --base-url http://127.0.0.1:3001
          node scripts/demo_seed/SEED_CONTROLLED_PILOT_FULL_REVIEW_V1.cjs --export-db-json --tenant tenantA --out acceptance-output/controlled_pilot_full_review.actual.json

      - name: Run C8 formal chain backend P0
        timeout-minutes: 10
        run: |
          set -euo pipefail
          mkdir -p acceptance-output
          set -a
          source .env.ci
          set +a
          export BASE_URL=http://127.0.0.1:3001
          export API_BASE_URL=http://127.0.0.1:3001
          export DATABASE_URL="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5433/${POSTGRES_DB}"
          node scripts/governance_acceptance/ACCEPTANCE_C8_FORMAL_CHAIN_BACKEND_P0_V1.cjs --base-url http://127.0.0.1:3001 --tenant tenantA 2>&1 | tee acceptance-output/c8-formal-chain-backend-p0.log

      - name: Install Playwright Chromium for frontend audit
        timeout-minutes: 5
        run: |
          set -euo pipefail
          pnpm exec playwright install chromium

      - name: Run frontend runtime page audit
        timeout-minutes: 12
        run: |
          set -euo pipefail
          mkdir -p acceptance-output
          set -a
          source .env.ci
          set +a
          export BASE_URL=http://127.0.0.1:3001
          export API_BASE_URL=http://127.0.0.1:3001
          export GEOX_WEB_PROXY_TARGET=http://127.0.0.1:3001
          export FRONTEND_AUDIT_WEB_BASE_URL=http://127.0.0.1:5173
          export FRONTEND_AUDIT_ROUTE_TIMEOUT_MS=35000
          export FRONTEND_AUDIT_TOTAL_TIMEOUT_MS=600000
          export FRONTEND_AUDIT_SKIP_BROWSER_INSTALL=1
          export FRONTEND_AUDIT_SKIP_WEB_SERVER=1
          pnpm --filter @geox/web dev -- --host 127.0.0.1 --port 5173 > acceptance-output/FRONTEND_WEB.log 2>&1 &
          WEB_PID=$!
          trap 'kill $WEB_PID >/dev/null 2>&1 || true; wait $WEB_PID 2>/dev/null || true' EXIT
          if ! timeout 90 bash -lc 'until curl -fsS http://127.0.0.1:5173 > /dev/null; do echo "[wait] frontend web not ready"; tail -n 40 acceptance-output/FRONTEND_WEB.log || true; sleep 2; done'; then
            echo "[diag] frontend web server did not become ready"
            tail -n 200 acceptance-output/FRONTEND_WEB.log || true
            exit 1
          fi
          pnpm run ci:frontend:runtime-page-audit

      - name: Run Controlled Pilot strict release gate
        timeout-minutes: 45
        run: |
          set -a
          source .env.ci
          set +a
          export BASE_URL=http://127.0.0.1:3001
          export API_BASE_URL=http://127.0.0.1:3001
          export DATABASE_URL="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:5433/${POSTGRES_DB}"
          export CONTROLLED_PILOT_PR18I_PHASE=post-full-review
          pnpm run ci:controlled-pilot

      - name: Run Stage-1 fixture raw sample contract gate
        run: |
          pnpm run ci:stage1-fixture:raw-sample-contract

      - name: Run P1 smoke preflight idempotency gate
        run: |
          set -euo pipefail
          set -a
          source .env.ci
          set +a
          export BASE_URL=http://127.0.0.1:3001
          export API_BASE_URL=http://127.0.0.1:3001
          pnpm run ci:p1-smoke:preflight-idempotent

      - name: Run customer report boundary suite wiring gate
        run: |
          pnpm run ci:customer-report-boundary-suite-wiring

      - name: Run customer report boundary suite
        timeout-minutes: 15
        run: |
          set -euo pipefail
          set -a
          source .env.ci
          set +a
          export GEOX_BASE_URL=http://127.0.0.1:3001
          pnpm run ci:customer-report-boundary-suite

      - name: Run acceptance suite
        run: |
          set -a
          source .env.ci
          set +a
          pnpm run test:acceptance

      - name: Collect runtime evidence logs
        if: always()
        run: |
          set -euo pipefail
          mkdir -p acceptance-output
          cp docs/audit/BASE_CONTRACT_GATE_MATURITY_REPORT.md acceptance-output/BASE_CONTRACT_GATE_MATURITY_REPORT.md || true
          cp docs/audit/CONTROLLED_PILOT_READINESS_REPORT.md acceptance-output/CONTROLLED_PILOT_READINESS_REPORT.md || true
          cp docs/audit/FRONTEND_RUNTIME_PAGE_AUDIT_REPORT.md acceptance-output/FRONTEND_RUNTIME_PAGE_AUDIT_REPORT.md || true
          cp -R docs/audit/frontend-runtime-page-audit acceptance-output/frontend-runtime-page-audit || true
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --no-color --tail=5000 server > acceptance-output/SERVER_RUNTIME.log
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --no-color --tail=2000 minio-init > acceptance-output/MINIO_INIT.log || true
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --no-color --tail=2000 postgres > acceptance-output/POSTGRES_RUNTIME.log || true
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --no-color --tail=2000 jobs > acceptance-output/JOBS_RUNTIME.log || true
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --no-color --tail=2000 executor > acceptance-output/EXECUTOR_RUNTIME.log || true
          test -s acceptance-output/SERVER_RUNTIME.log
          set +e
          docker run --rm --network host --entrypoint /bin/sh minio/mc:latest -c 'set -eu; mc alias set local http://127.0.0.1:9000 geoxminio ci-pilot-minio-strong-2026; mc ls local; mc stat local/evidence-exports-v1' > acceptance-output/MINIO_BUCKET_VERIFY.log 2>&1
          MINIO_BUCKET_VERIFY_RC=$?
          set -e
          grep -E "\[evidence-export\]\[s3\] upload target bucket=evidence-exports-v1 endpoint=.* job_id=" acceptance-output/SERVER_RUNTIME.log || true
          grep -E "verifying bucket exists: evidence-exports-v1|listing buckets" acceptance-output/MINIO_INIT.log || true
          grep -E "evidence-exports-v1" acceptance-output/MINIO_BUCKET_VERIFY.log || true
          if [ "$MINIO_BUCKET_VERIFY_RC" -ne 0 ]; then
            echo "[acceptance] bucket verify command failed with rc=$MINIO_BUCKET_VERIFY_RC (see acceptance-output/MINIO_BUCKET_VERIFY.log)"
            exit "$MINIO_BUCKET_VERIFY_RC"
          fi

      - name: Run COMMERCIAL MVP0 release gate
        run: |
          set -a
          source .env.ci
          set +a
          pnpm acceptance:commercial:mvp0:syntax
          pnpm acceptance:commercial:mvp0:release-gate

      - name: Final runtime hygiene check and artifact log collection
        if: always()
        run: |
          set -euo pipefail
          mkdir -p acceptance-output
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml logs --no-color --tail=5000 server > acceptance-output/SERVER_RUNTIME.log
          test -s acceptance-output/SERVER_RUNTIME.log
          if grep -E "FST_ERR_REP_ALREADY_SENT|Reply was already sent|ERR_HTTP_HEADERS_SENT" acceptance-output/SERVER_RUNTIME.log; then
            echo "[hygiene] detected double-send/runtime header errors"
            exit 1
          fi

      - name: Upload acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-output
          path: |
            acceptance-output/report.json
            acceptance-output/report.html
            acceptance-output/BASE_CONTRACT_GATE_MATURITY_REPORT.md
            acceptance-output/CONTROLLED_PILOT_READINESS_REPORT.md
            acceptance-output/FRONTEND_RUNTIME_PAGE_AUDIT_REPORT.md
            acceptance-output/controlled_pilot_full_review.plan.json
            acceptance-output/controlled_pilot_full_review.actual.json
            acceptance-output/controlled_pilot_full_review.release_gate.actual.json
            acceptance-output/frontend-runtime-page-audit/**
            acceptance-output/FRONTEND_WEB.log
            acceptance-output/*.log
          if-no-files-found: warn

      - name: Stop acceptance runtime dependencies
        if: always()
        run: |
          if [ ! -f .env.ci ]; then
            echo "skip cleanup: .env.ci missing"
            exit 0
          fi
          docker compose --env-file .env.ci -f docker-compose.commercial_v1.yml down -v
