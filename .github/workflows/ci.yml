name: ci

on:
  pull_request:

permissions:
  contents: read

jobs:
  s11b-finalization-postmerge-probe:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: landos
          POSTGRES_PASSWORD: mcft-cap05-s11b-probe
          POSTGRES_DB: landos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U landos -d landos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout effective S11A merged main
        uses: actions/checkout@v4
        with:
          ref: fd6c54e84ee4ede7bbb581b4fc55660251c2265f
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Verify exact merged-main identity and S11 finalization Gate
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "fd6c54e84ee4ede7bbb581b4fc55660251c2265f"
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S11_CLOSURE_FINALIZATION.cjs --postmerge

      - name: Run permanent MCFT-CAP-05 Runtime and PostgreSQL regressions
        env:
          CI: "true"
          DATABASE_URL: postgresql://landos:mcft-cap05-s11b-probe@127.0.0.1:5432/landos
        run: node scripts/dev/assert_local_pnpm_runtime.cjs

      - name: Repository typecheck
        run: pnpm -r typecheck

      - name: Repository build
        run: pnpm -r build

      - name: Server selfcheck
        run: pnpm --filter @geox/server test:p1:selfcheck
