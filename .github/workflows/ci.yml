name: ci

on:
  pull_request:

jobs:
  cap05-final-ssot-hygiene-postmerge-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout effective merged main
        uses: actions/checkout@v4
        with:
          ref: 9c4030e43d3b65857cf40d7936d5dfa8e80c17d1
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Verify merged-main identity and final SSOT hygiene Gate
        run: |
          test "$(git rev-parse HEAD)" = "9c4030e43d3b65857cf40d7936d5dfa8e80c17d1"
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_FINAL_EFFECTIVENESS_RECONCILIATION.cjs --postmerge

      - name: Repository typecheck
        run: pnpm -r typecheck

      - name: Repository build
        run: pnpm -r build

      - name: Server selfcheck
        run: pnpm --filter @geox/server test:p1:selfcheck
