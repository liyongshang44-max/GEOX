name: ci

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose-s11a:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout S11A branch
        uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-05-s11a-closure-candidate-v1
          fetch-depth: 0

      - name: Reassemble and execute materializer
        run: |
          set -euo pipefail
          cat docs/digital_twin/mcft/cap_05/.s11a-materializer-*.b64 > /tmp/materialize_s11a.b64
          test "$(sha256sum /tmp/materialize_s11a.b64 | cut -d' ' -f1)" = "133e26b7a1e1d54b423d7fe83a9922aa343b80d3812f06592927deb8c53eb260"
          base64 -d /tmp/materialize_s11a.b64 > /tmp/materialize_s11a.cjs
          test "$(sha256sum /tmp/materialize_s11a.cjs | cut -d' ' -f1)" = "b868d8fa68ac289e393aecb75a6c19e5952d707a36045e45f2b5c33f4742bc9d"
          node /tmp/materialize_s11a.cjs
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f docs/digital_twin/mcft/cap_05/.s11a-materialization-staging
          rm -f docs/digital_twin/mcft/cap_05/.s11a-materializer-*.b64
          git config user.name "GEOX Governance Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "diagnostic S11A candidate"

      - name: Capture Gate and boundary diagnostics
        run: |
          set +e
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S11_CLOSURE_FINALIZATION.cjs --candidate > /tmp/gate.log 2>&1
          echo $? > /tmp/gate.status
          git diff --name-only b1248216462eb31cfcf3c75633cc2e53a15520e4..HEAD | sort > /tmp/actual-files.txt
          cat > /tmp/expected-files.txt <<'EOF'
          docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md
          docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-AUTHORIZATION-STATUS.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-CLOSURE-RECORD.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-DELIVERY-SLICE-STATUS.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-MAIN-VERIFICATION.json
          docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-TASK.md
          scripts/dev/assert_local_pnpm_runtime.cjs
          scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S11_CLOSURE_FINALIZATION.cjs
          EOF
          sed -i 's/^          //' /tmp/expected-files.txt
          diff -u /tmp/expected-files.txt /tmp/actual-files.txt > /tmp/boundary.diff
          echo $? > /tmp/boundary.status
          cp docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-CLOSURE-RECORD.json /tmp/
          cp docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-MAIN-VERIFICATION.json /tmp/
          exit 0

      - name: Upload S11A diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: s11a-diagnostics
          path: |
            /tmp/gate.log
            /tmp/gate.status
            /tmp/actual-files.txt
            /tmp/expected-files.txt
            /tmp/boundary.diff
            /tmp/boundary.status
            /tmp/GEOX-MCFT-CAP-05-CLOSURE-RECORD.json
            /tmp/GEOX-MCFT-CAP-05-MAIN-VERIFICATION.json

      - name: Fail after artifact capture when validation failed
        run: |
          test "$(cat /tmp/gate.status)" = "0"
          test "$(cat /tmp/boundary.status)" = "0"
