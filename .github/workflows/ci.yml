name: ci

on:
  pull_request:

jobs:
  mcft-cap-06-s0-effectiveness-postmerge-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact S0 effectiveness merged main
        uses: actions/checkout@v4
        with:
          ref: b709bfed36ef1efa6d970b349d23a2b0006e4de2
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Verify exact merged-main identity and effective S1-only authorization
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "b709bfed36ef1efa6d970b349d23a2b0006e4de2"
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_AUTHORIZATION.cjs --postmerge

      - name: Repository typecheck
        run: pnpm -r typecheck

      - name: Repository build
        run: pnpm -r build

      - name: Server selfcheck
        run: pnpm --filter @geox/server test:p1:selfcheck
