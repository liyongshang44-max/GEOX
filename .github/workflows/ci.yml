name: ci

on:
  pull_request:

jobs:
  mcft-cap-06-s0-postmerge-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact S0 merged main
        uses: actions/checkout@v4
        with:
          ref: 4c93ec59a6ac0b53b43584cbef1a7e0295d6b58a
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Verify merged-main identity and S0 Authorization Gate
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "4c93ec59a6ac0b53b43584cbef1a7e0295d6b58a"
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_AUTHORIZATION.cjs --postmerge

      - name: Repository typecheck
        run: pnpm -r typecheck

      - name: Repository build
        run: pnpm -r build

      - name: Server selfcheck
        run: pnpm --filter @geox/server test:p1:selfcheck
