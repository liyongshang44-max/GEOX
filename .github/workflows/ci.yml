name: ci

on:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile --reporter=silent

      - name: Typecheck
        shell: bash
        run: |
          set +e
          pnpm -w exec tsc --noEmit -p apps/server/tsconfig.json --pretty false 2>&1 | tee /tmp/typecheck.log
          rc=${PIPESTATUS[0]}
          echo "TYPECHECK_ERROR_SUMMARY_BEGIN"
          grep -E "error TS[0-9]+" /tmp/typecheck.log || true
          echo "TYPECHECK_ERROR_SUMMARY_END"
          exit "$rc"
