name: ci

on:
  pull_request:

permissions:
  contents: write

jobs:
  mcft-cap-06-s1-readiness-hardening:
    if: github.head_ref == 'agent/mcft-cap-06-s1-controlled-regime-correction-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch and apply reviewed source patch
        run: |
          set -euo pipefail
          git fetch origin agent/mcft-cap-06-s1-readiness-hardening-staging-v1
          git show origin/agent/mcft-cap-06-s1-readiness-hardening-staging-v1:.github/mcft_cap06_s1_readiness_hardening.py.gz.b64 \
            | base64 -d \
            | gzip -d \
            > /tmp/mcft_cap06_s1_readiness_hardening.py
          python -m py_compile /tmp/mcft_cap06_s1_readiness_hardening.py
          python /tmp/mcft_cap06_s1_readiness_hardening.py source
          git diff --check
          node --check scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_DATA_CORRECTION.cjs

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run S1 successor-readiness preflight
        run: |
          set -euo pipefail
          mkdir -p acceptance-output
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_REGIMES.ts
          python - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path('acceptance-output/MCFT_CAP_06_S1_CONTROLLED_REGIMES_RESULT.json').read_text())
          assert result['successor_readiness_precondition_status'] == 'PASS'
          assert result['calibration_sensitive_case_count'] >= result['minimum_sensitive_case_count']
          assert result['calibration_represented_sensitive_regime_count'] >= result['minimum_required_sensitive_regime_count']
          assert result['holdout_purpose'] == 'HIGH_EXCESS_STRESS_HOLDOUT_ONLY'
          assert result['window_hash_semantics'] == 'ORDERED_RESIDUAL_REF_MEMBERSHIP_ONLY_V1'
          print(json.dumps({
              'sensitive_case_count': result['calibration_sensitive_case_count'],
              'represented_sensitive_regimes': result['calibration_represented_sensitive_regime_count'],
              'holdout_purpose': result['holdout_purpose'],
              'window_hash_semantics': result['window_hash_semantics'],
          }, sort_keys=True))
          PY

      - name: Materialize runtime-derived SSOT
        run: |
          set -euo pipefail
          python /tmp/mcft_cap06_s1_readiness_hardening.py materialize
          python -m json.tool docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-RESIDUAL-WINDOWS.json >/dev/null
          python -m json.tool docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-CONTROLLED-DATA-ERRATUM.json >/dev/null
          python -m json.tool docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-RESIDUAL-WINDOWS-STATUS.json >/dev/null
          node --check scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_DATA_CORRECTION.cjs
          git diff --check

      - name: Static repository validation
        run: |
          set -euo pipefail
          pnpm -r typecheck
          pnpm -r build

      - name: Restore standard CI and verify permanent boundary
        run: |
          set -euo pipefail
          git checkout origin/main -- .github/workflows/ci.yml
          rm -rf acceptance-output
          mapfile -t actual < <(git diff --name-only origin/main | sort)
          cat > /tmp/expected.txt <<'EOF'
          docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md
          docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-CONTROLLED-DATA-ERRATUM.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-RESIDUAL-WINDOWS-STATUS.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-RESIDUAL-WINDOWS.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-RESIDUAL-WINDOWS.md
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASK.md
          scripts/acceptance/run_acceptance.cjs
          scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_DATA_CORRECTION.cjs
          scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S0_V2_EXACT_QUALIFICATION.ts
          scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_REGIMES.ts
          scripts/runtime_acceptance/mcft_cap_04_twenty_four_tick_range_fixture_v1.ts
          scripts/runtime_acceptance/mcft_cap_06_s1_residual_windows_fixture_v1.ts
          EOF
          sed -i 's/^          //' /tmp/expected.txt
          diff -u /tmp/expected.txt <(printf '%s\n' "${actual[@]}")
          test "${#actual[@]}" -eq 15
          git diff --check

      - name: Commit hardened candidate
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "fix(mcft-cap-06): harden S1 successor readiness evidence"
          git push origin HEAD:${{ github.head_ref }}
