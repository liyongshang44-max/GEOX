name: ci

on:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merge ref quietly
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf ./* ./.??* 2>/dev/null || true
          git init -q
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "${{ github.event.pull_request.merge_commit_sha }}"
          git checkout -q FETCH_HEAD

      - name: Install quietly
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate >/dev/null
          pnpm install --no-frozen-lockfile --reporter=silent

      - name: Typecheck
        shell: bash
        run: |
          set +e
          pnpm -w exec tsc --noEmit -p apps/server/tsconfig.json --pretty false 2>&1 | tee /tmp/typecheck.log
          rc=${PIPESTATUS[0]}
          echo "TYPECHECK_ERROR_SUMMARY_BEGIN"
          grep -E "error TS[0-9]+" /tmp/typecheck.log || true
          echo "TYPECHECK_ERROR_SUMMARY_END"
          exit "$rc"
