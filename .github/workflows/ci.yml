name: ci

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose-s11c-chunks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout S11C branch
        uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-05-s11c-complete-activation-v1
          fetch-depth: 0

      - name: Capture per-chunk integrity
        run: |
          set -euo pipefail
          : > /tmp/chunks.txt
          for file in docs/digital_twin/mcft/cap_05/.s11c-materializer-*.b64; do
            printf '%s ' "$(basename "$file")" >> /tmp/chunks.txt
            wc -c < "$file" | tr -d '\n' >> /tmp/chunks.txt
            printf ' ' >> /tmp/chunks.txt
            sha256sum "$file" | cut -d' ' -f1 >> /tmp/chunks.txt
          done
          cat /tmp/chunks.txt

      - name: Upload chunk diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: s11c-chunk-integrity
          path: /tmp/chunks.txt
