name: ci

on:
  pull_request:

jobs:
  mcft-cap-06-p0-postmerge-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout effective merged main
        uses: actions/checkout@v4
        with:
          ref: a7bb8d9499560b0ef0244a1a6daeaee1eeb408bf
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Verify merged-main identity and P0 Gate
        env:
          GEOX_ALLOW_LOCAL_POSTMERGE: "1"
        run: |
          test "$(git rev-parse HEAD)" = "a7bb8d9499560b0ef0244a1a6daeaee1eeb408bf"
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_P0_RECONCILIATION.cjs --postmerge

      - name: Repository typecheck
        run: pnpm -r typecheck

      - name: Repository build
        run: pnpm -r build

      - name: Server selfcheck
        run: pnpm --filter @geox/server test:p1:selfcheck
