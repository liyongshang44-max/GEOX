name: MCFT-CAP-06 S1 candidate finalizer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/mcft-cap-06-s1-residual-windows-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: landos
          POSTGRES_PASSWORD: landos
          POSTGRES_DB: mcft_cap06_s1_finalize
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U landos -d mcft_cap06_s1_finalize"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-06-s1-residual-windows-v1
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Materialize permanent S1 candidate
        run: |
          set -euo pipefail
          python3 scripts/remediation/FINALIZE_MCFT_CAP_06_S1_RESIDUAL_WINDOWS_V1.py 2>&1 | tee /tmp/mcft-cap-06-s1-finalize.log

      - name: Validate permanent S1 candidate
        env:
          DATABASE_URL: postgres://landos:landos@127.0.0.1:5432/mcft_cap06_s1_finalize
        run: |
          set -euo pipefail
          node --check scripts/runtime_acceptance/RUN_MCFT_CAP_06_S1_RESIDUAL_WINDOWS.cjs
          node --check scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_RESIDUAL_WINDOWS.cjs
          node --check scripts/acceptance/run_acceptance.cjs
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_RESIDUAL_WINDOWS.cjs
          node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S1_RESIDUAL_WINDOWS.cjs 2>&1 | tee /tmp/mcft-cap-06-s1-postgres.log
          rm -f acceptance-output/MCFT_CAP_06_S1_RESULT.json
          python3 -m json.tool docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json >/dev/null
          python3 -m json.tool docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json >/dev/null
          python3 -m json.tool docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json >/dev/null
          python3 -m json.tool docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-RESIDUAL-WINDOWS.json >/dev/null
          python3 -m json.tool docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-RESIDUAL-WINDOWS-STATUS.json >/dev/null
          git diff --check
          pnpm -r typecheck
          pnpm -r build

      - name: Verify exact 13-file boundary
        run: |
          set -euo pipefail
          baseline=b709bfed36ef1efa6d970b349d23a2b0006e4de2
          expected=(
            docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md
            docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json
            docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json
            docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json
            docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-RESIDUAL-WINDOWS.json
            docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-RESIDUAL-WINDOWS-STATUS.json
            docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-RESIDUAL-WINDOWS.md
            docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASK.md
            scripts/acceptance/run_acceptance.cjs
            scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_RESIDUAL_WINDOWS.cjs
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_RESIDUAL_WINDOWS_DB.ts
            scripts/runtime_acceptance/RUN_MCFT_CAP_06_S1_RESIDUAL_WINDOWS.cjs
            scripts/runtime_acceptance/mcft_cap_06_s1_residual_windows_fixture_v1.ts
          )
          mapfile -t expected_sorted < <(printf '%s\n' "${expected[@]}" | sort)
          mapfile -t tracked < <(git diff --name-only "$baseline")
          mapfile -t untracked < <(git ls-files --others --exclude-standard)
          mapfile -t actual < <(printf '%s\n' "${tracked[@]}" "${untracked[@]}" | sed '/^$/d' | sort -u)
          diff -u <(printf '%s\n' "${expected_sorted[@]}") <(printf '%s\n' "${actual[@]}")

      - name: Commit permanent candidate tree
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "MCFT-CAP-06 S1: materialize controlled Residual-window candidate"
          git push origin HEAD:agent/mcft-cap-06-s1-residual-windows-v1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mcft-cap-06-s1-finalization
          path: |
            /tmp/mcft-cap-06-s1-finalize.log
            /tmp/mcft-cap-06-s1-postgres.log
          if-no-files-found: warn
          retention-days: 7
