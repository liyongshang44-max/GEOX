name: mcft-cap-06-s8-restart-readback-rebuild

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s8-restart-readback-rebuild.yml'
      - 'apps/server/scripts/mcft/MCFT_CAP_06_RESTART_READBACK_REBUILD_RUNNER.ts'
      - 'apps/server/src/runtime/calibration/restart_readback_rebuild_service_v1.ts'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S8-RESTART-READBACK-REBUILD-AUTHORITY-GRAPH.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S8-RESTART-READBACK-REBUILD-IMPLEMENTATION-CONTRACT.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S8-RESTART-READBACK-REBUILD-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASKBOOK-MANIFEST.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-AUTHORITY-V2.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S8_RESTART_READBACK_REBUILD.cjs'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S8_RESTART_READBACK_REBUILD.ts'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S8_RESTART_READBACK_REBUILD_DB.ts'
      - 'scripts/runtime_acceptance/RUN_MCFT_CAP_06_S8_RESTART_READBACK_REBUILD.cjs'
  push:
    branches: [main]
    paths:
      - '.github/workflows/mcft-cap-06-s8-restart-readback-rebuild.yml'
      - 'apps/server/scripts/mcft/MCFT_CAP_06_RESTART_READBACK_REBUILD_RUNNER.ts'
      - 'apps/server/src/runtime/calibration/restart_readback_rebuild_service_v1.ts'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S8-RESTART-READBACK-REBUILD-AUTHORITY-GRAPH.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S8-RESTART-READBACK-REBUILD-IMPLEMENTATION-CONTRACT.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S8-RESTART-READBACK-REBUILD-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASKBOOK-MANIFEST.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-AUTHORITY-V2.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S8_RESTART_READBACK_REBUILD.cjs'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S8_RESTART_READBACK_REBUILD.ts'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S8_RESTART_READBACK_REBUILD_DB.ts'
      - 'scripts/runtime_acceptance/RUN_MCFT_CAP_06_S8_RESTART_READBACK_REBUILD.cjs'

permissions:
  contents: read

jobs:
  s8-restart-readback-rebuild:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      MCFT_CAP_06_S8_RESTART_READBACK_REBUILD_BASELINE_REF: 7bd493b54abf93fa40cb7f17af88b2a063a38e1d
    steps:
      - name: Checkout workflow carrier
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Resolve frozen S8 implementation validation ref
        id: validation
        shell: bash
        run: |
          REF="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
          STATUS_FILE="docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S8-RESTART-READBACK-REBUILD-STATUS.json"
          if [ -f "$STATUS_FILE" ]; then
            IMPLEMENTATION_MERGED="$(node -e "const j=require('./$STATUS_FILE'); process.stdout.write(String(j.s8_implementation_merged === true))")"
            if [ "$IMPLEMENTATION_MERGED" = "true" ]; then
              REF="f14dc4c6aaf1cc8b56530c3f9088a1247f5d4db7"
            fi
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout exact S8 implementation authority
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.validation.outputs.ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Run single-command S8 restart/readback/rebuild preflight
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S8_RESTART_READBACK_REBUILD.cjs

      - name: Verify structured final evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const r = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S8_RESTART_READBACK_REBUILD_PREFLIGHT_RESULT.json', 'utf8'));
          if (r.schema_version !== 'geox_mcft_cap_06_s8_restart_readback_rebuild_preflight_result_v1') throw new Error('S8_RESTART_RESULT_SCHEMA_MISMATCH');
          if (r.status !== 'PASS') throw new Error('S8_RESTART_RESULT_NOT_PASS');
          if (r.evaluation_ref !== 'twin_shadow_evaluation_8cae1f6732420a4999deffc0') throw new Error('S8_RESTART_EVALUATION_REF_MISMATCH');
          if (r.evaluation_hash !== 'sha256:32c43020f45351994120515e5c633531bb594d85659456c65bd46305737d85e0') throw new Error('S8_RESTART_EVALUATION_HASH_MISMATCH');
          if (r.candidate_ref !== 'twin_calibration_candidate_5649b9ab80b5545cf6007387') throw new Error('S8_RESTART_CANDIDATE_REF_MISMATCH');
          if (r.candidate_hash !== 'sha256:a2018a61bf6699b3cc3b8992058eb2c37b4d38d7f70771f9186495144c229a65') throw new Error('S8_RESTART_CANDIDATE_HASH_MISMATCH');
          if (r.evaluation_case_count !== 8 || r.governance_fact_count !== 2) throw new Error('S8_RESTART_CANONICAL_COUNT_MISMATCH');
          if (r.canonical_facts_hash_before !== r.canonical_facts_hash_after) throw new Error('S8_RESTART_CANONICAL_FACT_DIVERGENCE');
          if (r.first_projection_snapshot_hash !== r.second_projection_snapshot_hash) throw new Error('S8_RESTART_PROJECTION_DIVERGENCE');
          if (r.fresh_process_count !== 2) throw new Error('S8_RESTART_FRESH_PROCESS_COUNT_MISMATCH');
          if (r.exact_readback_verified !== true || r.deterministic_second_rebuild_verified !== true) throw new Error('S8_RESTART_READBACK_OR_REBUILD_NOT_VERIFIED');
          if (r.first_rebuild_summary.canonical_objects_scanned !== 2 || r.first_rebuild_summary.evaluation_case_rows_rebuilt !== 8) throw new Error('S8_RESTART_FIRST_SUMMARY_MISMATCH');
          if (JSON.stringify(r.first_rebuild_summary) !== JSON.stringify(r.second_rebuild_summary)) throw new Error('S8_RESTART_SUMMARY_DIVERGENCE');
          if (r.canonical_fact_append_count !== 0 || r.canonical_fact_update_count !== 0 || r.canonical_fact_delete_count !== 0) throw new Error('S8_RESTART_CANONICAL_WRITE_VIOLATION');
          if (r.candidate_append_count !== 0 || r.evaluation_append_count !== 0 || r.model_activation_count !== 0 || r.active_config_switch_count !== 0) throw new Error('S8_RESTART_AUTHORITY_BOUNDARY_VIOLATION');
          if (r.runtime_parameter_change_count !== 0 || r.state_mutation_count !== 0 || r.checkpoint_mutation_count !== 0 || r.migration_count !== 0) throw new Error('S8_RESTART_RUNTIME_BOUNDARY_VIOLATION');
          if (r.production_database_used !== false) throw new Error('S8_RESTART_PRODUCTION_DATABASE_VIOLATION');
          if (r.s8_candidate_implemented !== true || r.s8_effective !== false || r.s9_authorized !== false) throw new Error('S8_RESTART_FRONTIER_MISMATCH');
          NODE

      - name: Upload structured evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s8-restart-readback-rebuild-evidence
          path: acceptance-output/
          if-no-files-found: error
