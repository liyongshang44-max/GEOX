name: mcft-cap-06-s1-s0-compat-patch

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/mcft-cap-06-s1-controlled-regime-correction-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch S0 qualification to validate S0 authority independently
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('.')
          source_path = root / 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S0_V2_EXACT_QUALIFICATION.ts'
          text = source_path.read_text(encoding='utf-8')

          old_const = 'const P0_STATUS_PATH = "docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-P0-STATUS.json";\n'
          new_const = old_const + 'const S0_EFFECTIVENESS_PATH = "docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S0-EFFECTIVENESS.json";\n'
          if text.count(old_const) != 1:
              raise SystemExit(f'P0 status constant count={text.count(old_const)}')
          text = text.replace(old_const, new_const)

          old_reads = '''  const p0Status = readJson(P0_STATUS_PATH);
  const currentState = readJson("docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json");'''
          new_reads = '''  const p0Status = readJson(P0_STATUS_PATH);
  const s0Effectiveness = readJson(S0_EFFECTIVENESS_PATH);
  const currentState = readJson("docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json");'''
          if text.count(old_reads) != 1:
              raise SystemExit(f'main read anchor count={text.count(old_reads)}')
          text = text.replace(old_reads, new_reads)

          old_assertions = '''  assert.equal(p0Status.status, "MERGED_EFFECTIVE", "P0_MERGED_EFFECTIVE_REQUIRED");
  assert.equal(p0Status.effectiveness?.effective, true, "P0_EFFECTIVENESS_REQUIRED");
  assert.equal(currentState.status, "MERGED_EFFECTIVE", "CURRENT_STATE_RECONCILIATION_EFFECTIVE_REQUIRED");
  assert.equal(currentState.reconciliation_effective, true, "CURRENT_STATE_RECONCILIATION_EFFECTIVE_REQUIRED");
  assert.equal(currentState.current_state?.s0, "MERGED_EFFECTIVE", "S0_MERGED_EFFECTIVE_REQUIRED");'''
          new_assertions = '''  assert.equal(p0Status.status, "MERGED_EFFECTIVE", "P0_MERGED_EFFECTIVE_REQUIRED");
  assert.equal(p0Status.effectiveness?.effective, true, "P0_EFFECTIVENESS_REQUIRED");
  assert.equal(s0Effectiveness.status, "MERGED_EFFECTIVE", "S0_EFFECTIVENESS_STATUS_REQUIRED");
  assert.equal(s0Effectiveness.effective, true, "S0_EFFECTIVENESS_REQUIRED");
  assert.equal(s0Effectiveness.implementation_merge_commit, "4c93ec59a6ac0b53b43584cbef1a7e0295d6b58a", "S0_IMPLEMENTATION_MERGE_REQUIRED");
  assert.equal(s0Effectiveness.head_to_merge_tree_equivalence, "PASS", "S0_TREE_EQUIVALENCE_REQUIRED");
  assert.equal(s0Effectiveness.postmerge_gate, "PASS", "S0_POSTMERGE_GATE_REQUIRED");
  assert.equal(s0Effectiveness.authorization_effective, true, "S0_AUTHORIZATION_EFFECTIVE_REQUIRED");
  assert.equal(s0Effectiveness.runtime_source_authorized, true, "S0_RUNTIME_SOURCE_AUTHORIZATION_REQUIRED");
  assert.equal(currentState.current_state?.s0, "MERGED_EFFECTIVE", "S0_MERGED_EFFECTIVE_REQUIRED");
  if (currentState.reconciliation_effective === true) {
    assert.equal(currentState.status, "MERGED_EFFECTIVE", "EFFECTIVE_RECONCILIATION_STATUS_REQUIRED");
  } else {
    assert.notEqual(currentState.status, "MERGED_EFFECTIVE", "NON_EFFECTIVE_RECONCILIATION_STATUS_REQUIRED");
    assert.equal(typeof currentState.effectiveness_condition, "string", "ACTIVE_CANDIDATE_EFFECTIVENESS_CONDITION_REQUIRED");
    assert.ok(currentState.effectiveness_condition.length > 0, "ACTIVE_CANDIDATE_EFFECTIVENESS_CONDITION_REQUIRED");
  }'''
          if text.count(old_assertions) != 1:
              raise SystemExit(f'global reconciliation assertion block count={text.count(old_assertions)}')
          text = text.replace(old_assertions, new_assertions)

          old_message = '  ok("merged-effective current-state and CAP-05 predecessor authority are exact");'
          new_message = '  ok("merged-effective S0 authority, active-slice SSOT and CAP-05 predecessor authority are exact");'
          if text.count(old_message) != 1:
              raise SystemExit(f'S0 success message count={text.count(old_message)}')
          text = text.replace(old_message, new_message)
          source_path.write_text(text, encoding='utf-8')

          status_path = root / 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-RESIDUAL-WINDOWS-STATUS.json'
          status = json.loads(status_path.read_text(encoding='utf-8'))
          s0_file = 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S0_V2_EXACT_QUALIFICATION.ts'
          boundary = status['exact_changed_file_boundary']
          if s0_file not in boundary:
              boundary.append(s0_file)
              boundary.sort()
          status['candidate_tree_validation']['exact_changed_file_count'] = 15
          status['candidate_tree_validation']['s0_downstream_state_compatibility'] = 'VALIDATE_S0_EFFECTIVENESS_NOT_GLOBAL_RECONCILIATION_STATUS'
          status_path.write_text(json.dumps(status, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')

          gate_path = root / 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_DATA_CORRECTION.cjs'
          gate = gate_path.read_text(encoding='utf-8')
          anchor = "  assert.equal(status.candidate_tree_validation.runtime_result_ssot_crosscheck, 'PASS');\n"
          addition = anchor + "  assert.equal(status.candidate_tree_validation.exact_changed_file_count, 15);\n  assert.equal(status.exact_changed_file_boundary.includes('scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S0_V2_EXACT_QUALIFICATION.ts'), true);\n"
          if gate.count(anchor) != 1:
              raise SystemExit(f'correction gate status anchor count={gate.count(anchor)}')
          gate_path.write_text(gate.replace(anchor, addition), encoding='utf-8')
          PY

      - name: Remove temporary patch workflow and trigger
        run: |
          set -euo pipefail
          rm -f .github/workflows/mcft-cap-06-s1-s0-compat-patch.yml
          rm -f .github/mcft-cap-06-s1-s0-compat-patch.trigger

      - name: Validate and push permanent patch
        run: |
          set -euo pipefail
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "fix(mcft-cap-06): decouple S0 proof from downstream candidate status"
          git push origin HEAD:${{ github.head_ref }}
