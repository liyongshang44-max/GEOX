name: MCFT-CAP-06 current-state reconciliation materializer

on:
  push:
    branches:
      - agent/mcft-cap-06-current-state-reconciliation-v1

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconcile current-state SSOT
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import re
          import subprocess

          ROOT = pathlib.Path.cwd()
          BASELINE = "1e66ea7efc842b8e547bccc40521d520b4370e69"
          BRANCH = "agent/mcft-cap-06-current-state-reconciliation-v1"
          S0 = "MCFT-CAP-06.GOV-AUTHORIZATION-PREDECESSOR-AND-DATASET-QUALIFICATION-V1"
          WORKFLOW = ".github/workflows/mcft-cap-06-current-state-reconcile.yml"
          P1_PATH = "docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-P-1-STATUS.json"
          P0_PATH = "docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-P0-STATUS.json"
          DELIVERY_PATH = "docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json"
          TASK_PATH = "docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASK.md"
          MAP_PATH = "docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md"
          MATRIX_PATH = "docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json"
          RECORD_PATH = "docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json"
          GATE_PATH = "scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_CURRENT_STATE_RECONCILIATION.cjs"

          def run(*args):
              return subprocess.check_output(args, text=True).strip()

          def read_json(path):
              return json.loads((ROOT / path).read_text(encoding="utf-8"))

          def write_json(path, value):
              target = ROOT / path
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(json.dumps(value, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")

          assert os.environ.get("GITHUB_REF_NAME") == BRANCH
          assert run("git", "rev-parse", "origin/main") == BASELINE
          subprocess.check_call(["git", "merge-base", "--is-ancestor", BASELINE, "HEAD"])

          p1 = read_json(P1_PATH)
          p1["status"] = "MERGED_EFFECTIVE"
          p1["implementation_status"] = "MERGED_EFFECTIVE"
          p1["effectiveness"] = {
              "effective": True,
              "condition": "P_MINUS_1_PR_MERGED_AND_MERGED_MAIN_P_MINUS_1_GATE_PASS",
              "implementation_pr_number": 2496,
              "implementation_exact_head": "762764074e62f186921e0aabd5251f53b5f7ce02",
              "implementation_exact_head_ci_run": 29417804608,
              "merge_commit": "79cd7814eff06ad86f86cdcb379c6f71a77f1ab8",
              "head_to_merge_file_delta_count": 0,
              "head_to_merge_tree_equivalence": "PASS",
              "postmerge_probe_pr_number": 2497,
              "postmerge_probe_workflow_run": 29418272690,
              "postmerge_gate": "PASS",
              "postmerge_probe_closed_without_merge": True,
              "p0_authorized_after_effectiveness": True,
              "next_repository_action_after_effectiveness": "MCFT-CAP-06.P0.CAP-05-TERMINAL-SSOT-RECONCILIATION-AND-PROVISIONAL-SSOT-V1"
          }
          write_json(P1_PATH, p1)

          p0 = read_json(P0_PATH)
          p0["status"] = "MERGED_EFFECTIVE"
          p0["implementation_status"] = "P0_MERGED_EFFECTIVE_S0_AUTHORIZED_NOT_STARTED"
          p0["baseline_main_commit"] = BASELINE
          p0["cap_06_provisional_state"].update({
              "design_status": "CONDITIONAL_FROZEN_AFTER_P_MINUS_1",
              "implementation_status": "P0_MERGED_EFFECTIVE",
              "authorization_effective": False,
              "runtime_source_authorized": False,
              "active_delivery_slice_id": None,
              "successor_authorized": False,
              "predecessor_eligibility": "RESTORED",
              "s0_qualification_authorized": True,
              "s0_status": "AUTHORIZED_NOT_STARTED"
          })
          p0["p0_authority"].update({
              "s0_qualification_authorized_after_p0_effectiveness": True,
              "runtime_source_authorized": False,
              "migration_authorized": False,
              "canonical_write_authorized": False,
              "postgresql_runtime_execution_authorized": False
          })
          p0["effectiveness"] = {
              "effective": True,
              "condition": "P0_PR_MERGED_AND_HEAD_TO_MERGE_TREE_EQUIVALENT_AND_MERGED_MAIN_P0_GATE_PASS",
              "implementation_pr_number": 2498,
              "implementation_exact_head": "13957179a9547995e0a1443ba400d07c830579fc",
              "implementation_exact_head_ci_run": 29419324004,
              "merge_commit": "a7bb8d9499560b0ef0244a1a6daeaee1eeb408bf",
              "head_to_merge_file_delta_count": 0,
              "head_to_merge_tree_equivalence": "PASS",
              "postmerge_probe_pr_number": 2499,
              "postmerge_probe_workflow_run": 29419841209,
              "postmerge_gate": "PASS",
              "postmerge_probe_closed_without_merge": True,
              "next_repository_action_after_effectiveness": S0
          }
          write_json(P0_PATH, p0)

          delivery = read_json(DELIVERY_PATH)
          delivery.update({
              "status": "GOVERNANCE_AUTHORIZED",
              "implementation_status": "P0_MERGED_EFFECTIVE_S0_AUTHORIZED_NOT_STARTED",
              "authorization_effective": False,
              "runtime_source_authorized": False,
              "active_delivery_slice_id": None,
              "predecessor_eligibility": "RESTORED",
              "s0_qualification_authorized": True,
              "next_repository_action": S0,
              "next_repository_action_after_p0_effectiveness": S0,
              "successor_authorized": False
          })
          delivery["completed_or_effective_slices"] = [
              {
                  "delivery_slice_id": "MCFT-CAP-06.P-1.DT02-CALIBRATION-SHADOW-ADJUDICATION-V1",
                  "status": "MERGED_EFFECTIVE",
                  "merge_commit": "79cd7814eff06ad86f86cdcb379c6f71a77f1ab8",
                  "postmerge_probe_pr_number": 2497,
                  "postmerge_workflow_run": 29418272690
              },
              {
                  "delivery_slice_id": "MCFT-CAP-06.P0.CAP-05-TERMINAL-SSOT-RECONCILIATION-AND-PROVISIONAL-SSOT-V1",
                  "status": "MERGED_EFFECTIVE",
                  "merge_commit": "a7bb8d9499560b0ef0244a1a6daeaee1eeb408bf",
                  "postmerge_probe_pr_number": 2499,
                  "postmerge_workflow_run": 29419841209
              }
          ]
          delivery["candidate_slices"] = []
          delivery["authorized_not_started_slices"] = [
              {
                  "delivery_slice_id": S0,
                  "status": "AUTHORIZED_NOT_STARTED",
                  "authorization_scope": "PREDECESSOR_QUALIFICATION_ONLY"
              }
          ]
          delivery["blocked_slices"] = [item for item in delivery.get("blocked_slices", []) if item != S0]
          delivery["superseded_candidates"] = [{
              "pull_request": 2500,
              "status": "CLOSED_NOT_MERGED",
              "reason": "S0_REBUILD_REQUIRED_RECURSIVE_CANONICAL_HASH_AND_EXACT_GRAPH_QUALIFICATION"
          }]
          write_json(DELIVERY_PATH, delivery)

          task_path = ROOT / TASK_PATH
          task = task_path.read_text(encoding="utf-8")
          status_block = '''当前状态：

```text
architecture_direction:
CONFORMANT

design_status:
CONDITIONAL_FROZEN_AFTER_P_MINUS_1

implementation_status:
P0_MERGED_EFFECTIVE_S0_AUTHORIZED_NOT_STARTED

runtime_implementation_status:
NOT_STARTED

authorization_effective:
false

s0_qualification_authorized:
true

runtime_source_authorized:
false

active_delivery_slice_id:
null

predecessor_eligibility:
RESTORED

dt02_architecture_amendment_status:
NOT_REQUIRED

first_permitted_repository_action:
MCFT-CAP-06.GOV-AUTHORIZATION-PREDECESSOR-AND-DATASET-QUALIFICATION-V1
```

本文件冻结 MCFT-CAP-06 的能力目标、边界和任务顺序。P-1 与 P0 均已 merged-main effective；CAP-05 predecessor eligibility 已恢复，S0 qualification 已授权但尚未开始。CAP-06 Runtime source、migration、canonical write、Model Activation、active-config switch、public route、Web、MCFT-CAP-07 与 Shadow-Online Runtime 仍未授权。'''
          task, count = re.subn(r'当前状态：\n\n```text\n.*?```\n\n本文件冻结 MCFT-CAP-06.*?Shadow-Online Runtime。', status_block, task, count=1, flags=re.S)
          assert count == 1
          task_path.write_text(task, encoding="utf-8")

          map_path = ROOT / MAP_PATH
          implementation_map = map_path.read_text(encoding="utf-8")
          map_block = '''<!-- MCFT-CAP-06-P0-CURRENT-STATE-BEGIN -->
## MCFT-CAP-06 current-state reconciliation

```text
baseline merged main:
1e66ea7efc842b8e547bccc40521d520b4370e69

P-1 status:
MERGED_EFFECTIVE

P-1 outcome:
REUSE_WITHOUT_AMENDMENT_CONFIG_OBJECT_NOT_REQUIRED

P0 status:
MERGED_EFFECTIVE

CAP-05 predecessor eligibility:
RESTORED

S0 qualification authorization:
EFFECTIVE

S0 status:
AUTHORIZED_NOT_STARTED

capability-line authorization effective:
false

runtime source authorized:
false

active delivery slice:
null

P-1A:
OMITTED

conditional S4:
OMITTED

S3 migration adjudication:
EXACTLY_ONE_ADDITIVE_MIGRATION

superseded S0 PR:
#2500 CLOSED_NOT_MERGED

successor MCFT-CAP-07 authorized:
false
```

The reconciled frontier records repository facts only: P-1 and P0 are merged-main effective, CAP-05 predecessor eligibility is restored, and S0 qualification is authorized but not started. No CAP-06 Runtime, migration, canonical write, Candidate, Evaluation, Model Activation, active-binding, public route, Web, scheduler or successor authority is granted.
<!-- MCFT-CAP-06-P0-CURRENT-STATE-END -->'''
          implementation_map, count = re.subn(r'<!-- MCFT-CAP-06-P0-CURRENT-STATE-BEGIN -->.*?<!-- MCFT-CAP-06-P0-CURRENT-STATE-END -->', map_block, implementation_map, count=1, flags=re.S)
          assert count == 1
          map_path.write_text(implementation_map, encoding="utf-8")

          matrix = read_json(MATRIX_PATH)
          matrix["baseline"] = {
              "branch": "main",
              "commit": BASELINE,
              "meaning": "MCFT-CAP-06 P-1 and P0 merged-main effective; CAP-05 predecessor eligibility restored; S0 qualification authorized but not started; CAP-06 Runtime remains unauthorized"
          }
          cap06 = next(item for item in matrix["capability_lines"] if item["capability_line_id"] == "MCFT-CAP-06")
          cap06.update({
              "status": "GOVERNANCE_AUTHORIZED",
              "implementation_status": "P0_MERGED_EFFECTIVE_S0_AUTHORIZED_NOT_STARTED",
              "authorization_effective": False,
              "s0_qualification_authorized": True,
              "runtime_source_authorized": False,
              "active_delivery_slice_id": None,
              "predecessor_eligibility": "RESTORED",
              "successor_authorized": False,
              "next_repository_action": S0
          })
          cap06["p0"] = {
              "delivery_slice_id": "MCFT-CAP-06.P0.CAP-05-TERMINAL-SSOT-RECONCILIATION-AND-PROVISIONAL-SSOT-V1",
              "status": "MERGED_EFFECTIVE",
              "effective": True,
              "implementation_pr_number": 2498,
              "merge_commit": "a7bb8d9499560b0ef0244a1a6daeaee1eeb408bf",
              "postmerge_probe_pr_number": 2499,
              "postmerge_workflow_run": 29419841209
          }
          cap06["s0"] = {
              "delivery_slice_id": S0,
              "status": "AUTHORIZED_NOT_STARTED",
              "authorization_scope": "PREDECESSOR_QUALIFICATION_ONLY",
              "runtime_source_authorized": False,
              "superseded_pull_request": 2500
          }
          cap06["preserved_nonclaims"] = [
              "NO_RUNTIME_SOURCE_AUTHORIZATION",
              "NO_MIGRATION",
              "NO_CANONICAL_WRITE",
              "NO_CALIBRATION_CANDIDATE",
              "NO_SHADOW_EVALUATION",
              "NO_MODEL_ACTIVATION",
              "NO_ACTIVE_CONFIG_SWITCH",
              "NO_S0_EFFECTIVENESS",
              "NO_MCFT_CAP_07_AUTHORIZATION"
          ]
          matrix["latest_governance_update"] = "MCFT-CAP-06.CURRENT-STATE-RECONCILIATION-V1"
          write_json(MATRIX_PATH, matrix)

          record = {
              "schema_version": "geox_mcft_cap_06_current_state_reconciliation_v1",
              "reconciliation_id": "MCFT-CAP-06.CURRENT-STATE-RECONCILIATION-V1",
              "capability_line_id": "MCFT-CAP-06",
              "baseline_main_commit": BASELINE,
              "status": "READY_FOR_MERGE",
              "reconciliation_effective": False,
              "current_state": {
                  "p_minus_1": "MERGED_EFFECTIVE",
                  "p0": "MERGED_EFFECTIVE",
                  "cap_05_predecessor_eligibility": "RESTORED",
                  "s0_qualification_authorized": True,
                  "s0": "AUTHORIZED_NOT_STARTED",
                  "capability_line_authorization_effective": False,
                  "runtime_source_authorized": False,
                  "active_delivery_slice_id": None,
                  "candidate_runtime_implemented": False,
                  "shadow_evaluation_runtime_implemented": False,
                  "capability_complete": False
              },
              "proof": {
                  "p_minus_1": {
                      "implementation_pr_number": 2496,
                      "merge_commit": "79cd7814eff06ad86f86cdcb379c6f71a77f1ab8",
                      "postmerge_probe_pr_number": 2497,
                      "postmerge_workflow_run": 29418272690,
                      "postmerge_gate": "PASS"
                  },
                  "p0": {
                      "implementation_pr_number": 2498,
                      "exact_head": "13957179a9547995e0a1443ba400d07c830579fc",
                      "exact_head_ci_run": 29419324004,
                      "merge_commit": "a7bb8d9499560b0ef0244a1a6daeaee1eeb408bf",
                      "postmerge_probe_pr_number": 2499,
                      "postmerge_workflow_run": 29419841209,
                      "postmerge_gate": "PASS",
                      "head_to_merge_file_delta_count": 0
                  },
                  "cap_05_predecessor_remediation": {
                      "effectiveness_pr_number": 2504,
                      "effectiveness_merge_commit": BASELINE,
                      "exact_merged_main_proof_workflow_run": 29441019824,
                      "formal_postgresql_runner": "PASS_MERGED_MAIN",
                      "predecessor_eligibility": "RESTORED",
                      "s0_resume_scope": "PREDECESSOR_QUALIFICATION_ONLY"
                  }
              },
              "superseded_candidates": [{
                  "pull_request": 2500,
                  "status": "CLOSED_NOT_MERGED",
                  "replacement_required": "S0_V2"
              }],
              "next_repository_action": S0,
              "preserved_nonclaims": [
                  "NO_CAP_06_RUNTIME_SOURCE_AUTHORIZATION",
                  "NO_CAP_06_MIGRATION_AUTHORIZATION",
                  "NO_CAP_06_CANONICAL_WRITE_AUTHORIZATION",
                  "NO_RESIDUAL_WINDOW_CREATED",
                  "NO_CALIBRATION_CANDIDATE",
                  "NO_SHADOW_EVALUATION",
                  "NO_MODEL_ACTIVATION",
                  "NO_ACTIVE_CONFIG_SWITCH",
                  "NO_PUBLIC_ROUTE",
                  "NO_WEB",
                  "NO_SCHEDULER",
                  "NO_MCFT_CAP_07_AUTHORIZATION"
              ],
              "effectiveness_condition": "RECONCILIATION_PR_MERGED_TO_MAIN_AND_MERGED_MAIN_GATE_PASS",
              "materialization_workflow_run": int(os.environ["GITHUB_RUN_ID"])
          }
          write_json(RECORD_PATH, record)

          gate = r'''// scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_CURRENT_STATE_RECONCILIATION.cjs
// Purpose: fail closed unless the MCFT-CAP-06 current-state frontier matches merged repository facts and preserves the no-Runtime boundary.

const assert = require("node:assert/strict");
const cp = require("node:child_process");
const fs = require("node:fs");
const path = require("node:path");

const ROOT = path.resolve(__dirname, "../..");
const BASELINE = "1e66ea7efc842b8e547bccc40521d520b4370e69";
const S0 = "MCFT-CAP-06.GOV-AUTHORIZATION-PREDECESSOR-AND-DATASET-QUALIFICATION-V1";
const FILES = [
  "docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md",
  "docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json",
  "docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json",
  "docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json",
  "docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-P-1-STATUS.json",
  "docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-P0-STATUS.json",
  "docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASK.md",
  "scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_CURRENT_STATE_RECONCILIATION.cjs"
].sort();

function run(args) {
  return cp.execFileSync("git", args, { cwd: ROOT, encoding: "utf8" }).trim();
}
function readJson(relativePath) {
  return JSON.parse(fs.readFileSync(path.join(ROOT, relativePath), "utf8"));
}
function text(relativePath) {
  return fs.readFileSync(path.join(ROOT, relativePath), "utf8");
}

cp.execFileSync("git", ["merge-base", "--is-ancestor", BASELINE, "HEAD"], { cwd: ROOT });
const tracked = run(["diff", "--name-only", BASELINE]).split(/\r?\n/).filter(Boolean);
const untracked = run(["ls-files", "--others", "--exclude-standard"]).split(/\r?\n/).filter(Boolean);
const changed = [...new Set([...tracked, ...untracked])].sort();
assert.deepEqual(changed, FILES, `CURRENT_STATE_FILE_BOUNDARY:${changed.join(",")}`);
assert.equal(fs.existsSync(path.join(ROOT, ".github/workflows/mcft-cap-06-current-state-reconcile.yml")), false);

const p1 = readJson("docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-P-1-STATUS.json");
assert.equal(p1.status, "MERGED_EFFECTIVE");
assert.equal(p1.effectiveness.effective, true);
assert.equal(p1.effectiveness.merge_commit, "79cd7814eff06ad86f86cdcb379c6f71a77f1ab8");
assert.equal(p1.effectiveness.postmerge_gate, "PASS");

const p0 = readJson("docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-P0-STATUS.json");
assert.equal(p0.status, "MERGED_EFFECTIVE");
assert.equal(p0.effectiveness.effective, true);
assert.equal(p0.effectiveness.merge_commit, "a7bb8d9499560b0ef0244a1a6daeaee1eeb408bf");
assert.equal(p0.cap_06_provisional_state.predecessor_eligibility, "RESTORED");
assert.equal(p0.cap_06_provisional_state.s0_qualification_authorized, true);
assert.equal(p0.cap_06_provisional_state.s0_status, "AUTHORIZED_NOT_STARTED");
assert.equal(p0.cap_06_provisional_state.runtime_source_authorized, false);

const predecessor = readJson("docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-POST-CLOSURE-RUNTIME-CONFORMANCE-STATUS.json");
assert.equal(predecessor.post_closure_conformance_status, "POST_CLOSURE_RUNTIME_CONFORMANCE_REMEDIATION_EFFECTIVE");
assert.equal(predecessor.formal_postgresql_runner_regression.status, "PASS_MERGED_MAIN");
assert.equal(predecessor.successor_predecessor_eligibility, "RESTORED");
assert.equal(predecessor.cap_06_s0_resume_authorized, true);
assert.equal(predecessor.cap_06_runtime_authority, false);

const delivery = readJson("docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json");
assert.equal(delivery.status, "GOVERNANCE_AUTHORIZED");
assert.equal(delivery.authorization_effective, false);
assert.equal(delivery.runtime_source_authorized, false);
assert.equal(delivery.active_delivery_slice_id, null);
assert.equal(delivery.s0_qualification_authorized, true);
assert.equal(delivery.authorized_not_started_slices.length, 1);
assert.equal(delivery.authorized_not_started_slices[0].delivery_slice_id, S0);
assert.equal(delivery.candidate_slices.length, 0);
assert.equal(delivery.superseded_candidates[0].pull_request, 2500);
assert.equal(delivery.superseded_candidates[0].status, "CLOSED_NOT_MERGED");

const record = readJson("docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json");
assert.equal(record.status, "READY_FOR_MERGE");
assert.equal(record.reconciliation_effective, false);
assert.equal(record.current_state.p_minus_1, "MERGED_EFFECTIVE");
assert.equal(record.current_state.p0, "MERGED_EFFECTIVE");
assert.equal(record.current_state.cap_05_predecessor_eligibility, "RESTORED");
assert.equal(record.current_state.s0_qualification_authorized, true);
assert.equal(record.current_state.s0, "AUTHORIZED_NOT_STARTED");
assert.equal(record.current_state.capability_line_authorization_effective, false);
assert.equal(record.current_state.runtime_source_authorized, false);
assert.equal(record.current_state.active_delivery_slice_id, null);
assert.equal(record.current_state.candidate_runtime_implemented, false);
assert.equal(record.current_state.shadow_evaluation_runtime_implemented, false);
assert.equal(record.current_state.capability_complete, false);
assert.equal(record.next_repository_action, S0);

const matrix = readJson("docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json");
assert.equal(matrix.baseline.commit, BASELINE);
const cap06 = matrix.capability_lines.find((item) => item.capability_line_id === "MCFT-CAP-06");
assert.ok(cap06);
assert.equal(cap06.status, "GOVERNANCE_AUTHORIZED");
assert.equal(cap06.p_minus_1.status, "MERGED_EFFECTIVE");
assert.equal(cap06.p0.status, "MERGED_EFFECTIVE");
assert.equal(cap06.p0.effective, true);
assert.equal(cap06.s0.status, "AUTHORIZED_NOT_STARTED");
assert.equal(cap06.authorization_effective, false);
assert.equal(cap06.runtime_source_authorized, false);
assert.equal(cap06.active_delivery_slice_id, null);
assert.equal(cap06.successor_authorized, false);

const task = text("docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASK.md");
assert.match(task, /P0_MERGED_EFFECTIVE_S0_AUTHORIZED_NOT_STARTED/);
assert.match(task, /s0_qualification_authorized:\ntrue/);
assert.match(task, /runtime_source_authorized:\nfalse/);
const map = text("docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md");
assert.match(map, /P0 status:\nMERGED_EFFECTIVE/);
assert.match(map, /S0 status:\nAUTHORIZED_NOT_STARTED/);
assert.match(map, /runtime source authorized:\nfalse/);

console.log("PASS MCFT-CAP-06 current-state reconciliation Gate");
'''
          gate_target = ROOT / GATE_PATH
          gate_target.parent.mkdir(parents=True, exist_ok=True)
          gate_target.write_text(gate, encoding="utf-8")

          (ROOT / WORKFLOW).unlink()
          PY
          node -c scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_CURRENT_STATE_RECONCILIATION.cjs
