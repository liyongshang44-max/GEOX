name: mcft-cap-06-s2-corrected-finalizer

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize-corrected-s2:
    if: github.head_ref == 'agent/mcft-cap-06-s2-contracts-math-corrected-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout required refs quietly
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --quiet origin \
            agent/mcft-cap-06-s2-contracts-math-corrected-v1:refs/remotes/origin/agent/mcft-cap-06-s2-contracts-math-corrected-v1 \
            main:refs/remotes/origin/main \
            f173186f8cd2940bd7082042d0d053e5a874f7c0
          git checkout -q -B agent/mcft-cap-06-s2-contracts-math-corrected-v1 origin/agent/mcft-cap-06-s2-contracts-math-corrected-v1

      - name: Restore exact materializer and generate corrected source
        env:
          OLD_S2_HEAD: f173186f8cd2940bd7082042d0d053e5a874f7c0
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import hashlib
          import pathlib
          import struct
          import zlib

          recovered_path = pathlib.Path('.github/mcft_cap06_s2_materializer_recovered.py')
          payload_path = pathlib.Path('.github/mcft_cap06_s2_materializer.py.gz.b64')
          output_path = pathlib.Path('.github/mcft_cap06_s2_materializer.py')
          text = recovered_path.read_text(encoding='utf-8')
          for old, new in [
              ('id0ut', 'input'), ('Id0ut', 'Input'),
              ('out0ut', 'output'), ('Out0ut', 'Output'),
              ('idteger', 'integer'), ('Idteger', 'Integer'),
              ('idtentionally', 'intentionally'), ('Idtentionally', 'Intentionally'),
              ('com0ute', 'compute'), ('Com0ute', 'Compute'),
          ]:
              text = text.replace(old, new)
          raw = base64.b64decode(''.join(payload_path.read_text(encoding='utf-8').split()), validate=True)
          expected_crc, expected_size = struct.unpack('<II', raw[-8:])
          restored = text.encode('utf-8')
          if zlib.crc32(restored) != expected_crc or len(restored) % (1 << 32) != expected_size:
              raise SystemExit('S2_MATERIALIZER_EXACT_RESTORATION_FAILED')
          compile(text, str(output_path), 'exec')
          output_path.write_text(text, encoding='utf-8', newline='\n')
          print('S2_MATERIALIZER_RESTORED_SHA256=' + hashlib.sha256(restored).hexdigest())
          PY
          files=(
            apps/server/src/domain/calibration/contracts_v1.ts
            apps/server/src/domain/calibration/fixed_point_metric_v1.ts
            apps/server/src/domain/calibration/exact_ref_port_v1.ts
            apps/server/src/domain/calibration/case_builder_v1.ts
            apps/server/src/domain/calibration/grid_search_v1.ts
            apps/server/src/domain/calibration/shadow_evaluation_v1.ts
            apps/server/src/domain/calibration/envelope_profiles_v1.ts
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.ts
          )
          for file in "${files[@]}"; do
            mkdir -p "$(dirname "$file")"
            git show "$OLD_S2_HEAD:$file" > "$file"
          done
          python .github/mcft_cap06_s2_materializer.py source
          python - <<'PY'
          from pathlib import Path

          p = Path('scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.ts')
          text = p.read_text(encoding='utf-8')
          import_anchor = 'import { semanticHashV1 } from "../../apps/server/src/domain/twin_runtime/canonical_identity_v1.js";\n'
          import_addition = import_anchor + 'import { validateCap04RuntimeConfigPayloadV1 } from "../../apps/server/src/domain/twin_runtime/forecast_scenario_runtime_config_v1.js";\n'
          if text.count(import_anchor) != 1:
              raise SystemExit('S2_CONFIG_VALIDATOR_IMPORT_ANCHOR_MISMATCH')
          text = text.replace(import_anchor, import_addition, 1)
          old_helper = '''function fixed6V1(value: unknown, code: string): string {
  return formatFixedDecimalV1(parseFixedDecimalV1(value, 6, code), 6);
}'''
          new_helper = '''function fixed6V1(value: unknown, code: string): string {
  if (typeof value !== "number" || !Number.isFinite(value)) throw new Error(code);
  return formatFixedDecimalV1(parseFixedDecimalV1(String(value), 6, code), 6);
}'''
          if text.count(old_helper) != 1:
              raise SystemExit('S2_FIXED6_HELPER_ANCHOR_MISMATCH')
          text = text.replace(old_helper, new_helper, 1)
          old_payload = '  const payload = caseItem.source_runtime_config.payload as Record<string, any>;\n'
          new_payload = '  const payload = caseItem.source_runtime_config.payload;\n  validateCap04RuntimeConfigPayloadV1(payload);\n'
          if text.count(old_payload) != 1:
              raise SystemExit('S2_CONFIG_PAYLOAD_ANCHOR_MISMATCH')
          text = text.replace(old_payload, new_payload, 1)
          p.write_text(text, encoding='utf-8', newline='\n')
          PY
          git diff --check
          grep -F '1_000_000n as const' apps/server/src/domain/calibration/grid_search_v1.ts
          ! grep -F 'Number(value)' scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.ts
          ! grep -F '.toFixed(' scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.ts
          grep -F 'validateCap04RuntimeConfigPayloadV1(payload)' scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.ts
          grep -F 'parseFixedDecimalV1(String(value), 6, code)' scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.ts

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run corrected S2 contracts and math acceptance
        run: |
          set -euo pipefail
          mkdir -p acceptance-output
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.ts 2>&1 | tee acceptance-output/MCFT_CAP_06_S2_CONTRACTS_MATH.log
          test -s acceptance-output/MCFT_CAP_06_S2_CONTRACTS_MATH_RESULT.json

      - name: Upload S2 diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s2-corrected-finalizer-evidence
          path: acceptance-output/
          if-no-files-found: error
          retention-days: 7

      - name: Materialize SSOT and governance Gate
        run: |
          set -euo pipefail
          python .github/mcft_cap06_s2_materializer.py materialize
          python -m json.tool docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S2-CONTRACTS-MATH.json >/dev/null
          python -m json.tool docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S2-STATUS.json >/dev/null
          node --check scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.cjs
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.cjs
          git diff --check

      - name: Typecheck and build
        run: |
          set -euo pipefail
          pnpm -r typecheck
          pnpm -r build

      - name: Re-run acceptance and Gate after build
        run: |
          set -euo pipefail
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.ts
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.cjs

      - name: Remove temporary files and verify exact 17-file boundary
        run: |
          set -euo pipefail
          rm -f .github/mcft_cap06_s2_materializer.py.gz.b64
          rm -f .github/mcft_cap06_s2_materializer.py
          rm -f .github/mcft_cap06_s2_materializer_recovered.py
          rm -f .github/mcft_cap06_s2_materializer_transport.json
          rm -rf .github/__pycache__ acceptance-output
          rm -f .github/workflows/mcft-cap-06-s2-corrected-materializer.yml
          rm -f .github/workflows/mcft-cap-06-s2-corrected-finalizer.yml
          mapfile -t actual < <(git diff --name-only origin/main | sort)
          cat > /tmp/expected.txt <<'EOF'
          apps/server/src/domain/calibration/case_builder_v1.ts
          apps/server/src/domain/calibration/contracts_v1.ts
          apps/server/src/domain/calibration/envelope_profiles_v1.ts
          apps/server/src/domain/calibration/exact_ref_port_v1.ts
          apps/server/src/domain/calibration/fixed_point_metric_v1.ts
          apps/server/src/domain/calibration/grid_search_v1.ts
          apps/server/src/domain/calibration/shadow_evaluation_v1.ts
          docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md
          docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S2-CONTRACTS-MATH.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S2-STATUS.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASK.md
          scripts/acceptance/run_acceptance.cjs
          scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.cjs
          scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.ts
          EOF
          sed -i 's/^          //' /tmp/expected.txt
          diff -u /tmp/expected.txt <(printf '%s\n' "${actual[@]}")
          test "${#actual[@]}" -eq 17
          git diff --check

      - name: Commit bounded corrected S2 candidate
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "feat(mcft-cap-06): implement corrected S2 contracts and math"
          git push origin HEAD:agent/mcft-cap-06-s2-contracts-math-corrected-v1
