name: mcft-cap-07-s4-file-snapshot-temp
on:
  pull_request:
    paths: ['.github/workflows/mcft-cap-07-s4-file-snapshot-temp.yml']
permissions:
  contents: read
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - run: git rev-parse HEAD^{tree} > current-tree-sha.txt
      - uses: actions/upload-artifact@v4
        with:
          name: s4-current-tree-${{ github.event.pull_request.head.sha }}
          path: current-tree-sha.txt
          retention-days: 1
