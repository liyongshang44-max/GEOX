name: mcft-cap-06-s11b-merged-main-finalization-proof

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s11b-merged-main-finalization-proof.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  s11b-exact-merged-main-finalization:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      MCFT_CAP_06_S11A_BASE_REF: b13a0057a8c9e93f3f4fcf8194b84149f1d2b1b5
    steps:
      - name: Checkout proof carrier
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify exact S11A merge topology
        shell: bash
        run: |
          set -euo pipefail
          BASE='b13a0057a8c9e93f3f4fcf8194b84149f1d2b1b5'
          CANDIDATE='be2c79b4c68a5ae9ec1d0fc05ec27850decf0b5e'
          MERGE='00476d1ca9ec33f01ad58555f54daa5d582580f9'
          test "$(git rev-parse HEAD^)" = "$MERGE"
          test "$(git rev-list --count "$BASE..$CANDIDATE")" = '1'
          test "$(git rev-list --count "$BASE..$MERGE")" = '2'
          test "$(git diff --name-only "$BASE...$CANDIDATE" | sed '/^$/d' | wc -l | tr -d ' ')" = '19'
          test "$(git diff --name-only "$CANDIDATE" "$MERGE" | sed '/^$/d' | wc -l | tr -d ' ')" = '0'
          test "$(git rev-parse "$CANDIDATE^{tree}")" = "$(git rev-parse "$MERGE^{tree}")"

      - name: Checkout exact S11A merge
        uses: actions/checkout@v4
        with:
          ref: 00476d1ca9ec33f01ad58555f54daa5d582580f9
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Run exact merged-main S11A closure Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_CLOSURE.cjs

      - name: Typecheck and build exact S11A merge
        run: |
          pnpm -r typecheck
          pnpm -r build
          pnpm --filter @geox/server run test:p1:selfcheck

      - name: Create isolated bounded-chain regression database
        shell: bash
        run: |
          set -euo pipefail
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          SELECT pg_terminate_backend(pid)
            FROM pg_stat_activity
           WHERE datname='mcft_cap06_s11b_runtime_regression'
             AND pid<>pg_backend_pid();
          DROP DATABASE IF EXISTS mcft_cap06_s11b_runtime_regression;
          CREATE DATABASE mcft_cap06_s11b_runtime_regression;
          SQL

      - name: Run permanent controlled bounded-chain PostgreSQL regression
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/mcft_cap06_s11b_runtime_regression
          MCFT_CAP_06_S10_BOUNDED_CHAIN_DESTRUCTIVE_ACCEPTANCE: '1'
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S10_BOUNDED_CHAIN_DB.ts

      - name: Run separate repository-history qualification regression
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S0_V2_HONEST_QUALIFICATION.cjs

      - name: Verify S11B structured evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const closure = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S11A_CLOSURE_RESULT.json', 'utf8'));
          const controlled = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S10_BOUNDED_CHAIN_DB_RESULT.json', 'utf8'));
          const repository = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S0_V2_RESULT.json', 'utf8'));
          if (closure.status !== 'PASS' || closure.exact_head !== '00476d1ca9ec33f01ad58555f54daa5d582580f9') throw new Error('S11B_EXACT_MERGED_MAIN_CLOSURE_GATE_INVALID');
          if (closure.hard_acceptance_total_check_count !== 255 || closure.hard_acceptance_pass_count !== 255) throw new Error('S11B_HARD_ACCEPTANCE_INVALID');
          if (closure.pending_completion_claim_count !== 48 || closure.effective_completion_claim_count !== 0) throw new Error('S11B_COMPLETION_CLAIM_STATE_INVALID');
          if (closure.closure_effective !== false || closure.capability_complete !== false) throw new Error('S11B_PREMATURE_CLOSURE_EFFECTIVENESS');
          if (closure.s11b_authorized !== false || closure.s11c_authorized !== false || closure.s11d_authorized !== false) throw new Error('S11B_REPOSITORY_SSOT_PREMATURELY_ADVANCED');
          if (controlled.status !== 'PASS') throw new Error('S11B_CONTROLLED_POSTGRESQL_REGRESSION_FAILED');
          if (controlled.actual_r !== 24 || controlled.actual_c !== 0 || controlled.actual_cap06_canonical_delta !== 36) throw new Error('S11B_CONTROLLED_DELTA_INVALID');
          if (controlled.completed_replay_additional_fact_count !== 0 || controlled.completed_replay_projection_divergence_count !== 0 || controlled.completed_replay_evidence_load_count !== 0) throw new Error('S11B_CONTROLLED_REPLAY_NOT_ZERO_WRITE');
          if (controlled.candidate_consumed !== false || controlled.evaluation_consumed !== false || controlled.model_activation_count !== 0 || controlled.active_config_snapshot_changed !== false) throw new Error('S11B_RUNTIME_AUTHORITY_CHANGED');
          if (!repository.qualification || typeof repository.qualification !== 'object') throw new Error('S11B_REPOSITORY_QUALIFICATION_PAYLOAD_MISSING');
          if (repository.qualification.dataset_qualification_status !== 'INSUFFICIENT_MATCHED_PAIRS') throw new Error('S11B_REPOSITORY_QUALIFICATION_STATUS_INVALID');
          if (repository.qualification.canonical_residual_count !== 1 || repository.qualification.eligible_matched_pair_count !== 1) throw new Error('S11B_REPOSITORY_QUALIFICATION_COUNTS_INVALID');
          NODE

      - name: Upload S11B proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s11b-merged-main-finalization-proof
          path: acceptance-output/
          if-no-files-found: error
