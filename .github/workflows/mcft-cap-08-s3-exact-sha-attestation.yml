name: mcft-cap-08-s3-exact-sha-attestation

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/mcft-cap-08-s3-decision-action-feedback.yml'
      - '.github/workflows/mcft-cap-08-s3-exact-sha-attestation.yml'
      - 'docs/digital_twin/mcft/cap_08/GEOX-MCFT-CAP-08-S3-*'
      - 'apps/server/src/domain/twin_runtime/cap08_s3_**'
      - 'apps/server/src/persistence/twin_runtime/postgres_approval_plan_evidence_repository_v1.ts'
      - 'apps/server/src/persistence/twin_runtime/postgres_immutable_decision_action_commit_repository_v1.ts'
      - 'apps/server/src/runtime/twin_runtime/action_feedback_normalization_service_v1.ts'
      - 'apps/server/src/runtime/twin_runtime/action_feedback_tick_selector_v1.ts'
      - 'apps/server/src/runtime/twin_runtime/human_decision_service_v1.ts'
      - 'apps/server/src/runtime/twin_runtime/cap08_s3_**'
      - 'apps/server/src/runtime/twin_runtime/receipt_consuming_forecast_scenario_tick_service_v1.ts'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_**'
      - 'scripts/governance_acceptance/mcft_cap08_s3_**'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_**'
      - 'scripts/runtime_acceptance/mcft_cap08_s3_**'
  workflow_dispatch:
    inputs:
      subject_sha:
        description: Exact current main merge SHA
        required: true
        type: string

permissions:
  contents: read
  actions: read
  pull-requests: read
  statuses: write

concurrency:
  group: mcft-cap08-s3-exact-${{ inputs.subject_sha || github.sha }}
  cancel-in-progress: false

jobs:
  exact-sha-attestation:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      MCFT_SUBJECT_SHA: ${{ inputs.subject_sha || github.sha }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 3s
          --health-timeout 2s
          --health-retries 30
    steps:
      - name: Checkout exact subject SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.subject_sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Validate automatic or current-main manual subject
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "${MCFT_SUBJECT_SHA}"
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            git fetch --no-tags origin main
            test "$(git rev-parse origin/main)" = "${MCFT_SUBJECT_SHA}"
          fi
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - name: Install locked workspace
        run: pnpm install --frozen-lockfile
      - name: Typecheck exact subject
        run: pnpm --filter @geox/server typecheck
      - name: Prove exact merge SHA declaration tree and independent review
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_EXACT_SHA_ATTESTATION.cjs
      - name: Resolve candidate identity
        id: tree
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const a=JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_08_S3_EXACT_SHA_ATTESTATION_RESULT.json','utf8'));
          fs.appendFileSync(process.env.GITHUB_OUTPUT,`base=${a.base_head_sha}\ncandidate=${a.candidate_head_sha}\nsubject=${a.subject_sha}\n`);
          NODE
      - name: Replay exact candidate boundary on detached candidate SHA
        env:
          MCFT_BASE_SHA: ${{ steps.tree.outputs.base }}
        run: |
          git checkout --detach "${{ steps.tree.outputs.candidate }}"
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_BOUNDARY.cjs
          git checkout --detach "${{ steps.tree.outputs.subject }}"

      - name: Bootstrap exact S3 positive database
        env:
          MCFT_CAP08_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
          MCFT_CAP08_TARGET_DATABASE_NAME: geox_mcft_cap08_s3_exact_positive
          MCFT_CAP08_RUNNER_PASSWORD: cap08-s3-exact-positive-runner-password
          MCFT_CAP08_MIGRATOR_PASSWORD: cap08-s3-exact-positive-migrator-password
          MCFT_CAP08_LEGACY_RUNTIME_PASSWORD: cap08-s3-exact-positive-legacy-password
          MCFT_CANDIDATE_SHA: ${{ steps.tree.outputs.candidate }}
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_PLATFORM_SECURITY_BOOTSTRAP_DB.ts
      - name: Reexecute exact S3 positive proof
        env:
          DATABASE_URL: postgres://geox_mcft_cap08_runner_v1:cap08-s3-exact-positive-runner-password@127.0.0.1:5432/geox_mcft_cap08_s3_exact_positive
          MCFT_CAP08_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox_mcft_cap08_s3_exact_positive
          MCFT_CAP08_S2_G3_DESTRUCTIVE_ACCEPTANCE: '1'
          MCFT_CAP08_S3_DESTRUCTIVE_ACCEPTANCE: '1'
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_DECISION_ACTION_DB.ts
      - name: Cleanup exact S3 positive database
        if: always()
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='geox_mcft_cap08_s3_exact_positive' AND pid<>pg_backend_pid();"
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "DROP DATABASE IF EXISTS geox_mcft_cap08_s3_exact_positive;"

      - name: Bootstrap exact S3 negative database
        env:
          MCFT_CAP08_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
          MCFT_CAP08_TARGET_DATABASE_NAME: geox_mcft_cap08_s3_exact_negative
          MCFT_CAP08_RUNNER_PASSWORD: cap08-s3-exact-negative-runner-password
          MCFT_CAP08_MIGRATOR_PASSWORD: cap08-s3-exact-negative-migrator-password
          MCFT_CAP08_LEGACY_RUNTIME_PASSWORD: cap08-s3-exact-negative-legacy-password
          MCFT_CANDIDATE_SHA: ${{ steps.tree.outputs.candidate }}
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_PLATFORM_SECURITY_BOOTSTRAP_DB.ts
      - name: Reexecute exact S3 negative and pointer matrix
        env:
          DATABASE_URL: postgres://geox_mcft_cap08_runner_v1:cap08-s3-exact-negative-runner-password@127.0.0.1:5432/geox_mcft_cap08_s3_exact_negative
          MCFT_CAP08_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox_mcft_cap08_s3_exact_negative
          MCFT_CAP08_S2_G3_DESTRUCTIVE_ACCEPTANCE: '1'
          MCFT_CAP08_S3_NEGATIVE_DESTRUCTIVE_ACCEPTANCE: '1'
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_NEGATIVE_DB.ts
      - name: Reexecute exact deferred-receipt and pointer edge proof
        env:
          DATABASE_URL: postgres://geox_mcft_cap08_runner_v1:cap08-s3-exact-negative-runner-password@127.0.0.1:5432/geox_mcft_cap08_s3_exact_negative
          MCFT_CAP08_ADMIN_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox_mcft_cap08_s3_exact_negative
          MCFT_CAP08_S2_G3_DESTRUCTIVE_ACCEPTANCE: '1'
          MCFT_CAP08_S3_EDGE_DESTRUCTIVE_ACCEPTANCE: '1'
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_08_S3_EDGE_SEMANTICS_DB.ts
      - name: Finalize exact merge-SHA artifact
        env:
          MCFT_ARTIFACT_STAGE: EXACT_MERGE_SHA
        run: node scripts/governance_acceptance/mcft_cap08_s3_artifact_finalize.cjs
      - name: Build deterministic archive
        run: |
          mkdir -p acceptance-output/archive-input
          cp acceptance-output/MCFT_CAP_08_S3_AUTHORITY_ARTIFACT.json acceptance-output/archive-input/canonical-artifact.json
          tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner -cf acceptance-output/mcft-cap-08-s3-attestation.tar -C acceptance-output/archive-input canonical-artifact.json
          gzip -n -f acceptance-output/mcft-cap-08-s3-attestation.tar
      - name: Upload and read back immutable R1 authority
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.GEOX_MCFT_ATTESTATION_S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.GEOX_MCFT_ATTESTATION_S3_SECRET_ACCESS_KEY }}
          GEOX_MCFT_ATTESTATION_S3_ENDPOINT: ${{ vars.GEOX_MCFT_ATTESTATION_S3_ENDPOINT }}
          GEOX_MCFT_ATTESTATION_S3_BUCKET: ${{ vars.GEOX_MCFT_ATTESTATION_S3_BUCKET }}
          GEOX_MCFT_ATTESTATION_S3_REGION: ${{ vars.GEOX_MCFT_ATTESTATION_S3_REGION }}
          GEOX_MCFT_ATTESTATION_S3_FORCE_PATH_STYLE: ${{ vars.GEOX_MCFT_ATTESTATION_S3_FORCE_PATH_STYLE }}
          MCFT_CANONICAL_ARTIFACT_PATH: acceptance-output/MCFT_CAP_08_S3_AUTHORITY_ARTIFACT.json
          MCFT_ARTIFACT_ARCHIVE_PATH: acceptance-output/mcft-cap-08-s3-attestation.tar.gz
          MCFT_REPOSITORY_OWNER: ${{ github.repository_owner }}
          MCFT_REPOSITORY_NAME: GEOX
          MCFT_ARTIFACT_NAME: mcft-cap-08-s3-exact-sha-${{ inputs.subject_sha || github.sha }}
          MCFT_RETENTION_LEVEL: R1
          MCFT_RETENTION_DAYS: 180
        run: node scripts/governance_acceptance/mcft_attestation_retention_store_v1.cjs --upload-readback
      - name: Cleanup exact S3 negative database
        if: always()
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='geox_mcft_cap08_s3_exact_negative' AND pid<>pg_backend_pid();"
          psql -h 127.0.0.1 -U postgres -d postgres -v ON_ERROR_STOP=1 -c "DROP DATABASE IF EXISTS geox_mcft_cap08_s3_exact_negative;"
      - name: Upload exact-SHA evidence
        id: artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-08-s3-exact-sha-${{ inputs.subject_sha || github.sha }}
          path: acceptance-output/
          if-no-files-found: error
          retention-days: 90
      - name: Publish exact-SHA status
        if: always()
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
          ARTIFACT_ID: ${{ steps.artifact.outputs.artifact-id }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs=require('fs');let a=null;
            try{a=JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_08_S3_AUTHORITY_ARTIFACT.json','utf8'))}catch{}
            const ok=process.env.JOB_STATUS==='success'
              && a?.status==='PASS'
              && a?.effective_delivery_frontier_projection?.effective_status==='S3_DECISION_ACTION_FEEDBACK_IMPLEMENTED_EFFECTIVE'
              && a?.independent_review?.required===true
              && a?.independent_review?.satisfied===true
              && a?.independent_review?.waived===false
              && String(process.env.ARTIFACT_ID||'').length>0;
            const [owner,repo]=process.env.GITHUB_REPOSITORY.split('/');
            await github.rest.repos.createCommitStatus({
              owner,repo,sha:process.env.MCFT_SUBJECT_SHA,state:ok?'success':'failure',
              context:'mcft-cap-08/s3-exact-sha-attestation',
              description:(ok?`PASS S3 next=S4 artifact=${process.env.ARTIFACT_ID}`:'FAIL S3 exact-SHA').slice(0,140),
              target_url:`${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            });
