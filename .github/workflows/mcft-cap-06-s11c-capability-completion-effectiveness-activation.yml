name: mcft-cap-06-s11c-capability-completion-effectiveness-activation

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s11c-capability-completion-effectiveness-activation.yml'
      - '.github/workflows/mcft-cap-06-s11d-final-effectiveness-reconciliation.yml'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CLOSURE-RECORD.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-AUTHORITY-V2.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-FINALIZATION-EFFECTIVENESS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-FINAL-EFFECTIVENESS-RECONCILIATION.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-MAIN-VERIFICATION.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S11A-CLOSURE-CANDIDATE-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S11C-CAPABILITY-COMPLETION-EFFECTIVENESS-ACTIVATION-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S11D-FINAL-EFFECTIVENESS-RECONCILIATION-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASKBOOK-MANIFEST.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_FINAL_EFFECTIVENESS_RECONCILIATION.cjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  s11c-activation-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout workflow carrier
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve frozen S11C validation ref
        id: validation
        shell: bash
        run: |
          set -euo pipefail
          MERGED=$(node -e "const s=require('./docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S11C-CAPABILITY-COMPLETION-EFFECTIVENESS-ACTIVATION-STATUS.json'); process.stdout.write(String(s.s11c_implementation_merged === true));")
          if [ "$MERGED" = 'true' ]; then
            echo 'ref=2e1b14e31a5420dccfd70c4955726427fc29eb7e' >> "$GITHUB_OUTPUT"
            echo 'baseline=00476d1ca9ec33f01ad58555f54daa5d582580f9' >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = 'pull_request' ]; then
            echo 'ref=${{ github.event.pull_request.head.sha }}' >> "$GITHUB_OUTPUT"
            echo 'baseline=${{ github.event.pull_request.base.sha }}' >> "$GITHUB_OUTPUT"
          else
            echo 'ref=${{ github.sha }}' >> "$GITHUB_OUTPUT"
            echo 'baseline=00476d1ca9ec33f01ad58555f54daa5d582580f9' >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout exact S11C validation authority
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.validation.outputs.ref }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run frozen S11C activation candidate Gate
        env:
          MCFT_CAP_06_S11C_BASE_REF: ${{ steps.validation.outputs.baseline }}
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S11C_CAPABILITY_COMPLETION_EFFECTIVENESS_ACTIVATION.cjs

      - name: Typecheck build and selfcheck
        run: |
          pnpm -r typecheck
          pnpm -r build
          pnpm --filter @geox/server run test:p1:selfcheck

      - name: Verify structured frozen S11C result
        run: |
          node - <<'NODE'
          const fs=require('node:fs');
          const r=JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S11C_ACTIVATION_RESULT.json','utf8'));
          if(r.status!=='PASS'||r.changed_file_count!==9) throw new Error(`S11C_FROZEN_NOT_PASS:${r.error||'UNKNOWN'}`);
          if(r.hard_acceptance_total_check_count!==255) throw new Error('S11C_FROZEN_HARD_ACCEPTANCE_INVALID');
          if(r.pending_completion_claim_count!==48||r.effective_completion_claim_count!==0) throw new Error('S11C_FROZEN_CLAIMS_INVALID');
          if(r.closure_effective!==false||r.capability_complete!==false||r.s11d_authorized!==false) throw new Error('S11C_FROZEN_EFFECTIVENESS_INVALID');
          NODE

      - name: Upload frozen S11C evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s11c-activation-candidate-evidence
          path: acceptance-output/MCFT_CAP_06_S11C_ACTIVATION_RESULT.json
          if-no-files-found: error
