name: mcft-cap-06-s11c-capability-completion-effectiveness-activation

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s11a-closure-candidate.yml'
      - '.github/workflows/mcft-cap-06-s11c-capability-completion-effectiveness-activation.yml'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CLOSURE-RECORD.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-AUTHORITY-V2.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-MAIN-VERIFICATION.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S11A-CLOSURE-CANDIDATE-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S11C-CAPABILITY-COMPLETION-EFFECTIVENESS-ACTIVATION-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASKBOOK-MANIFEST.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S11C_CAPABILITY_COMPLETION_EFFECTIVENESS_ACTIVATION.cjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  s11c-activation-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MCFT_CAP_06_S11C_BASE_REF: 00476d1ca9ec33f01ad58555f54daa5d582580f9
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run S11C activation candidate Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S11C_CAPABILITY_COMPLETION_EFFECTIVENESS_ACTIVATION.cjs
      - name: Typecheck build and selfcheck
        run: |
          pnpm -r typecheck
          pnpm -r build
          pnpm --filter @geox/server run test:p1:selfcheck
      - name: Verify structured S11C result
        run: |
          node - <<'NODE'
          const fs=require('node:fs');
          const r=JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S11C_ACTIVATION_RESULT.json','utf8'));
          if(r.status!=='PASS'||r.changed_file_count!==9) throw new Error(`S11C_NOT_PASS:${r.error||'UNKNOWN'}`);
          if(r.hard_acceptance_total_check_count!==255) throw new Error('S11C_HARD_ACCEPTANCE_INVALID');
          if(r.pending_completion_claim_count!==48||r.effective_completion_claim_count!==0) throw new Error('S11C_CLAIMS_INVALID');
          if(r.activation_status!=='CAPABILITY_COMPLETION_EFFECTIVENESS_ACTIVATION_CANDIDATE'||r.implementation_status!=='COMPLETE_CANDIDATE') throw new Error('S11C_STATUS_INVALID');
          if(r.closure_effective!==false||r.capability_complete!==false||r.s11d_authorized!==false) throw new Error('S11C_PREMATURE_EFFECTIVENESS');
          if(r.runtime_source_authorized!==false||r.successor_capability_line_authorized!==false) throw new Error('S11C_AUTHORITY_VIOLATION');
          if(r.unknown_s11c_merge_or_postmerge_evidence_recorded!==false) throw new Error('S11C_UNKNOWN_EVIDENCE_PREWRITTEN');
          for(const v of Object.values(r.runtime_delta)) if(v!==0) throw new Error('S11C_RUNTIME_DELTA_NONZERO');
          NODE
      - name: Upload S11C evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s11c-activation-candidate-evidence
          path: acceptance-output/MCFT_CAP_06_S11C_ACTIVATION_RESULT.json
          if-no-files-found: error
