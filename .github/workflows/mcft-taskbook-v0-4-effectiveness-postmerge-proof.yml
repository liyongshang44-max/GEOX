name: mcft-taskbook-v0-4-effectiveness-postmerge-proof

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-taskbook-v0-4-effectiveness-postmerge-proof.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  exact-merged-main-taskbook-v0-4-effectiveness-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proof carrier
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify exact proof topology
        shell: bash
        run: |
          BASE=56fd50500a14cc8b5d3743306da85f9d0055abe0
          CANDIDATE=2548e98eacc32eb53d67d8c192bb810c56589b03
          MERGE=a573e741ea0d2b84bfc3727af3412eaa4552fdd0
          test "$(git rev-parse "${MERGE}^2")" = "$CANDIDATE"
          test "$(git rev-list --count "${BASE}..${CANDIDATE}")" = "8"
          test "$(git rev-list --count "${BASE}..${MERGE}")" = "9"
          test "$(git diff --name-only "$CANDIDATE" "$MERGE" | wc -l | tr -d ' ')" = "0"
          test "$(git diff --name-only "${BASE}...${CANDIDATE}" | wc -l | tr -d ' ')" = "8"

      - name: Checkout exact taskbook v0.4 effectiveness merge
        uses: actions/checkout@v4
        with:
          ref: a573e741ea0d2b84bfc3727af3412eaa4552fdd0
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'

      - name: Run exact merged-main taskbook effectiveness Gate
        env:
          MCFT_CAP_06_TASKBOOK_V0_4_EFFECTIVENESS_BASE_REF: 56fd50500a14cc8b5d3743306da85f9d0055abe0
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_TASKBOOK_V0_4_EFFECTIVENESS.cjs

      - name: Verify exact merged-main structured effectiveness
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const r = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_TASKBOOK_V0_4_EFFECTIVENESS_RESULT.json', 'utf8'));
          if (r.status !== 'PASS') throw new Error(`TASKBOOK_EFFECTIVENESS_NOT_PASS:${r.error || 'UNKNOWN'}`);
          if (r.changed_file_count !== 8) throw new Error('TASKBOOK_EFFECTIVENESS_FILE_COUNT_INVALID');
          if (r.commit_count !== 9) throw new Error(`TASKBOOK_EFFECTIVENESS_TOPOLOGY_COUNT_INVALID:${r.commit_count}`);
          if (r.taskbook_version !== 'v0.4.0' || r.taskbook_status !== 'MERGED_MAIN_EFFECTIVE_FROZEN') throw new Error('TASKBOOK_EFFECTIVENESS_STATE_INVALID');
          if (r.execution_paused !== false) throw new Error('TASKBOOK_EXECUTION_NOT_RESUMED');
          if (r.active_delivery_slice_id !== 'MCFT-CAP-06.MCFT-03-04-12.RESTART-READBACK-REBUILD-V1') throw new Error('TASKBOOK_ACTIVE_SLICE_INVALID');
          if (r.next_repository_action !== 'S8_EFFECTIVENESS_WRITEBACK') throw new Error('TASKBOOK_NEXT_ACTION_INVALID');
          if (r.new_prerequisite_inserted !== false) throw new Error('TASKBOOK_AD_HOC_PREREQUISITE_VIOLATION');
          if (r.s8_implementation_merged_main_proven !== true || r.s8_effective !== false || r.s8_effectiveness_writeback_authorized !== true) throw new Error('TASKBOOK_S8_FRONTIER_INVALID');
          if (r.s9_authorized !== false) throw new Error('TASKBOOK_S9_MUST_REMAIN_BLOCKED');
          NODE

      - name: Upload proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-taskbook-v0-4-effectiveness-postmerge-proof-evidence
          path: acceptance-output/MCFT_CAP_06_TASKBOOK_V0_4_EFFECTIVENESS_RESULT.json
          if-no-files-found: error
