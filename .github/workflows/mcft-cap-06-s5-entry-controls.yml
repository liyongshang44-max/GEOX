name: mcft-cap-06-s5-entry-controls

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s5-entry-controls.yml'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CAP05-STRUCTURAL-DEBT-REGISTER.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-STATE.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S5-ENTRY-EFFECTIVENESS.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_EFFECTIVENESS_S5_AUTHORIZATION.cjs'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_STABILIZATION.cjs'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S5_ENTRY_EFFECTIVENESS.cjs'
  push:
    branches: [main]
    paths:
      - '.github/workflows/mcft-cap-06-s5-entry-controls.yml'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CAP05-STRUCTURAL-DEBT-REGISTER.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-STATE.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S5-ENTRY-EFFECTIVENESS.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_EFFECTIVENESS_S5_AUTHORIZATION.cjs'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_STABILIZATION.cjs'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S5_ENTRY_EFFECTIVENESS.cjs'

permissions:
  contents: read

jobs:
  s5-entry-effectiveness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact candidate head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify S4 compatibility through S5 entry effectiveness
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_EFFECTIVENESS_S5_AUTHORIZATION.cjs

      - name: Validate structured S5 entry effectiveness
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S5_ENTRY_EFFECTIVENESS.cjs

      - name: Verify structured effectiveness evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S5_ENTRY_EFFECTIVENESS_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s5_entry_effectiveness_result_v1') throw new Error('S5_ENTRY_EFFECTIVENESS_SCHEMA_MISMATCH');
          if (result.status !== 'PASS') throw new Error('S5_ENTRY_EFFECTIVENESS_NOT_PASS');
          if (result.canonical_write_count !== 0) throw new Error('S5_ENTRY_EFFECTIVENESS_CANONICAL_WRITE_FORBIDDEN');
          if (result.production_candidate_append_count !== 0) throw new Error('S5_ENTRY_EFFECTIVENESS_CANDIDATE_APPEND_FORBIDDEN');
          if (result.s5_implementation_started !== false) throw new Error('S5_ENTRY_EFFECTIVENESS_IMPLEMENTATION_STATE_MISMATCH');
          if (result.s5_graph_prerequisite_active === true) {
            if (result.s5_authorized !== false) throw new Error('S5_GRAPH_PREREQUISITE_MUST_BLOCK_S5');
          } else if (result.s5_authorized !== true) {
            throw new Error('S5_ENTRY_EFFECTIVENESS_FRONTIER_MISMATCH');
          }
          NODE

      - name: Upload structured effectiveness evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s5-entry-effectiveness-evidence
          path: acceptance-output/
          if-no-files-found: error
