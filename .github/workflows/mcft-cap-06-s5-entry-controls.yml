name: mcft-cap-06-s5-entry-controls
# Historical MCFT-CAP-06 workflow: automatic triggers frozen after final repair.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  s5-entry-effectiveness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trigger head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Detect downstream S6 effectiveness
        id: mode
        shell: bash
        run: |
          if [[ -f docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S6-PAIRED-SHADOW-EFFECTIVENESS.json ]]; then
            echo "s6_effectiveness=true" >> "$GITHUB_OUTPUT"
          else
            echo "s6_effectiveness=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout exact historical S5 effectiveness frontier
        if: steps.mode.outputs.s6_effectiveness == 'true'
        uses: actions/checkout@v4
        with:
          ref: 5f73ed68cad479276ca55fb70391ae4543cb3dcc
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify S4 compatibility through frozen S5 frontier
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_EFFECTIVENESS_S5_AUTHORIZATION.cjs

      - name: Validate structured S5 entry effectiveness
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S5_ENTRY_EFFECTIVENESS.cjs

      - name: Verify structured effectiveness evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S5_ENTRY_EFFECTIVENESS_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s5_entry_effectiveness_result_v1') throw new Error('S5_ENTRY_EFFECTIVENESS_SCHEMA_MISMATCH');
          if (result.status !== 'PASS') throw new Error('S5_ENTRY_EFFECTIVENESS_NOT_PASS');
          if (result.canonical_write_count !== 0) throw new Error('S5_ENTRY_EFFECTIVENESS_CANONICAL_WRITE_FORBIDDEN');
          if (result.production_candidate_append_count !== 0 || result.production_evaluation_append_count !== 0 || result.model_activation_count !== 0) throw new Error('S5_ENTRY_EFFECTIVENESS_PRODUCTION_WRITE_BOUNDARY_VIOLATION');
          if (result.s5_graph_prerequisite_active === true) {
            if (result.s5_authorized !== false || result.s5_implementation_started !== false) throw new Error('S5_GRAPH_PREREQUISITE_MUST_BLOCK_S5');
          } else if (result.s5_effective === true) {
            if (result.s5_authorized !== true || result.s5_implementation_started !== true) throw new Error('S5_ENTRY_EFFECTIVENESS_S5_STATE_MISMATCH');
            if (result.s6_authorized !== true || result.s6_implementation_started !== false) throw new Error('S5_ENTRY_EFFECTIVENESS_S6_FRONTIER_MISMATCH');
          } else {
            if (result.s5_authorized !== true || result.s5_implementation_started !== false) throw new Error('S5_ENTRY_EFFECTIVENESS_FRONTIER_MISMATCH');
          }
          NODE

      - name: Upload structured effectiveness evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s5-entry-effectiveness-evidence
          path: acceptance-output/
          if-no-files-found: error
