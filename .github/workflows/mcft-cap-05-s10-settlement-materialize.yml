          auth["allowed_claims_after_merge_and_postmerge_gate"] = append_unique(
            [value for value in auth.get("allowed_claims_after_merge_and_postmerge_gate", []) if "S10_EXPLICITLY_AUTHORIZED_NOT_STARTED" not in value],
            [
              "MCFT_CAP_05_S10_MERGED_EFFECTIVE",
              "MCFT_CAP_05_BOUNDED_EIGHT_TICK_FEEDBACK_CHAIN_ESTABLISHED",
              "MCFT_CAP_05_EIGHT_POSTERIOR_STATES_ESTABLISHED",
              "MCFT_CAP_05_EIGHT_SUCCESSFUL_FORECASTS_ESTABLISHED",
              "MCFT_CAP_05_EIGHT_SCENARIO_SETS_ESTABLISHED",
              "MCFT_CAP_05_CHECKPOINT_73_THROUGH_80_ESTABLISHED",
              "MCFT_CAP_05_S11_EXPLICITLY_AUTHORIZED_NOT_STARTED",
              "MCFT_CAP_05_S11_RUNTIME_SOURCE_NOT_AUTHORIZED",
            ],
