              "governance_gate": "PENDING",
              "repository_typecheck": "PENDING",
              "repository_build": "PENDING",
              "server_selfcheck": "PENDING",
              "standard_acceptance": "PENDING",
              "commercial_mvp0_release_gate": "PENDING",
            },
            "effectiveness_condition": "S10_SETTLEMENT_PR_MERGED_TO_MAIN_AND_MAIN_CI_SETTLEMENT_GATE_PASS",
            "effectiveness_condition_satisfied": False,
          }
          write_json(SETTLEMENT, settlement)

          map_marker_start = "<!-- MCFT-CAP-05-S10-SETTLEMENT-START -->"
          map_marker_end = "<!-- MCFT-CAP-05-S10-SETTLEMENT-END -->"
          map_section = f'''\n\n---\n\n{map_marker_start}\n## MCFT-CAP-05 S10 Effective and S11 Explicitly Authorized\n\n```text\ncapability_line_id: MCFT-CAP-05\nactivation_id: {ACTIVATION}\nbaseline_main_commit: {BASELINE}\nactivation_pr: {PR}\nS10_status: MERGED_EFFECTIVE\nS10_implementation_exact_head: {IMPLEMENTATION_HEAD}\nS10_implementation_exact_head_CI: 29401613098 SUCCESS\nS10_implementation_merge_commit: {IMPLEMENTATION_MERGE}\nS10_implementation_head_to_merge_file_delta_count: 0\nS10_Gate_remediation_exact_head: {REMEDIATION_HEAD}\nS10_Gate_remediation_CI: 29402130372 SUCCESS\nS10_effective_main_commit: {EFFECTIVE_MAIN}\nS10_merged_main_probe_PR: 2485 CLOSED_WITHOUT_MERGE\nS10_merged_main_probe_exact_head: {PROBE_HEAD}\nS10_merged_main_probe_workflow: 29403060957 SUCCESS\nS10_bounded_chain_acceptance: 14 PASS / 0 FAIL\nS11_status: AUTHORIZED_NOT_STARTED\nS11_delivery_slice_id: {S11}\nS11_runtime_source_authorized: false\nS11_implementation_started: false\nCAP_05_completion_claim_effective: false\nCAP_06_authorized: false\n```\n\nGovernance effect:\n\n- settle the exact eight-file S10 bounded feedback-chain implementation and its corrected postmerge Gate as merged-main effective;\n- freeze the eight posterior States, eight successful Forecasts, eight Scenario Sets, checkpoint sequence 73–80 and completed-chain zero-write replay evidence;\n- explicitly authorize S11 closure/finalization governance work without executing closure or activating completion claims;\n- preserve calibration, model activation, continuous Runtime, Gate A/B/C, Minimum Complete Field Twin and CAP-06 nonclaims;\n- add no Runtime source, canonical object, transaction family, migration, route, web or scheduler change.\n{map_marker_end}\n'''
          map_text = MAP.read_text(encoding="utf-8")
          map_text = re.sub(re.escape(map_marker_start) + r".*?" + re.escape(map_marker_end), "", map_text, flags=re.S)
          MAP.write_text(map_text.rstrip() + map_section, encoding="utf-8")

          task_text = TASK.read_text(encoding="utf-8")
          current_status = f'''当前状态：\n\n```text\narchitecture_direction:\nCONFORMANT\n\ndesign_status:\nDESIGN_FROZEN\n\nimplementation_status:\nS11_AUTHORIZED_NOT_STARTED\n\nauthorization_effective:\ntrue\n\nruntime_source_authorized:\nfalse\n\nactive_delivery_slice_id:\n{S11}\n\ndt02_architecture_amendment_status:\nNOT_REQUIRED_MERGED_EFFECTIVE\n\nfirst_permitted_repository_action:\n{S11}\n```\n\nP-1 至 S10 已按各自 lifecycle 形成 merged-effective 事实。当前活动切片为 S11 Closure / Finalization；仅授权治理结算实现，不执行能力关闭、不激活完成声明，仍不授权 CAP-06、校准、模型激活、自动建议或连续 Runtime。\n\n'''
          task_text, count = re.subn(
            r"当前状态：\n\n```text.*?## P-1 adjudication merged-effective result",
            current_status + "## P-1 adjudication merged-effective result",
            task_text,
            count=1,
            flags=re.S,
          )
          if count != 1:
            raise SystemExit("TASK_CURRENT_STATUS_REPLACEMENT_FAILED")
          task_marker_start = "<!-- MCFT-CAP-05-S10-SETTLEMENT-START -->"
          task_marker_end = "<!-- MCFT-CAP-05-S10-SETTLEMENT-END -->"
          task_section = f'''\n\n---\n\n{task_marker_start}\n## S10 SSOT Settlement — S10 Effective / S11 Closure Authorized\n\n```text\nactivation_id:\n{ACTIVATION}\n\nbaseline_main_commit:\n{BASELINE}\n\nsettlement_PR:\n{PR}\n\nimplementation_status:\nS11_AUTHORIZED_NOT_STARTED\n\nactive_delivery_slice_id:\n{S11}\n\nS10_status:\nMERGED_EFFECTIVE\n\nS10_implementation_exact_head:\n{IMPLEMENTATION_HEAD}\n\nS10_implementation_exact_head_workflow:\n29401613098 SUCCESS\n\nS10_implementation_merge_commit:\n{IMPLEMENTATION_MERGE}\n\nS10_implementation_head_to_merge_file_delta_count:\n0\n\nS10_postmerge_Gate_remediation_exact_head:\n{REMEDIATION_HEAD}\n\nS10_postmerge_Gate_remediation_workflow:\n29402130372 SUCCESS\n\nS10_effective_main_commit:\n{EFFECTIVE_MAIN}\n\nS10_merged_main_probe_PR:\n2485 CLOSED_WITHOUT_MERGE\n\nS10_merged_main_probe_exact_head:\n{PROBE_HEAD}\n\nS10_merged_main_probe_workflow:\n29403060957 SUCCESS\n\nS10_bounded_chain_Runtime_acceptance:\n14 PASS / 0 FAIL\n\nS11_status:\nAUTHORIZED_NOT_STARTED\n\nS11_runtime_source_authorized:\nfalse\n\nS11_implementation_started:\nfalse\n\nclosure_finalization_executed:\nfalse\n\nCAP_05_completion_claim_effective:\nfalse\n\nCAP_06_authorized:\nfalse\n```\n\nGovernance effect:\n\n- settle S10 as merged-main effective, including the corrected postmerge boundary Gate and proof-only merged-main probe;\n- explicitly authorize, but do not execute, S11 Closure / Finalization;\n- preserve every completion claim as non-effective until S11 implementation, exact-head validation, merge and merged-main closure verification complete;\n- preserve CAP-06 as unauthorized;\n- add no Runtime source, canonical object, transaction family, migration, route, web, scheduler, calibration or model-activation change.\n{task_marker_end}\n'''
          task_text = re.sub(re.escape(task_marker_start) + r".*?" + re.escape(task_marker_end), "", task_text, flags=re.S)
          TASK.write_text(task_text.rstrip() + task_section, encoding="utf-8")

          wrapper = WRAPPER.read_text(encoding="utf-8")
          if "ACCEPTANCE_MCFT_CAP_05_S10_SETTLEMENT.cjs" not in wrapper:
            wrapper = wrapper.replace(
              "const s9SettlementGatePath = path.join(process.cwd(), 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S9_SETTLEMENT.cjs');",
              "const s9SettlementGatePath = path.join(process.cwd(), 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S9_SETTLEMENT.cjs');\nconst s10SettlementGatePath = path.join(process.cwd(), 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S10_SETTLEMENT.cjs');",
            )
