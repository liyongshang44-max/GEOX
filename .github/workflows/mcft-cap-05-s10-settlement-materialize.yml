          def write_json(path, value):
            path.write_text(json.dumps(value, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")

          def append_unique(values, additions):
            result = []
            for value in [*(values or []), *additions]:
              if value not in result:
                result.append(value)
            return result

          s10_effectiveness = {
            "delivery_slice_id": S10,
            "implementation_pr_number": 2483,
            "implementation_exact_head": IMPLEMENTATION_HEAD,
            "implementation_exact_head_workflow": 29401613098,
            "implementation_merge_commit": IMPLEMENTATION_MERGE,
            "implementation_head_to_merge_file_delta_count": 0,
            "implementation_tree_equivalence": "PASS",
            "postmerge_gate_remediation_pr_number": 2484,
            "postmerge_gate_remediation_exact_head": REMEDIATION_HEAD,
            "postmerge_gate_remediation_workflow": 29402130372,
            "postmerge_gate_remediation_merge_commit": EFFECTIVE_MAIN,
            "postmerge_gate_remediation_head_to_merge_file_delta_count": 0,
            "postmerge_gate_remediation_tree_equivalence": "PASS",
            "merged_main_probe_pr_number": 2485,
            "merged_main_probe_exact_head": PROBE_HEAD,
            "merged_main_probe_workflow": 29403060957,
            "merged_main_probe_state": "SUCCESS",
            "merged_main_probe_closed_without_merge": True,
            "effective_main_commit": EFFECTIVE_MAIN,
            "effective_main_exact_s10_file_count": 8,
            "governance_gate": "PASS",
