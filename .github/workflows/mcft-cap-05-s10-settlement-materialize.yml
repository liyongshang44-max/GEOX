  materialize:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: "2486"
      BASELINE_MAIN: "0c015bad3eb1729000d7f68eb08e00de6ef4afcf"
      BRANCH_NAME: "agent/mcft-cap-05-s10-ssot-settlement-v1"
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Materialize atomic S10 settlement
        shell: bash
        run: |
          python3 - <<'PY'
          import json
