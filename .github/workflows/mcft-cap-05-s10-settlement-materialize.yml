          }

          nonclaims = [
            "NO_AUTOMATIC_RECOMMENDATION",
            "NO_POLICY_EVALUATION",
            "NO_GEOX_APPROVAL_AUTHORITY",
            "NO_GEOX_DISPATCH",
            "NO_AO_ACT_CHANGE",
            "NO_LATE_EVIDENCE_REVISION_RUNTIME",
            "NO_AUTOMATIC_HISTORY_REWRITE",
            "NO_CAUSAL_EFFECT_ATTRIBUTION",
            "NO_CALIBRATION_CANDIDATE",
            "NO_SHADOW_EVALUATION",
            "NO_MODEL_ACTIVATION",
            "NO_ACTIVE_MODEL_PARAMETER_CHANGE",
            "NO_CONTINUOUS_RUNTIME",
            "NO_CONTINUOUS_SCHEDULER",
            "NO_LIVE_FIELD_CLAIM",
            "NO_CLOSURE_FINALIZATION",
            "NO_CAP_05_COMPLETION_CLAIM",
            "NO_COMPLETION_CLAIMS_EFFECTIVE",
            "NO_S11_IMPLEMENTATION",
            "NO_CAP_06_AUTHORIZATION",
            "NO_MCFT_GATE_A_CLOSURE",
            "NO_MCFT_GATE_B_CLOSURE",
            "NO_MCFT_GATE_C_CLOSURE",
