            },
          })
          slices = delivery["slices"]
          s10 = next(item for item in slices if item["delivery_slice_id"] == S10)
          s10.update({
            "baseline_main_commit": "679a1442cc130c174951eb0330b0c82592e4a6df",
            "branch": "agent/mcft-cap-05-s10-bounded-eight-tick-feedback-chain-v1",
            "status": "MERGED_EFFECTIVE",
            "runtime_source_authorized": True,
            "allowed_claims": [
              "BOUNDED_EIGHT_TICK_FEEDBACK_CHAIN_ESTABLISHED",
              "EIGHT_POSTERIOR_STATES_ESTABLISHED",
              "EIGHT_SUCCESSFUL_FORECASTS_ESTABLISHED",
              "EIGHT_SCENARIO_SETS_ESTABLISHED",
              "CHECKPOINT_SEQUENCE_73_THROUGH_80_ESTABLISHED",
              "COMPLETED_CHAIN_ZERO_WRITE_REPLAY_ESTABLISHED",
            ],
            "preserved_nonclaims": nonclaims,
            "exact_changed_file_boundary": s10_boundary,
            "effectiveness_condition": "S10_IMPLEMENTATION_AND_GATE_REMEDIATION_MERGED_MAIN_EFFECTIVE",
            "effectiveness_condition_satisfied": True,
            "activation_id": "MCFT-CAP-05.S9.SSOT-SETTLEMENT-V1",
            "activation_pr_number": 2481,
            "implementation_started": True,
            **s10_effectiveness,
          })
          closure = next(item for item in slices if item["delivery_slice_id"] == S11)
          closure.update({
            "baseline_main_commit": BASELINE,
            "branch": None,
            "status": "AUTHORIZED_NOT_STARTED",
            "runtime_source_authorized": False,
            "allowed_claims": ["CLOSURE_AND_FINALIZATION_IMPLEMENTATION_AUTHORIZED"],
            "preserved_nonclaims": nonclaims,
            "exact_changed_file_boundary": [],
            "effectiveness_condition": "S10_MERGED_MAIN_EFFECTIVE_AND_EXPLICIT_S11_ACTIVATION",
            "effectiveness_condition_satisfied": True,
            "activation_id": ACTIVATION,
            "activation_pr_number": PR,
            "implementation_started": False,
          })
          write_json(DELIVERY, delivery)

          matrix = load_json(MATRIX)
          matrix["baseline"] = {
            "branch": "main",
            "commit": BASELINE,
            "meaning": "MCFT-CAP-05 S10 bounded eight-tick feedback chain is merged-main effective; S11 closure/finalization is explicitly authorized but not started",
          }
          cap = next(item for item in matrix["capability_lines"] if item["capability_line_id"] == "MCFT-CAP-05")
          cap.update({
            "status": "IN_PROGRESS",
            "design_status": "DESIGN_FROZEN",
            "implementation_status": "S11_AUTHORIZED_NOT_STARTED",
            "authorization_effective": True,
            "runtime_source_authorized": True,
            "active_delivery_slice_id": S11,
            "successor_capability_line_id": "MCFT-CAP-06",
            "successor_authorized": False,
            "next_delivery_slice_id": S11,
            "next_delivery_slice_authorized": True,
            "pending_completion_claims": [],
            "effective_completion_claims": [],
            "completion_claims": [],
            "next_authorized_slice_ids": [S11],
            "next_authorized_slice_id_after_merge_and_postmerge_gate": S11,
            "current_repository_baseline_commit": BASELINE,
            "latest_effective_slice_id": S10,
            "latest_effective_delivery_slice_id": S10,
            "latest_effective_main_commit": BASELINE,
            "latest_effective_slice_postmerge_workflow_run": 29403060957,
            "baseline_main_commit": BASELINE,
            "branch": BRANCH,
            "preserved_nonclaims": nonclaims,
            "effectiveness_condition": "S10_SETTLEMENT_PR_MERGED_TO_MAIN_AND_MAIN_CI_SETTLEMENT_GATE_PASS",
            "effectiveness_condition_satisfied": False,
            "active_activation": {
              "activation_id": ACTIVATION,
              "status": "IMPLEMENTATION_CANDIDATE",
              "pr_number": PR,
              "target_state": "S11_AUTHORIZED_NOT_STARTED",
              "effectiveness_condition_satisfied": False,
            },
            "s10_effectiveness": s10_effectiveness,
            "s10_settlement_candidate": {
              "activation_id": ACTIVATION,
              "pr_number": PR,
              "materialization_workflow": RUN_ID,
              "target_state": "S11_AUTHORIZED_NOT_STARTED",
              "effectiveness_condition_satisfied": False,
            },
          })
          matrix_s10 = next(item for item in cap["delivery_slices"] if item["delivery_slice_id"] == S10)
          matrix_s10.update(s10)
          matrix_closure = next(item for item in cap["delivery_slices"] if item["delivery_slice_id"] == S11)
          matrix_closure.update(closure)
          write_json(MATRIX, matrix)

          settlement = {
            "schema_version": "geox_mcft_cap_05_s10_settlement_status_v1",
            "capability_line_id": "MCFT-CAP-05",
            "activation_id": ACTIVATION,
            "settled_delivery_slice_id": S10,
            "next_delivery_slice_id": S11,
            "status": "IMPLEMENTATION_CANDIDATE",
            "target_state": "S11_AUTHORIZED_NOT_STARTED",
            "baseline_main_commit": BASELINE,
            "branch": BRANCH,
            "pr_number": PR,
            "materialization_workflow": RUN_ID,
            "s10_effectiveness": s10_effectiveness,
            "s11_authorization": {
              "delivery_slice_id": S11,
              "status_after_effectiveness": "AUTHORIZED_NOT_STARTED",
              "runtime_source_authorized": False,
              "implementation_started": False,
              "closure_finalization_executed": False,
              "capability_completion_claim_effective": False,
            },
            "canonical_object_type_delta": 0,
            "transaction_family_delta": 0,
            "migration_delta": 0,
            "runtime_source_delta": 0,
            "public_route_delta": 0,
            "web_delta": 0,
            "scheduler_delta": 0,
            "completion_claim_delta": 0,
            "cap_06_authorized": False,
            "preserved_nonclaims": nonclaims,
            "exact_changed_file_boundary": settlement_boundary,
            "validation": {
              "candidate_workflow": None,
