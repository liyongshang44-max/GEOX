          S11 = "MCFT-CAP-05.CLOSURE-AND-FINALIZATION-V1"
          ACTIVATION = "MCFT-CAP-05.S10.SSOT-SETTLEMENT-V1"
          IMPLEMENTATION_HEAD = "2b22e209472237f198fc52fc103d5401fac9c28a"
          IMPLEMENTATION_MERGE = "9acfab667ea51d812fd9f644c0f6634b0e45a673"
          REMEDIATION_HEAD = "a70ee127d14c7939ba2ef756c56c580520379826"
          EFFECTIVE_MAIN = BASELINE
