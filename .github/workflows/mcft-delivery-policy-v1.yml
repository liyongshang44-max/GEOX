name: mcft-delivery-policy-v1

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
    paths:
      - 'docs/digital_twin/mcft/**'
      - '.github/workflows/mcft-*.yml'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_*.cjs'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: mcft-delivery-policy-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  current-candidate-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact current candidate head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
      - name: Validate live repository policy against current candidate
        env:
          MCFT_DELIVERY_POLICY_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || 'HEAD^' }}
          MCFT_DELIVERY_POLICY_PR_DRAFT: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft || false }}
          MCFT_DELIVERY_POLICY_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_DELIVERY_POLICY_V1.cjs --validate-current-candidate
      - name: Verify live policy result
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const p = 'acceptance-output/MCFT_DELIVERY_POLICY_V1_RESULT.json';
          const r = JSON.parse(fs.readFileSync(p, 'utf8'));
          if (r.status !== 'PASS') throw new Error(`MCFT_DELIVERY_POLICY_NOT_PASS:${r.error || 'UNKNOWN'}`);
          if (r.enforcement_mode !== 'CURRENT_CANDIDATE_HEAD') throw new Error('MCFT_DELIVERY_POLICY_NOT_CURRENT_CANDIDATE');
          if (r.fixed_historical_checkout_used !== false) throw new Error('MCFT_DELIVERY_POLICY_HISTORICAL_CHECKOUT_USED');
          if (r.capability_slice !== false || r.runtime_authority !== false) throw new Error('MCFT_DELIVERY_POLICY_BOUNDARY_INVALID');
          NODE
      - name: Verify MCFT-CAP-06 exact merge-SHA attestation migration
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MCFT_CAP_06_ATTESTATION_SUBJECT: ea8caa10e6369ec5018d7c7b6630e2330d1ca085
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_DELIVERY_INFRASTRUCTURE_V1.cjs --verify-cap06-attestation
      - name: Upload delivery infrastructure evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-delivery-policy-${{ github.run_id }}
          path: |
            acceptance-output/MCFT_DELIVERY_POLICY_V1_RESULT.json
            acceptance-output/MCFT_DELIVERY_INFRASTRUCTURE_V1_RESULT.json
          if-no-files-found: warn
          retention-days: 90
