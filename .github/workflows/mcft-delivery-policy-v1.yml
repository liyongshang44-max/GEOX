name: mcft-delivery-policy-v1-historical
# Historical MCFT Delivery Policy V1. Superseded for realtime enforcement by V2.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  historical-taskbook-v0-4-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HISTORICAL_POLICY_REF: 56fd50500a14cc8b5d3743306da85f9d0055abe0
      HISTORICAL_POLICY_BASE: f14dc4c6aaf1cc8b56530c3f9088a1247f5d4db7
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.HISTORICAL_POLICY_REF }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
      - name: Reproduce historical V1 taskbook-revision proof
        env:
          MCFT_DELIVERY_POLICY_BASE_REF: ${{ env.HISTORICAL_POLICY_BASE }}
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_DELIVERY_POLICY_V1.cjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mcft-delivery-policy-v1-historical-evidence
          path: acceptance-output/MCFT_DELIVERY_POLICY_V1_RESULT.json
          if-no-files-found: error
