name: MCFT-CAP-04 S8 runtime diagnostic

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  runtime-diagnostic:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s8-restart-backfill-recovery-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s8-restart-backfill-recovery-v1
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm -r typecheck
      - name: Capture S8 runtime acceptance
        shell: bash
        run: |
          set +e
          pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_RESTART_BACKFILL.ts > /tmp/cap04-s8-restart-backfill.log 2>&1
          restart_code=$?
          pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_FAILURE_RECOVERY.ts > /tmp/cap04-s8-failure-recovery.log 2>&1
          recovery_code=$?
          echo "$restart_code" > /tmp/cap04-s8-restart-backfill-exit.txt
          echo "$recovery_code" > /tmp/cap04-s8-failure-recovery-exit.txt
          cat /tmp/cap04-s8-restart-backfill.log
          cat /tmp/cap04-s8-failure-recovery.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: cap04-s8-runtime-diagnostics
          path: |
            /tmp/cap04-s8-restart-backfill.log
            /tmp/cap04-s8-restart-backfill-exit.txt
            /tmp/cap04-s8-failure-recovery.log
            /tmp/cap04-s8-failure-recovery-exit.txt
          retention-days: 1
      - name: Enforce S8 runtime acceptance
        shell: bash
        run: |
          test "$(cat /tmp/cap04-s8-restart-backfill-exit.txt)" = "0"
          test "$(cat /tmp/cap04-s8-failure-recovery-exit.txt)" = "0"
