name: mcft-cap-06-s6-paired-shadow
# Historical MCFT-CAP-06 workflow: automatic triggers frozen after final repair.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  s6-paired-shadow:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      MCFT_CAP_06_S6_PAIRED_SHADOW_BASELINE_REF: 5f73ed68cad479276ca55fb70391ae4543cb3dcc
    steps:
      - name: Checkout trigger head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Detect S6 effectiveness writeback
        id: mode
        shell: bash
        run: |
          if [[ -f docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S6-PAIRED-SHADOW-EFFECTIVENESS.json ]]; then
            echo "effectiveness=true" >> "$GITHUB_OUTPUT"
          else
            echo "effectiveness=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout exact merged S6 implementation
        if: steps.mode.outputs.effectiveness == 'true'
        uses: actions/checkout@v4
        with:
          ref: b1111e39ed70b39098362a468eac14101bc29ee3
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Run single-command S6 paired-shadow preflight
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S6_PAIRED_SHADOW.cjs

      - name: Verify structured implementation evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S6_PAIRED_SHADOW_PREFLIGHT_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s6_paired_shadow_preflight_result_v1') throw new Error('S6_PAIRED_SHADOW_RESULT_SCHEMA_MISMATCH');
          if (result.status !== 'PASS') throw new Error('S6_PAIRED_SHADOW_RESULT_NOT_PASS');
          if (result.candidate_ref !== 'twin_calibration_candidate_5649b9ab80b5545cf6007387') throw new Error('S6_PAIRED_SHADOW_CANDIDATE_REF_MISMATCH');
          if (result.candidate_hash !== 'sha256:a2018a61bf6699b3cc3b8992058eb2c37b4d38d7f70771f9186495144c229a65') throw new Error('S6_PAIRED_SHADOW_CANDIDATE_HASH_MISMATCH');
          if (result.candidate_parameter_value !== '0.034000' || result.holdout_case_count !== 8) throw new Error('S6_PAIRED_SHADOW_INPUT_RESULT_MISMATCH');
          if (result.evaluation_disposition !== 'ELIGIBLE_FOR_HUMAN_ACTIVATION_REVIEW') throw new Error('S6_PAIRED_SHADOW_DISPOSITION_MISMATCH');
          if (JSON.stringify(result.reason_codes) !== JSON.stringify(['ALL_THRESHOLDS_PASS'])) throw new Error('S6_PAIRED_SHADOW_REASON_CODES_MISMATCH');
          if (result.deterministic_rerun_verified !== true || result.future_leakage_count !== 0) throw new Error('S6_PAIRED_SHADOW_DETERMINISM_OR_LEAKAGE_MISMATCH');
          if (result.production_database_used !== false) throw new Error('S6_PAIRED_SHADOW_PRODUCTION_DATABASE_VIOLATION');
          if (result.canonical_fact_write_count !== 0 || result.projection_write_count !== 0 || result.candidate_append_count !== 0 || result.evaluation_append_count !== 0) throw new Error('S6_PAIRED_SHADOW_WRITE_BOUNDARY_VIOLATION');
          if (result.model_activation_count !== 0 || result.active_config_switch_count !== 0 || result.runtime_parameter_change_count !== 0 || result.state_mutation_count !== 0 || result.checkpoint_mutation_count !== 0 || result.migration_count !== 0) throw new Error('S6_PAIRED_SHADOW_RUNTIME_BOUNDARY_VIOLATION');
          if (result.s6_candidate_implemented !== true || result.s6_effective !== false || result.s7_authorized !== false) throw new Error('S6_PAIRED_SHADOW_IMPLEMENTATION_FRONTIER_MISMATCH');
          NODE

      - name: Upload structured evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s6-paired-shadow-evidence
          path: acceptance-output/
          if-no-files-found: error
