name: cap04-remediation-db-diagnostic

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/mcft-cap-04-s6-single-tick-integration-v1

permissions:
  contents: read

jobs:
  db-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mcft_cap04_db_diagnostic
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mcft_cap04_db_diagnostic"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/mcft_cap04_db_diagnostic
      MCFT_CAP_04_SINGLE_TICK_DESTRUCTIVE_ACCEPTANCE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Run bounded PostgreSQL remediation diagnostic
        shell: bash
        run: |
          set +e
          timeout --signal=TERM 240s pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_SINGLE_TICK_INTEGRATION_DB.ts > acceptance-s6-db-diagnostic.log 2>&1
          status=$?
          echo "$status" > acceptance-s6-db-diagnostic-exit.txt
          cat acceptance-s6-db-diagnostic.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: cap04-remediation-db-diagnostic
          path: |
            acceptance-s6-db-diagnostic.log
            acceptance-s6-db-diagnostic-exit.txt
          retention-days: 1
