          fs.writeFileSync('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-FINALIZATION.md',`<!-- docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-FINALIZATION.md -->\n# GEOX MCFT-CAP-04 S10B Main Verification Candidate\n\n## Subject\n\n\`\`\`text\nverification_subject: S10A_MERGED_MAIN\nverification_subject_commit: ${BASE}\neffectiveness_subject: S10B_FINALIZATION_MERGE\neffectiveness_evidence_location: S10C_REPOSITORY_ARTIFACT\n\`\`\`\n\nS10A head-to-merge file delta is zero and tree equivalence is PASS. S10B prepares conditioned finalization state only. Exactly 24 claims remain pending and zero are effective.\n\nS10C remains unauthorized until S10B is merged and the Finalization Gate passes on the actual S10B merge commit.\n`);
          const matrix=rj(matrixPath);matrix.baseline={branch:'main',commit:BASE,meaning:'MCFT-CAP-04 S10B main verification candidate'};const cap=matrix.capability_lines.find(x=>x.capability_line_id==='MCFT-CAP-04');Object.assign(cap,{status:'S10B_MAIN_VERIFICATION_CANDIDATE',active_delivery_slice_id:S10,runtime_source_authorized:false,pending_completion_claims:claims,effective_completion_claims:[],closure_effective:false,capability_complete:false,s10a_effectiveness:s10a,successor_authorized:false,next_authorized_slice_ids:[]});const ms10=cap.delivery_slices.find(x=>x.delivery_slice_id===S10);if(ms10)Object.assign(ms10,{status:'S10B_MAIN_VERIFICATION_CANDIDATE',baseline_main_commit:BASE,branch:BRANCH});wj(matrixPath,matrix);
          let map=fs.readFileSync(mapPath,'utf8');const marker='## MCFT-CAP-04 S10B Main verification';if(!map.includes(marker))map+=`\n\n${marker}\n\n\`\`\`text\nbaseline main: ${BASE}\nverification subject: S10A_MERGED_MAIN\nS10A tree equivalence: PASS\nlifecycle stage: S10B_MAIN_VERIFICATION\npending completion claims: 24\neffective completion claims: 0\neffectiveness condition satisfied: false\nS10C authorized: false\nMCFT-CAP-05 authorized: false\n\`\`\`\n`;fs.writeFileSync(mapPath,map);
          const gate=`// scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_FINALIZATION.cjs\n// Purpose: validate S10B verification of S10A_MERGED_MAIN and conditioned finalization without premature effectiveness.\n'use strict';\nconst cp=require('node:child_process'),fs=require('node:fs'),path=require('node:path');const ROOT=path.resolve(__dirname,'../..'),BASE='${BASE}',S10='${S10}',MODE=process.argv.includes('--postmerge')?'postmerge':'final',files=${JSON.stringify(files)};let pass=0,fail=0;const check=(v,m)=>{if(v){pass++;console.log('PASS '+m)}else{fail++;console.error('FAIL '+m)}};const git=a=>cp.execFileSync('git',a,{cwd:ROOT,encoding:'utf8'}).trim(),j=p=>JSON.parse(fs.readFileSync(path.join(ROOT,p),'utf8')),exact=(a,b,m)=>check(JSON.stringify([...(a||[])].sort())===JSON.stringify([...(b||[])].sort()),m);for(const f of files)check(fs.existsSync(path.join(ROOT,f)),'file exists '+f);const a=j('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-AUTHORIZATION-STATUS.json'),d=j('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-DELIVERY-SLICE-STATUS.json'),c=j('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE-STATUS.json'),r=j('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-CLOSURE-RECORD.json'),f=j('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-FINALIZATION-STATUS.json'),m=j('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-MAIN-VERIFICATION.json'),s=d.slices.find(x=>x.delivery_slice_id===S10);check(a.active_delivery_slice_id===S10&&a.runtime_source_authorized===false,'auth S10 governance only');exact(a.exact_changed_file_boundary,files,'auth boundary exact');check(s.status==='S10B_MAIN_VERIFICATION_CANDIDATE'&&s.current_lifecycle_stage==='S10B_MAIN_VERIFICATION','delivery S10B');check(s.pending_completion_claims.length===24,'24 pending claims');exact(s.effective_completion_claims,[],'zero effective claims');check(c.status!=='COMPLETE'&&c.implementation_status!=='COMPLETE'&&c.closure_effective===false,'closure not complete');check(r.capability_complete===false,'record incomplete');check(f.verification_subject==='S10A_MERGED_MAIN'&&f.verification_subject_commit===BASE,'finalization subject exact');check(f.effectiveness_condition_satisfied===false,'finalization effectiveness false');check(f.s10c_authorized===false,'S10C unauthorized');check(m.verified_on_main===true&&m.verification_subject==='S10A_MERGED_MAIN'&&m.verification_subject_commit===BASE,'main verification exact');check(m.s10a_evidence.head_to_merge_file_delta_count===0&&m.s10a_evidence.head_to_merge_tree_equivalence==='PASS','tree equivalence PASS');check(m.effectiveness_condition_satisfied===false&&m.capability_complete===false,'no premature effectiveness');check(m.successor_authorized===false&&d.successor_authorized===false,'CAP05 unauthorized');const tracked=git(['diff','--name-only',BASE]).split(/\\r?\\n/).filter(Boolean),untracked=git(['ls-files','--others','--exclude-standard']).split(/\\r?\\n/).filter(Boolean),changed=[...new Set([...tracked,...untracked])].sort();exact(changed,files,'exact changed files');for(const x of changed){check(!x.startsWith('apps/server/src/'),'no Runtime '+x);check(!x.startsWith('apps/server/db/migrations/'),'no migration '+x);check(!x.startsWith('apps/web/'),'no web '+x);check(!x.startsWith('.github/workflows/'),'no workflow '+x)}if(MODE==='postmerge'){check(git(['branch','--show-current'])==='main','postmerge on main');check(git(['rev-parse','HEAD'])===git(['rev-parse','origin/main']),'postmerge main equals origin/main')}console.log('MCFT-CAP-04 S10B '+MODE+': '+pass+' PASS, '+fail+' FAIL');if(fail)process.exit(1);\n`;fs.writeFileSync('scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_FINALIZATION.cjs',gate);
