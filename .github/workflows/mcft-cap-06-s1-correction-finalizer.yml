name: mcft-cap-06-s1-correction-finalizer

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/mcft-cap-06-s1-controlled-regime-correction-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Regenerate exact S1 correction evidence
        run: |
          set -euo pipefail
          mkdir -p acceptance-output
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_REGIMES.ts
          node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S1_RESIDUAL_WINDOWS.cjs

      - name: Materialize additive erratum and candidate SSOT
        env:
          CANDIDATE_HEAD: ${{ github.sha }}
          CANDIDATE_WORKFLOW_RUN: ${{ github.run_id }}
        run: |
          set -euo pipefail
          python scripts/governance_acceptance/materialize_mcft_cap06_s1_correction.py

      - name: Validate corrected candidate
        run: |
          set -euo pipefail
          pnpm -r typecheck
          pnpm -r build
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_DATA_CORRECTION.cjs
          git diff --check

      - name: Remove temporary orchestration
        run: |
          set -euo pipefail
          rm -f .github/mcft-cap-06-s1-correction-finalizer.trigger
          rm -f .github/workflows/mcft-cap-06-s1-correction-probe.yml
          rm -f .github/workflows/mcft-cap-06-s1-correction-finalizer.yml
          rm -f scripts/governance_acceptance/materialize_mcft_cap06_s1_correction.py
          rm -rf acceptance-output

      - name: Verify exact permanent file boundary
        run: |
          set -euo pipefail
          git add -A
          mapfile -t actual < <(git diff --cached --name-only origin/main | sort)
          mapfile -t expected < <(cat <<'EOF' | sort
          docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md
          docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-CONTROLLED-DATA-ERRATUM.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-RESIDUAL-WINDOWS-STATUS.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-RESIDUAL-WINDOWS.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-RESIDUAL-WINDOWS.md
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASK.md
          scripts/acceptance/run_acceptance.cjs
          scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_DATA_CORRECTION.cjs
          scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_REGIMES.ts
          scripts/runtime_acceptance/mcft_cap_04_twenty_four_tick_range_fixture_v1.ts
          scripts/runtime_acceptance/mcft_cap_06_s1_residual_windows_fixture_v1.ts
          EOF
          )
          printf 'ACTUAL FILES\n%s\n' "${actual[*]}"
          diff <(printf '%s\n' "${expected[@]}") <(printf '%s\n' "${actual[@]}")
          git diff --cached --check

      - name: Commit permanent correction candidate
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "MCFT-CAP-06 S1: materialize controlled-data correction candidate"
          git push origin HEAD:${{ github.head_ref }}
