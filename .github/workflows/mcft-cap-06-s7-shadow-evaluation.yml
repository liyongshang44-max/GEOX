name: mcft-cap-06-s7-shadow-evaluation

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s7-shadow-evaluation.yml'
      - 'apps/server/scripts/mcft/MCFT_CAP_06_SHADOW_EVALUATION_COMMIT_RUNNER.ts'
      - 'apps/server/src/runtime/calibration/shadow_evaluation_commit_service_v1.ts'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-STATE.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S7-SHADOW-EVALUATION-AUTHORITY-GRAPH.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S7-SHADOW-EVALUATION-IMPLEMENTATION-CONTRACT.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S7-SHADOW-EVALUATION-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S7-SHADOW-EVALUATION-EFFECTIVENESS.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S7_SHADOW_EVALUATION.cjs'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S7_SHADOW_EVALUATION.ts'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S7_SHADOW_EVALUATION_DB.ts'
      - 'scripts/runtime_acceptance/RUN_MCFT_CAP_06_S7_SHADOW_EVALUATION.cjs'
  push:
    branches: [main]
    paths:
      - '.github/workflows/mcft-cap-06-s7-shadow-evaluation.yml'
      - 'apps/server/scripts/mcft/MCFT_CAP_06_SHADOW_EVALUATION_COMMIT_RUNNER.ts'
      - 'apps/server/src/runtime/calibration/shadow_evaluation_commit_service_v1.ts'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-STATE.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S7-SHADOW-EVALUATION-AUTHORITY-GRAPH.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S7-SHADOW-EVALUATION-IMPLEMENTATION-CONTRACT.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S7-SHADOW-EVALUATION-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S7-SHADOW-EVALUATION-EFFECTIVENESS.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S7_SHADOW_EVALUATION.cjs'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S7_SHADOW_EVALUATION.ts'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S7_SHADOW_EVALUATION_DB.ts'
      - 'scripts/runtime_acceptance/RUN_MCFT_CAP_06_S7_SHADOW_EVALUATION.cjs'

permissions:
  contents: read

jobs:
  s7-shadow-evaluation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      MCFT_CAP_06_S7_SHADOW_EVALUATION_BASELINE_REF: 1333ef2f1613745b785d01859e5355ea6fd27274
      S7_IMPLEMENTATION_MERGE: c52ddd97ddf190db78ded6571263d7a0cc64ece6
    steps:
      - name: Checkout trigger head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Detect S7 effectiveness writeback
        id: detect
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');
          let value = false;
          try {
            const status = JSON.parse(fs.readFileSync('docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S7-SHADOW-EVALUATION-STATUS.json', 'utf8'));
            const effect = JSON.parse(fs.readFileSync('docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S7-SHADOW-EVALUATION-EFFECTIVENESS.json', 'utf8'));
            value = status.s7_effective === true && effect.status === 'MERGED_EFFECTIVE';
          } catch {}
          console.log(`effectiveness=${value}`);
          NODE

      - name: Checkout exact merged S7 implementation
        if: steps.detect.outputs.effectiveness == 'true'
        uses: actions/checkout@v4
        with:
          ref: c52ddd97ddf190db78ded6571263d7a0cc64ece6
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Run single-command S7 Shadow Evaluation preflight
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S7_SHADOW_EVALUATION.cjs

      - name: Verify structured implementation evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S7_SHADOW_EVALUATION_PREFLIGHT_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s7_shadow_evaluation_preflight_result_v1') throw new Error('S7_SHADOW_EVALUATION_RESULT_SCHEMA_MISMATCH');
          if (result.status !== 'PASS') throw new Error('S7_SHADOW_EVALUATION_RESULT_NOT_PASS');
          if (process.env.S7_IMPLEMENTATION_MERGE && result.exact_head !== process.env.S7_IMPLEMENTATION_MERGE) throw new Error('S7_SHADOW_EVALUATION_EXACT_MERGE_MISMATCH');
          if (result.candidate_ref !== 'twin_calibration_candidate_5649b9ab80b5545cf6007387') throw new Error('S7_SHADOW_EVALUATION_CANDIDATE_REF_MISMATCH');
          if (result.candidate_hash !== 'sha256:a2018a61bf6699b3cc3b8992058eb2c37b4d38d7f70771f9186495144c229a65') throw new Error('S7_SHADOW_EVALUATION_CANDIDATE_HASH_MISMATCH');
          if (result.candidate_parameter_value !== '0.034000' || result.holdout_case_count !== 8) throw new Error('S7_SHADOW_EVALUATION_INPUT_RESULT_MISMATCH');
          if (result.source_s6_case_results_hash !== 'sha256:e1b33fb79059856c030cab58970c543f384fb30a385bc3aa49c96b315efe4daa') throw new Error('S7_SHADOW_EVALUATION_CASE_RESULTS_HASH_MISMATCH');
          if (result.source_s6_compute_determinism_hash !== 'sha256:8017c2ba6006e1f2a593312300937841b5c2dd3a700c949bb8309338994ef63e') throw new Error('S7_SHADOW_EVALUATION_COMPUTE_HASH_MISMATCH');
          if (result.evaluation_ref !== 'twin_shadow_evaluation_8cae1f6732420a4999deffc0') throw new Error('S7_SHADOW_EVALUATION_REF_MISMATCH');
          if (result.evaluation_hash !== 'sha256:32c43020f45351994120515e5c633531bb594d85659456c65bd46305737d85e0') throw new Error('S7_SHADOW_EVALUATION_HASH_MISMATCH');
          if (result.evaluation_disposition !== 'ELIGIBLE_FOR_HUMAN_ACTIVATION_REVIEW') throw new Error('S7_SHADOW_EVALUATION_DISPOSITION_MISMATCH');
          if (JSON.stringify(result.reason_codes) !== JSON.stringify(['ALL_THRESHOLDS_PASS'])) throw new Error('S7_SHADOW_EVALUATION_REASON_CODES_MISMATCH');
          if (result.first_evaluation_append_count !== 1 || result.completed_chain_rerun_evaluation_append_count !== 0) throw new Error('S7_SHADOW_EVALUATION_APPEND_MISMATCH');
          if (result.aggregate_projection_count !== 1 || result.candidate_evaluation_index_count !== 1 || result.case_projection_count !== 8) throw new Error('S7_SHADOW_EVALUATION_PROJECTION_MISMATCH');
          if (result.canonical_readback_verified !== true || result.production_database_used !== false) throw new Error('S7_SHADOW_EVALUATION_READBACK_OR_DATABASE_MISMATCH');
          if (result.candidate_append_count !== 0 || result.model_activation_count !== 0 || result.active_config_switch_count !== 0) throw new Error('S7_SHADOW_EVALUATION_AUTHORITY_BOUNDARY_VIOLATION');
          if (result.runtime_parameter_change_count !== 0 || result.state_mutation_count !== 0 || result.checkpoint_mutation_count !== 0 || result.migration_count !== 0) throw new Error('S7_SHADOW_EVALUATION_RUNTIME_BOUNDARY_VIOLATION');
          if (result.s7_candidate_implemented !== true || result.s7_effective !== false || result.s8_authorized !== false) throw new Error('S7_SHADOW_EVALUATION_IMPLEMENTATION_FRONTIER_MISMATCH');
          NODE

      - name: Upload structured evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s7-shadow-evaluation-evidence
          path: acceptance-output/
          if-no-files-found: error
