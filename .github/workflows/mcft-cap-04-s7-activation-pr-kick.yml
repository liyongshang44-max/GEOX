name: MCFT-CAP-04 S7 activation PR kick

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s7-activation-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s7-activation-v1
          fetch-depth: 0

      - name: Extract and run frozen activation materializer
        shell: python
        run: |
          from pathlib import Path
          source = Path('.github/workflows/mcft-cap-04-s7-activation-materializer.yml').read_text(encoding='utf-8').splitlines()
          start = source.index('        run: |') + 1
          end = next(i for i in range(start, len(source)) if source[i].startswith('      - name: Remove materializer inputs'))
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in source[start:end]) + '\n'
          Path('/tmp/materialize_s7_activation.py').write_text(script, encoding='utf-8')
          exec(compile(script, '/tmp/materialize_s7_activation.py', 'exec'), {'__name__': '__main__'})

      - name: Remove temporary materializers
        run: |
          rm -f .github/workflows/mcft-cap-04-s7-activation-materializer.yml
          rm -f .github/workflows/mcft-cap-04-s7-activation-pr-kick.yml
          rm -rf .cap04-s7-activation

      - name: Commit governance-only activation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "docs(mcft-cap-04): activate S7 24-tick range"
          git push origin HEAD:agent/mcft-cap-04-s7-activation-v1
