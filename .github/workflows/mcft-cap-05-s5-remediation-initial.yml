name: MCFT-CAP-05 S5 remediation final materialization

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-05-s5-remediation-recovery-hash-fixed-point-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mcft_cap05_s5_remediation
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mcft_cap05_s5_remediation"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/mcft_cap05_s5_remediation
      MCFT_CAP_05_S5_REMEDIATION_DESTRUCTIVE_ACCEPTANCE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Materialize remediation SSOT
        shell: bash
        run: |
          set -o pipefail
          python3 .mcft_cap05_s5_remediation_materializer.py 2>&1 | tee /tmp/mcft-cap05-s5-remediation-materializer.log

      - name: Upload materializer failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-05-s5-remediation-materializer-failure
          path: /tmp/mcft-cap05-s5-remediation-materializer.log
          if-no-files-found: ignore

      - name: Commit exact remediation candidate and remove temporary files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f \
            .github/workflows/mcft-cap-05-s5-remediation-initial.yml \
            .github/workflows/mcft-cap-05-s5-remediation-db.yml \
            .mcft_cap05_s5_remediation_materializer.py
          git add -f \
            apps/server/src/evidence/twin_runtime/approval_plan_evidence_contracts_v1.ts \
            apps/server/src/persistence/twin_runtime/postgres_approval_plan_evidence_repository_v1.ts \
            apps/server/src/persistence/twin_runtime/postgres_approval_plan_recovery_repository_v1.ts \
            apps/server/src/persistence/twin_runtime/postgres_feedback_persistence_repository_v1.ts \
            apps/server/src/projections/twin_runtime/feedback_persistence_projection_v1.ts \
            apps/server/src/runtime/twin_runtime/approval_plan_binding_service_v1.ts \
            docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md \
            docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-AUTHORIZATION-STATUS.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-DELIVERY-SLICE-STATUS.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-S5-REMEDIATION-STATUS.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-TASK.md \
            scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S5_REMEDIATION.cjs \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_APPROVAL_PLAN_BINDING_DB.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_PERSISTENCE_RECOVERY_DB.ts \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_S5_REMEDIATION_DB.ts
          git commit -m "fix(mcft-cap-05): remediate S5 recovery hash and fixed-point authority"

      - name: Run remediation governance Gate
        shell: bash
        run: |
          set -o pipefail
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S5_REMEDIATION.cjs 2>&1 | tee /tmp/mcft-cap05-s5-remediation-governance.log

      - name: Upload governance failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-05-s5-remediation-governance-failure
          path: /tmp/mcft-cap05-s5-remediation-governance.log
          if-no-files-found: ignore

      - name: Run remediation PostgreSQL acceptance
        shell: bash
        run: |
          set -o pipefail
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_S5_REMEDIATION_DB.ts 2>&1 | tee /tmp/mcft-cap05-s5-remediation-db.log

      - name: Create S3 regression database
        run: PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d postgres -c 'CREATE DATABASE mcft_cap05_s3_remediation_regression'

      - name: Run S3 persistence and recovery regression
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/mcft_cap05_s3_remediation_regression
          MCFT_CAP_05_S3_DESTRUCTIVE_ACCEPTANCE: "1"
        shell: bash
        run: |
          set -o pipefail
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_PERSISTENCE_RECOVERY_DB.ts 2>&1 | tee /tmp/mcft-cap05-s3-remediation-regression.log

      - name: Typecheck repository
        run: pnpm -r typecheck

      - name: Push final remediation candidate
        run: git push origin HEAD:${{ github.head_ref }}
