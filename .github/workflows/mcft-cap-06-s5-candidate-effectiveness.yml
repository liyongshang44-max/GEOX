name: mcft-cap-06-s5-candidate-effectiveness

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s5-candidate-effectiveness.yml'
      - '.github/workflows/mcft-cap-06-s5-candidate.yml'
      - '.github/workflows/mcft-cap-06-s5-entry-controls.yml'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-STATE.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S5-CANDIDATE-EFFECTIVENESS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S5-CANDIDATE-STATUS.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_EFFECTIVENESS_S5_AUTHORIZATION.cjs'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_STABILIZATION.cjs'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S5_CANDIDATE.cjs'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S5_CANDIDATE_EFFECTIVENESS.cjs'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S5_ENTRY_EFFECTIVENESS.cjs'
  push:
    branches: [main]
    paths:
      - '.github/workflows/mcft-cap-06-s5-candidate-effectiveness.yml'
      - '.github/workflows/mcft-cap-06-s5-candidate.yml'
      - '.github/workflows/mcft-cap-06-s5-entry-controls.yml'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-STATE.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S5-CANDIDATE-EFFECTIVENESS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S5-CANDIDATE-STATUS.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_EFFECTIVENESS_S5_AUTHORIZATION.cjs'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S4_STABILIZATION.cjs'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S5_CANDIDATE.cjs'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S5_CANDIDATE_EFFECTIVENESS.cjs'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S5_ENTRY_EFFECTIVENESS.cjs'

permissions:
  contents: read

jobs:
  s5-candidate-effectiveness:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      MCFT_CAP_06_S5_CANDIDATE_BASELINE_REF: dc7913d070c4a0c2cac0a7c35ccfa4292e633876
      MCFT_CAP_06_S5_CANDIDATE_EFFECTIVENESS_BASELINE_REF: 8edbc27ea0dfabd41faede9fb0f8bed11058c260
    steps:
      - name: Checkout exact S5 implementation merge
        uses: actions/checkout@v4
        with:
          ref: 8edbc27ea0dfabd41faede9fb0f8bed11058c260
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Run exact merged-main S5 Candidate preflight
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S5_CANDIDATE.cjs

      - name: Verify exact implementation merge evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S5_CANDIDATE_PREFLIGHT_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s5_candidate_preflight_result_v1') throw new Error('S5_EFFECTIVENESS_IMPLEMENTATION_SCHEMA_MISMATCH');
          if (result.status !== 'PASS') throw new Error('S5_EFFECTIVENESS_IMPLEMENTATION_NOT_PASS');
          if (result.exact_head !== '8edbc27ea0dfabd41faede9fb0f8bed11058c260') throw new Error('S5_EFFECTIVENESS_IMPLEMENTATION_HEAD_MISMATCH');
          if (result.calibration_case_count !== 16 || result.grid_point_count !== 21 || result.selected_parameter_value !== '0.034000') throw new Error('S5_EFFECTIVENESS_NUMERICAL_RESULT_MISMATCH');
          if (result.controlled_candidate_append_count !== 1 || result.completed_chain_rerun_candidate_append_count !== 0) throw new Error('S5_EFFECTIVENESS_APPEND_MISMATCH');
          if (result.production_candidate_append_count !== 0 || result.evaluation_append_count !== 0 || result.model_activation_count !== 0) throw new Error('S5_EFFECTIVENESS_PRODUCTION_WRITE_BOUNDARY_VIOLATION');
          if (result.active_config_switch_count !== 0 || result.runtime_parameter_change_count !== 0 || result.state_mutation_count !== 0 || result.checkpoint_mutation_count !== 0 || result.migration_count !== 0) throw new Error('S5_EFFECTIVENESS_RUNTIME_BOUNDARY_VIOLATION');
          if (result.production_database_used !== false) throw new Error('S5_EFFECTIVENESS_PRODUCTION_DATABASE_VIOLATION');
          if (result.s5_candidate_implemented !== true || result.s5_effective !== false || result.s6_authorized !== false) throw new Error('S5_EFFECTIVENESS_PREWRITEBACK_FRONTIER_MISMATCH');
          NODE

      - name: Checkout exact effectiveness candidate head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          clean: false

      - name: Run structured S5 Candidate effectiveness Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S5_CANDIDATE_EFFECTIVENESS.cjs

      - name: Verify structured effectiveness evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S5_CANDIDATE_EFFECTIVENESS_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s5_candidate_effectiveness_result_v1') throw new Error('S5_EFFECTIVENESS_RESULT_SCHEMA_MISMATCH');
          if (result.status !== 'PASS') throw new Error('S5_EFFECTIVENESS_RESULT_NOT_PASS');
          if (result.changed_file_count !== 13 || result.logical_commit_count < 1 || result.logical_commit_count > 16) throw new Error('S5_EFFECTIVENESS_GOVERNED_DELTA_MISMATCH');
          if (result.s5_status !== 'MERGED_EFFECTIVE' || result.s5_effective !== true) throw new Error('S5_EFFECTIVENESS_STATUS_MISMATCH');
          if (result.active_delivery_slice_id !== 'MCFT-CAP-06.MCFT-06-09-11-12.PAIRED-HISTORICAL-SHADOW-COMPUTE-V1') throw new Error('S5_EFFECTIVENESS_FRONTIER_MISMATCH');
          if (result.s6_authorized !== true || result.s6_implementation_started !== false) throw new Error('S5_EFFECTIVENESS_S6_AUTHORIZATION_MISMATCH');
          if (result.governance_writeback_canonical_write_count !== 0 || result.production_candidate_append_count !== 0 || result.production_evaluation_append_count !== 0 || result.model_activation_count !== 0) throw new Error('S5_EFFECTIVENESS_WRITE_BOUNDARY_VIOLATION');
          if (result.active_config_switch_count !== 0 || result.runtime_parameter_change_count !== 0 || result.state_mutation_count !== 0 || result.checkpoint_mutation_count !== 0 || result.migration_count !== 0) throw new Error('S5_EFFECTIVENESS_RUNTIME_MUTATION_VIOLATION');
          NODE

      - name: Upload effectiveness evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s5-candidate-effectiveness-evidence
          path: acceptance-output/
          if-no-files-found: error
