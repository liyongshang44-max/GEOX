name: mcft-cap-05-s8-db-pass-count-fix

on:
  push:
    branches:
      - agent/mcft-cap-05-s8-forecast-residual-c-commit-v1

permissions:
  contents: write

jobs:
  fix-pass-count:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-05-s8-forecast-residual-c-commit-v1
          fetch-depth: 0

      - name: Correct PostgreSQL acceptance count and remove materializer
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path('scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_FORECAST_RESIDUAL_OUTCOME_TICK_DB.ts'): [
                  ('assert.equal(pass, 7);', 'assert.equal(pass, 8);'),
              ],
              Path('scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S8_FORECAST_RESIDUAL_C_COMMIT.cjs'): [
                  ("database.includes('assert.equal(pass, 7)')", "database.includes('assert.equal(pass, 8)')"),
                  ("'PostgreSQL acceptance freezes 7 PASS cardinality'", "'PostgreSQL acceptance freezes 8 PASS cardinality'"),
              ],
              Path('docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-S8-STATUS.json'): [
                  ('"target_postgresql_pass_count": 7', '"target_postgresql_pass_count": 8'),
              ],
          }

          for path, pairs in replacements.items():
              text = path.read_text(encoding='utf-8')
              for old, new in pairs:
                  if text.count(old) != 1:
                      raise SystemExit(f'EXPECTED_EXACTLY_ONE:{path}:{old}:{text.count(old)}')
                  text = text.replace(old, new)
              path.write_text(text, encoding='utf-8')
          PY
          git rm .github/workflows/mcft-cap-05-s8-db-pass-count-fix.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_FORECAST_RESIDUAL_OUTCOME_TICK_DB.ts scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S8_FORECAST_RESIDUAL_C_COMMIT.cjs docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-S8-STATUS.json
          git commit -m "test(mcft-cap-05-s8): freeze 8-pass PostgreSQL acceptance"
          git push origin HEAD:agent/mcft-cap-05-s8-forecast-residual-c-commit-v1
