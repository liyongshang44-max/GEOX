name: mcft-cap-06-s11a-closure-candidate

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s10-bounded-chain-effectiveness.yml'
      - '.github/workflows/mcft-cap-06-s11a-closure-candidate.yml'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CLOSURE-RECORD.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-AUTHORITY-V2.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-HARD-ACCEPTANCE-EVIDENCE-LEDGER.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-MAIN-VERIFICATION.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S11A-CLOSURE-CANDIDATE-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASKBOOK-MANIFEST.json'
      - 'docs/digital_twin/mcft/cap_06/hard_acceptance/**'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_CLOSURE.cjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  s11a-closure-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MCFT_CAP_06_S11A_BASE_REF: b13a0057a8c9e93f3f4fcf8194b84149f1d2b1b5
    steps:
      - name: Checkout exact S11A candidate head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Run S11A closure candidate Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_CLOSURE.cjs

      - name: Repository typecheck
        run: pnpm -r typecheck

      - name: Repository build
        run: pnpm -r build

      - name: Server selfcheck
        run: pnpm --filter @geox/server run test:p1:selfcheck

      - name: Verify structured S11A result
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const r = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S11A_CLOSURE_RESULT.json', 'utf8'));
          if (r.schema_version !== 'geox_mcft_cap_06_s11a_closure_result_v1') throw new Error('S11A_RESULT_SCHEMA_INVALID');
          if (r.status !== 'PASS') throw new Error(`S11A_GATE_NOT_PASS:${r.error || 'UNKNOWN'}`);
          if (r.changed_file_count !== 19) throw new Error('S11A_CHANGED_FILE_COUNT_INVALID');
          if (r.taskbook_version !== 'v0.4.0') throw new Error('S11A_TASKBOOK_VERSION_INVALID');
          if (r.hard_acceptance_category_count !== 10) throw new Error('S11A_HARD_CATEGORY_COUNT_INVALID');
          if (r.hard_acceptance_total_check_count !== 255 || r.hard_acceptance_pass_count !== 255) throw new Error('S11A_HARD_ACCEPTANCE_COUNT_INVALID');
          if (r.hard_acceptance_fail_count !== 0 || r.hard_acceptance_not_applicable_count !== 0) throw new Error('S11A_HARD_ACCEPTANCE_STATUS_INVALID');
          if (r.pending_completion_claim_count !== 48 || r.effective_completion_claim_count !== 0) throw new Error('S11A_COMPLETION_CLAIM_SET_INVALID');
          if (r.closure_status !== 'CLOSURE_CANDIDATE' || r.closure_effective !== false || r.capability_complete !== false) throw new Error('S11A_CLOSURE_STATE_INVALID');
          if (r.active_delivery_slice_id !== 'MCFT-CAP-06.CLOSURE-CANDIDATE-V1') throw new Error('S11A_ACTIVE_SLICE_INVALID');
          if (r.s11b_authorized !== false || r.s11c_authorized !== false || r.s11d_authorized !== false) throw new Error('S11A_DOWNSTREAM_AUTHORITY_VIOLATION');
          if (r.runtime_source_authorized !== false || r.successor_capability_line_authorized !== false) throw new Error('S11A_RUNTIME_OR_SUCCESSOR_AUTHORITY_VIOLATION');
          if (r.new_prerequisite_inserted !== false || r.new_slice_inserted !== false) throw new Error('S11A_AD_HOC_NODE_VIOLATION');
          for (const value of Object.values(r.runtime_delta)) if (value !== 0) throw new Error('S11A_RUNTIME_DELTA_NONZERO');
          NODE

      - name: Upload S11A evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s11a-closure-candidate-evidence
          path: acceptance-output/MCFT_CAP_06_S11A_CLOSURE_RESULT.json
          if-no-files-found: error
