name: mcft-cap-06-s11a-closure-candidate
# Historical MCFT-CAP-06 workflow: automatic triggers frozen after final repair.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  s11a-closure-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout workflow carrier
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve frozen S11A validation ref
        id: validation
        shell: bash
        run: |
          set -euo pipefail
          MERGED=$(node -e "const s=require('./docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S11A-CLOSURE-CANDIDATE-STATUS.json'); process.stdout.write(String(s.s11a_implementation_merged === true));")
          if [ "$MERGED" = 'true' ]; then
            echo 'ref=00476d1ca9ec33f01ad58555f54daa5d582580f9' >> "$GITHUB_OUTPUT"
            echo 'baseline=b13a0057a8c9e93f3f4fcf8194b84149f1d2b1b5' >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = 'pull_request' ]; then
            echo 'ref=${{ github.event.pull_request.head.sha }}' >> "$GITHUB_OUTPUT"
            echo 'baseline=${{ github.event.pull_request.base.sha }}' >> "$GITHUB_OUTPUT"
          else
            echo 'ref=${{ github.sha }}' >> "$GITHUB_OUTPUT"
            echo 'baseline=b13a0057a8c9e93f3f4fcf8194b84149f1d2b1b5' >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout exact S11A validation authority
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.validation.outputs.ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Run S11A closure candidate Gate
        env:
          MCFT_CAP_06_S11A_BASE_REF: ${{ steps.validation.outputs.baseline }}
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_CLOSURE.cjs

      - name: Repository typecheck
        run: pnpm -r typecheck

      - name: Repository build
        run: pnpm -r build

      - name: Server selfcheck
        run: pnpm --filter @geox/server run test:p1:selfcheck

      - name: Verify structured S11A result
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const r = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S11A_CLOSURE_RESULT.json', 'utf8'));
          if (r.status !== 'PASS' || r.changed_file_count !== 19) throw new Error(`S11A_FROZEN_GATE_INVALID:${r.error || 'UNKNOWN'}`);
          if (r.hard_acceptance_total_check_count !== 255 || r.hard_acceptance_pass_count !== 255) throw new Error('S11A_FROZEN_HARD_ACCEPTANCE_INVALID');
          if (r.pending_completion_claim_count !== 48 || r.effective_completion_claim_count !== 0) throw new Error('S11A_FROZEN_CLAIMS_INVALID');
          if (r.closure_effective !== false || r.capability_complete !== false) throw new Error('S11A_FROZEN_CLOSURE_STATE_INVALID');
          NODE

      - name: Upload S11A evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s11a-closure-candidate-evidence
          path: acceptance-output/MCFT_CAP_06_S11A_CLOSURE_RESULT.json
          if-no-files-found: error
