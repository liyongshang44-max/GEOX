name: MCFT-CAP-04 S4 diagnose negative acceptance

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s4-pure-three-scenario-math-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout S4 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Materialize S4 governance
        run: node .cap04-s4/materialize_s4.cjs

      - name: Recursive typecheck
        run: pnpm -r typecheck

      - name: Run positive Scenario math acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_PURE_SCENARIO_MATH.ts

      - name: Run negative Scenario math acceptance
        id: negative
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_PURE_SCENARIO_MATH_NEGATIVE.ts 2>&1 | tee /tmp/cap04-s4-negative.log

      - name: Persist negative acceptance diagnostics
        if: steps.negative.outcome == 'failure'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if test -f .cap04-s4/negative-acceptance.log; then exit 0; fi
          mkdir -p .cap04-s4
          cp /tmp/cap04-s4-negative.log .cap04-s4/negative-acceptance.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .cap04-s4/negative-acceptance.log
          git commit -m "chore(mcft-cap-04): persist S4 negative diagnostics"
          git push origin "HEAD:${HEAD_BRANCH}"

      - name: Stop after negative acceptance failure
        if: steps.negative.outcome == 'failure'
        run: exit 1
