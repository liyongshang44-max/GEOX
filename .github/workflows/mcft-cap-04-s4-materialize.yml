name: MCFT-CAP-04 S4 finalize

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s4-pure-three-scenario-math-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout S4 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Materialize S4 governance
        run: node .cap04-s4/materialize_s4.cjs

      - name: Recursive typecheck
        run: pnpm -r typecheck

      - name: Run positive Scenario math acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_PURE_SCENARIO_MATH.ts

      - name: Run negative Scenario math acceptance
        run: pnpm exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_04_PURE_SCENARIO_MATH_NEGATIVE.ts

      - name: Remove temporary materialization and diagnostic files
        run: |
          rm -rf .cap04-s4
          rm -f .github/workflows/mcft-cap-04-s4-materialize.yml

      - name: Run final S4 governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S4_PURE_SCENARIO_MATH.cjs --final

      - name: Verify patch integrity
        run: git diff --check 4a1c9fde05594c97fb949e062df77375a1a27365

      - name: Commit exact final candidate
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(mcft-cap-04): finalize S4 pure scenario math candidate"
          git push origin "HEAD:${HEAD_BRANCH}"
