name: MCFT-CAP-04 S10A exact-head Gate

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s10a-final-gate-probe-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s10a-finalization-candidate-v1
          fetch-depth: 0
      - name: Verify exact candidate head
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "08667e5639462f88f0763c7ec2ec5454dc43d436"
          test "$(git rev-parse origin/agent/mcft-cap-04-s10a-finalization-candidate-v1)" = "08667e5639462f88f0763c7ec2ec5454dc43d436"
      - name: Run S10A Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S10A_FINALIZATION_CANDIDATE.cjs
