name: MCFT-CAP-05 P0 merged-main verification

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-05-p0-postmerge-probe-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Verify exact merged main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          test "$(git branch --show-current)" = "main"
          test "$(git rev-parse HEAD)" = "2d4d00aec8cd1e925687ee67e5de429c324cc1b2"
          test "$(git rev-parse origin/main)" = "2d4d00aec8cd1e925687ee67e5de429c324cc1b2"
      - name: Run MCFT-CAP-05 P0 merged-main Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_P0_SETTLEMENT_SSOT.cjs --postmerge
