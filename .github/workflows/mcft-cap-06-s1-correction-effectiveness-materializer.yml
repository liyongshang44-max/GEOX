name: mcft-cap-06-s1-correction-effectiveness-materializer

on:
  pull_request:

permissions:
  contents: write

jobs:
  materialize-and-validate:
    if: github.head_ref == 'agent/mcft-cap-06-s1-correction-effectiveness-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
    steps:
      - name: Checkout effectiveness branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Decode and execute locally validated materializer
        run: |
          set -euo pipefail
          base64 -d .github/mcft_cap06_s1_effectiveness.py.gz.b64 | gzip -d > .github/mcft_cap06_s1_effectiveness.py
          python -m py_compile .github/mcft_cap06_s1_effectiveness.py
          python .github/mcft_cap06_s1_effectiveness.py
          git diff --check

      - name: Validate materialized schemas and Gate syntax
        run: |
          set -euo pipefail
          python -m json.tool docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json >/dev/null
          python -m json.tool docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json >/dev/null
          python -m json.tool docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json >/dev/null
          python -m json.tool docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-CONTROLLED-DATA-ERRATUM.json >/dev/null
          python -m json.tool docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-EFFECTIVENESS.json >/dev/null
          python -m json.tool docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-RESIDUAL-WINDOWS-STATUS.json >/dev/null
          node --check scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_DATA_CORRECTION.cjs

      - name: Reproduce S1 canonical Residuals in isolated PostgreSQL
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S1_RESIDUAL_WINDOWS.cjs

      - name: Reproduce sensitivity and regime evidence
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_REGIMES.ts

      - name: Run corrected S1 effectiveness Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_DATA_CORRECTION.cjs

      - name: Typecheck and build repository
        run: |
          set -euo pipefail
          pnpm -r typecheck
          pnpm -r build

      - name: Remove temporary materializer and verify exact boundary
        run: |
          set -euo pipefail
          rm -f .github/mcft_cap06_s1_effectiveness.py.gz.b64
          rm -f .github/mcft_cap06_s1_effectiveness.py
          rm -rf .github/__pycache__ acceptance-output
          rm -f .github/workflows/mcft-cap-06-s1-correction-effectiveness-materializer.yml
          mapfile -t actual < <(git diff --name-only origin/main | sort)
          cat > /tmp/expected.txt <<'EOF'
          docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md
          docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-CONTROLLED-DATA-ERRATUM.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-EFFECTIVENESS.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S1-RESIDUAL-WINDOWS-STATUS.json
          docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-TASK.md
          scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_DATA_CORRECTION.cjs
          EOF
          sed -i 's/^          //' /tmp/expected.txt
          diff -u /tmp/expected.txt <(printf '%s\n' "${actual[@]}")
          test "${#actual[@]}" -eq 9
          git diff --check

      - name: Commit bounded effectiveness candidate
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "docs(mcft-cap-06): activate corrected S1 effectiveness"
          git push origin HEAD:${{ github.head_ref }}
