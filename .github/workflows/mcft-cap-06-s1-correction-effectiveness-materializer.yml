name: mcft-cap-06-s1-correction-effectiveness-materializer

on:
  pull_request:

jobs:
  materialize-diagnostic:
    if: github.head_ref == 'agent/mcft-cap-06-s1-correction-effectiveness-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout effectiveness branch quietly
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --quiet --depth=1 origin agent/mcft-cap-06-s1-correction-effectiveness-v1:refs/remotes/origin/agent/mcft-cap-06-s1-correction-effectiveness-v1
          git checkout -q -B agent/mcft-cap-06-s1-correction-effectiveness-v1 origin/agent/mcft-cap-06-s1-correction-effectiveness-v1

      - name: Execute locally validated materializer with direct diagnostics
        run: |
          set -euo pipefail
          base64 -d .github/mcft_cap06_s1_effectiveness.py.gz.b64 | gzip -d > .github/mcft_cap06_s1_effectiveness.py
          python -m py_compile .github/mcft_cap06_s1_effectiveness.py
          python .github/mcft_cap06_s1_effectiveness.py 2>&1 | tee /tmp/materializer.log
          git diff --check
          node --check scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_DATA_CORRECTION.cjs
