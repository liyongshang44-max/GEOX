name: MCFT-CAP-05 S4 exact-head verification

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-05-s4-exact-head-probe-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mcft_cap05_s4_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mcft_cap05_s4_acceptance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/mcft_cap05_s4_acceptance
      MCFT_CAP_05_S4_DESTRUCTIVE_ACCEPTANCE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-05-s4-human-decision-g-commit-v1
          fetch-depth: 0

      - name: Verify exact S4 head
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin agent/mcft-cap-05-s4-human-decision-g-commit-v1
          test "$(git rev-parse HEAD)" = "e9f3b81e2aa8b68498263049086d79184ead6108"
          test "$(git rev-parse origin/agent/mcft-cap-05-s4-human-decision-g-commit-v1)" = "e9f3b81e2aa8b68498263049086d79184ead6108"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Run S4 governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S4_HUMAN_DECISION_G.cjs

      - name: Run S4 PostgreSQL acceptance
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_HUMAN_DECISION_G_DB.ts

      - name: Typecheck repository
        run: pnpm -r typecheck
