name: cap04-recovery-client-fix

on:
  push:
    branches:
      - agent/mcft-cap-04-s6-single-tick-integration-v1

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-04-s6-single-tick-integration-v1
      - name: Release checkpoint Forecast recovery client
        shell: python
        run: |
          from pathlib import Path
          path = Path('apps/server/src/persistence/twin_runtime/postgres_forecast_scenario_recovery_repository_v1.ts')
          text = path.read_text(encoding='utf-8')
          old = '''    const forecastRef = stringFieldV1(checkpoint.payload.forecast_result_ref, "PENDING_SCENARIO_CHECKPOINT_FORECAST_REF_REQUIRED");
    const forecast = await this.readCanonicalObjectForRecoveryWithClientV1(await this.recoveryPool.connect(), forecastRef).catch((error) => { throw error; });
    if (!forecast || forecast.object_type !== "twin_forecast_run_v1") throw new Error("PENDING_SCENARIO_FORECAST_NOT_FOUND");
'''
          new = '''    const forecastRef = stringFieldV1(checkpoint.payload.forecast_result_ref, "PENDING_SCENARIO_CHECKPOINT_FORECAST_REF_REQUIRED");
    const client = await this.recoveryPool.connect();
    let forecast: CanonicalObjectEnvelopeV1 | null;
    try {
      forecast = await this.readCanonicalObjectForRecoveryWithClientV1(client, forecastRef);
    } finally {
      client.release();
    }
    if (!forecast || forecast.object_type !== "twin_forecast_run_v1") throw new Error("PENDING_SCENARIO_FORECAST_NOT_FOUND");
'''
          if old not in text:
              raise SystemExit('pending Forecast client anchor missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
      - name: Remove temporary patcher
        run: rm .github/workflows/cap04-recovery-client-fix.yml
      - name: Commit client release
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/server/src/persistence/twin_runtime/postgres_forecast_scenario_recovery_repository_v1.ts .github/workflows/cap04-recovery-client-fix.yml
          git commit -m "fix(mcft-cap-04): release pending Forecast recovery client"
          git push origin HEAD:agent/mcft-cap-04-s6-single-tick-integration-v1
