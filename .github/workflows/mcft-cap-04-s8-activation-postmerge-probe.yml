name: MCFT-CAP-04 S8 activation merged-main verification

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-s8-activation-postmerge-probe-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Verify exact merged main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          test "$(git branch --show-current)" = "main"
          test "$(git rev-parse HEAD)" = "bdc3e93ce755e237655f7bfc98b117a6e842d030"
          test "$(git rev-parse origin/main)" = "bdc3e93ce755e237655f7bfc98b117a6e842d030"
      - name: Run S8 activation merged-main Governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_S8_ACTIVATION.cjs --postmerge
