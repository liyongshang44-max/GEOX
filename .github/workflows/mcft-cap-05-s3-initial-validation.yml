name: MCFT-CAP-05 S3 initial validation

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-05-s3-persistence-idempotency-recovery-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mcft_cap05_s3_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mcft_cap05_s3_acceptance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/mcft_cap05_s3_acceptance
      MCFT_CAP_05_S3_DESTRUCTIVE_ACCEPTANCE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Isolate fault-injection event identity
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          p = Path('scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_PERSISTENCE_RECOVERY_DB.ts')
          text = p.read_text(encoding='utf-8')
          old = '  faultFeedback.payload.source_record_id = `${feedback.payload.source_record_id}_fault`;\n  faultFeedback.determinism_hash = computeMemberDeterminismHashV1(faultFeedback as unknown as Record<string, unknown>);'
          new = '  faultFeedback.payload.source_record_id = `${feedback.payload.source_record_id}_fault`;\n  faultFeedback.payload.event_id = `${feedback.payload.event_id}_fault`;\n  faultFeedback.determinism_hash = computeMemberDeterminismHashV1(faultFeedback as unknown as Record<string, unknown>);'
          if old in text:
              p.write_text(text.replace(old, new, 1), encoding='utf-8')
          elif new not in text:
              raise SystemExit('fault fixture patch target missing')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_PERSISTENCE_RECOVERY_DB.ts
            git commit -m "test(mcft-cap-05): isolate S3 fault event identity"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Typecheck repository
        run: pnpm -r typecheck
      - name: Run S3 PostgreSQL acceptance
        shell: bash
        run: |
          set -o pipefail
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_PERSISTENCE_RECOVERY_DB.ts 2>&1 | tee /tmp/mcft-cap05-s3-db.log
      - name: Upload S3 DB failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-05-s3-db-failure
          path: /tmp/mcft-cap05-s3-db.log
          if-no-files-found: ignore
