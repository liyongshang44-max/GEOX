name: MCFT-CAP-05 S6 final materialization

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-05-s6-action-feedback-h-adapter-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mcft_cap05_s6_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mcft_cap05_s6_acceptance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/mcft_cap05_s6_acceptance
      MCFT_CAP_05_S6_DESTRUCTIVE_ACCEPTANCE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Materialize S6 SSOT
        shell: bash
        run: |
          set -o pipefail
          python3 .mcft_cap05_s6_materializer.py 2>&1 | tee /tmp/mcft-cap05-s6-materializer.log

      - name: Upload materializer failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-05-s6-materializer-failure
          path: /tmp/mcft-cap05-s6-materializer.log
          if-no-files-found: ignore

      - name: Commit exact S6 candidate and remove temporary files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/mcft-cap-05-s6-initial-validation.yml .mcft_cap05_s6_materializer.py
          git add -f \
            apps/server/src/domain/twin_runtime/action_feedback_to_executed_irrigation_v1.ts \
            apps/server/src/evidence/twin_runtime/execution_receipt_evidence_contract_v1.ts \
            apps/server/src/runtime/twin_runtime/action_feedback_normalization_service_v1.ts \
            docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md \
            docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-AUTHORIZATION-STATUS.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-DELIVERY-SLICE-STATUS.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-S6-ACTION-FEEDBACK-H.md \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-S6-STATUS.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-TASK.md \
            scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S6_ACTION_FEEDBACK_H.cjs \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_ACTION_FEEDBACK_H_DB.ts
          git commit -m "feat(mcft-cap-05): establish S6 Action Feedback H and adapter"

      - name: Run S6 governance Gate
        shell: bash
        run: |
          set -o pipefail
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S6_ACTION_FEEDBACK_H.cjs 2>&1 | tee /tmp/mcft-cap05-s6-governance.log

      - name: Upload governance failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-05-s6-governance-failure
          path: /tmp/mcft-cap05-s6-governance.log
          if-no-files-found: ignore

      - name: Run S6 PostgreSQL acceptance
        shell: bash
        run: |
          set -o pipefail
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_ACTION_FEEDBACK_H_DB.ts 2>&1 | tee /tmp/mcft-cap05-s6-db.log

      - name: Upload PostgreSQL failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-05-s6-postgresql-failure
          path: /tmp/mcft-cap05-s6-db.log
          if-no-files-found: ignore

      - name: Typecheck repository
        run: pnpm -r typecheck

      - name: Push final S6 candidate
        run: git push origin HEAD:${{ github.head_ref }}
