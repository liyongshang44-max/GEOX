name: mcft-cap-03-baseline-diagnostic

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-03-baseline-diagnostic.yml'

permissions:
  contents: read

jobs:
  compare-cap03-recovery:
    strategy:
      fail-fast: false
      matrix:
        checkout_ref:
          - main
          - agent/mcft-cap-05-post-closure-config-conformance-v1
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: landos
          POSTGRES_PASSWORD: ci-pilot-postgres-strong-2026
          POSTGRES_DB: landos
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U landos -d landos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://landos:ci-pilot-postgres-strong-2026@127.0.0.1:5433/landos
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.checkout_ref }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Run CAP-03 inherited recovery acceptance
        run: |
          set -o pipefail
          pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_03_ASSIMILATED_PERSISTENCE_RECOVERY_DB.ts 2>&1 | tee /tmp/cap03-${{ strategy.job-index }}.log
      - name: Upload CAP-03 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cap03-${{ strategy.job-index }}-${{ matrix.checkout_ref }}
          path: /tmp/cap03-${{ strategy.job-index }}.log
