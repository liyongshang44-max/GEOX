name: mcft-cap-06-s7-shadow-evaluation-effectiveness

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s7-shadow-evaluation-effectiveness.yml'
      - '.github/workflows/mcft-cap-06-s7-shadow-evaluation.yml'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-STATE.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S7-SHADOW-EVALUATION-EFFECTIVENESS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S7-SHADOW-EVALUATION-STATUS.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S7_SHADOW_EVALUATION_EFFECTIVENESS.cjs'
  push:
    branches: [main]
    paths:
      - '.github/workflows/mcft-cap-06-s7-shadow-evaluation-effectiveness.yml'
      - '.github/workflows/mcft-cap-06-s7-shadow-evaluation.yml'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-STATE.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S7-SHADOW-EVALUATION-EFFECTIVENESS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S7-SHADOW-EVALUATION-STATUS.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S7_SHADOW_EVALUATION_EFFECTIVENESS.cjs'

permissions:
  contents: read

jobs:
  s7-shadow-evaluation-effectiveness:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      MCFT_CAP_06_S7_SHADOW_EVALUATION_BASELINE_REF: 1333ef2f1613745b785d01859e5355ea6fd27274
      MCFT_CAP_06_S7_SHADOW_EVALUATION_EFFECTIVENESS_BASELINE_REF: c52ddd97ddf190db78ded6571263d7a0cc64ece6
    steps:
      - name: Checkout exact S7 implementation merge
        uses: actions/checkout@v4
        with:
          ref: c52ddd97ddf190db78ded6571263d7a0cc64ece6
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Run exact merged-main S7 preflight
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S7_SHADOW_EVALUATION.cjs

      - name: Verify exact implementation merge evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const r = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S7_SHADOW_EVALUATION_PREFLIGHT_RESULT.json', 'utf8'));
          if (r.status !== 'PASS') throw new Error('S7_EFFECTIVENESS_IMPLEMENTATION_NOT_PASS');
          if (r.exact_head !== 'c52ddd97ddf190db78ded6571263d7a0cc64ece6') throw new Error('S7_EFFECTIVENESS_IMPLEMENTATION_HEAD_MISMATCH');
          if (r.candidate_ref !== 'twin_calibration_candidate_5649b9ab80b5545cf6007387') throw new Error('S7_EFFECTIVENESS_CANDIDATE_REF_MISMATCH');
          if (r.candidate_hash !== 'sha256:a2018a61bf6699b3cc3b8992058eb2c37b4d38d7f70771f9186495144c229a65') throw new Error('S7_EFFECTIVENESS_CANDIDATE_HASH_MISMATCH');
          if (r.source_s6_case_results_hash !== 'sha256:e1b33fb79059856c030cab58970c543f384fb30a385bc3aa49c96b315efe4daa') throw new Error('S7_EFFECTIVENESS_CASE_HASH_MISMATCH');
          if (r.source_s6_compute_determinism_hash !== 'sha256:8017c2ba6006e1f2a593312300937841b5c2dd3a700c949bb8309338994ef63e') throw new Error('S7_EFFECTIVENESS_COMPUTE_HASH_MISMATCH');
          if (r.evaluation_ref !== 'twin_shadow_evaluation_8cae1f6732420a4999deffc0') throw new Error('S7_EFFECTIVENESS_EVALUATION_REF_MISMATCH');
          if (r.evaluation_hash !== 'sha256:32c43020f45351994120515e5c633531bb594d85659456c65bd46305737d85e0') throw new Error('S7_EFFECTIVENESS_EVALUATION_HASH_MISMATCH');
          if (r.first_evaluation_append_count !== 1 || r.completed_chain_rerun_evaluation_append_count !== 0) throw new Error('S7_EFFECTIVENESS_APPEND_MISMATCH');
          if (r.aggregate_projection_count !== 1 || r.candidate_evaluation_index_count !== 1 || r.case_projection_count !== 8) throw new Error('S7_EFFECTIVENESS_PROJECTION_MISMATCH');
          if (r.candidate_append_count !== 0 || r.model_activation_count !== 0 || r.active_config_switch_count !== 0) throw new Error('S7_EFFECTIVENESS_IMPLEMENTATION_AUTHORITY_VIOLATION');
          if (r.runtime_parameter_change_count !== 0 || r.state_mutation_count !== 0 || r.checkpoint_mutation_count !== 0 || r.migration_count !== 0) throw new Error('S7_EFFECTIVENESS_IMPLEMENTATION_RUNTIME_VIOLATION');
          if (r.s7_candidate_implemented !== true || r.s7_effective !== false || r.s8_authorized !== false) throw new Error('S7_EFFECTIVENESS_PREWRITEBACK_FRONTIER_MISMATCH');
          NODE

      - name: Checkout exact effectiveness candidate head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          clean: false

      - name: Run structured S7 effectiveness Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S7_SHADOW_EVALUATION_EFFECTIVENESS.cjs

      - name: Verify structured effectiveness evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const r = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S7_SHADOW_EVALUATION_EFFECTIVENESS_RESULT.json', 'utf8'));
          if (r.schema_version !== 'geox_mcft_cap_06_s7_shadow_evaluation_effectiveness_result_v1') throw new Error('S7_EFFECTIVENESS_RESULT_SCHEMA_MISMATCH');
          if (r.status !== 'PASS') throw new Error('S7_EFFECTIVENESS_RESULT_NOT_PASS');
          if (r.changed_file_count !== 8 || r.logical_commit_count < 1 || r.logical_commit_count > 10) throw new Error('S7_EFFECTIVENESS_GOVERNED_DELTA_MISMATCH');
          if (r.s7_status !== 'MERGED_EFFECTIVE' || r.s7_effective !== true) throw new Error('S7_EFFECTIVENESS_STATUS_MISMATCH');
          if (r.active_delivery_slice_id !== 'MCFT-CAP-06.MCFT-03-04-12.RESTART-READBACK-REBUILD-V1') throw new Error('S7_EFFECTIVENESS_FRONTIER_MISMATCH');
          if (r.s8_authorized !== true || r.s8_implementation_started !== false || r.s8_candidate_implemented !== false || r.s8_effective !== false) throw new Error('S7_EFFECTIVENESS_S8_AUTHORIZATION_MISMATCH');
          if (r.governance_writeback_canonical_write_count !== 0 || r.production_candidate_append_count !== 0 || r.production_evaluation_append_count !== 0 || r.projection_write_count !== 0 || r.model_activation_count !== 0) throw new Error('S7_EFFECTIVENESS_WRITE_BOUNDARY_VIOLATION');
          if (r.active_config_switch_count !== 0 || r.runtime_parameter_change_count !== 0 || r.state_mutation_count !== 0 || r.checkpoint_mutation_count !== 0 || r.migration_count !== 0) throw new Error('S7_EFFECTIVENESS_RUNTIME_MUTATION_VIOLATION');
          NODE

      - name: Upload effectiveness evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s7-shadow-evaluation-effectiveness-evidence
          path: acceptance-output/
          if-no-files-found: error
