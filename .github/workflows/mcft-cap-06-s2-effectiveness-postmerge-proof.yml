name: mcft-cap-06-s2-effectiveness-postmerge-proof

on:
  pull_request:

permissions:
  contents: read

jobs:
  exact-merged-main-s2-effectiveness-proof:
    if: github.head_ref == 'agent/mcft-cap-06-s2-effectiveness-postmerge-proof-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      PROVED_COMMIT: ea198cc0cad063c7e70a59727171908f2f8c7e7d
    steps:
      - name: Checkout exact S2 effectiveness merge commit
        uses: actions/checkout@v4
        with:
          ref: ea198cc0cad063c7e70a59727171908f2f8c7e7d
          fetch-depth: 0

      - name: Prove checkout and main identity
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$PROVED_COMMIT"
          git fetch --quiet origin main
          test "$(git rev-parse origin/main)" = "$PROVED_COMMIT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck and build exact merge commit
        run: |
          set -euo pipefail
          pnpm -r typecheck
          pnpm -r build

      - name: Reproduce corrected S1 canonical Residuals
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S1_RESIDUAL_WINDOWS.cjs

      - name: Reproduce corrected S1 regimes
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_REGIMES.ts

      - name: Run corrected S1 lifecycle Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S1_CONTROLLED_DATA_CORRECTION.cjs

      - name: Reproduce S2 contracts and math
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.ts

      - name: Run S2 merged-effective Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S2_CONTRACTS_MATH.cjs

      - name: Verify bounded effectiveness state
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const root = process.cwd();
          const readJson = (relative) => JSON.parse(
            fs.readFileSync(path.join(root, relative), 'utf8'),
          );

          const s3 = 'MCFT-CAP-06.MCFT-03-12.D-GOVERNANCE-PERSISTENCE-RECOVERY-V1';
          const status = readJson('docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S2-STATUS.json');
          const effectiveness = readJson('docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S2-EFFECTIVENESS.json');
          const delivery = readJson('docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json');
          const current = readJson('docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json');

          if (status.status !== 'MERGED_EFFECTIVE') throw new Error('S2_STATUS_NOT_EFFECTIVE');
          if (status.s2_effective !== true) throw new Error('S2_EFFECTIVE_FALSE');
          if (status.s3_authorized !== true) throw new Error('S3_NOT_AUTHORIZED');
          if (effectiveness.effective !== true) throw new Error('S2_EFFECTIVENESS_RECORD_FALSE');
          if (effectiveness.implementation_merge_commit !== 'b6d28477d87239ee417c688d43122cb7a20b1a31') {
            throw new Error('S2_IMPLEMENTATION_MERGE_MISMATCH');
          }
          if (effectiveness.postmerge_workflow_run !== 29506065728) {
            throw new Error('S2_IMPLEMENTATION_PROOF_MISMATCH');
          }
          if (effectiveness.canonical_write_count !== 0) throw new Error('S2_CANONICAL_WRITE_FOUND');
          if (effectiveness.projection_write_count !== 0) throw new Error('S2_PROJECTION_WRITE_FOUND');
          if (effectiveness.migration_count !== 0) throw new Error('S2_MIGRATION_FOUND');
          if (effectiveness.model_activation_count !== 0) throw new Error('S2_MODEL_ACTIVATION_FOUND');
          if (delivery.active_delivery_slice_id !== s3) throw new Error('ACTIVE_SLICE_NOT_S3');
          if (delivery.s3_authorized !== true || delivery.s3_implementation_started !== false) {
            throw new Error('S3_AUTHORIZATION_STATE_INVALID');
          }
          if (current.current_state.active_delivery_slice_id !== s3) {
            throw new Error('CURRENT_STATE_ACTIVE_SLICE_NOT_S3');
          }
          if (current.current_state.candidate_runtime_implemented !== false) {
            throw new Error('CANDIDATE_RUNTIME_PREMATURE');
          }
          if (current.current_state.shadow_evaluation_runtime_implemented !== false) {
            throw new Error('EVALUATION_RUNTIME_PREMATURE');
          }
          NODE

      - name: Final exact-commit proof
        run: test "$(git rev-parse HEAD)" = "$PROVED_COMMIT"
