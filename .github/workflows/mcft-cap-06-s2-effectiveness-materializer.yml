name: mcft-cap-06-s2-effectiveness-finalizer

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/mcft-cap-06-s2-effectiveness-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mcft-cap-06-s2-effectiveness-v1
          fetch-depth: 0

      - name: Verify main baseline
        run: |
          set -euo pipefail
          git fetch --quiet origin main
          test "$(git rev-parse origin/main)" = "b6d28477d87239ee417c688d43122cb7a20b1a31"

      - name: Correct final effectiveness pointers
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          S3 = 'MCFT-CAP-06.MCFT-03-12.D-GOVERNANCE-PERSISTENCE-RECOVERY-V1'
          HEAD = 'cc1c982f3dd8e26af31a2f4270e6b43cba4ba30f'
          CI = 29504752806
          MERGE = 'b6d28477d87239ee417c688d43122cb7a20b1a31'
          PROOF = 29506065728

          def load(path):
            return json.loads(Path(path).read_text(encoding='utf-8'))

          def save(path, value):
            Path(path).write_text(json.dumps(value, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')

          matrix_path = 'docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json'
          matrix = load(matrix_path)
          lines = matrix.get('capability_lines', matrix.get('capabilities'))
          line = next(item for item in lines if item['capability_line_id'] == 'MCFT-CAP-06')
          line['next_delivery_slice_id'] = S3
          line['next_delivery_slice_authorized'] = True
          save(matrix_path, matrix)

          status_path = 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S2-STATUS.json'
          status = load(status_path)
          validation = status['candidate_tree_validation']
          validation['repository_typecheck'] = f'PASS_EXACT_HEAD_CI_{CI}'
          validation['repository_build'] = f'PASS_EXACT_HEAD_CI_{CI}'
          validation['exact_head_ci_status'] = 'PASS'
          validation['exact_head'] = HEAD
          validation['exact_head_ci_run'] = CI
          save(status_path, status)

          current_path = 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json'
          current = load(current_path)
          validation = current['s2_candidate_validation']
          validation['exact_head_ci_status'] = 'PASS'
          validation['exact_head'] = HEAD
          validation['exact_head_ci_run'] = CI
          validation['merge_commit'] = MERGE
          validation['postmerge_workflow_run'] = PROOF
          save(current_path, current)
          PY

      - name: Commit final nine-file tree
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/mcft-cap-06-s2-effectiveness-materializer.yml
          git add docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json
          git add docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S2-STATUS.json
          git add docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json
          git commit -m "governance(mcft-cap-06): finalize S2 effectiveness pointers"
          git push origin HEAD:agent/mcft-cap-06-s2-effectiveness-v1
