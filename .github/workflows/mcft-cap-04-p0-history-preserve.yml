name: MCFT-CAP-04 P0 preserve-history reconciliation

on:
  pull_request:
    types: [reopened]
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  reconcile:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-04-p0-ssot-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout P0 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Preserve history and reconcile P0
        run: node .cap04-p0-history/materialize_minimal_p0_history.cjs

      - name: Remove temporary reconciliation inputs
        run: |
          rm -rf .cap04-p0-history
          rm .github/workflows/mcft-cap-04-p0-history-preserve.yml

      - name: Capture P0 final Gate
        run: |
          set +e
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_04_P0_PREDECESSOR_SSOT.cjs --final > /tmp/mcft-cap-04-p0-gate.log 2>&1
          echo "$?" > /tmp/mcft-cap-04-p0-gate.exit
          cat /tmp/mcft-cap-04-p0-gate.log
          exit 0

      - name: Capture candidate diff
        run: |
          git diff --name-only eca0d053045db59982ad20a6e0421f72ae16f804 > /tmp/mcft-cap-04-p0-diff.log
          cat /tmp/mcft-cap-04-p0-diff.log
          wc -l /tmp/mcft-cap-04-p0-diff.log

      - name: Publish P0 diagnostic
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const gate = fs.readFileSync('/tmp/mcft-cap-04-p0-gate.log', 'utf8');
            const exitCode = fs.readFileSync('/tmp/mcft-cap-04-p0-gate.exit', 'utf8').trim();
            const diff = fs.readFileSync('/tmp/mcft-cap-04-p0-diff.log', 'utf8');
            const body = [
              '<!-- mcft-cap-04-p0-diagnostic -->',
              '### MCFT-CAP-04 P0 diagnostic',
              '',
              `Gate exit: ${exitCode}`,
              '',
              '```text',
              gate.slice(-12000),
              '```',
              '',
              'Candidate diff:',
              '',
              '```text',
              diff,
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Enforce diagnostic result
        run: |
          test "$(cat /tmp/mcft-cap-04-p0-gate.exit)" -eq 0
          test "$(wc -l < /tmp/mcft-cap-04-p0-diff.log)" -eq 5

      - name: Re-run CAP-03 R4 final verification Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_03_R4_FINAL_VERIFICATION.cjs

      - name: Verify complete task hash
        run: echo 'ea63e92a64b760b84c49428b1d3a245ce5cd94bb08daa9c6b971a53861b90a63  docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-TASK.md' | sha256sum -c -

      - name: Parse governance JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('docs/digital_twin/mcft/cap_04/GEOX-MCFT-CAP-04-P0-STATUS.json','utf8'))"

      - name: Check patch integrity
        run: git diff --check eca0d053045db59982ad20a6e0421f72ae16f804

      - name: Commit minimal P0 reconciliation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "docs(mcft-cap-04): preserve history in P0 reconciliation"
          git push origin HEAD:${{ github.head_ref }}
