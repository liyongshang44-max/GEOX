name: s3b-versioned-persistence-transition

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  transition:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout S3B branch
        uses: actions/checkout@v4
        with:
          ref: mcft-cap-03-assimilated-a2-persistence-recovery-v1
          fetch-depth: 1
          show-progress: false
      - name: Apply versioned persistence transition
        shell: python
        run: |
          from pathlib import Path
          import json

          repository_path = Path("apps/server/src/persistence/twin_runtime/postgres_runtime_repository_v1.ts")
          text = repository_path.read_text(encoding="utf-8")

          text = text.replace(
              "// Purpose: implement Runtime Config persistence, the fenced idempotent A0 transaction, and the fenced idempotent MCFT-CAP-02 A2 continuation transaction in the same persistence family.\n",
              "// Purpose: implement Runtime Config persistence, the fenced idempotent A0 transaction, and one versioned fenced idempotent A2 transaction shared by historical MCFT-CAP-02 and assimilated MCFT-CAP-03 record sets.\n",
              1,
          )
          text = text.replace(
              "import type { Pool, PoolClient } from \"pg\";\n",
              "import type { Pool, PoolClient } from \"pg\";\n"
              "import { ASSIMILATED_CONTINUATION_RECORD_SET_CONTRACT_ID_V1 } from \"../../domain/twin_runtime/assimilated_continuation_contracts_v1.js\";\n"
              "import type { AssimilatedContinuationRecordSetV1 } from \"../../domain/twin_runtime/assimilated_continuation_record_set_identity_v1.js\";\n"
              "import { validateAssimilatedContinuationCrossReferencesV1 } from \"../../domain/twin_runtime/assimilated_continuation_cross_ref_validator_v1.js\";\n",
              1,
          )
          text = text.replace(
              "import type { ContinuationRecordSetV1 } from \"../../domain/twin_runtime/continuation_record_set_identity_v1.js\";\n",
              "import type { ContinuationRecordSetV1 } from \"../../domain/twin_runtime/continuation_record_set_identity_v1.js\";\n"
              "import {\n"
              "  validateVersionedContinuationRecordSetV1,\n"
              "  type VersionedContinuationRecordSetV1,\n"
              "} from \"../../domain/twin_runtime/continuation_record_set_dispatch_v1.js\";\n",
              1,
          )
          text = text.replace(
              "  BootstrapPersistencePortV1,\n",
              "  AssimilatedContinuationPersistencePortV1,\n  BootstrapPersistencePortV1,\n",
              1,
          )
          text = text.replace(
              "function requireMemberV1(recordSet: ContinuationRecordSetV1, objectType: CanonicalObjectEnvelopeV1[\"object_type\"]): CanonicalObjectEnvelopeV1 {",
              "function requireMemberV1(recordSet: VersionedContinuationRecordSetV1, objectType: CanonicalObjectEnvelopeV1[\"object_type\"]): CanonicalObjectEnvelopeV1 {",
              1,
          )
          text = text.replace(
              "function assertScopeMatchesV1(scope: TwinScopeKeyV1, recordSet: ContinuationRecordSetV1): void {",
              "function assertScopeMatchesV1(scope: TwinScopeKeyV1, recordSet: VersionedContinuationRecordSetV1): void {",
              1,
          )

          helper_anchor = "}\n\nexport class PostgresRuntimeRepositoryV1 implements RuntimeConfigRepositoryPortV1, BootstrapPersistencePortV1, ContinuationPersistencePortV1 {"
          helper_replacement = """}

function isAssimilatedRecordSetV1(
  recordSet: VersionedContinuationRecordSetV1,
): recordSet is AssimilatedContinuationRecordSetV1 {
  return "record_set_contract_id" in recordSet;
}

function validateVersionedPersistenceRecordSetV1(
  recordSet: VersionedContinuationRecordSetV1,
): void {
  if (isAssimilatedRecordSetV1(recordSet)) {
    validateAssimilatedContinuationCrossReferencesV1(recordSet);
    return;
  }
  validateContinuationRecordSetV1(recordSet);
}

type VersionedContinuationCommitInputV1 = {
  scope: TwinScopeKeyV1;
  lease: RuntimeLeaseClaimV1;
  expected: ContinuationExpectedPointersV1;
  record_set: VersionedContinuationRecordSetV1;
  fault_injection?: (stage: string) => void;
};

export class PostgresRuntimeRepositoryV1 implements RuntimeConfigRepositoryPortV1, BootstrapPersistencePortV1, ContinuationPersistencePortV1, AssimilatedContinuationPersistencePortV1 {"""
          if helper_anchor not in text:
              raise SystemExit("repository helper/class anchor not found")
          text = text.replace(helper_anchor, helper_replacement, 1)

          read_start = text.index("  async lookupContinuationRecordSet")
          verify_start = text.index("  private async verifyContinuationAuthorityV1", read_start)
          read_block = r'''  async lookupContinuationRecordSet(idempotencyKey: string): Promise<ContinuationRecordSetV1 | null> {
    const guard = await this.pool.query(
      "SELECT record_set_id FROM twin_object_idempotency_index_v1 WHERE identity_kind='A2_RECORD_SET' AND idempotency_key=$1",
      [idempotencyKey],
    );
    return guard.rows.length ? this.readContinuationRecordSet(guard.rows[0].record_set_id) : null;
  }

  async lookupAssimilatedContinuationRecordSet(
    idempotencyKey: string,
  ): Promise<AssimilatedContinuationRecordSetV1 | null> {
    const guard = await this.pool.query(
      "SELECT record_set_id FROM twin_object_idempotency_index_v1 WHERE identity_kind='A2_RECORD_SET' AND idempotency_key=$1",
      [idempotencyKey],
    );
    return guard.rows.length
      ? this.readAssimilatedContinuationRecordSet(guard.rows[0].record_set_id)
      : null;
  }

  private async readVersionedContinuationRecordSetWithClient(
    client: PoolClient,
    recordSetId: string,
  ): Promise<VersionedContinuationRecordSetV1 | null> {
    const guard = await client.query(
      "SELECT idempotency_key,determinism_hash,identity_basis,member_object_ids FROM twin_object_idempotency_index_v1 WHERE identity_kind='A2_RECORD_SET' AND record_set_id=$1",
      [recordSetId],
    );
    if (!guard.rows.length || !guard.rows[0].identity_basis) return null;
    const ids: string[] = guard.rows[0].member_object_ids;
    const facts = await client.query(
      "SELECT record_json FROM facts WHERE record_json->'payload'->>'object_id'=ANY($1::text[])",
      [ids],
    );
    if (facts.rows.length !== 8) return null;
    const members = facts.rows.map((row) => parseFactObject(row.record_json));
    const identityBasis = guard.rows[0].identity_basis as Record<string, unknown>;
    const aggregate = identityBasis.aggregate_identity_input as VersionedContinuationRecordSetV1["aggregate_identity_input"];
    const runtimeConfig = await this.readCanonicalObjectWithClient(
      client,
      aggregate.runtime_config_ref,
    );
    if (!runtimeConfig || runtimeConfig.object_type !== "twin_runtime_config_v1") {
      throw new Error("RUNTIME_CONFIG_NOT_FOUND");
    }
    if (runtimeConfig.determinism_hash !== aggregate.runtime_config_hash) {
      throw new Error("RUNTIME_CONFIG_HASH_MISMATCH");
    }
    const common = {
      continuation_operation_key:
        identityBasis.continuation_operation_key as VersionedContinuationRecordSetV1["continuation_operation_key"],
      continuation_operation_key_hash: String(identityBasis.continuation_operation_key_hash),
      continuation_record_set_id: recordSetId,
      continuation_idempotency_key: guard.rows[0].idempotency_key,
      member_object_ids: Object.fromEntries(
        members.map((member) => [member.object_type, member.object_id]),
      ) as ContinuationRecordSetV1["member_object_ids"],
      continuation_record_set_determinism_hash: guard.rows[0].determinism_hash,
      members,
    };
    const discriminator = identityBasis.record_set_contract_id;
    if (discriminator === undefined || discriminator === null) {
      const recordSet: ContinuationRecordSetV1 = {
        ...common,
        aggregate_identity_input:
          aggregate as ContinuationRecordSetV1["aggregate_identity_input"],
      };
      validateVersionedContinuationRecordSetV1({
        record_set: recordSet,
        runtime_config: runtimeConfig,
      });
      return recordSet;
    }
    if (discriminator !== ASSIMILATED_CONTINUATION_RECORD_SET_CONTRACT_ID_V1) {
      throw new Error("UNKNOWN_RECORD_SET_CONTRACT");
    }
    const recordSet: AssimilatedContinuationRecordSetV1 = {
      ...common,
      record_set_contract_id: ASSIMILATED_CONTINUATION_RECORD_SET_CONTRACT_ID_V1,
      aggregate_identity_input:
        aggregate as AssimilatedContinuationRecordSetV1["aggregate_identity_input"],
    };
    validateVersionedContinuationRecordSetV1({
      record_set: recordSet,
      runtime_config: runtimeConfig,
    });
    return recordSet;
  }

  private async readVersionedContinuationRecordSet(
    recordSetId: string,
  ): Promise<VersionedContinuationRecordSetV1 | null> {
    const client = await this.pool.connect();
    try {
      return await this.readVersionedContinuationRecordSetWithClient(client, recordSetId);
    } finally {
      client.release();
    }
  }

  async readContinuationRecordSet(recordSetId: string): Promise<ContinuationRecordSetV1 | null> {
    const recordSet = await this.readVersionedContinuationRecordSet(recordSetId);
    if (!recordSet) return null;
    if (isAssimilatedRecordSetV1(recordSet)) {
      throw new Error("CONTINUATION_RECORD_SET_CONTRACT_MISMATCH");
    }
    return recordSet;
  }

  async readAssimilatedContinuationRecordSet(
    recordSetId: string,
  ): Promise<AssimilatedContinuationRecordSetV1 | null> {
    const recordSet = await this.readVersionedContinuationRecordSet(recordSetId);
    if (!recordSet) return null;
    if (!isAssimilatedRecordSetV1(recordSet)) {
      throw new Error("ASSIMILATED_RECORD_SET_CONTRACT_MISMATCH");
    }
    return recordSet;
  }

'''
          text = text[:read_start] + read_block + text[verify_start:]
          text = text.replace(
              "    recordSet: ContinuationRecordSetV1,\n  ): Promise<void> {",
              "    recordSet: VersionedContinuationRecordSetV1,\n  ): Promise<void> {",
              1,
          )
          text = text.replace(
              "  private async verifyContinuationCanonicalUniquenessV1(client: PoolClient, recordSet: ContinuationRecordSetV1): Promise<void> {",
              "  private async verifyContinuationCanonicalUniquenessV1(client: PoolClient, recordSet: VersionedContinuationRecordSetV1): Promise<void> {",
              1,
          )

          commit_start = text.index("  async commitContinuationState")
          rebuild_start = text.index("  async rebuildContinuationProjections", commit_start)
          old_commit = text[commit_start:rebuild_start]
          old_commit = old_commit.replace(
              "  async commitContinuationState(input: Parameters<ContinuationPersistencePortV1[\"commitContinuationState\"]>[0]) {",
              "  private async commitVersionedContinuationStateV1(input: VersionedContinuationCommitInputV1) {",
              1,
          )
          old_commit = old_commit.replace(
              "    validateContinuationRecordSetV1(input.record_set);",
              "    validateVersionedPersistenceRecordSetV1(input.record_set);",
              1,
          )
          old_commit = old_commit.replace(
              "this.readContinuationRecordSetWithClient",
              "this.readVersionedContinuationRecordSetWithClient",
          )
          old_commit = old_commit.replace(
              "this.readContinuationRecordSet(input.record_set.continuation_record_set_id)",
              "this.readVersionedContinuationRecordSet(input.record_set.continuation_record_set_id)",
          )
          old_commit = old_commit.replace(
              "        if (!recordSet) throw new Error(\"IDEMPOTENT_CONTINUATION_RECORD_SET_INCOMPLETE\");\n        if (recordSet.continuation_record_set_determinism_hash",
              "        if (!recordSet) throw new Error(\"IDEMPOTENT_CONTINUATION_RECORD_SET_INCOMPLETE\");\n        if (isAssimilatedRecordSetV1(recordSet) !== isAssimilatedRecordSetV1(input.record_set)) throw new Error(\"IDEMPOTENCY_CONFLICT\");\n        if (recordSet.continuation_record_set_determinism_hash",
              1,
          )
          old_commit = old_commit.replace(
              "            aggregate_identity_input: input.record_set.aggregate_identity_input,\n",
              "            aggregate_identity_input: input.record_set.aggregate_identity_input,\n            record_set_contract_id: isAssimilatedRecordSetV1(input.record_set)\n              ? input.record_set.record_set_contract_id\n              : undefined,\n",
              1,
          )

          commit_wrappers = r'''  async commitContinuationState(
    input: Parameters<ContinuationPersistencePortV1["commitContinuationState"]>[0],
  ) {
    const result = await this.commitVersionedContinuationStateV1(input);
    if (isAssimilatedRecordSetV1(result.record_set)) {
      throw new Error("CONTINUATION_RECORD_SET_CONTRACT_MISMATCH");
    }
    return result;
  }

  async commitAssimilatedContinuationState(
    input: Parameters<AssimilatedContinuationPersistencePortV1["commitAssimilatedContinuationState"]>[0],
  ) {
    const result = await this.commitVersionedContinuationStateV1(input);
    if (!isAssimilatedRecordSetV1(result.record_set)) {
      throw new Error("ASSIMILATED_RECORD_SET_CONTRACT_MISMATCH");
    }
    return result;
  }

'''
          text = text[:commit_start] + commit_wrappers + old_commit + text[rebuild_start:]

          rebuild_start = text.index("  async rebuildContinuationProjections")
          old_rebuild = text[rebuild_start:]
          old_rebuild = old_rebuild.replace(
              "  async rebuildContinuationProjections(recordSetId: string): Promise<{ rebuilt_projection_count: 5 }> {",
              "  private async rebuildVersionedContinuationProjectionsV1(recordSetId: string): Promise<{ rebuilt_projection_count: 5 }> {",
              1,
          )
          old_rebuild = old_rebuild.replace(
              "this.readContinuationRecordSetWithClient",
              "this.readVersionedContinuationRecordSetWithClient",
              1,
          )
          rebuild_wrappers = r'''  async rebuildContinuationProjections(
    recordSetId: string,
  ): Promise<{ rebuilt_projection_count: 5 }> {
    const recordSet = await this.readContinuationRecordSet(recordSetId);
    if (!recordSet) throw new Error("CONTINUATION_RECORD_SET_NOT_FOUND");
    return this.rebuildVersionedContinuationProjectionsV1(recordSetId);
  }

  async rebuildAssimilatedContinuationProjections(
    recordSetId: string,
  ): Promise<{ rebuilt_projection_count: 5 }> {
    const recordSet = await this.readAssimilatedContinuationRecordSet(recordSetId);
    if (!recordSet) throw new Error("ASSIMILATED_CONTINUATION_RECORD_SET_NOT_FOUND");
    return this.rebuildVersionedContinuationProjectionsV1(recordSetId);
  }

'''
          text = text[:rebuild_start] + rebuild_wrappers + old_rebuild
          repository_path.write_text(text, encoding="utf-8", newline="\n")

          fixture_path = Path("scripts/runtime_acceptance/mcft_cap_03_assimilated_persistence_recovery_fixture_v1.ts")
          fixture = fixture_path.read_text(encoding="utf-8")
          fixture = fixture.replace(
              "  const cap02ForecastTemplate = memberByTypeV1(\n",
              "  const cap02StateTemplate = memberByTypeV1(\n    source.continuationRecordSet.members,\n    \"twin_state_estimate_v1\",\n  );\n  const cap02ForecastTemplate = memberByTypeV1(\n",
              1,
          )
          fixture = fixture.replace(
              "  const predecessorState = structuredClone(source.predecessorState);",
              "  const predecessorState = clonePredecessorMemberV1({\n"
              "    template: cap02StateTemplate,\n"
              "    object_id: deriveSemanticObjectIdV1(\"s3b_cap02_final_state\", {\n"
              "      scope: source.scope,\n"
              "      logical_time: S3B_PREDECESSOR_LOGICAL_TIME_V1,\n"
              "    }),\n"
              "    logical_time: S3B_PREDECESSOR_LOGICAL_TIME_V1,\n"
              "    payload_patch: {},\n"
              "  });",
              1,
          )
          fixture_path.write_text(fixture, encoding="utf-8", newline="\n")

          status_path = Path("docs/digital_twin/mcft/cap_03/GEOX-MCFT-CAP-03-ASSIMILATED-PERSISTENCE-RECOVERY-STATUS.json")
          status = json.loads(status_path.read_text(encoding="utf-8"))
          status["preserved_nonclaims"] = [
              "NO_CAP_03_A2_TICK_COMMITTED" if item == "NO_MAINLINE_CAP_03_A2_TICK_COMMITTED" else item
              for item in status["preserved_nonclaims"]
          ]
          status_path.write_text(json.dumps(status, indent=2) + "\n", encoding="utf-8", newline="\n")

          delivery_path = Path("docs/digital_twin/mcft/cap_03/GEOX-MCFT-CAP-03-DELIVERY-SLICE-STATUS.json")
          delivery = json.loads(delivery_path.read_text(encoding="utf-8"))
          s3b_id = "MCFT-CAP-03.MCFT-03-08.ASSIMILATED-A2-PERSISTENCE-RECOVERY-V1"
          s4_id = "MCFT-CAP-03.MCFT-04-05-06-07-08-09.SINGLE-TICK-INTEGRATION-V1"
          delivery["status"] = "ASSIMILATED_PERSISTENCE_RECOVERY_IN_PROGRESS"
          delivery["active_delivery_slice_id"] = s3b_id
          s3b = next(item for item in delivery["slices"] if item["delivery_slice_id"] == s3b_id)
          s3b.update({
              "baseline_main_commit": "293fbeff04441f12aee13945c2db24b4b9bb23b5",
              "branch": "mcft-cap-03-assimilated-a2-persistence-recovery-v1",
              "status": "IN_PROGRESS",
              "activation_fields_status": "FROZEN",
              "allowed_claims": status["allowed_claims_after_merge_and_postmerge_gate"],
              "preserved_nonclaims": status["preserved_nonclaims"],
              "exact_changed_file_boundary": status["exact_changed_file_boundary"],
              "effectiveness_condition": "S3B_PR_MERGED_TO_MAIN_AND_MERGED_MAIN_ASSIMILATED_PERSISTENCE_RECOVERY_GATE_PASS",
          })
          s4 = next(item for item in delivery["slices"] if item["delivery_slice_id"] == s4_id)
          if s4["status"] != "BLOCKED" or s4["branch"] is not None or s4["baseline_main_commit"] is not None:
              raise SystemExit("S4 is not in the required blocked pre-activation state")
          delivery_path.write_text(json.dumps(delivery, indent=2) + "\n", encoding="utf-8", newline="\n")

          Path(".github/workflows/s3b-versioned-persistence-transition.yml").unlink()
      - name: Commit transition
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(mcft-cap-03): implement S3B versioned A2 persistence"
          git push origin HEAD:mcft-cap-03-assimilated-a2-persistence-recovery-v1
