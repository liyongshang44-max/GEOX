name: mcft-cap-06-s6-paired-shadow-effectiveness

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s4-effectiveness-s5-authorization.yml'
      - '.github/workflows/mcft-cap-06-s5-candidate-effectiveness.yml'
      - '.github/workflows/mcft-cap-06-s5-entry-controls.yml'
      - '.github/workflows/mcft-cap-06-s6-paired-shadow-effectiveness.yml'
      - '.github/workflows/mcft-cap-06-s6-paired-shadow.yml'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-STATE.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S6-PAIRED-SHADOW-EFFECTIVENESS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S6-PAIRED-SHADOW-STATUS.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S6_PAIRED_SHADOW_EFFECTIVENESS.cjs'
  push:
    branches: [main]
    paths:
      - '.github/workflows/mcft-cap-06-s4-effectiveness-s5-authorization.yml'
      - '.github/workflows/mcft-cap-06-s5-candidate-effectiveness.yml'
      - '.github/workflows/mcft-cap-06-s5-entry-controls.yml'
      - '.github/workflows/mcft-cap-06-s6-paired-shadow-effectiveness.yml'
      - '.github/workflows/mcft-cap-06-s6-paired-shadow.yml'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-DELIVERY-STATE.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-CURRENT-STATE-RECONCILIATION.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-DELIVERY-SLICE-STATUS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S6-PAIRED-SHADOW-EFFECTIVENESS.json'
      - 'docs/digital_twin/mcft/cap_06/GEOX-MCFT-CAP-06-S6-PAIRED-SHADOW-STATUS.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S6_PAIRED_SHADOW_EFFECTIVENESS.cjs'

permissions:
  contents: read

jobs:
  s6-paired-shadow-effectiveness:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      MCFT_CAP_06_S6_PAIRED_SHADOW_BASELINE_REF: 5f73ed68cad479276ca55fb70391ae4543cb3dcc
      MCFT_CAP_06_S6_PAIRED_SHADOW_EFFECTIVENESS_BASELINE_REF: b1111e39ed70b39098362a468eac14101bc29ee3
    steps:
      - name: Checkout exact S6 implementation merge
        uses: actions/checkout@v4
        with:
          ref: b1111e39ed70b39098362a468eac14101bc29ee3
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Run exact merged-main S6 preflight
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S6_PAIRED_SHADOW.cjs

      - name: Verify exact implementation merge evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S6_PAIRED_SHADOW_PREFLIGHT_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s6_paired_shadow_preflight_result_v1') throw new Error('S6_EFFECTIVENESS_IMPLEMENTATION_SCHEMA_MISMATCH');
          if (result.status !== 'PASS') throw new Error('S6_EFFECTIVENESS_IMPLEMENTATION_NOT_PASS');
          if (result.exact_head !== 'b1111e39ed70b39098362a468eac14101bc29ee3') throw new Error('S6_EFFECTIVENESS_IMPLEMENTATION_HEAD_MISMATCH');
          if (result.candidate_ref !== 'twin_calibration_candidate_5649b9ab80b5545cf6007387') throw new Error('S6_EFFECTIVENESS_CANDIDATE_REF_MISMATCH');
          if (result.candidate_hash !== 'sha256:a2018a61bf6699b3cc3b8992058eb2c37b4d38d7f70771f9186495144c229a65') throw new Error('S6_EFFECTIVENESS_CANDIDATE_HASH_MISMATCH');
          if (result.candidate_parameter_value !== '0.034000' || result.holdout_case_count !== 8) throw new Error('S6_EFFECTIVENESS_INPUT_RESULT_MISMATCH');
          if (result.evaluation_disposition !== 'ELIGIBLE_FOR_HUMAN_ACTIVATION_REVIEW') throw new Error('S6_EFFECTIVENESS_DISPOSITION_MISMATCH');
          if (JSON.stringify(result.reason_codes) !== JSON.stringify(['ALL_THRESHOLDS_PASS'])) throw new Error('S6_EFFECTIVENESS_REASON_MISMATCH');
          if (result.deterministic_rerun_verified !== true || result.future_leakage_count !== 0) throw new Error('S6_EFFECTIVENESS_DETERMINISM_OR_LEAKAGE_MISMATCH');
          if (result.canonical_fact_write_count !== 0 || result.projection_write_count !== 0 || result.candidate_append_count !== 0 || result.evaluation_append_count !== 0) throw new Error('S6_EFFECTIVENESS_IMPLEMENTATION_WRITE_BOUNDARY_VIOLATION');
          if (result.model_activation_count !== 0 || result.active_config_switch_count !== 0 || result.runtime_parameter_change_count !== 0 || result.state_mutation_count !== 0 || result.checkpoint_mutation_count !== 0 || result.migration_count !== 0) throw new Error('S6_EFFECTIVENESS_IMPLEMENTATION_RUNTIME_BOUNDARY_VIOLATION');
          if (result.s6_candidate_implemented !== true || result.s6_effective !== false || result.s7_authorized !== false) throw new Error('S6_EFFECTIVENESS_PREWRITEBACK_FRONTIER_MISMATCH');
          NODE

      - name: Checkout exact effectiveness candidate head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          clean: false

      - name: Run structured S6 effectiveness Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S6_PAIRED_SHADOW_EFFECTIVENESS.cjs

      - name: Verify structured effectiveness evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S6_PAIRED_SHADOW_EFFECTIVENESS_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s6_paired_shadow_effectiveness_result_v1') throw new Error('S6_EFFECTIVENESS_RESULT_SCHEMA_MISMATCH');
          if (result.status !== 'PASS') throw new Error('S6_EFFECTIVENESS_RESULT_NOT_PASS');
          if (result.changed_file_count !== 11 || result.logical_commit_count < 1 || result.logical_commit_count > 15) throw new Error('S6_EFFECTIVENESS_GOVERNED_DELTA_MISMATCH');
          if (result.s6_status !== 'MERGED_EFFECTIVE' || result.s6_effective !== true) throw new Error('S6_EFFECTIVENESS_STATUS_MISMATCH');
          if (result.active_delivery_slice_id !== 'MCFT-CAP-06.MCFT-03-12.SHADOW-EVALUATION-COMMIT-V1') throw new Error('S6_EFFECTIVENESS_FRONTIER_MISMATCH');
          if (result.s7_authorized !== true || result.s7_implementation_started !== false) throw new Error('S6_EFFECTIVENESS_S7_AUTHORIZATION_MISMATCH');
          if (result.governance_writeback_canonical_write_count !== 0 || result.production_candidate_append_count !== 0 || result.production_evaluation_append_count !== 0 || result.projection_write_count !== 0 || result.model_activation_count !== 0) throw new Error('S6_EFFECTIVENESS_WRITE_BOUNDARY_VIOLATION');
          if (result.active_config_switch_count !== 0 || result.runtime_parameter_change_count !== 0 || result.state_mutation_count !== 0 || result.checkpoint_mutation_count !== 0 || result.migration_count !== 0) throw new Error('S6_EFFECTIVENESS_RUNTIME_MUTATION_VIOLATION');
          NODE

      - name: Upload effectiveness evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s6-paired-shadow-effectiveness-evidence
          path: acceptance-output/
          if-no-files-found: error
