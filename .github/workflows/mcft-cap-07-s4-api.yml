name: mcft-cap-07-s4-api

on:
  pull_request:
    paths:
      - 'docs/digital_twin/mcft/cap_07/GEOX-MCFT-CAP-07-S4-DELIVERY-STATUS-V1.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION.cjs'
      - '.github/workflows/mcft-cap-07-s4-api.yml'
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mcft-cap-07-s4-${{ github.event_name }}-${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  mcft-cap-07-s4-api:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 3s
          --health-timeout 2s
          --health-retries 30
    steps:
      - name: Checkout exact candidate head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve comparison base
        id: comparison-base
        shell: bash
        env:
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || '' }}
        run: |
          set -euo pipefail
          if [[ -n "${EVENT_BASE_SHA}" ]]; then
            BASE_SHA="${EVENT_BASE_SHA}"
          else
            BASE_SHA="$(git rev-parse origin/main)"
          fi
          git cat-file -e "${BASE_SHA}^{commit}"
          echo "sha=${BASE_SHA}" >> "${GITHUB_OUTPUT}"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Install locked workspace
        run: pnpm install --frozen-lockfile

      - name: Typecheck server read surface
        run: pnpm --filter @geox/server typecheck

      - name: Run exact-SHA governance remediation selftest
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION.cjs --selftest-governance-remediation

      - name: Run S4 transport and contract acceptance
        env:
          MCFT_BASE_SHA: ${{ steps.comparison-base.outputs.sha }}
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_07_S4_API.ts

      - name: Run S4 real PostgreSQL adapter acceptance
        env:
          MCFT_S4_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_07_S4_POSTGRES_ADAPTER.ts

      - name: Run S4 root-independent Health PostgreSQL acceptance
        env:
          MCFT_S4_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_07_S4_HEALTH_POSTGRES.ts

      - name: Run S4 PostgreSQL domain composer acceptance
        env:
          MCFT_S4_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_07_S4_DOMAIN_COMPOSERS_POSTGRES.ts

      - name: Run S4 frozen production schema acceptance
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_07_S4_FROZEN_SCHEMA.ts

      - name: Verify structured S4 results
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          for (const [file, minimum] of [
            ['acceptance-output/MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION_SELFTEST.json', 4],
            ['acceptance-output/MCFT_CAP_07_S4_API_RESULT.json', 9],
            ['acceptance-output/MCFT_CAP_07_S4_POSTGRES_ADAPTER_RESULT.json', 12],
            ['acceptance-output/MCFT_CAP_07_S4_HEALTH_POSTGRES_RESULT.json', 6],
            ['acceptance-output/MCFT_CAP_07_S4_DOMAIN_COMPOSERS_POSTGRES_RESULT.json', 4],
            ['acceptance-output/MCFT_CAP_07_S4_FROZEN_SCHEMA_RESULT.json', 6],
          ]) {
            const result = JSON.parse(fs.readFileSync(file, 'utf8'));
            if (result.status !== 'PASS') throw new Error(`S4_NOT_PASS:${file}:${result.error || 'UNKNOWN'}`);
            if (!Number.isInteger(result.check_count) || result.check_count < minimum) throw new Error(`S4_CHECK_INVENTORY_INVALID:${file}`);
            if (!Array.isArray(result.checks) || result.checks.some((check) => check.status !== 'PASS')) throw new Error(`S4_CHECK_FAILURE:${file}`);
          }
          NODE

      - name: Verify frozen frontier projection and remediation boundary
        env:
          MCFT_BASE_SHA: ${{ steps.comparison-base.outputs.sha }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const cp = require('node:child_process');
          const statusPath = 'docs/digital_twin/mcft/cap_07/GEOX-MCFT-CAP-07-S4-DELIVERY-STATUS-V1.json';
          const s4 = JSON.parse(fs.readFileSync(statusPath, 'utf8'));
          const s5 = JSON.parse(fs.readFileSync('docs/digital_twin/mcft/cap_07/GEOX-MCFT-CAP-07-S5-DELIVERY-STATUS-V1.json', 'utf8'));
          const exact = (actual, expected, code) => {
            if (actual !== expected) throw new Error(`${code}:${String(actual)}`);
          };

          exact(s4.record_status, 'S4_COMMITTED_CANDIDATE_AUTHORITY', 'S4_STATUS');
          exact(s4.delivery_state, 'IMPLEMENTED_AWAITING_PROTECTED_MERGE_AND_EXACT_SHA_ATTESTATION', 'S4_DELIVERY_STATE');
          exact(s4.s4_candidate_implemented, true, 'S4_IMPLEMENTED');
          exact(s4.implementation_authorized, true, 'S4_IMPLEMENTATION_AUTHORITY');
          exact(s4.effectiveness_condition, 'PRESENT_ON_MAIN_AND_EXACT_SHA_ATTESTATION_PASS', 'S4_EFFECTIVENESS_CONDITION');
          exact(s4.externally_effective, false, 'S4_REPOSITORY_EFFECTIVENESS_MUST_REMAIN_CONDITIONAL');
          exact(s4.effective_status_when_attested, 'IN_PROGRESS', 'S4_EFFECTIVE_STATUS_PROJECTION');
          exact(s4.effective_next_slice_when_attested, 'S5', 'S4_EFFECTIVE_NEXT_SLICE_PROJECTION');
          exact(s4.runtime_source_authorized, false, 'S4_RUNTIME_SOURCE');
          exact(s4.canonical_write_authorized, false, 'S4_CANONICAL_WRITE');
          exact(s4.mcft_cap_08_authorized, false, 'S4_CAP08');
          exact(s5.s5_candidate_implemented, false, 'S5_IMPLEMENTED_PRECONDITION');
          exact(s5.implementation_authorized, false, 'S5_AUTHORIZED_PRECONDITION');

          const attestationSource = fs.readFileSync('scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION.cjs', 'utf8');
          if (!attestationSource.includes('MCFT_GOVERNANCE_REMEDIATION_V1')) throw new Error('GOVERNANCE_REMEDIATION_MARKER_NOT_SUPPORTED');
          if (!attestationSource.includes('candidate_transition_created_by_remediation: false')) throw new Error('REMEDIATION_NONTRANSITION_ASSERTION_MISSING');

          const actual = cp.execFileSync(
            'git',
            ['diff', '--name-only', `${process.env.MCFT_BASE_SHA}...HEAD`],
            { encoding: 'utf8' },
          ).trim().split(/\r?\n/).filter(Boolean).sort();
          const allowed = [
            '.github/workflows/mcft-cap-07-s4-api.yml',
            statusPath,
            'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION.cjs',
          ].sort();
          if (JSON.stringify(actual) !== JSON.stringify(allowed)) {
            throw new Error(`S4_FRONTIER_REMEDIATION_BOUNDARY_INVALID:${JSON.stringify(actual)}`);
          }
          NODE

      - name: Upload focused acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-07-s4-api-${{ github.sha }}
          path: |
            acceptance-output/MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION_SELFTEST.json
            acceptance-output/MCFT_CAP_07_S4_API_RESULT.json
            acceptance-output/MCFT_CAP_07_S4_POSTGRES_ADAPTER_RESULT.json
            acceptance-output/MCFT_CAP_07_S4_HEALTH_POSTGRES_RESULT.json
            acceptance-output/MCFT_CAP_07_S4_DOMAIN_COMPOSERS_POSTGRES_RESULT.json
            acceptance-output/MCFT_CAP_07_S4_FROZEN_SCHEMA_RESULT.json
          if-no-files-found: error
          retention-days: 90
