name: mcft-cap-07-s4-api

on:
  pull_request:
    paths:
      - 'apps/server/src/repositories/field_twin_read_model/postgres_field_twin_read_repository_v1.ts'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_07_S4_CURSOR_VISIBILITY_POSTGRES.ts'
      - 'docs/digital_twin/mcft/cap_07/**'
      - 'docs/digital_twin/mcft/MCFT-CANDIDATE-AUTHORITY-REGISTRY-V1.json'
      - 'scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION.cjs'
      - 'scripts/governance_acceptance/MCFT_REGISTRY_FOCUSED_WORKFLOW_APPLICABILITY_V1.cjs'
      - 'scripts/governance_acceptance/mcft_cap07_s6_closure_artifact_finalize.cjs'
      - '.github/workflows/mcft-cap-07-slice-exact-sha-attestation.yml'
      - '.github/workflows/mcft-cap-07-s4-api.yml'
      - '.github/workflows/mcft-cap-07-s6-closure.yml'
      - 'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_07_S6_CLOSURE.ts'
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: mcft-cap-07-s4-${{ github.event_name }}-${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  resolve-applicability:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      disposition: ${{ steps.resolve.outputs.disposition }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with: { node-version: 20.11.1 }
      - id: resolve
        name: Resolve Registry-owned candidate transition
        env:
          MCFT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          MCFT_CANDIDATE_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
          MCFT_EXPECTED_FOCUSED_WORKFLOW: mcft-cap-07-s4-api
        run: |
          DISPOSITION="$(node scripts/governance_acceptance/MCFT_REGISTRY_FOCUSED_WORKFLOW_APPLICABILITY_V1.cjs --resolve)"
          echo "disposition=${DISPOSITION}" >> "${GITHUB_OUTPUT}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mcft-cap-07-s4-applicability-${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          path: acceptance-output/MCFT_REGISTRY_FOCUSED_WORKFLOW_APPLICABILITY_V1_RESULT.json
          if-no-files-found: error
          retention-days: 30

  not-applicable:
    needs: resolve-applicability
    if: needs.resolve-applicability.outputs.disposition == 'NOT_APPLICABLE'
    runs-on: ubuntu-latest
    steps:
      - run: echo "mcft-cap-07-s4-api NOT_APPLICABLE for this registered transition"

  mcft-cap-07-s4-api:
    needs: resolve-applicability
    if: needs.resolve-applicability.outputs.disposition == 'APPLICABLE'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 3s
          --health-timeout 2s
          --health-retries 30
    steps:
      - name: Checkout exact candidate head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve exact head, comparison base, and lifecycle mode
        id: delivery
        shell: bash
        env:
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: |
          set -euo pipefail
          EXACT_SHA="${EVENT_HEAD_SHA}"
          BASE_SHA="${EVENT_BASE_SHA}"
          git cat-file -e "${EXACT_SHA}^{commit}"
          git cat-file -e "${BASE_SHA}^{commit}"
          git merge-base --is-ancestor "${BASE_SHA}" "${EXACT_SHA}"
          export MCFT_BASE_SHA="${BASE_SHA}"
          MODE="$(node - <<'NODE'
          const cp = require('node:child_process');
          const fs = require('node:fs');
          const actual = cp.execFileSync('git',['diff','--name-only',`${process.env.MCFT_BASE_SHA}...HEAD`],{encoding:'utf8'}).trim().split(/\r?\n/).filter(Boolean).sort();
          const cursor = [
            '.github/workflows/mcft-cap-07-s4-api.yml',
            'apps/server/src/repositories/field_twin_read_model/postgres_field_twin_read_repository_v1.ts',
            'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_07_S4_CURSOR_VISIBILITY_POSTGRES.ts',
          ].sort();
          const s6 = [
            '.github/workflows/mcft-cap-07-s4-api.yml',
            '.github/workflows/mcft-cap-07-s6-closure.yml',
            '.github/workflows/mcft-cap-07-slice-exact-sha-attestation.yml',
            'docs/digital_twin/mcft/MCFT-CANDIDATE-AUTHORITY-REGISTRY-V1.json',
            'docs/digital_twin/mcft/cap_07/GEOX-MCFT-CAP-07-RESOLVED-MANIFEST-V1.json',
            'docs/digital_twin/mcft/cap_07/GEOX-MCFT-CAP-07-S5-HARD-ACCEPTANCE-EVIDENCE-V1.json',
            'docs/digital_twin/mcft/cap_07/GEOX-MCFT-CAP-07-S6-DELIVERY-STATUS-V1.json',
            'docs/digital_twin/mcft/cap_07/GEOX-MCFT-CAP-07-S6-HARD-ACCEPTANCE-EVIDENCE-V1.json',
            'docs/digital_twin/mcft/cap_07/GEOX-MCFT-CAP-07-S6-HARD-ACCEPTANCE-RESOLUTION-V1.json',
            'docs/digital_twin/mcft/cap_07/GEOX-MCFT-CAP-07-WORKFLOW-DECLARATION-V1.json',
            'scripts/governance_acceptance/mcft_cap07_s6_closure_artifact_finalize.cjs',
            'scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_07_S6_CLOSURE.ts',
          ].sort();
          let mode = 'S4_GOVERNANCE_MODE';
          let expected = null;
          if (JSON.stringify(actual) === JSON.stringify(cursor)) { mode = 'S4_CURSOR_VISIBILITY_REMEDIATION_MODE'; expected = cursor; }
          else if (JSON.stringify(actual) === JSON.stringify(s6)) { mode = 'S6_CLOSURE_MODE'; expected = s6; }
          fs.writeFileSync('acceptance-output-mode.json', JSON.stringify({mode,actual,expected},null,2));
          process.stdout.write(mode);
          NODE
          )"
          echo "exact_sha=${EXACT_SHA}" >> "${GITHUB_OUTPUT}"
          echo "base_sha=${BASE_SHA}" >> "${GITHUB_OUTPUT}"
          echo "mode=${MODE}" >> "${GITHUB_OUTPUT}"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - name: Install locked workspace
        run: pnpm install --frozen-lockfile
      - name: Typecheck server read surface
        run: pnpm --filter @geox/server typecheck
      - name: Run exact-SHA governance remediation selftest
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION.cjs --selftest-governance-remediation

      - name: Run S4 transport and contract acceptance
        if: steps.delivery.outputs.mode == 'S4_GOVERNANCE_MODE'
        env:
          MCFT_BASE_SHA: ${{ steps.delivery.outputs.base_sha }}
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_07_S4_API.ts
      - name: Run S4 real PostgreSQL adapter acceptance
        env:
          MCFT_S4_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_07_S4_POSTGRES_ADAPTER.ts
      - name: Run S4 root-independent Health PostgreSQL acceptance
        env:
          MCFT_S4_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_07_S4_HEALTH_POSTGRES.ts
      - name: Run S4 PostgreSQL domain composer acceptance
        env:
          MCFT_S4_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_07_S4_DOMAIN_COMPOSERS_POSTGRES.ts
      - name: Run S4 frozen production schema acceptance
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_07_S4_FROZEN_SCHEMA.ts
      - name: Run old-cursor projection visibility PostgreSQL acceptance
        env:
          MCFT_S4_CURSOR_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_07_S4_CURSOR_VISIBILITY_POSTGRES.ts

      - name: Verify structured S4 results and lifecycle boundary
        env:
          DELIVERY_MODE: ${{ steps.delivery.outputs.mode }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          for (const [file, minimum] of [
            ['acceptance-output/MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION_SELFTEST.json',5],
            ['acceptance-output/MCFT_CAP_07_S4_POSTGRES_ADAPTER_RESULT.json',12],
            ['acceptance-output/MCFT_CAP_07_S4_HEALTH_POSTGRES_RESULT.json',6],
            ['acceptance-output/MCFT_CAP_07_S4_DOMAIN_COMPOSERS_POSTGRES_RESULT.json',4],
            ['acceptance-output/MCFT_CAP_07_S4_FROZEN_SCHEMA_RESULT.json',6],
            ['acceptance-output/MCFT_CAP_07_S4_CURSOR_VISIBILITY_POSTGRES_RESULT.json',4],
          ]) {
            const result = JSON.parse(fs.readFileSync(file,'utf8'));
            if (result.status !== 'PASS' || result.check_count < minimum) throw new Error(`S4_RESULT_NOT_PASS:${file}:${result.error || 'UNKNOWN'}`);
          }
          const s4 = JSON.parse(fs.readFileSync('docs/digital_twin/mcft/cap_07/GEOX-MCFT-CAP-07-S4-DELIVERY-STATUS-V1.json','utf8'));
          if (s4.s4_candidate_implemented !== true || s4.runtime_source_authorized !== false || s4.canonical_write_authorized !== false || s4.mcft_cap_08_authorized !== false) throw new Error('S4_AUTHORITY_INVALID');
          const mode = JSON.parse(fs.readFileSync('acceptance-output-mode.json','utf8'));
          if (process.env.DELIVERY_MODE === 'S4_CURSOR_VISIBILITY_REMEDIATION_MODE') {
            if (mode.actual.length !== 3 || JSON.stringify(mode.actual) !== JSON.stringify(mode.expected)) throw new Error(`S4_CURSOR_REMEDIATION_BOUNDARY_INVALID:${JSON.stringify(mode.actual)}`);
          } else if (process.env.DELIVERY_MODE === 'S6_CLOSURE_MODE') {
            if (mode.actual.length !== 12 || JSON.stringify(mode.actual) !== JSON.stringify(mode.expected)) throw new Error(`S6_CLOSURE_BOUNDARY_INVALID:${JSON.stringify(mode.actual)}`);
            const s5 = JSON.parse(fs.readFileSync('docs/digital_twin/mcft/cap_07/GEOX-MCFT-CAP-07-S5-DELIVERY-STATUS-V1.json','utf8'));
            const s6 = JSON.parse(fs.readFileSync('docs/digital_twin/mcft/cap_07/GEOX-MCFT-CAP-07-S6-DELIVERY-STATUS-V1.json','utf8'));
            if (s5.s5_candidate_implemented !== true || s6.s6_candidate_implemented !== true || s6.externally_effective !== false) throw new Error('S6_CLOSURE_AUTHORITY_INVALID');
            if (s6.required_closure_retention_level !== 'R2' || s6.required_closure_retention_days !== 730) throw new Error('S6_RETENTION_CONTRACT_INVALID');
            const finalizer = fs.readFileSync('scripts/governance_acceptance/mcft_cap07_s6_closure_artifact_finalize.cjs','utf8');
            for (const token of ['effective_resolved_item_count: 282','product_observation_write_delta: 0','MCFT_CAP_07_COMPLETE','item.item_id']) if (!finalizer.includes(token)) throw new Error(`S6_FINALIZER_TOKEN_MISSING:${token}`);
          } else {
            const api = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_07_S4_API_RESULT.json','utf8'));
            if (api.status !== 'PASS' || api.check_count < 9) throw new Error('S4_API_NOT_PASS');
          }
          const cursor = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_07_S4_CURSOR_VISIBILITY_POSTGRES_RESULT.json','utf8'));
          if (cursor.old_cursor_post_snapshot_projection_excluded !== true || cursor.fresh_snapshot_late_commit_visible !== true || cursor.product_read_write_delta !== 0) throw new Error('S4_CURSOR_VISIBILITY_PROOF_INVALID');
          NODE

      - name: Upload focused acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-07-s4-api-${{ steps.delivery.outputs.exact_sha }}
          path: |
            acceptance-output-mode.json
            acceptance-output/MCFT_CAP_07_SLICE_EXACT_SHA_ATTESTATION_SELFTEST.json
            acceptance-output/MCFT_CAP_07_S4_API_RESULT.json
            acceptance-output/MCFT_CAP_07_S4_POSTGRES_ADAPTER_RESULT.json
            acceptance-output/MCFT_CAP_07_S4_HEALTH_POSTGRES_RESULT.json
            acceptance-output/MCFT_CAP_07_S4_DOMAIN_COMPOSERS_POSTGRES_RESULT.json
            acceptance-output/MCFT_CAP_07_S4_FROZEN_SCHEMA_RESULT.json
            acceptance-output/MCFT_CAP_07_S4_CURSOR_VISIBILITY_POSTGRES_RESULT.json
          if-no-files-found: warn
          retention-days: 90
