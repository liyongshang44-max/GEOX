name: MCFT-CAP-05 S4 final materialization

on:
  pull_request:
    types: [synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-05-s4-human-decision-g-commit-v1'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mcft_cap05_s4_acceptance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mcft_cap05_s4_acceptance"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/mcft_cap05_s4_acceptance
      MCFT_CAP_05_S4_DESTRUCTIVE_ACCEPTANCE: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile

      - name: Materialize S4 SSOT
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          p = Path('.mcft_cap05_s4_materializer.py')
          text = p.read_text(encoding='utf-8')
          old = 'marker = "# 28. S4 — Human Decision through G transaction"'
          new = 'marker = "## S4 — Human Decision"'
          if old not in text:
              raise SystemExit('S4 materializer marker patch target missing')
          p.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          python3 .mcft_cap05_s4_materializer.py

      - name: Commit exact S4 candidate and remove temporary files
        shell: bash
        run: |
          exec > >(tee /tmp/mcft-cap05-s4-commit.log) 2>&1
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/mcft-cap-05-s4-initial-validation.yml .mcft_cap05_s4_materializer.py
          git add \
            apps/server/src/domain/twin_runtime/feedback_canonical_contracts_v1.ts \
            apps/server/src/runtime/twin_runtime/human_decision_service_v1.ts \
            docs/digital_twin/GEOX-DT-02-MCFT-IMPLEMENTATION-MAP.md \
            docs/digital_twin/GEOX-MCFT-VERTICAL-CAPABILITY-LINE-MATRIX.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-AUTHORIZATION-STATUS.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-DELIVERY-SLICE-STATUS.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-S4-HUMAN-DECISION-G.md \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-S4-STATUS.json \
            docs/digital_twin/mcft/cap_05/GEOX-MCFT-CAP-05-TASK.md \
            scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S4_HUMAN_DECISION_G.cjs \
            scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_HUMAN_DECISION_G_DB.ts
          git status --short
          git commit -m "feat(mcft-cap-05): establish S4 Human Decision through G"

      - name: Upload commit failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-05-s4-commit-failure
          path: /tmp/mcft-cap05-s4-commit.log
          if-no-files-found: ignore

      - name: Run S4 governance Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_S4_HUMAN_DECISION_G.cjs

      - name: Run S4 PostgreSQL acceptance
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_05_HUMAN_DECISION_G_DB.ts

      - name: Typecheck repository
        run: pnpm -r typecheck

      - name: Push final S4 candidate
        run: git push origin HEAD:${{ github.head_ref }}
