name: mcft-cap-06-s5-predecessor-effectiveness-postmerge-proof

on:
  pull_request:
    paths:
      - '.github/workflows/mcft-cap-06-s5-predecessor-effectiveness-postmerge-proof.yml'

permissions:
  contents: read

jobs:
  exact-merged-main-proof:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d geox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geox
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/geox
      MCFT_CAP_06_S5_GRAPH_BASELINE_REF: 437a6ccae5903494638d17c997a7017c6da057cf
      MCFT_CAP_06_S5_PREDECESSOR_EFFECTIVENESS_BASELINE_REF: 17a01ec25be2bbd7ee92b9e9e6115afed9665435
    steps:
      - name: Checkout proof carrier
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify exact proof topology
        shell: bash
        run: |
          test "$(git rev-parse HEAD^)" = "dc7913d070c4a0c2cac0a7c35ccfa4292e633876"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "dc7913d070c4a0c2cac0a7c35ccfa4292e633876"
          test -z "$(git diff --name-only cea83363d760396b933c0132ee0d465659c9301b dc7913d070c4a0c2cac0a7c35ccfa4292e633876)"
          test "$(git rev-list --count 17a01ec25be2bbd7ee92b9e9e6115afed9665435..cea83363d760396b933c0132ee0d465659c9301b)" = "1"

      - name: Checkout exact predecessor implementation
        uses: actions/checkout@v4
        with:
          ref: 17a01ec25be2bbd7ee92b9e9e6115afed9665435
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Run exact predecessor graph preflight
        run: node scripts/runtime_acceptance/RUN_MCFT_CAP_06_S5_PREDECESSOR_GRAPH_CONFORMANCE.cjs

      - name: Verify predecessor structured evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S5_PREDECESSOR_GRAPH_PREFLIGHT_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s5_predecessor_graph_preflight_result_v1') throw new Error('POSTMERGE_GRAPH_SCHEMA_MISMATCH');
          if (result.status !== 'PASS') throw new Error('POSTMERGE_GRAPH_NOT_PASS');
          if (result.canonical_write_count !== 0 || result.candidate_append_count !== 0 || result.evaluation_append_count !== 0) throw new Error('POSTMERGE_GRAPH_WRITE_BOUNDARY_VIOLATION');
          if (result.s5_authorized !== false || result.s5_implementation_started !== false) throw new Error('POSTMERGE_GRAPH_FRONTIER_MISMATCH');
          NODE

      - name: Checkout exact effectiveness merge commit
        uses: actions/checkout@v4
        with:
          ref: dc7913d070c4a0c2cac0a7c35ccfa4292e633876
          fetch-depth: 0

      - name: Run structured effectiveness Gate
        run: node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_06_S5_PREDECESSOR_EFFECTIVENESS.cjs

      - name: Verify exact merged-main effectiveness evidence
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const result = JSON.parse(fs.readFileSync('acceptance-output/MCFT_CAP_06_S5_PREDECESSOR_EFFECTIVENESS_RESULT.json', 'utf8'));
          if (result.schema_version !== 'geox_mcft_cap_06_s5_predecessor_effectiveness_result_v1') throw new Error('POSTMERGE_EFFECTIVENESS_SCHEMA_MISMATCH');
          if (result.status !== 'PASS') throw new Error('POSTMERGE_EFFECTIVENESS_NOT_PASS');
          if (result.exact_head !== 'dc7913d070c4a0c2cac0a7c35ccfa4292e633876') throw new Error('POSTMERGE_EFFECTIVENESS_HEAD_MISMATCH');
          if (result.changed_file_count !== 6 || result.logical_commit_count !== 2) throw new Error('POSTMERGE_EFFECTIVENESS_HISTORY_MISMATCH');
          if (result.s5_authorized !== true || result.s5_implementation_started !== false) throw new Error('POSTMERGE_EFFECTIVENESS_FRONTIER_MISMATCH');
          if (result.canonical_write_count !== 0 || result.candidate_append_count !== 0 || result.evaluation_append_count !== 0) throw new Error('POSTMERGE_EFFECTIVENESS_WRITE_BOUNDARY_VIOLATION');
          NODE

      - name: Upload proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcft-cap-06-s5-predecessor-effectiveness-postmerge-proof
          path: acceptance-output/
          if-no-files-found: error
