name: MCFT-CAP-05 P0 materializer

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'agent/mcft-cap-05-p0-settlement-provisional-ssot-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Materialize P0 governance package
        shell: bash
        run: |
          set -euo pipefail
          python3 .mcft_cap_05_p0_materializer.py
          rm .mcft_cap_05_p0_materializer.py
          rm .github/workflows/mcft-cap-05-p0-materialize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(mcft-cap-05): materialize P0 settlement SSOT"
          node scripts/governance_acceptance/ACCEPTANCE_MCFT_CAP_05_P0_SETTLEMENT_SSOT.cjs
          git push origin HEAD:${{ github.head_ref }}
