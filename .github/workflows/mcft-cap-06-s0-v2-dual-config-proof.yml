name: mcft-cap-06-s0-v2-dual-config-proof

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/server/src/domain/twin_runtime/calibration_case_graph_qualification_v2.ts"
      - "apps/server/src/persistence/twin_runtime/postgres_cap06_repository_history_case_graph_reader_v2.ts"
      - "scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_CASE_GRAPH_QUALIFICATION_V3.ts"
      - ".github/workflows/mcft-cap-06-s0-v2-dual-config-proof.yml"
  workflow_dispatch:

jobs:
  dual-config-qualification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run server typecheck
        run: pnpm run typecheck:server

      - name: Run S0 v2 dual-config qualification acceptance
        run: pnpm -w exec tsx scripts/runtime_acceptance/ACCEPTANCE_MCFT_CAP_06_CASE_GRAPH_QUALIFICATION_V3.ts
